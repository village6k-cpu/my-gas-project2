<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="확인요청">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1e3a5f">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%231e3a5f' width='100' height='100' rx='20'/><text x='50' y='62' text-anchor='middle' font-size='50'>V</text></svg>">
<title>빌리지 확인요청</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'Noto Sans KR',-apple-system,sans-serif;
    background:#f5f7fa; color:#2d3436;
    font-size:18px; line-height:1.7;
    padding:16px; max-width:600px; margin:0 auto;
    -webkit-text-size-adjust:100%;
  }

  /* 헤더 */
  .header {
    background:#1e3a5f; color:#fff; padding:26px 20px; border-radius:16px;
    margin-bottom:20px; text-align:center;
  }
  .header h1 { font-size:26px; font-weight:700; }
  .header p { font-size:16px; opacity:.7; margin-top:8px; }

  /* 카드 */
  .card {
    background:#fff; border-radius:16px; padding:22px;
    box-shadow:0 2px 10px rgba(0,0,0,.08); margin-bottom:16px;
  }
  .card h3 { font-size:20px; font-weight:700; color:#1e3a5f; margin-bottom:16px; }

  /* 입력 */
  textarea {
    width:100%; min-height:240px; border:2px solid #ddd; border-radius:12px;
    padding:16px; font-size:18px; font-family:inherit; resize:vertical;
    line-height:1.7;
  }
  textarea:focus { outline:none; border-color:#3498db; }

  input[type="text"], input[type="date"], input[type="time"] {
    width:100%; border:2px solid #ddd; border-radius:12px;
    padding:14px 16px; font-size:18px; font-family:inherit;
  }
  input:focus { outline:none; border-color:#3498db; }

  /* 버튼 */
  .btn {
    display:block; width:100%; padding:20px; border:none; border-radius:14px;
    font-size:20px; font-weight:700; font-family:inherit;
    cursor:pointer; transition:all .15s;
  }
  .btn-parse { background:#3498db; color:#fff; margin-top:14px; }
  .btn-parse:active { background:#2980b9; }
  .btn-submit { background:#27ae60; color:#fff; }
  .btn-submit:active { background:#229954; }
  .btn-reset { background:#e74c3c; color:#fff; margin-top:10px; }
  .btn-reset:active { background:#c0392b; }
  .btn:disabled { background:#bdc3c7; cursor:not-allowed; }

  /* 결과 테이블 */
  .result-table { width:100%; border-collapse:collapse; margin:12px 0; }
  .result-table th {
    background:#f0f4f8; padding:14px 12px; text-align:left;
    font-size:16px; color:#666; border-bottom:2px solid #e0e0e0;
  }
  .result-table td {
    padding:12px; font-size:18px; border-bottom:1px solid #eee;
  }
  .result-table .equip-name { font-weight:600; }
  .result-table .equip-qty { text-align:center; width:80px; }
  .result-table input {
    width:100%; border:1.5px solid #ddd; border-radius:10px;
    padding:12px 14px; font-size:18px;
  }
  .result-table input.qty { width:70px; text-align:center; }

  /* 인포 그리드 */
  .info-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:14px; }
  .info-item label { font-size:15px; color:#888; display:block; margin-bottom:6px; font-weight:600; }

  /* 상태 메시지 */
  .status {
    padding:18px; border-radius:12px; margin:14px 0;
    font-size:18px; text-align:center; font-weight:600;
  }
  .status.success { background:#d5f5e3; color:#1e8449; }
  .status.error { background:#fadbd8; color:#c0392b; }
  .status.loading { background:#ebf5fb; color:#2980b9; }

  /* 삭제 버튼 */
  .btn-del {
    background:none; border:none; color:#e74c3c; cursor:pointer;
    font-size:26px; padding:6px 12px;
  }

  /* 장비 추가 */
  .btn-add-row {
    background:none; border:2px dashed #bbb; border-radius:12px;
    padding:16px; width:100%; color:#888; cursor:pointer;
    font-size:18px; margin-top:10px;
  }
  .btn-add-row:active { border-color:#3498db; color:#3498db; }

  .hidden { display:none; }

  /* 자동완성 드롭다운 */
  .ac-wrap { position:relative; }
  .ac-list {
    display:none; position:absolute; top:100%; left:0; right:0;
    background:#fff; border:2px solid #3498db; border-top:none;
    border-radius:0 0 10px 10px; max-height:200px; overflow-y:auto;
    z-index:50; box-shadow:0 4px 12px rgba(0,0,0,.15);
  }
  .ac-list.show { display:block; }
  .ac-item {
    padding:12px 14px; font-size:15px; cursor:pointer;
    border-bottom:1px solid #f0f0f0;
  }
  .ac-item:active, .ac-item.selected { background:#ebf5fb; }
  .ac-item .ac-match { color:#3498db; font-weight:700; }
  .ac-badge {
    display:inline-block; font-size:11px; color:#888;
    background:#f0f0f0; border-radius:4px; padding:1px 6px; margin-left:6px;
  }
  .equip-matched { border-color:#27ae60 !important; }
  .equip-unmatched { border-color:#e74c3c !important; }

  /* 입력 방식 탭 */
  .tab-bar {
    display:flex; gap:0; margin-bottom:14px;
  }
  .tab-btn {
    flex:1; padding:14px; border:2px solid #ddd; background:#f8f9fa;
    font-size:16px; font-weight:700; font-family:inherit;
    cursor:pointer; text-align:center; color:#888;
  }
  .tab-btn:first-child { border-radius:10px 0 0 10px; }
  .tab-btn:last-child { border-radius:0 10px 10px 0; }
  .tab-btn.on { background:#1e3a5f; color:#fff; border-color:#1e3a5f; }

  /* 사진 업로드 */
  .photo-area {
    border:2px dashed #ccc; border-radius:12px;
    padding:30px 20px; text-align:center; color:#888;
    cursor:pointer; position:relative;
  }
  .photo-area.has-img { border-style:solid; border-color:#3498db; padding:8px; }
  .photo-area .photo-icon { font-size:48px; margin-bottom:10px; }
  .photo-area .photo-text { font-size:15px; }
  .photo-area .photo-sub { font-size:13px; color:#aaa; margin-top:6px; }
  .photo-area img {
    max-width:100%; max-height:300px; border-radius:8px;
  }
  .photo-area input { display:none; }

  .photo-status {
    padding:14px; border-radius:10px; margin-top:12px;
    font-size:15px; text-align:center; font-weight:600;
  }
  .photo-status.loading { background:#ebf5fb; color:#2980b9; }
  .photo-status.error { background:#fadbd8; color:#c0392b; }

  /* 가용확인 결과 */
  .result-ok { color:#27ae60; font-weight:700; }
  .result-warn { color:#f39c12; font-weight:700; }
  .result-fail { color:#e74c3c; font-weight:700; }

</style>
</head>
<body>

<div class="header">
  <h1>빌리지 확인요청</h1>
  <p>카카오톡 대화를 붙여넣으면 자동으로 파싱합니다</p>
</div>

<!-- STEP 1: 입력 방식 선택 -->
<div id="step1">
  <div class="card">
    <div class="tab-bar">
      <button class="tab-btn on" id="tabText" onclick="switchTab('text')">텍스트 붙여넣기</button>
      <button class="tab-btn" id="tabPhoto" onclick="switchTab('photo')">사진 캡처</button>
    </div>

    <!-- 텍스트 입력 -->
    <div id="inputText">
      <textarea id="chatInput" placeholder="카카오톡 대화를 복사해서 붙여넣으세요

예시:
0402 12:00~0402 22:00
a7s3 바디세트 2대
70200gm2 2대"></textarea>
      <button class="btn btn-parse" onclick="parseChat()">파싱하기</button>
    </div>

    <!-- 사진 입력 -->
    <div id="inputPhoto" class="hidden">
      <div class="photo-area" id="photoArea" onclick="document.getElementById('photoFile').click()">
        <div id="photoPreview">
          <div class="photo-icon">📷</div>
          <div class="photo-text">사진 촬영 또는 앨범에서 선택</div>
          <div class="photo-sub">카카오톡 대화 캡처 이미지를 올려주세요</div>
        </div>
        <input type="file" id="photoFile" accept="image/*" onchange="onPhotoSelected(event)">
      </div>
      <div id="photoStatus"></div>
      <button class="btn btn-parse" onclick="parsePhoto()" id="btnParsePhoto" style="display:none">사진 파싱하기</button>
    </div>
  </div>
</div>

<!-- STEP 2: 파싱 결과 확인/수정 -->
<div id="step2" class="hidden">
  <div class="card">
    <h3>예약 정보</h3>
    <div class="info-grid">
      <div class="info-item">
        <label>예약자명</label>
        <input type="text" id="resName">
      </div>
      <div class="info-item">
        <label>연락처</label>
        <input type="tel" id="resPhone" placeholder="010-0000-0000" oninput="formatPhone(this)">
      </div>
      <div class="info-item">
        <label>반출일</label>
        <input type="date" id="startDate">
      </div>
      <div class="info-item">
        <label>반출시간</label>
        <input type="time" id="startTime">
      </div>
      <div class="info-item">
        <label>반납일</label>
        <input type="date" id="endDate">
      </div>
      <div class="info-item">
        <label>반납시간</label>
        <input type="time" id="endTime">
      </div>
    </div>
  </div>

  <div class="card">
    <h3>장비 목록</h3>
    <table class="result-table">
      <thead><tr><th>장비/세트명</th><th>수량</th><th></th></tr></thead>
      <tbody id="equipList"></tbody>
    </table>
    <button class="btn-add-row" onclick="addEquipRow()">+ 장비 추가</button>
  </div>

  <div id="statusMsg"></div>

  <div class="card" style="padding:12px">
    <button class="btn btn-submit" onclick="submitRequest()">확인요청 입력</button>
    <button class="btn btn-reset" onclick="resetForm()">다시 입력</button>
  </div>
</div>

<!-- STEP 3: 가용확인 결과 + 등록 -->
<div id="step3" class="hidden">
  <div class="card">
    <h3>가용확인 결과</h3>
    <div id="reqIdDisplay" style="font-size:14px; color:#888; margin-bottom:12px;"></div>
    <table class="result-table">
      <thead><tr><th>장비명</th><th>수량</th><th>결과</th></tr></thead>
      <tbody id="resultList"></tbody>
    </table>
  </div>

  <div id="registerStatusMsg"></div>

  <div class="card" style="padding:12px">
    <button class="btn btn-submit" onclick="registerRequest()" id="btnRegister">등록하기</button>
    <button class="btn" style="background:#3498db; color:#fff; margin-top:8px;" onclick="goBackToEdit()">수정하기</button>
    <button class="btn btn-reset" onclick="resetForm()">처음부터 다시</button>
  </div>
</div>

<script>
// ━━━ 웹앱 URL (자기 자신) ━━━
var API_URL = "";  // doGet에서 주입됨

// 페이지 로드 시 장비 목록 미리 로드
setTimeout(function() { if (API_URL) loadEquipList(); }, 100);

// ━━━ 카카오톡 텍스트 파싱 ━━━
function parseChat() {
  var text = document.getElementById("chatInput").value.trim();
  if (!text) return alert("대화 내용을 붙여넣어 주세요.");

  var result = { name: "", phone: "", startDate: "", startTime: "", endDate: "", endTime: "", items: [] };

  var lines = text.split("\n").map(function(l) { return l.trim(); }).filter(function(l) { return l; });

  // ── 예약자명 파싱 (카톡 대화 상대방 이름) ──
  // 카톡 복사 형식들:
  // "유근일 오후 3:13" / "유근일 오전 10:30" / "[유근일] 오후 3:13"
  // "유근일, [유근일] 오후 3:13" / "2024년 3월 29일 오후 3:13, 유근일"
  var senderNames = [];
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];
    // 패턴1: "이름 오전/오후 H:MM" (가장 일반적)
    var mName1 = line.match(/^(.+?)\s+[오][전후]\s*\d{1,2}:\d{2}/);
    if (mName1) {
      var n = mName1[1].replace(/[\[\]]/g, "").replace(/,\s*$/, "").trim();
      if (n.length >= 2 && n.length <= 10 && !/\d{4}년/.test(n) && !/빌리지/.test(n)) {
        senderNames.push(n);
      }
      continue;
    }
    // 패턴2: "[이름] 오전/오후 H:MM"
    var mName2 = line.match(/^\[(.+?)\]\s*[오][전후]\s*\d{1,2}:\d{2}/);
    if (mName2) {
      var n2 = mName2[1].trim();
      if (n2.length >= 2 && n2.length <= 10 && !/빌리지/.test(n2)) {
        senderNames.push(n2);
      }
      continue;
    }
    // 패턴3: "날짜, 이름" 형식 (카톡 내보내기)
    var mName3 = line.match(/\d{4}[년.]\s*\d{1,2}[월.]\s*\d{1,2}[일.]?\s*.+?,\s*(.+)/);
    if (mName3) {
      var n3 = mName3[1].trim();
      if (n3.length >= 2 && n3.length <= 10 && !/빌리지/.test(n3)) {
        senderNames.push(n3);
      }
    }
  }
  // 가장 많이 등장하는 이름 = 상대방 (빌리지/본인 제외)
  if (senderNames.length > 0) {
    var nameCount = {};
    senderNames.forEach(function(n) { nameCount[n] = (nameCount[n] || 0) + 1; });
    // 가장 빈도 높은 이름
    var sorted = Object.keys(nameCount).sort(function(a, b) { return nameCount[b] - nameCount[a]; });
    result.name = sorted[0] || "";
  }

  // ── 연락처 파싱 ──
  var phoneMatch = text.match(/01[016789][-\s.]?\d{3,4}[-\s.]?\d{4}/);
  if (phoneMatch) {
    // 숫자만 추출 후 하이픈 포맷팅
    var digits = phoneMatch[0].replace(/\D/g, "");
    result.phone = formatPhoneNumber(digits);
  }

  // ── 날짜/시간 파싱 ──
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];

    // 패턴1: "0402 12:00~0402 22:00" 또는 "0402 12:00 ~ 0402 22:00"
    var m1 = line.match(/(\d{2,4})\s*(\d{1,2}:\d{2})\s*~\s*(\d{2,4})\s*(\d{1,2}:\d{2})/);
    if (m1) {
      result.startDate = parseShortDate(m1[1]);
      result.startTime = m1[2];
      result.endDate = parseShortDate(m1[3]);
      result.endTime = m1[4];
      continue;
    }

    // 패턴2: "4/2 12:00 ~ 4/3 22:00" 또는 "4월2일 12:00~4월3일 22:00"
    var m2 = line.match(/(\d{1,2})[\/월](\d{1,2})[일]?\s*(\d{1,2}:\d{2})\s*~\s*(\d{1,2})[\/월](\d{1,2})[일]?\s*(\d{1,2}:\d{2})/);
    if (m2) {
      result.startDate = buildDate(m2[1], m2[2]);
      result.startTime = m2[3];
      result.endDate = buildDate(m2[4], m2[5]);
      result.endTime = m2[6];
      continue;
    }

    // 패턴3: 날짜만 "0402~0403" 또는 "4/2~4/3"
    var m3 = line.match(/(\d{2,4})\s*~\s*(\d{2,4})(?!\s*\d{1,2}:)/);
    if (m3 && !result.startDate) {
      result.startDate = parseShortDate(m3[1]);
      result.endDate = parseShortDate(m3[2]);
      continue;
    }

    // 패턴4: 시간만 "12:00~22:00"
    var m4 = line.match(/(\d{1,2}:\d{2})\s*~\s*(\d{1,2}:\d{2})/);
    if (m4 && !result.startTime) {
      result.startTime = m4[1];
      result.endTime = m4[2];
      continue;
    }
  }

  // ── 장비 파싱 ──
  // 제외 키워드 (대화 맥락에서 제외된 항목)
  var excludePatterns = /예약|가능|확정|부탁|안녕|감독|혹시|이렇게|추가|제외|오즈모|그러면|이어도|없구|있습니|것 같|가능하실/;

  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];
    // 날짜/시간 패턴이 있는 줄은 스킵
    if (/\d{1,2}:\d{2}\s*~/.test(line) || /~\s*\d{1,2}:\d{2}/.test(line)) continue;
    if (excludePatterns.test(line)) continue;

    // "장비명 N대/세트/개" 패턴
    var mEquip = line.match(/^(.+?)\s+(\d+)\s*(대|세트|개|ea)?$/i);
    if (mEquip) {
      result.items.push({ name: mEquip[1].trim(), qty: parseInt(mEquip[2]) });
      continue;
    }

    // "장비명 N대" 가 중간에 있는 패턴
    var mInline = line.match(/^(.+?)\s+(\d+)\s*(대|세트|개|ea)/i);
    if (mInline) {
      result.items.push({ name: mInline[1].trim(), qty: parseInt(mInline[2]) });
      continue;
    }

    // 수량 없이 장비명만 있는 경우 (한글/영문/숫자 조합, 2글자 이상)
    if (/^[가-힣a-zA-Z0-9\s\+\-\(\)\.]+$/.test(line) && line.length >= 2 && !/^\d+$/.test(line)) {
      // 단순 인사/대화가 아닌 경우만
      if (!/^(네|넵|아|음|혹시|그럼|저희)/.test(line)) {
        result.items.push({ name: line.trim(), qty: 1 });
      }
    }
  }

  // ── 결과 표시 ──
  document.getElementById("resName").value = result.name;
  document.getElementById("resPhone").value = result.phone;
  document.getElementById("startDate").value = result.startDate;
  document.getElementById("startTime").value = result.startTime;
  document.getElementById("endDate").value = result.endDate;
  document.getElementById("endTime").value = result.endTime;

  var tbody = document.getElementById("equipList");
  tbody.innerHTML = "";
  result.items.forEach(function(item) { addEquipRow(item.name, item.qty); });
  if (result.items.length === 0) addEquipRow("", 1);

  document.getElementById("step1").classList.add("hidden");
  document.getElementById("step2").classList.remove("hidden");
}

// ━━━ 날짜 헬퍼 ━━━
function parseShortDate(s) {
  var now = new Date();
  var year = now.getFullYear();
  if (s.length === 4) {
    // 0402 → 04-02
    return year + "-" + s.substring(0,2) + "-" + s.substring(2,4);
  } else if (s.length === 6) {
    // 260402 → 2026-04-02
    return "20" + s.substring(0,2) + "-" + s.substring(2,4) + "-" + s.substring(4,6);
  } else if (s.length === 8) {
    // 20260402
    return s.substring(0,4) + "-" + s.substring(4,6) + "-" + s.substring(6,8);
  }
  return s;
}

function buildDate(m, d) {
  var year = new Date().getFullYear();
  return year + "-" + String(m).padStart(2,"0") + "-" + String(d).padStart(2,"0");
}

// ━━━ 장비 목록 로드 ━━━
var equipMasterList = [];

function loadEquipList() {
  fetch(API_URL + "?key=village2026&action=read&sheet=목록&range=A2:A500")
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.values) {
        equipMasterList = data.values.flat().filter(function(v) { return v; });
      } else if (Array.isArray(data)) {
        equipMasterList = data.flat().filter(function(v) { return v; });
      }
    })
    .catch(function(e) { console.log("장비 목록 로드 실패:", e); });
}

// ━━━ 장비 행 추가/삭제 ━━━
function addEquipRow(name, qty) {
  var tbody = document.getElementById("equipList");
  var tr = document.createElement("tr");

  // 자동 매칭 시도
  var matchedName = name ? clientFuzzyMatch(name) : "";
  var isMatched = matchedName && equipMasterList.indexOf(matchedName) >= 0;
  var displayName = matchedName || name || "";
  var borderClass = name ? (isMatched ? "equip-matched" : "equip-unmatched") : "";

  tr.innerHTML =
    '<td class="ac-wrap">' +
      '<input type="text" class="equip-name ' + borderClass + '" value="' + displayName.replace(/"/g, '&quot;') + '" placeholder="장비명 검색" autocomplete="off" onfocus="showAcList(this)" oninput="filterAcList(this)">' +
      '<div class="ac-list"></div>' +
    '</td>' +
    '<td><input type="text" class="qty equip-qty" value="' + (qty || 1) + '"></td>' +
    '<td><button class="btn-del" onclick="this.closest(\'tr\').remove()">✕</button></td>';
  tbody.appendChild(tr);
}

// ━━━ 자동완성 ━━━
function showAcList(input) {
  // 포커스 시: 미매칭(빨강)이면 입력값 비우고 전체 목록 표시
  if (input.classList.contains("equip-unmatched")) {
    input.dataset.original = input.value;
    input.value = "";
    input.placeholder = input.dataset.original + " → 선택하세요";
  }
  filterAcList(input);
}

function filterAcList(input) {
  var wrap = input.closest(".ac-wrap");
  var list = wrap.querySelector(".ac-list");
  var query = input.value.trim().toLowerCase().replace(/\s+/g, "");

  if (equipMasterList.length === 0) {
    list.classList.remove("show");
    return;
  }

  // 필터링 + 점수
  var scored = equipMasterList.map(function(name) {
    var nameLower = name.toLowerCase().replace(/\s+/g, "");
    var score = 0;
    if (!query) { score = 1; }
    else if (nameLower === query) { score = 100; }
    else if (nameLower.indexOf(query) >= 0) { score = 80; }
    else if (query.indexOf(nameLower) >= 0) { score = 60; }
    else {
      // 키워드 매칭
      var keywords = query.match(/[a-z]+\d+[a-z]*\d*|[가-힣]{2,}|[a-z]{2,}/gi) || [];
      keywords.forEach(function(kw) {
        if (nameLower.indexOf(kw.toLowerCase()) >= 0) score += 20;
      });
    }
    return { name: name, score: score };
  }).filter(function(s) { return s.score > 0; })
    .sort(function(a, b) { return b.score - a.score; })
    .slice(0, 30);

  if (scored.length === 0 && query) {
    // 검색 결과 없으면 전체 목록 표시
    scored = equipMasterList.slice(0, 30).map(function(name) {
      return { name: name, score: 1 };
    });
  }

  list.innerHTML = scored.map(function(s) {
    var display = query ? highlightMatch(s.name, query) : s.name;
    return '<div class="ac-item" onmousedown="selectAcItem(this, \'' + s.name.replace(/'/g, "\\'") + '\')">' + display + '</div>';
  }).join("");
  list.classList.add("show");
}

function highlightMatch(name, query) {
  if (!query) return name;
  var idx = name.toLowerCase().replace(/\s+/g, "").indexOf(query);
  // 단순 하이라이트 - 원문에서 찾기
  var lowerName = name.toLowerCase();
  var qi = 0;
  var result = "";
  for (var i = 0; i < name.length && qi < query.length; i++) {
    if (name[i].toLowerCase() === query[qi] || (name[i] === " ")) {
      if (name[i].toLowerCase() === query[qi]) {
        result += '<span class="ac-match">' + name[i] + '</span>';
        qi++;
      } else {
        result += name[i];
      }
    } else {
      result += name[i];
    }
  }
  result += name.substring(result.replace(/<[^>]*>/g, "").length);
  return result || name;
}

function selectAcItem(el, name) {
  var wrap = el.closest(".ac-wrap");
  var input = wrap.querySelector(".equip-name");
  input.value = name;
  input.className = "equip-name equip-matched";
  wrap.querySelector(".ac-list").classList.remove("show");
}

// 전역 클릭으로 드롭다운 닫기
document.addEventListener("click", function(e) {
  if (!e.target.closest(".ac-wrap")) {
    document.querySelectorAll(".ac-list").forEach(function(l) { l.classList.remove("show"); });
  }
});

// ━━━ 클라이언트 퍼지 매칭 ━━━
function clientFuzzyMatch(input) {
  if (!input || equipMasterList.length === 0) return input;
  var q = input.toLowerCase().replace(/\s+/g, "");

  // 정확 일치
  for (var i = 0; i < equipMasterList.length; i++) {
    if (equipMasterList[i].toLowerCase().replace(/\s+/g, "") === q) return equipMasterList[i];
  }

  // 포함 매칭 (가장 짧은 길이 차이)
  var contains = [];
  for (var i = 0; i < equipMasterList.length; i++) {
    var n = equipMasterList[i].toLowerCase().replace(/\s+/g, "");
    if (n.indexOf(q) >= 0 || q.indexOf(n) >= 0) {
      contains.push({ name: equipMasterList[i], diff: Math.abs(n.length - q.length) });
    }
  }
  if (contains.length > 0) {
    contains.sort(function(a, b) { return a.diff - b.diff; });
    return contains[0].name;
  }

  // 키워드 매칭
  var keywords = q.match(/[a-z]+\d+[a-z]*\d*|[a-z]{2,}/gi) || [];
  if (keywords.length > 0) {
    var best = null, bestScore = 0;
    for (var i = 0; i < equipMasterList.length; i++) {
      var n = equipMasterList[i].toLowerCase().replace(/\s+/g, "");
      var score = 0;
      keywords.forEach(function(kw) { if (n.indexOf(kw.toLowerCase()) >= 0) score++; });
      if (score > bestScore) { bestScore = score; best = equipMasterList[i]; }
    }
    if (best) return best;
  }

  return input; // 매칭 실패 시 원본
}

// ━━━ 확인요청 제출 ━━━
function submitRequest() {
  var startDate = document.getElementById("startDate").value;
  var endDate = document.getElementById("endDate").value;
  if (!startDate || !endDate) return alert("반출일/반납일을 입력해 주세요.");

  var rows = document.querySelectorAll("#equipList tr");
  var items = [];
  rows.forEach(function(tr) {
    var name = tr.querySelector(".equip-name").value.trim();
    var qty = parseInt(tr.querySelector(".equip-qty").value) || 1;
    if (name) items.push({ "이름": name, "수량": qty });
  });
  if (items.length === 0) return alert("장비를 1개 이상 입력해 주세요.");

  var payload = {
    key: "village2026",
    action: "run",
    func: "insertAndCheckRequest",
    args: {
      "반출일": startDate,
      "반출시간": document.getElementById("startTime").value || "",
      "반납일": endDate,
      "반납시간": document.getElementById("endTime").value || "",
      "예약자명": document.getElementById("resName").value || "",
      "연락처": document.getElementById("resPhone").value || "",
      "장비": items
    }
  };

  showStatus("loading", "확인요청 입력 + 가용확인 중...");
  var btn = document.querySelector(".btn-submit");
  btn.disabled = true;

  fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify(payload),
    redirect: "follow"
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    btn.disabled = false;
    if (data.success) {
      currentReqID = data.reqID;
      showAvailabilityResults(data.reqID, data.results || []);
    } else {
      showStatus("error", "오류: " + (data.error || JSON.stringify(data)));
    }
  })
  .catch(function(err) {
    btn.disabled = false;
    showStatus("error", "통신 오류: " + err.message);
  });
}

// ━━━ 가용확인 결과 표시 ━━━
var currentReqID = "";

function showAvailabilityResults(reqID, results) {
  document.getElementById("step2").classList.add("hidden");
  document.getElementById("step3").classList.remove("hidden");
  document.getElementById("statusMsg").style.display = "none";

  document.getElementById("reqIdDisplay").textContent = "요청ID: " + reqID;

  var tbody = document.getElementById("resultList");
  tbody.innerHTML = "";

  var allOk = true;
  results.forEach(function(r) {
    var tr = document.createElement("tr");
    var resultClass = "result-ok";
    var resultText = r.결과 || "";
    if (/부족|⚠/.test(resultText)) { resultClass = "result-warn"; allOk = false; }
    if (/가용0|❌|없음/.test(resultText)) { resultClass = "result-fail"; allOk = false; }

    tr.innerHTML =
      '<td class="equip-name">' + (r.장비명 || "") + '</td>' +
      '<td class="equip-qty" style="text-align:center">' + (r.수량 || "") + '</td>' +
      '<td class="' + resultClass + '">' + resultText + '<br><span style="font-size:12px;color:#888;font-weight:400">' + (r.상세 || "") + '</span></td>';
    tbody.appendChild(tr);
  });

  // 등록 버튼 상태
  var btnReg = document.getElementById("btnRegister");
  if (allOk) {
    btnReg.style.background = "#27ae60";
    btnReg.textContent = "등록하기";
  } else {
    btnReg.style.background = "#f39c12";
    btnReg.textContent = "일부 부족 — 그래도 등록하기";
  }
}

// ━━━ 등록 ━━━
function registerRequest() {
  if (!currentReqID) return alert("요청ID가 없습니다.");

  var statusEl = document.getElementById("registerStatusMsg");
  statusEl.className = "status loading";
  statusEl.textContent = "등록 처리 중...";
  statusEl.style.display = "block";

  var btnReg = document.getElementById("btnRegister");
  btnReg.disabled = true;

  // GAS 웹앱은 POST 시 302 리다이렉트 → manual로 잡아서 리다이렉트 URL을 GET으로 재요청
  fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify({
      key: "village2026",
      action: "등록",
      reqID: currentReqID
    }),
    redirect: "manual"
  })
  .then(function(r) {
    if (r.type === "opaqueredirect" || r.status === 0) {
      // GAS 리다이렉트: GET으로 재호출
      return fetch(API_URL + "?key=village2026&action=등록&reqID=" + encodeURIComponent(currentReqID));
    }
    return r;
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    btnReg.disabled = false;
    if (data.status === "OK" || data.success) {
      statusEl.className = "status success";
      statusEl.textContent = "등록 완료! " + (data.message || "");
      btnReg.style.display = "none";
    } else {
      statusEl.className = "status error";
      statusEl.textContent = "오류: " + (data.message || data.error || JSON.stringify(data));
    }
  })
  .catch(function(err) {
    btnReg.disabled = false;
    statusEl.className = "status error";
    statusEl.textContent = "통신 오류: " + err.message;
  });
}

// ━━━ 수정하기 (step3 → step2) ━━━
function goBackToEdit() {
  document.getElementById("step3").classList.add("hidden");
  document.getElementById("step2").classList.remove("hidden");
}

// ━━━ 전화번호 포맷팅 ━━━
function formatPhoneNumber(digits) {
  if (!digits) return "";
  digits = digits.replace(/\D/g, "");
  if (digits.length === 11) {
    return digits.substring(0,3) + "-" + digits.substring(3,7) + "-" + digits.substring(7);
  } else if (digits.length === 10) {
    return digits.substring(0,3) + "-" + digits.substring(3,6) + "-" + digits.substring(6);
  }
  return digits;
}

function formatPhone(el) {
  var digits = el.value.replace(/\D/g, "");
  if (digits.length > 11) digits = digits.substring(0, 11);
  el.value = formatPhoneNumber(digits);
}

function showStatus(type, msg) {
  var el = document.getElementById("statusMsg");
  el.className = "status " + type;
  el.textContent = msg;
  el.style.display = "block";
}

// ━━━ 탭 전환 ━━━
function switchTab(tab) {
  document.getElementById("tabText").classList.toggle("on", tab === "text");
  document.getElementById("tabPhoto").classList.toggle("on", tab === "photo");
  document.getElementById("inputText").classList.toggle("hidden", tab !== "text");
  document.getElementById("inputPhoto").classList.toggle("hidden", tab !== "photo");
}

// ━━━ 사진 선택 ━━━
var selectedImageBase64 = null;

function onPhotoSelected(e) {
  var file = e.target.files[0];
  if (!file) return;

  var reader = new FileReader();
  reader.onload = function(ev) {
    selectedImageBase64 = ev.target.result;
    // 미리보기
    document.getElementById("photoPreview").innerHTML =
      '<img src="' + selectedImageBase64 + '">';
    document.getElementById("photoArea").classList.add("has-img");
    document.getElementById("btnParsePhoto").style.display = "block";
    document.getElementById("photoStatus").innerHTML = "";
  };
  reader.readAsDataURL(file);
}

// ━━━ 사진 파싱 (Claude API via GAS) ━━━
function parsePhoto() {
  if (!selectedImageBase64) return alert("사진을 먼저 선택해주세요.");

  var statusEl = document.getElementById("photoStatus");
  statusEl.className = "photo-status loading";
  statusEl.textContent = "AI가 이미지를 분석 중...";
  document.getElementById("btnParsePhoto").disabled = true;

  // base64에서 data:image/... 헤더 분리
  var parts = selectedImageBase64.split(",");
  var mediaType = parts[0].match(/data:(.*?);/)[1];
  var base64Data = parts[1];

  fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify({
      key: "village2026",
      action: "parseImage",
      image: base64Data,
      mediaType: mediaType
    }),
    redirect: "follow"
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    document.getElementById("btnParsePhoto").disabled = false;
    if (data.error) {
      statusEl.className = "photo-status error";
      statusEl.textContent = "오류: " + data.error;
      return;
    }
    statusEl.innerHTML = "";
    // 파싱 결과를 step2에 표시
    applyParsedResult(data);
  })
  .catch(function(err) {
    document.getElementById("btnParsePhoto").disabled = false;
    statusEl.className = "photo-status error";
    statusEl.textContent = "통신 오류: " + err.message;
  });
}

// ━━━ 파싱 결과 적용 (텍스트/사진 공용) ━━━
function applyParsedResult(result) {
  document.getElementById("resName").value = result.name || result.예약자명 || "";
  var rawPhone = result.phone || result.연락처 || "";
  document.getElementById("resPhone").value = formatPhoneNumber(rawPhone.replace(/\D/g, "")) || rawPhone;
  document.getElementById("startDate").value = result.startDate || result.반출일 || "";
  document.getElementById("startTime").value = result.startTime || result.반출시간 || "";
  document.getElementById("endDate").value = result.endDate || result.반납일 || "";
  document.getElementById("endTime").value = result.endTime || result.반납시간 || "";

  var items = result.items || result.장비 || [];
  var tbody = document.getElementById("equipList");
  tbody.innerHTML = "";
  items.forEach(function(item) {
    addEquipRow(item.name || item.이름 || "", item.qty || item.수량 || 1);
  });
  if (items.length === 0) addEquipRow("", 1);

  document.getElementById("step1").classList.add("hidden");
  document.getElementById("step2").classList.remove("hidden");
}

// ━━━ 초기화 ━━━
function resetForm() {
  document.getElementById("step1").classList.remove("hidden");
  document.getElementById("step2").classList.add("hidden");
  document.getElementById("step3").classList.add("hidden");
  document.getElementById("chatInput").value = "";
  document.getElementById("statusMsg").style.display = "none";
  document.getElementById("registerStatusMsg").style.display = "none";
  currentReqID = "";
  var btnReg = document.getElementById("btnRegister");
  btnReg.style.display = "block";
  btnReg.disabled = false;
  // 사진 초기화
  selectedImageBase64 = null;
  document.getElementById("photoPreview").innerHTML =
    '<div class="photo-icon">📷</div>' +
    '<div class="photo-text">사진 촬영 또는 앨범에서 선택</div>' +
    '<div class="photo-sub">카카오톡 대화 캡처 이미지를 올려주세요</div>';
  document.getElementById("photoArea").classList.remove("has-img");
  document.getElementById("btnParsePhoto").style.display = "none";
  document.getElementById("photoStatus").innerHTML = "";
  document.getElementById("photoFile").value = "";
}
