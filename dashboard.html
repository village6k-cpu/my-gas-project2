<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#F7F7F5">
<title>빌리지 오늘 일정</title>
<style>
  :root {
    --bg: #F7F7F5;
    --surface: #FFFFFF;
    --border: #E9E9E7;
    --border-light: #F0F0EE;
    --text-primary: #37352F;
    --text-secondary: #787774;
    --text-muted: #B4B4B0;
    --accent: #2383E2;
    --blue-bg: #D3E5EF;
    --blue-text: #24609C;
    --amber-bg: #FDECC8;
    --amber-text: #93640D;
    --green-bg: #DBEDDB;
    --green-text: #2B6B2B;
    --gray-bg: #E8E8E5;
    --gray-text: #787774;
    --red: #EB5757;
    --radius: 6px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    -webkit-user-select: none; user-select: none;
  }

  /* ── 헤더 ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px 10px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .date-context {
    display: flex;
    align-items: baseline;
    gap: 8px;
    color: var(--text-muted);
    font-size: 12px;
    margin-left: auto;
    white-space: nowrap;
  }
  .date-context strong {
    color: var(--text-primary);
    font-size: 13px;
    font-weight: 750;
  }
  .header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }
  .app-switcher {
    display: flex;
    overflow: hidden;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .app-tab {
    display: inline-flex;
    align-items: center;
    min-height: 32px;
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 650;
    color: var(--text-secondary);
    text-decoration: none;
    white-space: nowrap;
  }
  .app-tab:not(:last-child) { border-right: 1px solid var(--border); }
  .app-tab.active { background: var(--accent); color: #fff; }
  a.app-tab:hover { color: var(--accent); background: rgba(0,0,0,0.03); }
  .nav-link {
    min-height: 32px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-primary);
    background: var(--bg);
    text-decoration: none;
    font-size: 12px;
    font-weight: 650;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .nav-link:hover { border-color: var(--accent); color: var(--accent); }
  .nav-link:active { background: var(--bg); }
  .nav-link.request-link {
    min-height: 36px;
    padding: 7px 12px 7px 9px;
    border-color: rgba(35,131,226,0.34);
    background: #EAF4FF;
    color: #0F5EA8;
    font-weight: 800;
    box-shadow: 0 1px 0 rgba(35,131,226,0.08);
  }
  .nav-link.request-link:hover {
    background: #DDEEFF;
    border-color: var(--accent);
    color: #0B5CAD;
  }
  .request-ai-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    height: 20px;
    min-width: 24px;
    padding: 0 5px;
    border-radius: 4px;
    background: var(--accent);
    color: #fff;
    font-size: 10px;
    font-weight: 850;
    line-height: 1;
  }
  .request-main { white-space: nowrap; }

  .icon-btn {
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    cursor: pointer;
    color: var(--text-secondary);
    font-size: 16px;
    transition: all 0.15s;
  }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
  .icon-btn:active { background: var(--bg); }
  .icon-btn.spinning { animation: spin 0.8s ease; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── 날짜 네비 ── */
  .date-nav {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .date-nav-btn {
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    cursor: pointer;
    color: var(--text-secondary);
    font-size: 13px;
  }
  .date-nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .date-nav-btn:active { background: var(--bg); }

  .date-input {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    min-height: 32px;
    padding: 6px 10px;
    font-size: 13px;
    font-family: inherit;
    color: var(--text-primary);
    background: var(--surface);
    cursor: pointer;
    outline: none;
  }
  .date-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(35,131,226,0.15); }

  .today-btn {
    border: 1px solid var(--accent);
    background: var(--accent);
    color: #fff;
    min-height: 32px;
    padding: 6px 12px;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.15s;
  }
  .today-btn:hover { opacity: 0.9; }
  .today-btn:active { opacity: 0.85; }

  .dashboard-search {
    position: relative;
    flex: 1 1 240px;
    max-width: 360px;
    min-width: 190px;
  }
  .dashboard-search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 13px;
    pointer-events: none;
  }
  .dashboard-search input {
    width: 100%;
    min-height: 32px;
    padding: 6px 10px 6px 30px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg);
    color: var(--text-primary);
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .dashboard-search input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(35,131,226,0.15);
  }
  .dashboard-search input::placeholder { color: var(--text-muted); }

  /* ── 인수인계 메모 ── */
  .notice-board {
    --notice-note-font-size: 15px;
    --notice-note-min-height: 54px;
    display: grid;
    grid-template-columns: minmax(150px, 210px) minmax(0, 1fr);
    gap: 12px;
    padding: 14px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .notice-lead,
  .notice-note {
    position: relative;
    border-radius: var(--radius);
    box-shadow: 0 4px 12px rgba(55,53,47,0.08);
  }
  .notice-lead {
    padding: 13px 15px;
    background: #FFF4BC;
    border: 1px solid #EED47A;
    transform: rotate(-0.5deg);
  }
  .notice-kicker {
    color: #93640D;
    font-size: 11px;
    font-weight: 800;
    margin-bottom: 4px;
  }
  .notice-title {
    color: var(--text-primary);
    font-size: 24px;
    font-weight: 850;
    line-height: 1.05;
  }
  .notice-controls {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 12px;
  }
  .notice-add-btn {
    width: 30px;
    height: 30px;
    border: 1px solid #D0B95D;
    border-radius: var(--radius);
    background: rgba(255,255,255,0.45);
    color: #93640D;
    font-size: 18px;
    font-weight: 800;
    line-height: 1;
    cursor: pointer;
  }
  .notice-add-btn:hover { background: rgba(255,255,255,0.7); }
  .notice-font-controls {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px;
    border: 1px solid rgba(147,100,13,0.28);
    border-radius: var(--radius);
    background: rgba(255,255,255,0.36);
  }
  .notice-font-btn {
    min-width: 28px;
    height: 24px;
    border: none;
    border-radius: 4px;
    background: transparent;
    color: #93640D;
    font-size: 12px;
    font-weight: 850;
    font-family: inherit;
    cursor: pointer;
  }
  .notice-font-btn:hover { background: rgba(255,255,255,0.68); }
  .notice-font-size {
    min-width: 34px;
    text-align: center;
    color: #93640D;
    font-size: 11px;
    font-weight: 800;
  }
  .notice-save-state {
    color: #93640D;
    font-size: 11px;
    font-weight: 700;
    min-width: 42px;
  }
  .notice-list {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
  }
  .notice-note {
    padding: 14px 36px 14px 17px;
    background: #FFFDF2;
    border: 1px solid #E8D99F;
    border-left: 4px solid #D99A00;
    color: var(--text-primary);
    font-size: var(--notice-note-font-size);
    font-weight: 750;
    line-height: 1.5;
  }
  .notice-note.secondary {
    background: #F2F7FB;
    border-color: #D8E5EF;
    border-left-color: var(--accent);
  }
  .notice-note::before {
    content: '';
    position: absolute;
    top: 9px;
    right: 32px;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: rgba(55,53,47,0.22);
  }
  .notice-textarea {
    width: 100%;
    min-height: var(--notice-note-min-height);
    border: none;
    outline: none;
    resize: none;
    overflow: hidden;
    background: transparent;
    color: inherit;
    font: inherit;
    line-height: inherit;
    letter-spacing: 0;
  }
  .notice-textarea:focus { box-shadow: inset 0 -1px 0 rgba(35,131,226,0.35); }
  .notice-delete-btn {
    position: absolute;
    top: 4px;
    right: 4px;
    width: 24px;
    height: 24px;
    border: 1px solid transparent;
    border-radius: var(--radius);
    background: transparent;
    color: var(--text-muted);
    font-size: 16px;
    line-height: 1;
    cursor: pointer;
  }
  .notice-delete-btn:hover { border-color: rgba(235,87,87,0.35); color: var(--red); background: rgba(235,87,87,0.06); }

  /* ── 탭 ── */
  .tabs {
    display: flex;
    padding: 10px 20px;
    gap: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 108px;
    z-index: 50;
  }
  .tabs-inner {
    display: flex;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .tab {
    flex: 1;
    padding: 6px 14px;
    border: none;
    border-right: 1px solid var(--border);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    background: transparent;
    color: var(--text-secondary);
    font-family: inherit;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .tab:last-child { border-right: none; }
  .tab:hover { background: rgba(0,0,0,0.03); }
  .tab.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .tab .badge {
    display: inline-block;
    background: rgba(0,0,0,0.06);
    border-radius: 6px;
    padding: 1px 7px;
    font-size: 11px;
    margin-left: 4px;
  }
  .tab.active .badge { background: rgba(255,255,255,0.25); }

  /* ── 컨텐츠 ── */
  .content { padding: 0 20px 30px; }
  .section { display: none; }
  .section.visible { display: block; }

  .time-group { margin-top: 16px; }
  .time-group-header {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 0.3px;
    padding: 0 2px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .time-group-header::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── 일정 카드 ── */
  .schedule-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 8px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: box-shadow 0.15s;
  }
  .schedule-card:active { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }

  .schedule-card.type-checkout { border-left: 3px solid var(--accent); }
  .schedule-card.type-checkin  { border-left: 3px solid var(--gray-text); }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
  }
  .customer-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-primary);
  }
  .customer-company {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .time-badge {
    font-size: 12px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 6px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .type-checkout .time-badge { background: var(--blue-bg); color: var(--blue-text); }
  .type-checkin  .time-badge { background: var(--gray-bg); color: var(--gray-text); }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 8px;
    font-size: 13px;
    color: var(--text-secondary);
  }
  .card-meta .icon { font-size: 13px; width: 16px; text-align: center; }

  .equip-list { display: flex; flex-wrap: wrap; gap: 5px; }
  .equip-tag {
    background: var(--bg);
    color: var(--text-secondary);
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 5px;
    font-weight: 600;
    border: 1px solid var(--border);
  }
  .equip-tag.set-tag {
    background: var(--green-bg);
    color: var(--green-text);
    border-color: #A7F3D0;
  }
  .equip-add-btn {
    display: inline-flex;
    align-items: center;
    min-height: 24px;
    padding: 3px 9px;
    border: 1px dashed var(--text-muted);
    border-radius: 5px;
    color: var(--text-secondary);
    background: transparent;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }
  .equip-add-btn:active { background: var(--bg); }
  .equip-checklist {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-top: 6px;
    margin-bottom: 8px;
  }
  .equip-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    border-radius: var(--radius);
    background: var(--surface);
    border: 1px solid var(--border);
    font-size: 13px;
    position: relative;
  }
  .equip-row.is-set { background: var(--green-bg); border-color: #B8D8B8; font-weight: 700; }
  .equip-row.is-component { padding-left: 28px; background: var(--bg); border-color: transparent; font-size: 12px; color: var(--text-secondary); }
  .equip-row.is-component::before {
    content: '└';
    position: absolute;
    left: 14px;
    color: var(--text-muted);
  }
  .equip-row.is-single { background: var(--surface); }
  .equip-row.checked { opacity: 0.55; }
  .equip-row.checked .equip-name { text-decoration: line-through; }
  .equip-row-main {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
  }
  .equip-checkbox {
    width: 18px;
    height: 18px;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    background: var(--surface);
    color: transparent;
    font-weight: 700;
    font-size: 12px;
    line-height: 1;
    transition: all 0.15s;
  }
  .equip-checkbox.checked {
    background: var(--green-text);
    border-color: var(--green-text);
    color: #fff;
  }
  .equip-name { flex: 1; min-width: 0; word-break: break-word; }
  .equip-set-tag {
    display: inline-block;
    background: var(--green-text);
    color: #fff;
    font-size: 9px;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 3px;
    margin-right: 4px;
    vertical-align: middle;
  }
  .equip-qty {
    color: var(--text-secondary);
    font-size: 11px;
    font-weight: 600;
    flex-shrink: 0;
    margin-right: 4px;
  }
  .equip-row-remove {
    width: 18px;
    height: 18px;
    line-height: 16px;
    text-align: center;
    color: var(--text-muted);
    cursor: pointer;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .equip-row-remove:hover { background: #FAE0E0; color: var(--red); }
  .equip-return-meta,
  .trade-return-meta {
    display: grid;
    grid-template-columns: 116px minmax(0, 1fr);
    gap: 6px;
    width: 100%;
    box-sizing: border-box;
  }
  .equip-return-meta {
    padding-left: 26px;
  }
  .trade-return-meta {
    margin-top: 10px;
    padding: 8px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg);
  }
  .return-status-select,
  .return-memo-input {
    min-height: 30px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text-primary);
    font-size: 12px;
    font-family: inherit;
    padding: 5px 8px;
    outline: none;
  }
  .return-memo-input { width: 100%; box-sizing: border-box; }
  .return-status-select:focus,
  .return-memo-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(37,99,235,0.15);
  }
  .return-status-select.is-saving,
  .return-memo-input.is-saving { border-color: var(--accent); }
  .return-status-select.is-error,
  .return-memo-input.is-error { border-color: var(--red); }
  .equip-save-state {
    grid-column: 1 / -1;
    min-height: 13px;
    font-size: 10px;
    color: var(--text-muted);
  }
  .equip-save-state.is-error { color: var(--red); }
  @media (max-width: 560px) {
    .equip-return-meta,
    .trade-return-meta {
      grid-template-columns: 1fr;
    }
    .equip-return-meta {
      padding-left: 0;
    }
  }

  /* ── 상태 배지 ── */
  .status-badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 5px;
    font-weight: 600;
  }
  .status-대기     { background: var(--blue-bg); color: var(--blue-text); }
  .status-예약     { background: var(--blue-bg); color: var(--blue-text); }
  .status-반출     { background: var(--amber-bg); color: var(--amber-text); }
  .status-반출중   { background: var(--amber-bg); color: var(--amber-text); }
  .status-반납완료 { background: var(--green-bg); color: var(--green-text); }
  .status-취소     { background: #E8E8E5; color: #787774; }

  /* ── 빈 상태 ── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-state .icon { font-size: 40px; margin-bottom: 10px; opacity: 0.5; }
  .empty-state .text { font-size: 14px; }

  /* ── 로딩 ── */
  .loading { text-align: center; padding: 80px 20px; color: var(--text-muted); }
  .loading .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 14px;
  }

  .tel-link {
    color: var(--accent);
    text-decoration: none;
    font-weight: 600;
  }

  /* ── 카드 상세 펼침 ── */
  .card-detail {
    display: none;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .card-detail.open { display: block; }
  .detail-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    padding: 4px 0;
    color: var(--text-secondary);
  }
  .detail-row .dl { font-weight: 700; color: var(--text-primary); }
  .detail-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 12px;
  }
  .action-link, .action-btn {
    display: inline-flex;
    align-items: center;

    min-height: 34px;

    border-radius: 8px;

  }
  .action-link.primary, .action-btn.primary {

  }
  .payment-select,
  .proof-select {
    width: 140px;
    min-height: 34px;
    border: 1px solid var(--border);
    border-radius: 8px;

  .card-actions {

  .card-actions .payment-select,

  .photo-panel {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border-light);

  .photo-row {

  .photo-label {

  .photo-thumbs {

  .photo-thumb,
  .photo-more {
    width: 38px;
    height: 38px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface);
  }
  .photo-thumb {
    object-fit: cover;
    cursor: pointer;
  }
  .photo-more {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--text-secondary);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;

  .photo-empty {
    font-size: 11px;
    color: var(--text-muted);

  .photo-add-btn {
    min-height: 30px;
    padding: 5px 9px;
    border: 1px solid var(--border);

    background: var(--surface);

    font-size: 12px;

  .photo-add-btn:hover { border-color: var(--accent); color: var(--accent); }
  .photo-upload-state {
    min-height: 13px;

    color: var(--text-muted);
  }
  .photo-upload-state.is-error { color: var(--red); }
  .photo-modal-box { max-width: 760px; }
  .photo-modal-grid {
    max-height: min(68vh, 620px);
    overflow: auto;
  }
  .photo-modal-section {
    margin-top: 14px;
  }
  .photo-modal-section:first-child { margin-top: 0; }
  .photo-modal-section-title {
    font-size: 13px;
    font-weight: 800;
    color: var(--text-primary);
    margin-bottom: 8px;
  }
  .photo-modal-thumbs {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(104px, 1fr));
    gap: 8px;
  }
  .photo-modal-thumb {
    aspect-ratio: 1;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    object-fit: cover;
    background: var(--bg);
    width: 100%;
  }
  @media (max-width: 560px) {
    .photo-row {
      grid-template-columns: 36px minmax(0, 1fr);

    .photo-add-btn {
      grid-column: 2;

      grid-template-columns: repeat(auto-fill, minmax(86px, 1fr));

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 1000;

  .modal-overlay.open { display: flex; }
  .modal-box {
    width: 100%;
    max-width: 400px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    padding: 22px 22px 18px;
    box-shadow: 0 8px 30px rgba(27,35,50,0.16);
  }
  .modal-title { font-size: 16px; font-weight: 800; margin-bottom: 14px; color: var(--text-primary); }
  .modal-label { display: block; font-size: 12px; font-weight: 700; color: var(--text-secondary); margin-bottom: 6px; }
  .modal-input {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text-primary);
    font-size: 14px;
    font-family: inherit;
    padding: 8px 10px;
    margin-bottom: 12px;
    outline: none;
  }
  .modal-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
  .multi-equip-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 8px;
  }
  .multi-equip-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 76px 32px;
    gap: 8px;
    align-items: start;

  .multi-equip-row .modal-input { margin-bottom: 0; }
  .multi-row-remove {
    width: 32px;
    height: 32px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text-muted);
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
  }
  .multi-row-remove:hover { border-color: var(--red); color: var(--red); }
  .multi-add-row-btn {
    min-height: 30px;
    padding: 6px 10px;
    border: 1px dashed var(--text-muted);
    border-radius: var(--radius);
    background: transparent;
    color: var(--text-secondary);
    font-size: 12px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
  }
  .multi-add-row-btn:hover { border-color: var(--accent); color: var(--accent); }
  .multi-add-row-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 6px; }
  .modal-btn {
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    color: var(--text-secondary);
    font-size: 13px;
    font-weight: 700;
    font-family: inherit;
    padding: 8px 14px;
    cursor: pointer;
  }
  .modal-btn-confirm { background: var(--accent); border-color: var(--accent); color: #fff; }
  .modal-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── 반응형 ── */
  @media (max-width: 600px) {
    .header-actions { width: 100%; justify-content: flex-start; }
    .header-actions .request-link { flex: 1; justify-content: center; }
    .app-switcher { flex: 1; }
    .app-tab { flex: 1; justify-content: center; }
    .date-context { width: 100%; margin-left: 0; }
    .dashboard-search { min-width: 100%; max-width: none; }
    .notice-board { grid-template-columns: 1fr; }
    .notice-list { grid-template-columns: 1fr; }

    .header { padding: 12px 32px 10px; }
    .notice-board { padding: 14px 32px; }
    .tabs { padding: 10px 32px; }
    .content { padding: 0 32px 30px; }
  }
</style>
</head>
<body>
<script>var API_URL = ""; var INITIAL_DATA = null;</script>

<div class="header">
  <div class="header-top">
    <div class="app-switcher" aria-label="운영 화면 전환">
      <span class="app-tab active">오늘 일정</span>
      <a href="?page=timeline" class="app-tab">빌리지 스케줄</a>
    </div>
    <div class="header-actions">
      <a href="https://village6k-cpu.github.io/my-gas-project2/request.html" class="nav-link request-link" title="AI 카톡 예약입력">
        <span class="request-ai-badge">AI</span>
        <span class="request-main">카톡 예약입력</span>
      </a>
      <button class="icon-btn" onclick="refreshData()" id="refreshBtn" title="새로고침">↻</button>
    </div>
  </div>
  <div class="date-nav">
    <button class="date-nav-btn" onclick="changeDate(-1)">◀</button>
    <input type="date" class="date-input" id="dateInput" onchange="onDateChange()">
    <button class="date-nav-btn" onclick="changeDate(1)">▶</button>
    <button class="today-btn" onclick="goToday()">오늘</button>
    <div class="dashboard-search">
      <span class="dashboard-search-icon">&#x1F50D;</span>
      <input id="dashboardSearchInput" type="search" placeholder="고객/장비/거래ID 검색" autocomplete="off" oninput="onDashboardSearchInput(this.value)">
    </div>
    <div class="date-context">
      <strong id="headerTitle">오늘 일정</strong>
      <span id="dateLabel"></span>
    </div>
  </div>
</div>

<div class="notice-board" id="noticeBoard" aria-label="인수인계 메모">
  <div class="notice-lead">
    <div class="notice-title">인수인계</div>
    <div class="notice-controls">
      <button class="notice-add-btn" onclick="addDashboardNote()" title="메모 추가" aria-label="메모 추가">+</button>
      <div class="notice-font-controls" aria-label="메모 글자 크기">
        <button class="notice-font-btn" onclick="adjustDashboardNoteFont(-1)" title="글자 작게" aria-label="글자 작게">A-</button>
        <button class="notice-font-btn" onclick="resetDashboardNoteFont()" title="기본 크기" aria-label="기본 크기">
          <span class="notice-font-size" id="noticeFontSize">15px</span>
        </button>
        <button class="notice-font-btn" onclick="adjustDashboardNoteFont(1)" title="글자 크게" aria-label="글자 크게">A+</button>
      </div>
      <span class="notice-save-state" id="noticeSaveState"></span>
    </div>
  </div>
  <div class="notice-list" id="noticeList"></div>
</div>

<div class="tabs">
  <div class="tabs-inner">
    <button class="tab active" data-tab="checkout" onclick="switchTab('checkout')">
      반출 <span class="badge" id="tabCheckout">0</span>
    </button>
    <button class="tab" data-tab="checkin" onclick="switchTab('checkin')">
      반납 <span class="badge" id="tabCheckin">0</span>
    </button>
    <button class="tab" data-tab="all" onclick="switchTab('all')">
      전체 <span class="badge" id="tabAll">0</span>
    </button>
  </div>
</div>

<div class="content">
  <div id="loadingArea" class="loading">
    <div class="spinner"></div>
    <div>일정을 불러오는 중...</div>
  </div>
  <div id="checkoutSection" class="section"></div>
  <div id="checkinSection" class="section"></div>
  <div id="allSection" class="section"></div>
</div>

<script>
var dashboardData = null;
var currentDate = new Date();
var activeDashboardTab = 'checkout';
var dashboardSearchQuery = '';
var dashboardRequestSeq = 0;
var dashboardAbortController = null;
var DASHBOARD_CACHE_PREFIX = 'dashCache_v4_';
var CONTRACT_STATUS_OPTIONS = ['', '예약', '반출', '취소'];
var RETURN_STATUS_OPTIONS = ['', '정상', '확인필요', '파손', '분실', '미반납', '반납완료'];
var equipmentMemoSaveTimers = {};
var DEFAULT_DASHBOARD_NOTES = [
  '세부 구성품 및 추가 요청 사항은 카톡 대화 내용을 한번 더 확인 후 세팅',
  '매직암, 라인, 배터리 등 기타 악세사리류 갯수 철저하게 체크'
];
var DASHBOARD_NOTES_LOCAL_KEY = 'dashboardPostItNotes_fallback_v1';
var DASHBOARD_NOTE_FONT_KEY = 'dashboardPostItFontSize_v1';
var DASHBOARD_NOTE_FONT_DEFAULT = 15;
var DASHBOARD_NOTE_FONT_MIN = 12;
var DASHBOARD_NOTE_FONT_MAX = 24;
var dashboardNoteFontSize = DASHBOARD_NOTE_FONT_DEFAULT;
var dashboardNotes = DEFAULT_DASHBOARD_NOTES.slice();
var noteSaveTimer = null;
var dashboardPhotoStore = {};
var dashboardPhotoLoading = {};
var dashboardPhotoBatchTimer = null;
var dashboardDatePrefetching = {};

document.addEventListener('DOMContentLoaded', function() {
  var urlParams = new URLSearchParams(window.location.search);
  var dateParam = urlParams.get('date');
  if (dateParam) {
    currentDate = new Date(dateParam + 'T00:00:00');
  }
  updateDateDisplay();
  loadDashboardNoteFontSize();
  renderDashboardNotes(dashboardNotes);
  loadDashboardNotes();
  // 서버가 INITIAL_DATA 박아 보냈으면 즉시 렌더 (fetch 왕복 1회 절약)
  if (INITIAL_DATA && isDashboardDateMatch(INITIAL_DATA, formatDate(currentDate))) {
    dashboardData = INITIAL_DATA;
    renderDashboard(INITIAL_DATA, formatDate(currentDate));
  } else {
    loadData(!!INITIAL_DATA);
  }
});

function updateDateDisplay() {
  var days = ['일','월','화','수','목','금','토'];
  var d = currentDate;
  document.getElementById('dateLabel').textContent =
    d.getFullYear() + '년 ' + (d.getMonth()+1) + '월 ' + d.getDate() + '일 (' + days[d.getDay()] + ')';
  document.getElementById('dateInput').value = formatDate(d);

  var today = formatDate(new Date());
  document.getElementById('headerTitle').textContent =
    formatDate(d) === today ? '오늘 일정' : (d.getMonth()+1) + '/' + d.getDate() + ' 일정';
}

function formatDate(d) {
  return d.getFullYear() + '-' + ('0'+(d.getMonth()+1)).slice(-2) + '-' + ('0'+d.getDate()).slice(-2);
}

function changeDate(offset) {
  currentDate.setDate(currentDate.getDate() + offset);
  updateDateDisplay();
  loadData();
}

function onDateChange() {
  var val = document.getElementById('dateInput').value;
  if (val) {
    currentDate = new Date(val + 'T00:00:00');
    updateDateDisplay();
    loadData();
  }
}

function goToday() {
  currentDate = new Date();
  updateDateDisplay();
  loadData();
}

function onDashboardSearchInput(value) {
  dashboardSearchQuery = String(value || '').trim();
  if (dashboardSearchQuery) activeDashboardTab = 'all';
  if (dashboardData) renderDashboard(dashboardData, formatDate(currentDate));
}

function loadData(forceFresh) {
  var dateStr = formatDate(currentDate);
  var requestId = ++dashboardRequestSeq;
  var lsKey = DASHBOARD_CACHE_PREFIX + dateStr;
  var renderedCached = false;
  var cachedJson = null;

  if (dashboardAbortController && dashboardAbortController.abort) {
    try { dashboardAbortController.abort(); } catch (e) {}
  }
  dashboardAbortController = (typeof AbortController !== 'undefined') ? new AbortController() : null;

  try { cachedJson = localStorage.getItem(lsKey); } catch (e) {}
  if (cachedJson && !forceFresh) {
    try {
      var cachedData = readDashboardLocalCache(dateStr, cachedJson);
      dashboardData = cachedData;
      renderedCached = renderDashboard(cachedData, dateStr);
    } catch (e) {
      renderedCached = false;
    }
  }

  showDashboardLoading(dateStr, renderedCached);
  if (!renderedCached) {
    document.querySelectorAll('.section').forEach(function(s) { s.classList.remove('visible'); });
  }

  var url = API_URL + '?key=village2026&action=dashboard&date=' + dateStr;
  if (forceFresh) url += '&nocache=1';
  var fetchOptions = dashboardAbortController ? { signal: dashboardAbortController.signal } : {};

  fetch(url, fetchOptions)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!isCurrentDashboardRequest(requestId, dateStr) || !isDashboardDateMatch(data, dateStr)) return;
      dashboardData = data;
      renderDashboard(data, dateStr);
      writeDashboardLocalCache(dateStr, data);
    })
    .catch(function(err) {
      if (err && err.name === 'AbortError') return;
      if (!isCurrentDashboardRequest(requestId, dateStr)) return;
      if (!renderedCached) {
        document.getElementById('loadingArea').innerHTML =
          '<div class="empty-state"><div class="icon">!</div><div class="text">데이터 로드 실패</div></div>';
      } else {
        document.getElementById('loadingArea').style.display = 'none';
      }
    });
}

function refreshData() {
  var btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  setTimeout(function() { btn.classList.remove('spinning'); }, 800);
  clearDashboardCacheForDate(formatDate(currentDate));
  loadData(true);  // 캐시 우회 — 시트의 최신 데이터 강제 조회
}

function showDashboardLoading(dateStr, keepVisible) {
  var loading = document.getElementById('loadingArea');
  if (!loading) return;
  loading.innerHTML = '<div class="spinner"></div><div>' + escHtml(dateStr) + ' 일정 불러오는 중...</div>';
  loading.style.display = keepVisible ? 'none' : 'block';
}

function isCurrentDashboardRequest(requestId, dateStr) {
  return requestId === dashboardRequestSeq && dateStr === formatDate(currentDate);
}

function isDashboardDateMatch(data, dateStr) {
  if (!dateStr) dateStr = formatDate(currentDate);
  return !data || !data.date || data.date === dateStr;
}

function clearDashboardCacheForDate(dateStr) {
  try { localStorage.removeItem(DASHBOARD_CACHE_PREFIX + dateStr); } catch (e) {}
}

function readDashboardLocalCache(dateStr, raw) {
  var parsed = JSON.parse(raw);
  var data = parsed && parsed.data ? parsed.data : parsed;
  if (data && !data.date) data.date = dateStr;
  return data;
}

function writeDashboardLocalCache(dateStr, data) {
  if (!dateStr || !data || data.error) return;
  try {
    localStorage.setItem(DASHBOARD_CACHE_PREFIX + dateStr, JSON.stringify({
      cachedAt: Date.now(),
      data: data
    }));
  } catch (e) {}
}

function persistCurrentDashboardCache() {
  if (!dashboardData) return;
  writeDashboardLocalCache(dashboardData.date || formatDate(currentDate), dashboardData);
}

function prefetchAdjacentDashboardDates(dateStr) {
  if (dashboardSearchQuery) return;
  [-1, 1].forEach(function(offset) {
    prefetchDashboardDate(addDaysToDateStr(dateStr, offset));
  });
}

function addDaysToDateStr(dateStr, offset) {
  var d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + offset);
  return formatDate(d);
}

function prefetchDashboardDate(dateStr) {
  if (!dateStr || dashboardDatePrefetching[dateStr]) return;
  try {
    if (localStorage.getItem(DASHBOARD_CACHE_PREFIX + dateStr)) return;
  } catch (e) {}

  dashboardDatePrefetching[dateStr] = true;
  fetch(API_URL + '?key=village2026&action=dashboard&date=' + encodeURIComponent(dateStr))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data && data.error) return;
      if (!isDashboardDateMatch(data, dateStr)) return;
      writeDashboardLocalCache(dateStr, data);
    })
    .catch(function() {})
    .then(function() { delete dashboardDatePrefetching[dateStr]; });
}

function normalizeDashboardNotes(notes) {
  if (!Array.isArray(notes)) return [];
  return notes.map(function(note) {
    return String(note || '').trim().slice(0, 180);
  }).filter(function(note) { return note !== ''; }).slice(0, 8);
}

function setNoticeSaveState(text) {
  var el = document.getElementById('noticeSaveState');
  if (el) el.textContent = text || '';
}

function clampDashboardNoteFont(size) {
  size = Number(size) || DASHBOARD_NOTE_FONT_DEFAULT;
  return Math.max(DASHBOARD_NOTE_FONT_MIN, Math.min(DASHBOARD_NOTE_FONT_MAX, Math.round(size)));
}

function getDashboardNoteMinHeight() {
  return Math.max(44, Math.round(dashboardNoteFontSize * 3.6));
}

function applyDashboardNoteFontSize(size, shouldSave) {
  dashboardNoteFontSize = clampDashboardNoteFont(size);
  var board = document.getElementById('noticeBoard');
  if (board) {
    board.style.setProperty('--notice-note-font-size', dashboardNoteFontSize + 'px');
    board.style.setProperty('--notice-note-min-height', getDashboardNoteMinHeight() + 'px');
  }
  var label = document.getElementById('noticeFontSize');
  if (label) label.textContent = dashboardNoteFontSize + 'px';
  document.querySelectorAll('.notice-textarea').forEach(autoSizeNoteTextarea);
  if (shouldSave) {
    try { localStorage.setItem(DASHBOARD_NOTE_FONT_KEY, String(dashboardNoteFontSize)); } catch (e) {}
  }
}

function loadDashboardNoteFontSize() {
  var saved = null;
  try { saved = localStorage.getItem(DASHBOARD_NOTE_FONT_KEY); } catch (e) {}
  applyDashboardNoteFontSize(saved || DASHBOARD_NOTE_FONT_DEFAULT, false);
}

function adjustDashboardNoteFont(delta) {
  applyDashboardNoteFontSize(dashboardNoteFontSize + delta, true);
}

function resetDashboardNoteFont() {
  applyDashboardNoteFontSize(DASHBOARD_NOTE_FONT_DEFAULT, true);
}

function autoSizeNoteTextarea(textarea) {
  if (!textarea) return;
  textarea.style.height = 'auto';
  textarea.style.height = Math.max(getDashboardNoteMinHeight(), textarea.scrollHeight) + 'px';
}

function renderDashboardNotes(notes) {
  dashboardNotes = Array.isArray(notes) ? notes.slice(0, 8) : [];
  var list = document.getElementById('noticeList');
  if (!list) return;
  list.innerHTML = '';

  dashboardNotes.forEach(function(note, index) {
    var card = document.createElement('div');
    card.className = 'notice-note' + (index % 2 === 1 ? ' secondary' : '');

    var textarea = document.createElement('textarea');
    textarea.className = 'notice-textarea';
    textarea.maxLength = 180;
    textarea.value = note;
    textarea.setAttribute('aria-label', '인수인계 메모 ' + (index + 1));
    textarea.addEventListener('input', function() {
      dashboardNotes[index] = textarea.value;
      autoSizeNoteTextarea(textarea);
      queueDashboardNotesSave();
    });

    var deleteBtn = document.createElement('button');
    deleteBtn.type = 'button';
    deleteBtn.className = 'notice-delete-btn';
    deleteBtn.title = '메모 삭제';

function timeSortKey(timeValue) {
  var raw = String(timeValue || '').trim();
  if (!raw || raw === '시간 미정') return '99:99';

  var isPm = raw.indexOf('오후') >= 0 || /\bPM\b/i.test(raw);
  var isAm = raw.indexOf('오전') >= 0 || /\bAM\b/i.test(raw);
  var match = raw.match(/(\d{1,2})\s*(?::|시)\s*(\d{1,2})?/);
  if (!match) return '99:99';

  var hour = Number(match[1]);
  var minute = match[2] !== undefined ? Number(match[2]) : 0;
  if (isNaN(hour) || isNaN(minute) || hour < 0 || hour > 24 || minute < 0 || minute > 59) {
    return '99:99';
  }
  if (isPm && hour < 12) hour += 12;
  if (isAm && hour === 12) hour = 0;
  if (hour === 24 && minute > 0) return '99:99';

  return ('0' + hour).slice(-2) + ':' + ('0' + minute).slice(-2);
}

function compareScheduleItemsByTime(a, b) {
  var at = timeSortKey(a && (a.sortTime || a.time));
  var bt = timeSortKey(b && (b.sortTime || b.time));
  var timeCmp = at.localeCompare(bt);
  if (timeCmp) return timeCmp;

  var an = String((a && (a.name || a.tradeId)) || '');
  var bn = String((b && (b.name || b.tradeId)) || '');
  return an.localeCompare(bn);
}

function compareTimeLabels(a, b) {
  var timeCmp = timeSortKey(a).localeCompare(timeSortKey(b));
  if (timeCmp) return timeCmp;
  return String(a || '').localeCompare(String(b || ''));
}

function normalizeDashboardSearchText(value) {
  return String(value || '').toLowerCase().replace(/\s+/g, ' ').trim();
}

function dashboardItemMatchesSearch(item, type) {
  var terms = normalizeDashboardSearchText(dashboardSearchQuery).split(' ').filter(Boolean);
  if (!terms.length) return true;

  var parts = [
    type === 'checkout' ? '반출' : '반납',
    item.tradeId,
    item.name,
    item.company,
    item.tel,
    item.status,
    item.contractStatus,
    item.time,
    item.sortTime,
    item.checkoutDate,
    item.returnDate,
    item.paymentMethod,
    item.paymentSource,
    item.paymentWarning,
    item.proofType,
    item.issueStatus,
    item.issueNote,
    item.returnStatus,
    item.returnMemo
  ];
  (item.equipments || []).forEach(function(eq) {
    parts.push(eq.name, eq.setName, eq.qty, eq.isSet ? '세트 set' : '', eq.isComponent ? '구성품' : '');
  });

  var haystack = normalizeDashboardSearchText(parts.join(' '));
  return terms.every(function(term) { return haystack.indexOf(term) >= 0; });
}

function filterDashboardItems(items, type) {
  if (!dashboardSearchQuery) return items.slice();
  return items.filter(function(item) { return dashboardItemMatchesSearch(item, type); });
}

function renderDashboard(data, expectedDate) {
  if (!isDashboardDateMatch(data, expectedDate)) return false;
  data = data || {};
  var checkout = Array.isArray(data.checkout) ? data.checkout : [];
  var checkin = Array.isArray(data.checkin) ? data.checkin : [];
  var filteredCheckout = filterDashboardItems(checkout, 'checkout');
  var filteredCheckin = filterDashboardItems(checkin, 'checkin');
  var isSearching = !!dashboardSearchQuery;
  document.getElementById('loadingArea').style.display = 'none';

  document.getElementById('tabCheckout').textContent = filteredCheckout.length;
  document.getElementById('tabCheckin').textContent = filteredCheckin.length;
  document.getElementById('tabAll').textContent = filteredCheckout.length + filteredCheckin.length;

  renderList('checkoutSection', filteredCheckout, 'checkout', isSearching);
  renderList('checkinSection', filteredCheckin, 'checkin', isSearching);

  var all = filteredCheckout.map(function(c) { c._type = 'checkout'; return c; })
    .concat(filteredCheckin.map(function(c) { c._type = 'checkin'; return c; }));
  all.sort(compareScheduleItemsByTime);
  renderList('allSection', all, 'all', isSearching);

  switchTab(activeDashboardTab || 'checkout');
  prefetchAdjacentDashboardDates(data.date || expectedDate || formatDate(currentDate));
  scheduleDashboardPhotoLoad(checkout.concat(checkin));
  return true;
}

function renderList(containerId, items, type, isSearching) {
  var container = document.getElementById(containerId);

  if (!items || items.length === 0) {

      if (item.company) html += '<div class="customer-company">' + escHtml(item.company) + '</div>';
      html += '</div>';
      html += '<div class="time-badge">' + timeKey + '</div></div>';

      if (item.tel) {
        html += '<div class="card-meta"><span class="icon">📞</span>';
        html += '<a href="tel:' + item.tel + '" class="tel-link" onclick="event.stopPropagation()">' + escHtml(item.tel) + '</a></div>';
      }
      html += tradeReturnFieldsHtml(item, cardType);

      html += '<div class="equip-checklist">';
      (item.equipments || []).forEach(function(eq) {
        var rowCls = 'equip-row';
        if (eq.isSet) rowCls += ' is-set';
        else if (eq.isComponent) rowCls += ' is-component';
        else rowCls += ' is-single';
        var checked = (cardType === 'checkout' ? eq.checkedCheckout : eq.checkedCheckin);
        if (checked) rowCls += ' checked';

        var cbCls = 'equip-checkbox' + (checked ? ' checked' : '');
        var phaseStr = (cardType === 'checkout' ? 'checkout' : 'checkin');
        var sidEsc = escJs(eq.scheduleId);
        var nameEsc = escJs(eq.name);

        html += '<div class="' + rowCls + '" onclick="event.stopPropagation()">';
        html += '<div class="equip-row-main">';
        html += '<span class="' + cbCls + '" onclick="toggleItem(this,\'' + sidEsc + '\',\'' + phaseStr + '\')">' + (checked ? '✓' : '') + '</span>';
        html += '<span class="equip-name">';
        if (eq.isSet) html += '<span class="equip-set-tag">SET</span>';
        html += escHtml(eq.name);
        html += '</span>';
        if (eq.qty && eq.qty != 1) html += '<span class="equip-qty">×' + escHtml(eq.qty) + '</span>';
        if (!eq.isComponent) {
          html += '<span class="equip-row-remove" onclick="event.stopPropagation();removeEquip(\'' + escJs(item.tradeId) + '\',\'' + nameEsc + '\')" title="삭제">×</span>';
        }
        html += '</div>';
        html += '</div>';
      });
      html += '<button class="equip-add-btn" onclick="event.stopPropagation();addEquip(\'' + escHtml(item.tradeId) + '\')">+ 장비추가</button>';
      html += '</div>';
      html += photoGalleryHtml(item);
      html += cardActionHtml(item);

      html += '<div class="card-detail" id="' + cardId + '">';
      html += '<div class="detail-row"><span>거래ID</span><span class="dl">' + escHtml(item.tradeId) + '</span></div>';
      var pLabel = cardType === 'checkout' ? '반납 예정' : '반출일';

      var detailStatusLabel = cardType === 'checkout' ? '계약상태' : '상태';
      var detailStatus = cardType === 'checkout'
        ? (normalizeContractStatus(item.contractStatus || item.status) || item.contractStatus || item.status || '예약')
        : (item.status || '대기');
      html += '<div class="detail-row"><span>' + detailStatusLabel + '</span><span class="status-badge status-' + detailStatus + '">' + detailStatus + '</span></div>';
      if (item.equipments && item.equipments.length > 0) {
        var total = item.equipments.reduce(function(s, eq) { return s + (eq.qty || 1); }, 0);
        html += '<div class="detail-row"><span>총 장비 수</span><span class="dl">' + total + '건</span></div>';

  };

function scheduleDashboardPhotoLoad(items) {
  clearTimeout(dashboardPhotoBatchTimer);
  dashboardPhotoBatchTimer = setTimeout(function() {
    var tids = uniquePhotoTradeIds(items);
    if (!tids.length) return;
    tids.forEach(function(tid) { dashboardPhotoLoading[tid] = true; });
    updatePhotoPanels();
    fetchDashboardPhotosBatch(tids)
      .then(function(map) {
        Object.keys(map || {}).forEach(function(tid) {
          dashboardPhotoStore[tid] = normalizeDashboardPhotos(map[tid]);
          delete dashboardPhotoLoading[tid];
        });
        updatePhotoPanels();
      })
      .catch(function() {
        tids.forEach(function(tid) { delete dashboardPhotoLoading[tid]; });
        updatePhotoPanels();
      });
  }, 80);
}

function uniquePhotoTradeIds(items) {
  var seen = {};
  var tids = [];
  (items || []).forEach(function(item) {
    var tid = item && item.tradeId ? String(item.tradeId) : '';
    if (!tid || seen[tid] || dashboardPhotoStore[tid] || dashboardPhotoLoading[tid]) return;
    seen[tid] = true;
    tids.push(tid);
  });
  return tids;
}

function fetchDashboardPhotosBatch(tids) {
  return fetch(API_URL || '', {
    method: 'POST',
    body: JSON.stringify({
      key: 'village2026',
      action: 'dashboardPhotosBatch',
      tids: tids
    })
  })
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res.error) throw new Error(res.error);
      return res.photosByTrade || {};
    });
}

function updatePhotoPanels() {
  document.querySelectorAll('.photo-panel[data-photo-tid]').forEach(function(panel) {
    var tid = panel.getAttribute('data-photo-tid') || '';
    panel.outerHTML = photoGalleryHtml({ tradeId: tid, photos: dashboardPhotoStore[tid] });
  });
}

function openPhotoPicker(tid, phase) {
  var input = document.getElementById('dashboardPhotoInput');
  if (!input) {
    input = document.createElement('input');
    input.id = 'dashboardPhotoInput';
    input.type = 'file';
    input.accept = 'image/*';
    input.multiple = true;
    input.style.display = 'none';
    document.body.appendChild(input);
  }
  input.onchange = function() {
    var files = Array.prototype.slice.call(input.files || []);
    input.value = '';
    uploadDashboardPhotoFiles(tid, phase, files);
  };
  input.click();
}

function uploadDashboardPhotoFiles(tid, phase, files) {
  if (!files || !files.length) return;
  var label = phase === 'checkin' ? '반납' : '반출';
  setPhotoUploadState(tid, label + ' 사진 ' + files.length + '장 업로드 중', false);

  var successes = 0;
  var failures = [];
  files.reduce(function(chain, file) {
    return chain.then(function() {
      return compressDashboardPhoto(file)
        .then(function(payload) {
          return postDashboardPhoto(tid, phase, payload);
        })
        .then(function() { successes++; })
        .catch(function(err) {
          failures.push(file.name + ': ' + err.message);
        });
    });
  }, Promise.resolve()).then(function() {
    if (successes > 0) {
      delete dashboardPhotoStore[tid];
      dashboardPhotoLoading[tid] = true;
      updatePhotoPanels();
      fetchDashboardPhotosBatch([tid]).then(function(map) {
        dashboardPhotoStore[tid] = normalizeDashboardPhotos(map[tid]);
        delete dashboardPhotoLoading[tid];
        updatePhotoPanels();
      }).catch(function() {
        delete dashboardPhotoLoading[tid];
        updatePhotoPanels();
      });
    }
    if (failures.length) {
      setPhotoUploadState(tid, '업로드 실패 ' + failures.length + '건', true);
      alert('사진 업로드 실패\n' + failures.join('\n'));
      return;
    }
    setPhotoUploadState(tid, '업로드 완료', false);
    setTimeout(function() { setPhotoUploadState(tid, '', false); }, 1400);
  });
}

function compressDashboardPhoto(file) {
  return new Promise(function(resolve, reject) {
    if (!file || !/^image\//.test(file.type || '')) {
      reject(new Error('이미지 파일만 업로드할 수 있습니다'));
      return;
    }

    var reader = new FileReader();
    reader.onload = function(e) {
      var img = new Image();
      img.onload = function() {
        var maxSide = 1600;
        var scale = Math.min(1, maxSide / Math.max(img.width, img.height));
        var width = Math.max(1, Math.round(img.width * scale));
        var height = Math.max(1, Math.round(img.height * scale));
        var canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        var ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, width, height);
        ctx.drawImage(img, 0, 0, width, height);
        var baseName = (file.name || 'photo').replace(/\.[^.]+$/, '') + '.jpg';
        resolve({
          fileName: baseName,
          mimeType: 'image/jpeg',
          data: canvas.toDataURL('image/jpeg', 0.82)
        });
      };
      img.onerror = function() { reject(new Error('이미지를 읽지 못했습니다')); };
      img.src = e.target.result;
    };
    reader.onerror = function() { reject(new Error('파일을 읽지 못했습니다')); };
    reader.readAsDataURL(file);
  });
}

function postDashboardPhoto(tid, phase, payload) {
  return fetch(API_URL || '', {
    method: 'POST',
    body: JSON.stringify({
      key: 'village2026',
      action: 'uploadDashboardPhoto',
      tid: tid,
      phase: phase,
      fileName: payload.fileName,
      mimeType: payload.mimeType,
      data: payload.data
    })
  })
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res.error) throw new Error(res.error);
      return res;
    });
}

function setPhotoUploadState(tid, text, isError) {

    el.textContent = text || '';

function getDashboardPhotosByTrade(tid) {
  var merged = normalizeDashboardPhotos();
  if (!dashboardData) return merged;
  ['checkout', 'checkin'].forEach(function(listName) {
    (dashboardData[listName] || []).forEach(function(item) {
      if (item.tradeId !== tid) return;
      var photos = normalizeDashboardPhotos(item.photos);
      mergePhotoList_(merged.checkout, photos.checkout);
      mergePhotoList_(merged.checkin, photos.checkin);
      mergePhotoList_(merged.other, photos.other);
    });
  });
  return merged;
}

function mergePhotoList_(target, source) {
  (source || []).forEach(function(photo) {
    var key = photo.fileId || photo.url || photo.thumbnailUrl;
    for (var i = 0; i < target.length; i++) {
      if ((target[i].fileId || target[i].url || target[i].thumbnailUrl) === key) return;
    }
    target.push(photo);
  });
}

function cardActionHtml(item) {
  var html = '<div class="card-actions" onclick="event.stopPropagation()">';
  if (item.contractUrl) {
    html += '<a class="action-link primary" href="' + escAttr(item.contractUrl) + '" target="_blank" onclick="event.stopPropagation()">계약서 열기</a>';
  } else {
    html += '<button class="action-btn" onclick="event.stopPropagation()" disabled>계약서 없음</button>';
  }
  html += '<button class="action-btn" onclick="event.stopPropagation();runTradeOpsAction(this,\'' + escJs(item.tradeId) + '\',\'sendEstimate\')">견적서 발송</button>';
  html += paymentSelectHtml(item);
  html += proofTypeSelectHtml(item);
  html += issueStatusSelectHtml(item);
  html += '</div>';
  if (item.paymentWarning) html += '<div class="detail-note">' + escHtml(item.paymentWarning) + '</div>';
  if (item.issueNote && /실패|오류|증빙|발행/.test(item.issueNote)) html += '<div class="detail-note">' + escHtml(item.issueNote) + '</div>';
  return html;
}

function paymentSelectHtml(item) {
  var options = [''].concat((dashboardData && dashboardData.paymentOptions) || ['미정', '계좌', '카드', '현금', '기타']);
  var current = item.paymentMethod || '';
  var html = '<select class="payment-select" data-prev="' + escAttr(current) + '" onclick="event.stopPropagation()" onchange="updatePaymentMethod(event,this,\'' + escJs(item.tradeId) + '\')">';
  options.forEach(function(opt) {
    var label = opt || '결제수단';
    html += '<option value="' + escAttr(opt) + '"' + (opt === current ? ' selected' : '') + '>' + escHtml(label) + '</option>';
  });
  html += '</select>';
  return html;
}

function updatePaymentMethod(event, select, tradeId) {
  event.stopPropagation();
  var prev = select.getAttribute('data-prev') || '';
  var method = select.value;
  select.disabled = true;
  fetch(API_URL + '?key=village2026&action=updatePayment&tid=' + encodeURIComponent(tradeId) + '&method=' + encodeURIComponent(method))
    .then(function(r) { return r.json(); })
    .then(function(res) {
      select.disabled = false;
      if (res.error) {
        alert('결제수단 저장 실패: ' + res.error);
        select.value = prev;
        return;
      }
      select.setAttribute('data-prev', method);
      syncPaymentInMemory(tradeId, method, res);
      if (res.warning) alert(res.warning);
    })
    .catch(function(err) {
      select.disabled = false;
      select.value = prev;
      alert('결제수단 저장 실패: ' + err.message);
    });
}

function proofTypeSelectHtml(item) {
  return tradeProofSelectHtml(item, 'proofType', (dashboardData && dashboardData.proofTypeOptions) || ['미발행', '세금계산서', '현금영수증(전화번호)', '현금영수증(사업자번호)'], '증빙유형');
}

function issueStatusSelectHtml(item) {
  return tradeProofSelectHtml(item, 'issueStatus', (dashboardData && dashboardData.issueStatusOptions) || ['미발행', '발행요청', '발행완료', '전송실패'], '발행상태');
}

function tradeProofSelectHtml(item, field, baseOptions, placeholder) {
  var current = field === 'proofType' ? (item.proofType || '') : (item.issueStatus || '');
  var options = [''].concat((baseOptions || []).filter(Boolean));
  if (current && options.indexOf(current) < 0) options.splice(1, 0, current);
  var html = '<select class="proof-select" data-field="' + field + '" data-prev="' + escAttr(current) + '" onclick="event.stopPropagation()" onchange="updateTradeProofField(event,this,\'' + escJs(item.tradeId) + '\',\'' + field + '\')">';
  options.forEach(function(opt) {
    html += '<option value="' + escAttr(opt) + '"' + (opt === current ? ' selected' : '') + '>' + escHtml(opt || placeholder) + '</option>';
  });
  html += '</select>';
  return html;
}

function updateTradeProofField(event, select, tradeId, field) {
  event.stopPropagation();
  var prev = select.getAttribute('data-prev') || '';
  var value = select.value || '';
  if (field === 'issueStatus' && value === '발행요청') {
    if (!confirm('이 거래건의 계산서/현금영수증을 실제 발행할까요?')) {
      select.value = prev;
      return;
    }
  }

  select.disabled = true;
  fetch(API_URL || '', {
    method: 'POST',
    body: JSON.stringify({
      key: 'village2026',
      action: 'updateTradeProof',
      tid: tradeId,
      field: field,
      value: value
    })
  })
    .then(function(r) { return r.json(); })
    .then(function(res) {
      select.disabled = false;
      if (res.error) {
        alert('증빙 저장 실패: ' + res.error);
        select.value = prev;
        return;
      }
      var nextValue = res.issueStatus || res.value || value;
      select.value = nextValue;
      select.setAttribute('data-prev', nextValue);
      syncTradeProofInMemory(tradeId, field, nextValue, res);
      if (res.message) alert(res.message);
    })
    .catch(function(err) {
      select.disabled = false;
      select.value = prev;
      alert('증빙 저장 실패: ' + err.message);
    });
}

function runTradeOpsAction(button, tradeId, action) {
  var isIssue = action === 'issueProof';
  if (isIssue && !confirm('이 거래건의 계산서/현금영수증을 실제 발행할까요?')) return;

  var label = button.textContent;
  button.disabled = true;
  button.textContent = '처리 중';

  fetch(API_URL || '', {
    method: 'POST',
    body: JSON.stringify({
      key: 'village2026',
      action: action,
      tid: tradeId
    })
  })
    .then(function(r) { return r.json(); })
    .then(function(res) {
      button.disabled = false;
      button.textContent = label;
      if (res.error) {
        alert((isIssue ? '계산서 발행 실패: ' : '견적서 발송 실패: ') + res.error);
        return;
      }
      if (isIssue) syncTradeProofInMemory(tradeId, 'issueStatus', res.issueStatus || '발행요청', res);
      alert(res.message || (isIssue ? '계산서 발행 요청 완료' : '견적서 발송 요청 완료'));
    })
    .catch(function(err) {
      button.disabled = false;
      button.textContent = label;
      alert((isIssue ? '계산서 발행 실패: ' : '견적서 발송 실패: ') + err.message);
    });
}

function syncTradeProofInMemory(tid, field, value, res) {
  if (!dashboardData) return;
  dashboardItemsForTrade(tid).forEach(function(item) {
    if (field === 'proofType') item.proofType = value;
    if (field === 'issueStatus') item.issueStatus = res && res.issueStatus ? res.issueStatus : value;
    if (res && res.error) item.issueNote = res.error;
    if (res && res.message) item.issueNote = res.message;
  });
  persistCurrentDashboardCache();
}

function syncPaymentInMemory(tid, method, res) {
  if (!dashboardData) return;
  dashboardItemsForTrade(tid).forEach(function(item) {
    item.paymentMethod = method;
    item.paymentSource = method ? 'sheet:J' : '';
    if (res && res.warning) item.paymentWarning = res.warning;
    if (res && res.sideEffects && res.sideEffects.applied) {
      if (res.sideEffects.columns && res.sideEffects.columns.K) item.proofType = res.sideEffects.columns.K;
      if (res.sideEffects.columns && res.sideEffects.columns.L) item.issueStatus = res.sideEffects.columns.L;
    }
  });
  persistCurrentDashboardCache();
}

function dashboardItemsForTrade(tid) {
  var items = [];
  if (!dashboardData) return items;
  ['checkout', 'checkin'].forEach(function(listName) {
    (dashboardData[listName] || []).forEach(function(item) {
      if (item.tradeId === tid) items.push(item);
    });
  });
  return items;
}

function removeEquip(tid, equipName) {
  if (!confirm('"' + equipName + '" 을(를) 삭제하시겠습니까?\n(같은 세트 구성품도 함께 삭제됩니다)')) return;

  fetch(API_URL + '?key=village2026&action=removeEquip&tid=' + encodeURIComponent(tid)
    + '&equipName=' + encodeURIComponent(equipName))
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res.error) { alert("삭제 실패: " + res.error); return; }
      loadData(true);
    })
    .catch(function(err) { alert("네트워크 오류: " + err.message); });
}

function tradeReturnFieldsHtml(item, cardType) {
  var isCheckout = cardType === 'checkout';
  var status = isCheckout ? normalizeContractStatus(item.contractStatus || item.status || '') : (item.returnStatus || '');
  var memo = item.returnMemo || '';
  var attrs = ' data-trade-id="' + escAttr(item.tradeId) + '"' +
    ' data-label="' + escAttr(item.name) + '"';
  var html = '<div class="trade-return-meta" onclick="event.stopPropagation()">';
  if (isCheckout) {
    html += '<select class="return-status-select" data-field="contractStatus" data-prev="' + escAttr(status) + '"' + attrs + ' onchange="updateContractStatus(this)" onclick="event.stopPropagation()">';
    html += contractStatusOptionsHtml(status);
  } else {
    html += '<select class="return-status-select" data-field="returnStatus" data-prev="' + escAttr(status) + '"' + attrs + ' onchange="updateEquipmentCheck(this)" onclick="event.stopPropagation()">';
    html += returnStatusOptionsHtml(status);
  }
  html += '</select>';
  html += '<input class="return-memo-input" type="text" maxlength="500" placeholder="특이사항 메모" value="' + escAttr(memo) + '" data-field="memo" data-prev="' + escAttr(memo) + '"' + attrs + ' oninput="queueEquipmentMemoSave(this)" onblur="flushEquipmentMemoSave(this)" onclick="event.stopPropagation()">';
  html += '<span class="equip-save-state"></span>';
  html += '</div>';
  return html;
}

function normalizeContractStatus(current) {
  current = String(current || '').trim();
  if (current === '확정') return '예약';
  if (current === '반납완료') return '반출';
  return CONTRACT_STATUS_OPTIONS.indexOf(current) >= 0 ? current : '';
}

function contractStatusOptionsHtml(current) {
  current = normalizeContractStatus(current);
  return CONTRACT_STATUS_OPTIONS.map(function(opt) {
    var label = opt || '계약상태';
    return '<option value="' + escAttr(opt) + '"' + (opt === current ? ' selected' : '') + '>' + escHtml(label) + '</option>';
  }).join('');
}

function returnStatusOptionsHtml(current) {
  current = String(current || '').trim();
  var options = RETURN_STATUS_OPTIONS.slice();
  if (current && options.indexOf(current) < 0) options.splice(1, 0, current);
  return options.map(function(opt) {
    var label = opt || '반납상태';
    return '<option value="' + escAttr(opt) + '"' + (opt === current ? ' selected' : '') + '>' + escHtml(label) + '</option>';
  }).join('');
}

function equipmentCheckTimerKey(el) {
  return [
    el.getAttribute('data-trade-id') || '',
    el.getAttribute('data-field') || ''
  ].join('|');
}

function queueEquipmentMemoSave(input) {
  var key = equipmentCheckTimerKey(input);
  if (equipmentMemoSaveTimers[key]) clearTimeout(equipmentMemoSaveTimers[key]);
  setEquipmentCheckState(input, '저장 대기', false);
  equipmentMemoSaveTimers[key] = setTimeout(function() {
    updateEquipmentCheck(input);
  }, 650);
}

function flushEquipmentMemoSave(input) {
  var key = equipmentCheckTimerKey(input);
  if (equipmentMemoSaveTimers[key]) {
    clearTimeout(equipmentMemoSaveTimers[key]);
    delete equipmentMemoSaveTimers[key];
  }
  if ((input.getAttribute('data-prev') || '') !== input.value) updateEquipmentCheck(input);
}

function updateEquipmentCheck(el) {
  var field = el.getAttribute('data-field') || '';
  var prev = el.getAttribute('data-prev') || '';
  var value = el.value || '';
  var payload = {
    key: 'village2026',
    action: 'updateEquipmentCheck',
    tid: el.getAttribute('data-trade-id') || '',
    label: el.getAttribute('data-label') || '',
    field: field,
    value: value
  };
  var key = equipmentCheckTimerKey(el);
  if (equipmentMemoSaveTimers[key]) {
    clearTimeout(equipmentMemoSaveTimers[key]);
    delete equipmentMemoSaveTimers[key];
  }
  if (prev === value) {
    setEquipmentCheckState(el, '', false);
    return;
  }

  el.classList.remove('is-error');
  el.classList.add('is-saving');
  if (el.tagName === 'SELECT') el.disabled = true;
  setEquipmentCheckState(el, '저장 중', false);

  fetch(API_URL || '', { method: 'POST', body: JSON.stringify(payload) })
    .then(function(r) { return r.json(); })
    .then(function(res) {
      el.classList.remove('is-saving');
      if (el.tagName === 'SELECT') el.disabled = false;
      if (res.error) throw new Error(res.error);
      el.setAttribute('data-prev', value);
      syncEquipmentCheckInMemory(payload, res);
      syncTradeFieldControls(payload.field, payload.tid, value);
      setEquipmentCheckState(el, '저장됨', false);
      setTimeout(function() { setEquipmentCheckState(el, '', false); }, 1200);
    })
    .catch(function(err) {
      el.classList.remove('is-saving');
      el.classList.add('is-error');
      if (el.tagName === 'SELECT') {
        el.disabled = false;
        el.value = prev;
      }
      setEquipmentCheckState(el, '저장 실패: ' + err.message, true);
    });
}

function updateContractStatus(el) {
  var prev = el.getAttribute('data-prev') || '';
  var status = el.value || '';
  var tid = el.getAttribute('data-trade-id') || '';
  if (prev === status) {
    setEquipmentCheckState(el, '', false);
    return;
  }

  el.classList.remove('is-error');
  el.classList.add('is-saving');
  el.disabled = true;
  setEquipmentCheckState(el, '저장 중', false);

  fetch(API_URL || '', {
    method: 'POST',
    body: JSON.stringify({
      key: 'village2026',
      action: 'updateContractStatus',
      tid: tid,
      status: status
    })
  })
    .then(function(r) { return r.json(); })
    .then(function(res) {
      el.classList.remove('is-saving');
      el.disabled = false;
      if (res.error) throw new Error(res.error);
      el.setAttribute('data-prev', status);
      syncContractStatusInMemory(tid, status);
      syncTradeFieldControls('contractStatus', tid, status);
      setEquipmentCheckState(el, '저장됨', false);
      setTimeout(function() { setEquipmentCheckState(el, '', false); }, 1200);
    })
    .catch(function(err) {
      el.classList.remove('is-saving');
      el.classList.add('is-error');
      el.disabled = false;
      el.value = prev;
      setEquipmentCheckState(el, '저장 실패: ' + err.message, true);
    });
}

function setEquipmentCheckState(el, text, isError) {
  var box = el.closest('.trade-return-meta, .equip-return-meta');
  var state = box ? box.querySelector('.equip-save-state') : null;
  if (!state) return;
  state.textContent = text || '';
  state.classList.toggle('is-error', !!isError);
}

function syncContractStatusInMemory(tid, status) {
  if (!dashboardData) return;
  dashboardItemsForTrade(tid).forEach(function(item) {
    item.contractStatus = status;
  });
  persistCurrentDashboardCache();
}

function syncTradeFieldControls(field, tid, value) {
  document.querySelectorAll('[data-field="' + field + '"][data-trade-id]').forEach(function(ctrl) {
    if ((ctrl.getAttribute('data-trade-id') || '') !== tid) return;
    ctrl.value = value;
    ctrl.setAttribute('data-prev', value);
  });
}

function syncEquipmentCheckInMemory(payload, res) {
  if (!dashboardData) return;
  dashboardItemsForTrade(payload.tid).forEach(function(item) {
    if (payload.field === 'returnStatus') item.returnStatus = payload.value;
    if (payload.field === 'memo') item.returnMemo = payload.value;
    if (res && res.row) item.equipmentCheckRow = res.row;
  });
  persistCurrentDashboardCache();
}

function toggleItem(cb, scheduleId, phase) {
  var nowDone = !cb.classList.contains('checked');
  cb.classList.toggle('checked', nowDone);
  cb.textContent = nowDone ? '✓' : '';
  var row = cb.closest('.equip-row');
  if (row) row.classList.toggle('checked', nowDone);
  syncItemCheckInMemory(scheduleId, phase, nowDone);

  fetch(API_URL + '?key=village2026&action=toggleItem'
    + '&scheduleId=' + encodeURIComponent(scheduleId)
    + '&phase=' + phase
    + '&done=' + (nowDone ? '1' : '0'))
    .then(function(r) { return r.json(); })
    .catch(function() {
      cb.classList.toggle('checked', !nowDone);
      cb.textContent = !nowDone ? '✓' : '';
      if (row) row.classList.toggle('checked', !nowDone);
      syncItemCheckInMemory(scheduleId, phase, !nowDone);
    });
}

function syncItemCheckInMemory(scheduleId, phase, done) {
  if (!dashboardData) return;
  ['checkout', 'checkin'].forEach(function(listName) {
    (dashboardData[listName] || []).forEach(function(item) {
      (item.equipments || []).forEach(function(eq) {
        if (eq.scheduleId !== scheduleId) return;
        if (phase === 'checkout') eq.checkedCheckout = done;
        if (phase === 'checkin') eq.checkedCheckin = done;
      });
    });
  });
  persistCurrentDashboardCache();
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) { return escHtml(s).replace(/'/g,'&#39;'); }
function escJs(s) { return String(s || '').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,' '); }

var equipListCache = null;
var pendingAddTid = null;

function loadEquipList() {
  if (equipListCache) return Promise.resolve(equipListCache);
  return fetch(API_URL + '?key=village2026&action=read&sheet=' + encodeURIComponent('목록') + '&range=A2:A1000')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var arr = d && d.data ? d.data : [];
      equipListCache = arr.map(function(row) { return Array.isArray(row) ? row[0] : row; })
        .filter(function(v) { return !!v; })
        .map(String);
      var dl = document.getElementById('equipDatalist');
      if (dl) {
        dl.innerHTML = equipListCache.map(function(n) {
          return '<option value="' + escAttr(n) + '"></option>';
        }).join('');
      }
      return equipListCache;
    })
    .catch(function() {
      equipListCache = [];
      return [];
    });
}

function addEquipRow(name, qty) {
  var container = document.getElementById('equipRows');
  if (!container) return null;

  var row = document.createElement('div');
  row.className = 'multi-equip-row';

  var input = document.createElement('input');
  input.className = 'modal-input equip-name-input';
  input.setAttribute('list', 'equipDatalist');
  input.placeholder = '장비명';
  input.autocomplete = 'off';
  input.value = name || '';

  var qtyInput = document.createElement('input');
  qtyInput.className = 'modal-input equip-qty-input';
  qtyInput.type = 'number';
  qtyInput.min = '1';
  qtyInput.value = qty || '1';

  var removeBtn = document.createElement('button');
  removeBtn.type = 'button';
  removeBtn.className = 'multi-row-remove';
  removeBtn.title = '행 삭제';
  removeBtn.textContent = '×';
  removeBtn.onclick = function() {
    if (container.querySelectorAll('.multi-equip-row').length <= 1) {
      input.value = '';
      qtyInput.value = '1';
      input.focus();
      return;
    }
    row.remove();
  };

  row.appendChild(input);
  row.appendChild(qtyInput);
  row.appendChild(removeBtn);
  container.appendChild(row);
  return row;
}

function resetEquipRows(entries) {
  var container = document.getElementById('equipRows');
  if (!container) return;
  container.innerHTML = '';
  if (entries && entries.length) {
    entries.forEach(function(entry) { addEquipRow(entry.name, entry.qty); });
  } else {
    addEquipRow('', 1);
  }
}

function collectEquipEntries() {
  var rows = document.querySelectorAll('#equipRows .multi-equip-row');
  var merged = {};
  var order = [];
  rows.forEach(function(row) {
    var nameInput = row.querySelector('.equip-name-input');
    var qtyInput = row.querySelector('.equip-qty-input');
    var name = nameInput ? nameInput.value.trim() : '';
    if (!name) return;
    var qty = parseInt(qtyInput ? qtyInput.value : '1', 10);
    if (!qty || qty < 1) qty = 1;
    if (!merged[name]) {
      merged[name] = { name: name, qty: qty };
      order.push(name);
    } else {
      merged[name].qty += qty;
    }
  });
  return order.map(function(name) { return merged[name]; });
}

function setAddEquipBusy(isBusy, label) {
  var btn = document.getElementById('addEquipConfirmBtn');
  var addBtn = document.getElementById('addEquipRowBtn');
  btn.disabled = isBusy;
  btn.textContent = label || '가용 확인 후 추가';
  if (addBtn) addBtn.disabled = isBusy;
}

function postAddEquip(tid, entry) {
  return fetch(API_URL + '?key=village2026&action=addEquip&tid=' + encodeURIComponent(tid)
    + '&equipName=' + encodeURIComponent(entry.name) + '&qty=' + encodeURIComponent(entry.qty))
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res.error) throw new Error(res.error);
      return res;
    });
}

function addEquip(tid) {
  pendingAddTid = tid;
  resetEquipRows();
  setAddEquipBusy(false);
  document.getElementById('addEquipModal').classList.add('open');
  loadEquipList().then(function() {
    setTimeout(function() {
      var input = document.querySelector('#equipRows .equip-name-input');
      if (input) input.focus();
    }, 50);
  });
}

function closeAddEquipModal() {
  document.getElementById('addEquipModal').classList.remove('open');
  pendingAddTid = null;
}

function confirmAddEquip() {
  if (!pendingAddTid) { closeAddEquipModal(); return; }
  var entries = collectEquipEntries();
  if (!entries.length) { alert('장비명을 하나 이상 입력하거나 선택하세요.'); return; }

  setAddEquipBusy(true, '가용 확인 중...');

  var tid = pendingAddTid;
  var successes = [];
  var failures = [];
  entries.reduce(function(promise, entry) {
    return promise.then(function() {
      return postAddEquip(tid, entry)
        .then(function() { successes.push(entry); })
        .catch(function(err) { failures.push({ entry: entry, message: err.message }); });
    });
  }, Promise.resolve()).then(function() {
    setAddEquipBusy(false);
    if (failures.length) {
      if (successes.length) loadData(true);
      resetEquipRows(failures.map(function(f) { return f.entry; }));
      alert((successes.length ? successes.length + '개 추가 완료, ' : '')
        + failures.length + '개 추가 실패\n'
        + failures.map(function(f) { return '- ' + f.entry.name + ': ' + f.message; }).join('\n'));
      return;
    }
    closeAddEquipModal();
    loadData(true);
    alert('가용 확인 완료. 장비 ' + successes.length + '개를 추가했습니다.');
  }).catch(function(err) {
    setAddEquipBusy(false);
    alert('네트워크 오류: ' + err.message);
  });
}

window.addEventListener('load', function() { loadEquipList(); });
</script>
<div id="addEquipModal" class="modal-overlay" onclick="if(event.target===this)closeAddEquipModal()">
  <div class="modal-box">
    <div class="modal-title">장비 추가</div>
    <label class="modal-label">장비명 / 수량</label>
    <div id="equipRows" class="multi-equip-list"></div>
    <button type="button" id="addEquipRowBtn" class="multi-add-row-btn" onclick="addEquipRow()">+ 장비 행 추가</button>
    <datalist id="equipDatalist"></datalist>
    <div class="modal-actions">
      <button class="modal-btn" onclick="closeAddEquipModal()">취소</button>
      <button id="addEquipConfirmBtn" class="modal-btn modal-btn-confirm" onclick="confirmAddEquip()">가용 확인 후 추가</button>
    </div>
  </div>
</div>

<div id="photoModal" class="modal-overlay" onclick="if(event.target===this)closePhotoModal()">
  <div class="modal-box photo-modal-box">
    <div class="modal-title" id="photoModalTitle">사진</div>
    <div id="photoModalGrid" class="photo-modal-grid"></div>
    <div class="modal-actions">
      <button class="modal-btn" onclick="closePhotoModal()">닫기</button>
    </div>
  </div>
</div>
</body>
