<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#F7F7F5">
<title>빌리지 오늘 일정</title>
<style>
  :root {
    --bg: #F7F7F5;
    --surface: #FFFFFF;
    --border: #E9E9E7;
    --border-light: #F0F0EE;
    --text-primary: #37352F;
    --text-secondary: #787774;
    --text-muted: #B4B4B0;
    --accent: #2383E2;
    --blue-bg: #D3E5EF;
    --blue-text: #24609C;
    --amber-bg: #FDECC8;
    --amber-text: #93640D;
    --green-bg: #DBEDDB;
    --green-text: #2B6B2B;
    --gray-bg: #E8E8E5;
    --gray-text: #787774;
    --red: #EB5757;
    --radius: 6px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    -webkit-user-select: none; user-select: none;
  }

  /* ── 헤더 ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px 10px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .date-context {
    display: flex;
    align-items: baseline;
    gap: 8px;
    color: var(--text-muted);
    font-size: 12px;
    margin-left: auto;
    white-space: nowrap;
  }
  .date-context strong {
    color: var(--text-primary);
    font-size: 13px;
    font-weight: 750;
  }
  .header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }
  .app-switcher {
    display: flex;
    overflow: hidden;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .app-tab {
    display: inline-flex;
    align-items: center;
    min-height: 32px;
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 650;
    color: var(--text-secondary);
    text-decoration: none;
    white-space: nowrap;
  }
  .app-tab:not(:last-child) { border-right: 1px solid var(--border); }
  .app-tab.active { background: var(--accent); color: #fff; }
  a.app-tab:hover { color: var(--accent); background: rgba(0,0,0,0.03); }
  .nav-link {
    min-height: 32px;
    display: inline-flex;
    align-items: center;
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-primary);
    background: var(--bg);
    text-decoration: none;
    font-size: 12px;
    font-weight: 650;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .nav-link:hover { border-color: var(--accent); color: var(--accent); }
  .nav-link:active { background: var(--bg); }

  .icon-btn {
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    cursor: pointer;
    color: var(--text-secondary);
    font-size: 16px;
    transition: all 0.15s;
  }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
  .icon-btn:active { background: var(--bg); }
  .icon-btn.spinning { animation: spin 0.8s ease; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── 날짜 네비 ── */
  .date-nav {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .date-nav-btn {
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    cursor: pointer;
    color: var(--text-secondary);
    font-size: 13px;
  }
  .date-nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .date-nav-btn:active { background: var(--bg); }

  .date-input {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    min-height: 32px;
    padding: 6px 10px;
    font-size: 13px;
    font-family: inherit;
    color: var(--text-primary);
    background: var(--surface);
    cursor: pointer;
    outline: none;
  }
  .date-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(35,131,226,0.15); }

  .today-btn {
    border: 1px solid var(--accent);
    background: var(--accent);
    color: #fff;
    min-height: 32px;
    padding: 6px 12px;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.15s;
  }
  .today-btn:hover { opacity: 0.9; }
  .today-btn:active { opacity: 0.85; }

  /* ── 사장님 메모 ── */
  .notice-board {
    display: grid;
    grid-template-columns: minmax(150px, 210px) minmax(0, 1fr);
    gap: 12px;
    padding: 14px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .notice-lead,
  .notice-note {
    position: relative;
    border-radius: var(--radius);
    box-shadow: 0 4px 12px rgba(55,53,47,0.08);
  }
  .notice-lead {
    padding: 13px 15px;
    background: #FFF4BC;
    border: 1px solid #EED47A;
    transform: rotate(-0.5deg);
  }
  .notice-kicker {
    color: #93640D;
    font-size: 11px;
    font-weight: 800;
    margin-bottom: 4px;
  }
  .notice-title {
    color: var(--text-primary);
    font-size: 16px;
    font-weight: 850;
    line-height: 1.25;
  }
  .notice-list {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
  }
  .notice-note {
    padding: 13px 15px 13px 16px;
    background: #FFFDF2;
    border: 1px solid #E8D99F;
    border-left: 4px solid #D99A00;
    color: var(--text-primary);
    font-size: 13px;
    font-weight: 750;
    line-height: 1.55;
  }
  .notice-note.secondary {
    background: #F2F7FB;
    border-color: #D8E5EF;
    border-left-color: var(--accent);
  }
  .notice-note::before {
    content: '';
    position: absolute;
    top: 9px;
    right: 10px;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: rgba(55,53,47,0.22);
  }

  /* ── 탭 ── */
  .tabs {
    display: flex;
    padding: 10px 20px;
    gap: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 108px;
    z-index: 50;
  }
  .tabs-inner {
    display: flex;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .tab {
    flex: 1;
    padding: 6px 14px;
    border: none;
    border-right: 1px solid var(--border);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    background: transparent;
    color: var(--text-secondary);
    font-family: inherit;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .tab:last-child { border-right: none; }
  .tab:hover { background: rgba(0,0,0,0.03); }
  .tab.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .tab .badge {
    display: inline-block;
    background: rgba(0,0,0,0.06);
    border-radius: 6px;
    padding: 1px 7px;
    font-size: 11px;
    margin-left: 4px;
  }
  .tab.active .badge { background: rgba(255,255,255,0.25); }

  /* ── 컨텐츠 ── */
  .content { padding: 0 20px 30px; }
  .section { display: none; }
  .section.visible { display: block; }

  .time-group { margin-top: 16px; }
  .time-group-header {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 0.3px;
    padding: 0 2px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .time-group-header::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── 일정 카드 ── */
  .schedule-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 8px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: box-shadow 0.15s;
  }
  .schedule-card:active { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }

  .schedule-card.type-checkout { border-left: 3px solid var(--accent); }
  .schedule-card.type-checkin  { border-left: 3px solid var(--gray-text); }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
  }
  .customer-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-primary);
  }
  .customer-company {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .time-badge {
    font-size: 12px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 6px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .type-checkout .time-badge { background: var(--blue-bg); color: var(--blue-text); }
  .type-checkin  .time-badge { background: var(--gray-bg); color: var(--gray-text); }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 8px;
    font-size: 13px;
    color: var(--text-secondary);
  }
  .card-meta .icon { font-size: 13px; width: 16px; text-align: center; }

  .equip-list { display: flex; flex-wrap: wrap; gap: 5px; }
  .equip-tag {
    background: var(--bg);
    color: var(--text-secondary);
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 5px;
    font-weight: 600;
    border: 1px solid var(--border);
  }
  .equip-tag.set-tag {
    background: var(--green-bg);
    color: var(--green-text);
    border-color: #A7F3D0;
  }
  .equip-add-btn {
    display: inline-flex;
    align-items: center;
    min-height: 24px;
    padding: 3px 9px;
    border: 1px dashed var(--text-muted);
    border-radius: 5px;
    color: var(--text-secondary);
    background: transparent;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }
  .equip-add-btn:active { background: var(--bg); }

  /* ── 상태 배지 ── */
  .status-badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 5px;
    font-weight: 600;
  }
  .status-대기     { background: var(--blue-bg); color: var(--blue-text); }
  .status-반출중   { background: var(--amber-bg); color: var(--amber-text); }
  .status-반납완료 { background: var(--green-bg); color: var(--green-text); }

  /* ── 빈 상태 ── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-state .icon { font-size: 40px; margin-bottom: 10px; opacity: 0.5; }
  .empty-state .text { font-size: 14px; }

  /* ── 로딩 ── */
  .loading { text-align: center; padding: 80px 20px; color: var(--text-muted); }
  .loading .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 14px;
  }

  .tel-link {
    color: var(--accent);
    text-decoration: none;
    font-weight: 600;
  }

  /* ── 카드 상세 펼침 ── */
  .card-detail {
    display: none;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .card-detail.open { display: block; }
  .detail-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    padding: 4px 0;
    color: var(--text-secondary);
  }
  .detail-row .dl { font-weight: 700; color: var(--text-primary); }
  .detail-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 12px;
  }
  .action-link, .action-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 34px;
    padding: 7px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-primary);
    font-size: 12px;
    font-weight: 700;
    text-decoration: none;
    cursor: pointer;
    font-family: inherit;
  }
  .action-link.primary, .action-btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .payment-select {
    width: 140px;
    min-height: 34px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    color: var(--text-primary);
    font-size: 12px;
    font-weight: 700;
    padding: 6px 8px;
    outline: none;
  }
  .payment-select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
  }
  .detail-note {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 8px;
    line-height: 1.4;
  }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background: rgba(0,0,0,0.45);
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    width: 100%;
    max-width: 400px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    padding: 22px 22px 18px;
    box-shadow: 0 8px 30px rgba(27,35,50,0.16);
  }
  .modal-title { font-size: 16px; font-weight: 800; margin-bottom: 14px; color: var(--text-primary); }
  .modal-label { display: block; font-size: 12px; font-weight: 700; color: var(--text-secondary); margin-bottom: 6px; }
  .modal-input {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text-primary);
    font-size: 14px;
    font-family: inherit;
    padding: 8px 10px;
    margin-bottom: 12px;
    outline: none;
  }
  .modal-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
  .multi-equip-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 8px;
  }
  .multi-equip-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 76px 32px;
    gap: 8px;
    align-items: start;
  }
  .multi-equip-row .modal-input { margin-bottom: 0; }
  .multi-row-remove {
    width: 32px;
    height: 32px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text-muted);
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
  }
  .multi-row-remove:hover { border-color: var(--red); color: var(--red); }
  .multi-add-row-btn {
    min-height: 30px;
    padding: 6px 10px;
    border: 1px dashed var(--text-muted);
    border-radius: var(--radius);
    background: transparent;
    color: var(--text-secondary);
    font-size: 12px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
  }
  .multi-add-row-btn:hover { border-color: var(--accent); color: var(--accent); }
  .multi-add-row-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 6px; }
  .modal-btn {
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    color: var(--text-secondary);
    font-size: 13px;
    font-weight: 700;
    font-family: inherit;
    padding: 8px 14px;
    cursor: pointer;
  }
  .modal-btn-confirm { background: var(--accent); border-color: var(--accent); color: #fff; }
  .modal-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── 반응형 ── */
  @media (max-width: 600px) {
    .header-actions { width: 100%; justify-content: flex-start; }
    .app-switcher { flex: 1; }
    .app-tab { flex: 1; justify-content: center; }
    .date-context { width: 100%; margin-left: 0; }
    .notice-board { grid-template-columns: 1fr; }
    .notice-list { grid-template-columns: 1fr; }
  }
  @media (min-width: 768px) {
    .header { padding: 12px 32px 10px; }
    .notice-board { padding: 14px 32px; }
    .tabs { padding: 10px 32px; }
    .content { padding: 0 32px 30px; }
  }
</style>
</head>
<body>
<script>var API_URL = ""; var INITIAL_DATA = null;</script>

<div class="header">
  <div class="header-top">
    <div class="app-switcher" aria-label="운영 화면 전환">
      <span class="app-tab active">오늘 일정</span>
      <a href="?page=timeline" class="app-tab">빌리지 스케줄</a>
    </div>
    <div class="header-actions">
      <a href="https://village6k-cpu.github.io/my-gas-project2/request.html" class="nav-link">예약 입력</a>
      <button class="icon-btn" onclick="refreshData()" id="refreshBtn" title="새로고침">↻</button>
    </div>
  </div>
  <div class="date-nav">
    <button class="date-nav-btn" onclick="changeDate(-1)">◀</button>
    <input type="date" class="date-input" id="dateInput" onchange="onDateChange()">
    <button class="date-nav-btn" onclick="changeDate(1)">▶</button>
    <button class="today-btn" onclick="goToday()">오늘</button>
    <div class="date-context">
      <strong id="headerTitle">오늘 일정</strong>
      <span id="dateLabel"></span>
    </div>
  </div>
</div>

<div class="notice-board" aria-label="오늘 세팅 메모">
  <div class="notice-lead">
    <div class="notice-kicker">사장님 메모</div>
    <div class="notice-title">오늘 세팅 전<br>반드시 확인</div>
  </div>
  <div class="notice-list">
    <div class="notice-note">세부 구성품 및 추가 요청 사항은 카톡 대화 내용을 한번 더 확인 후 세팅</div>
    <div class="notice-note secondary">매직암, 라인, 배터리 등 기타 악세사리류 갯수 철저하게 체크</div>
  </div>
</div>

<div class="tabs">
  <div class="tabs-inner">
    <button class="tab active" data-tab="checkout" onclick="switchTab('checkout')">
      반출 <span class="badge" id="tabCheckout">0</span>
    </button>
    <button class="tab" data-tab="checkin" onclick="switchTab('checkin')">
      반납 <span class="badge" id="tabCheckin">0</span>
    </button>
    <button class="tab" data-tab="all" onclick="switchTab('all')">
      전체 <span class="badge" id="tabAll">0</span>
    </button>
  </div>
</div>

<div class="content">
  <div id="loadingArea" class="loading">
    <div class="spinner"></div>
    <div>일정을 불러오는 중...</div>
  </div>
  <div id="checkoutSection" class="section"></div>
  <div id="checkinSection" class="section"></div>
  <div id="allSection" class="section"></div>
</div>

<script>
var dashboardData = null;
var currentDate = new Date();

document.addEventListener('DOMContentLoaded', function() {
  updateDateDisplay();
  // 서버가 INITIAL_DATA 박아 보냈으면 즉시 렌더 (fetch 왕복 1회 절약)
  if (INITIAL_DATA) {
    dashboardData = INITIAL_DATA;
    renderDashboard(INITIAL_DATA);
  } else {
    loadData();
  }
});

function updateDateDisplay() {
  var days = ['일','월','화','수','목','금','토'];
  var d = currentDate;
  document.getElementById('dateLabel').textContent =
    d.getFullYear() + '년 ' + (d.getMonth()+1) + '월 ' + d.getDate() + '일 (' + days[d.getDay()] + ')';
  document.getElementById('dateInput').value = formatDate(d);

  var today = formatDate(new Date());
  document.getElementById('headerTitle').textContent =
    formatDate(d) === today ? '오늘 일정' : (d.getMonth()+1) + '/' + d.getDate() + ' 일정';
}

function formatDate(d) {
  return d.getFullYear() + '-' + ('0'+(d.getMonth()+1)).slice(-2) + '-' + ('0'+d.getDate()).slice(-2);
}

function changeDate(offset) {
  currentDate.setDate(currentDate.getDate() + offset);
  updateDateDisplay();
  loadData();
}

function onDateChange() {
  var val = document.getElementById('dateInput').value;
  if (val) {
    currentDate = new Date(val + 'T00:00:00');
    updateDateDisplay();
    loadData();
  }
}

function goToday() {
  currentDate = new Date();
  updateDateDisplay();
  loadData();
}

function loadData(forceFresh) {
  document.getElementById('loadingArea').style.display = 'block';
  document.querySelectorAll('.section').forEach(function(s) { s.classList.remove('visible'); });

  var url = API_URL + '?key=village2026&action=dashboard&date=' + formatDate(currentDate);
  if (forceFresh) url += '&nocache=1';

  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      dashboardData = data;
      renderDashboard(data);
    })
    .catch(function(err) {
      document.getElementById('loadingArea').innerHTML =
        '<div class="empty-state"><div class="icon">⚠️</div><div class="text">데이터 로드 실패</div></div>';
    });
}

function refreshData() {
  var btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  setTimeout(function() { btn.classList.remove('spinning'); }, 800);
  loadData(true);  // 캐시 우회 — 시트의 최신 데이터 강제 조회
}

function timeSortKey(timeValue) {
  var raw = String(timeValue || '').trim();
  if (!raw || raw === '시간 미정') return '99:99';

  var isPm = raw.indexOf('오후') >= 0 || /\bPM\b/i.test(raw);
  var isAm = raw.indexOf('오전') >= 0 || /\bAM\b/i.test(raw);
  var match = raw.match(/(\d{1,2})\s*(?::|시)\s*(\d{1,2})?/);
  if (!match) return '99:99';

  var hour = Number(match[1]);
  var minute = match[2] !== undefined ? Number(match[2]) : 0;
  if (isNaN(hour) || isNaN(minute) || hour < 0 || hour > 24 || minute < 0 || minute > 59) {
    return '99:99';
  }
  if (isPm && hour < 12) hour += 12;
  if (isAm && hour === 12) hour = 0;
  if (hour === 24 && minute > 0) return '99:99';

  return ('0' + hour).slice(-2) + ':' + ('0' + minute).slice(-2);
}

function compareScheduleItemsByTime(a, b) {
  var at = timeSortKey(a && (a.sortTime || a.time));
  var bt = timeSortKey(b && (b.sortTime || b.time));
  var timeCmp = at.localeCompare(bt);
  if (timeCmp) return timeCmp;

  var an = String((a && (a.name || a.tradeId)) || '');
  var bn = String((b && (b.name || b.tradeId)) || '');
  return an.localeCompare(bn);
}

function compareTimeLabels(a, b) {
  var timeCmp = timeSortKey(a).localeCompare(timeSortKey(b));
  if (timeCmp) return timeCmp;
  return String(a || '').localeCompare(String(b || ''));
}

function renderDashboard(data) {
  document.getElementById('loadingArea').style.display = 'none';

  document.getElementById('tabCheckout').textContent = data.checkout.length;
  document.getElementById('tabCheckin').textContent = data.checkin.length;
  document.getElementById('tabAll').textContent = data.checkout.length + data.checkin.length;

  renderList('checkoutSection', data.checkout, 'checkout');
  renderList('checkinSection', data.checkin, 'checkin');

  var all = data.checkout.map(function(c) { c._type = 'checkout'; return c; })
    .concat(data.checkin.map(function(c) { c._type = 'checkin'; return c; }));
  all.sort(compareScheduleItemsByTime);
  renderList('allSection', all, 'all');

  switchTab('checkout');
}

function renderList(containerId, items, type) {
  var container = document.getElementById(containerId);

  if (!items || items.length === 0) {
    container.innerHTML =
      '<div class="empty-state"><div class="icon">' +
      (type === 'checkout' ? '📦' : type === 'checkin' ? '📥' : '📋') +
      '</div><div class="text">' +
      (type === 'checkout' ? '반출' : type === 'checkin' ? '반납' : '') +
      ' 일정이 없습니다</div></div>';
    return;
  }

  var groups = {};
  items.slice().sort(compareScheduleItemsByTime).forEach(function(item) {
    var timeKey = item.time || '시간 미정';
    if (!groups[timeKey]) groups[timeKey] = [];
    groups[timeKey].push(item);
  });

  var html = '';
  Object.keys(groups).sort(compareTimeLabels).forEach(function(timeKey) {
    html += '<div class="time-group">';
    html += '<div class="time-group-header">' + timeKey + '</div>';

    groups[timeKey].forEach(function(item, idx) {
      var cardType = item._type || type;
      var cardId = cardType + '_' + timeKey.replace(/[: ]/g,'') + '_' + idx;

      html += '<div class="schedule-card type-' + cardType + '" onclick="toggleDetail(\'' + cardId + '\')">';
      html += '<div class="card-header"><div>';
      html += '<div class="customer-name">' + escHtml(item.name) + '</div>';
      if (item.company) html += '<div class="customer-company">' + escHtml(item.company) + '</div>';
      html += '</div>';
      html += '<div class="time-badge">' + timeKey + '</div></div>';

      if (item.tel) {
        html += '<div class="card-meta"><span class="icon">📞</span>';
        html += '<a href="tel:' + item.tel + '" class="tel-link" onclick="event.stopPropagation()">' + escHtml(item.tel) + '</a></div>';
      }

      html += '<div class="equip-list">';
      (item.equipments || []).forEach(function(eq) {
        var cls = eq.isSet ? 'equip-tag set-tag' : 'equip-tag';
        html += '<span class="' + cls + '">' + escHtml(eq.name + (eq.qty > 1 ? ' ×' + eq.qty : '')) + '</span>';
      });
      html += '<button class="equip-add-btn" onclick="event.stopPropagation();addEquip(\'' + escHtml(item.tradeId) + '\')">+ 장비추가</button>';
      html += '</div>';

      html += '<div class="card-detail" id="' + cardId + '">';
      html += '<div class="detail-row"><span>거래ID</span><span class="dl">' + escHtml(item.tradeId) + '</span></div>';
      var pLabel = cardType === 'checkout' ? '반납 예정' : '반출일';
      var pValue = cardType === 'checkout' ? item.returnDate : item.checkoutDate;
      if (pValue) html += '<div class="detail-row"><span>' + pLabel + '</span><span class="dl">' + escHtml(pValue) + '</span></div>';
      html += '<div class="detail-row"><span>상태</span><span class="status-badge status-' + (item.status || '대기') + '">' + (item.status || '대기') + '</span></div>';
      if (item.equipments && item.equipments.length > 0) {
        var total = item.equipments.reduce(function(s, eq) { return s + (eq.qty || 1); }, 0);
        html += '<div class="detail-row"><span>총 장비 수</span><span class="dl">' + total + '건</span></div>';
      }
      html += '<div class="detail-actions">';
      if (item.contractUrl) {
        html += '<a class="action-link primary" href="' + escAttr(item.contractUrl) + '" target="_blank" onclick="event.stopPropagation()">계약서 열기</a>';
      } else {
        html += '<button class="action-btn" onclick="event.stopPropagation()" disabled>계약서 링크 없음</button>';
      }
      html += paymentSelectHtml(item);
      html += '</div>';
      if (item.paymentWarning) html += '<div class="detail-note">' + escHtml(item.paymentWarning) + '</div>';
      html += '</div></div>';
    });
    html += '</div>';
  });

  container.innerHTML = html;
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(function(t) {
    t.classList.toggle('active', t.dataset.tab === tab);
  });
  document.querySelectorAll('.section').forEach(function(s) { s.classList.remove('visible'); });
  document.getElementById(tab + 'Section').classList.add('visible');
}

function toggleDetail(id) {
  var el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

function paymentSelectHtml(item) {
  var options = [''].concat((dashboardData && dashboardData.paymentOptions) || ['미정', '계좌', '카드', '현금', '기타']);
  var current = item.paymentMethod || '';
  var html = '<select class="payment-select" data-prev="' + escAttr(current) + '" onclick="event.stopPropagation()" onchange="updatePaymentMethod(event,this,\'' + escJs(item.tradeId) + '\')">';
  options.forEach(function(opt) {
    var label = opt || '선택';
    html += '<option value="' + escAttr(opt) + '"' + (opt === current ? ' selected' : '') + '>' + escHtml(label) + '</option>';
  });
  html += '</select>';
  return html;
}

function updatePaymentMethod(event, select, tradeId) {
  event.stopPropagation();
  var prev = select.getAttribute('data-prev') || '';
  var method = select.value;
  select.disabled = true;
  fetch(API_URL + '?key=village2026&action=updatePayment&tid=' + encodeURIComponent(tradeId) + '&method=' + encodeURIComponent(method))
    .then(function(r) { return r.json(); })
    .then(function(res) {
      select.disabled = false;
      if (res.error) {
        alert('결제수단 저장 실패: ' + res.error);
        select.value = prev;
        return;
      }
      select.setAttribute('data-prev', method);
      if (res.warning) alert(res.warning);
      loadData(true);
    })
    .catch(function(err) {
      select.disabled = false;
      select.value = prev;
      alert('결제수단 저장 실패: ' + err.message);
    });
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) { return escHtml(s).replace(/'/g,'&#39;'); }
function escJs(s) { return String(s || '').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,' '); }

var equipListCache = null;
var pendingAddTid = null;

function loadEquipList() {
  if (equipListCache) return Promise.resolve(equipListCache);
  return fetch(API_URL + '?key=village2026&action=read&sheet=' + encodeURIComponent('목록') + '&range=A2:A1000')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var arr = d && d.data ? d.data : [];
      equipListCache = arr.map(function(row) { return Array.isArray(row) ? row[0] : row; })
        .filter(function(v) { return !!v; })
        .map(String);
      var dl = document.getElementById('equipDatalist');
      if (dl) {
        dl.innerHTML = equipListCache.map(function(n) {
          return '<option value="' + escAttr(n) + '"></option>';
        }).join('');
      }
      return equipListCache;
    })
    .catch(function() {
      equipListCache = [];
      return [];
    });
}

function addEquipRow(name, qty) {
  var container = document.getElementById('equipRows');
  if (!container) return null;

  var row = document.createElement('div');
  row.className = 'multi-equip-row';

  var input = document.createElement('input');
  input.className = 'modal-input equip-name-input';
  input.setAttribute('list', 'equipDatalist');
  input.placeholder = '장비명';
  input.autocomplete = 'off';
  input.value = name || '';

  var qtyInput = document.createElement('input');
  qtyInput.className = 'modal-input equip-qty-input';
  qtyInput.type = 'number';
  qtyInput.min = '1';
  qtyInput.value = qty || '1';

  var removeBtn = document.createElement('button');
  removeBtn.type = 'button';
  removeBtn.className = 'multi-row-remove';
  removeBtn.title = '행 삭제';
  removeBtn.textContent = '×';
  removeBtn.onclick = function() {
    if (container.querySelectorAll('.multi-equip-row').length <= 1) {
      input.value = '';
      qtyInput.value = '1';
      input.focus();
      return;
    }
    row.remove();
  };

  row.appendChild(input);
  row.appendChild(qtyInput);
  row.appendChild(removeBtn);
  container.appendChild(row);
  return row;
}

function resetEquipRows(entries) {
  var container = document.getElementById('equipRows');
  if (!container) return;
  container.innerHTML = '';
  if (entries && entries.length) {
    entries.forEach(function(entry) { addEquipRow(entry.name, entry.qty); });
  } else {
    addEquipRow('', 1);
  }
}

function collectEquipEntries() {
  var rows = document.querySelectorAll('#equipRows .multi-equip-row');
  var merged = {};
  var order = [];
  rows.forEach(function(row) {
    var nameInput = row.querySelector('.equip-name-input');
    var qtyInput = row.querySelector('.equip-qty-input');
    var name = nameInput ? nameInput.value.trim() : '';
    if (!name) return;
    var qty = parseInt(qtyInput ? qtyInput.value : '1', 10);
    if (!qty || qty < 1) qty = 1;
    if (!merged[name]) {
      merged[name] = { name: name, qty: qty };
      order.push(name);
    } else {
      merged[name].qty += qty;
    }
  });
  return order.map(function(name) { return merged[name]; });
}

function setAddEquipBusy(isBusy, label) {
  var btn = document.getElementById('addEquipConfirmBtn');
  var addBtn = document.getElementById('addEquipRowBtn');
  btn.disabled = isBusy;
  btn.textContent = label || '가용 확인 후 추가';
  if (addBtn) addBtn.disabled = isBusy;
}

function postAddEquip(tid, entry) {
  return fetch(API_URL + '?key=village2026&action=addEquip&tid=' + encodeURIComponent(tid)
    + '&equipName=' + encodeURIComponent(entry.name) + '&qty=' + encodeURIComponent(entry.qty))
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res.error) throw new Error(res.error);
      return res;
    });
}

function addEquip(tid) {
  pendingAddTid = tid;
  resetEquipRows();
  setAddEquipBusy(false);
  document.getElementById('addEquipModal').classList.add('open');
  loadEquipList().then(function() {
    setTimeout(function() {
      var input = document.querySelector('#equipRows .equip-name-input');
      if (input) input.focus();
    }, 50);
  });
}

function closeAddEquipModal() {
  document.getElementById('addEquipModal').classList.remove('open');
  pendingAddTid = null;
}

function confirmAddEquip() {
  if (!pendingAddTid) { closeAddEquipModal(); return; }
  var entries = collectEquipEntries();
  if (!entries.length) { alert('장비명을 하나 이상 입력하거나 선택하세요.'); return; }

  setAddEquipBusy(true, '가용 확인 중...');

  var tid = pendingAddTid;
  var successes = [];
  var failures = [];
  entries.reduce(function(promise, entry) {
    return promise.then(function() {
      return postAddEquip(tid, entry)
        .then(function() { successes.push(entry); })
        .catch(function(err) { failures.push({ entry: entry, message: err.message }); });
    });
  }, Promise.resolve()).then(function() {
    setAddEquipBusy(false);
    if (failures.length) {
      if (successes.length) loadData(true);
      resetEquipRows(failures.map(function(f) { return f.entry; }));
      alert((successes.length ? successes.length + '개 추가 완료, ' : '')
        + failures.length + '개 추가 실패\n'
        + failures.map(function(f) { return '- ' + f.entry.name + ': ' + f.message; }).join('\n'));
      return;
    }
    closeAddEquipModal();
    loadData(true);
    alert('가용 확인 완료. 장비 ' + successes.length + '개를 추가했습니다.');
  }).catch(function(err) {
    setAddEquipBusy(false);
    alert('네트워크 오류: ' + err.message);
  });
}

window.addEventListener('load', function() { loadEquipList(); });
</script>
<div id="addEquipModal" class="modal-overlay" onclick="if(event.target===this)closeAddEquipModal()">
  <div class="modal-box">
    <div class="modal-title">장비 추가</div>
    <label class="modal-label">장비명 / 수량</label>
    <div id="equipRows" class="multi-equip-list"></div>
    <button type="button" id="addEquipRowBtn" class="multi-add-row-btn" onclick="addEquipRow()">+ 장비 행 추가</button>
    <datalist id="equipDatalist"></datalist>
    <div class="modal-actions">
      <button class="modal-btn" onclick="closeAddEquipModal()">취소</button>
      <button id="addEquipConfirmBtn" class="modal-btn modal-btn-confirm" onclick="confirmAddEquip()">가용 확인 후 추가</button>
    </div>
  </div>
</div>
</body>
</html>
