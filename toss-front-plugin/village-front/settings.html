<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://static.toss.im/tds/43.9.4/css/tds.min.css" />
    <link rel="stylesheet" type="text/css" href="https://static.toss.im/tps/main.css" />
    <link rel="stylesheet" type="text/css" href="https://static.toss.im/tps/others.css" />
    <script src="https://cdn.tossplace.com/toss-front-sdk/v0/index.js"></script>
    <title>VILLAGE 설정</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 28px;
        color: #191919;
        background: #f6f4f0;
        font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard",
          "Noto Sans KR", sans-serif;
      }

      main {
        width: min(560px, 100%);
        margin: 0 auto;
      }

      h1 {
        margin: 0 0 22px;
        font-size: 28px;
        line-height: 1.25;
      }

      .setting-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: 64px;
        padding: 16px 18px;
        margin-bottom: 12px;
        border-radius: 8px;
        background: #fff;
        box-shadow: inset 0 0 0 1px rgba(25, 25, 25, 0.08);
      }

      .setting-label {
        font-size: 17px;
        font-weight: 700;
      }

      .setting-value {
        max-width: 55%;
        font-size: 15px;
        color: #555;
        text-align: right;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>VILLAGE 설정</h1>
      <section class="setting-row">
        <span class="setting-label">Toss SN</span>
        <span id="serial-number" class="setting-value">-</span>
      </section>
      <section class="setting-row">
        <span class="setting-label">서버</span>
        <span id="lookup-base" class="setting-value">-</span>
      </section>
      <section class="setting-row">
        <span class="setting-label">상태</span>
        <span id="settings-status" class="setting-value">확인 중</span>
      </section>
    </main>

    <script src="./config.js"></script>
    <script>
      var sdk = window.TossFrontSDK;

      async function loadSettings() {
        document.getElementById('lookup-base').textContent =
          (window.CONFIG && window.CONFIG.LOOKUP_BASE) || '-';

        try {
          var result = sdk && sdk.app && sdk.app.getSerialNumber ? await sdk.app.getSerialNumber() : {};
          document.getElementById('serial-number').textContent = result.serialNumber || '-';
          document.getElementById('settings-status').textContent = '정상';
        } catch (e) {
          document.getElementById('serial-number').textContent = '확인 불가';
          document.getElementById('settings-status').textContent = 'SDK 확인 필요';
        }
      }

      loadSettings();
    </script>
  </body>
</html>
