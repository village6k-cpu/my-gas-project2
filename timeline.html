<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>빌리지 스케줄</title>
  <link href="https://unpkg.com/vis-timeline@7.7.3/styles/vis-timeline-graph2d.min.css" rel="stylesheet">
  <style>
    :root {
      --bg: #FAFBFC;
      --surface: #FFFFFF;
      --border: #E8ECF0;
      --text-primary: #1B2332;
      --text-secondary: #5F6B7A;
      --text-muted: #9AA5B4;
      --accent: #2563EB;
      --blue: #3B82F6;
      --amber: #F59E0B;
      --green: #10B981;
      --gray: #9CA3AF;
      --purple: #8B5CF6;
      --red: #EF4444;
      --radius: 8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── 헤더 ── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .header-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
      white-space: nowrap;
    }

    .search-box {
      position: relative;
      flex: 1;
      max-width: 320px;
    }
    .search-box input {
      width: 100%;
      padding: 8px 12px 8px 36px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      font-size: 13px;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-box input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    }
    .search-box input::placeholder { color: var(--text-muted); }
    .search-box svg {
      position: absolute;
      left: 10px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: auto;
    }

    .pill-group {
      display: flex;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .pill {
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      border: none;
      background: transparent;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .pill:not(:last-child) { border-right: 1px solid var(--border); }
    .pill:hover { background: rgba(0,0,0,0.03); }
    .pill.active {
      background: var(--accent);
      color: #fff;
    }

    .icon-btn {
      width: 32px; height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.15s;
      font-size: 14px;
    }
    .icon-btn:hover {
      background: var(--bg);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── 범례 + 통계 바 ── */
    .info-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 6px 20px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-shrink: 0;
      font-size: 12px;
    }
    .legend-group {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .legend-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      color: var(--text-secondary);
      cursor: pointer;
      user-select: none;
    }
    .legend-chip.dimmed { opacity: 0.35; }
    .legend-bar {
      width: 14px; height: 14px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .stat-text {
      margin-left: auto;
      color: var(--text-muted);
    }

    /* ── 타임라인 영역 ── */
    .timeline-area {
      flex: 1;
      overflow: hidden;
      position: relative;
      background: var(--surface);
    }

    #timeline { width: 100%; height: 100%; }

    /* ── vis.js 스타일 오버라이드 ── */
    .vis-timeline {
      border: none !important;
      font-family: inherit !important;
    }

    /* 좌측 그룹 라벨 */
    .vis-labelset .vis-label {
      border-bottom: 1px solid var(--border) !important;
    }
    .vis-label .vis-inner {
      font-size: 12px !important;
      padding: 4px 12px !important;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 180px;
    }

    /* 아이템 바 */
    .vis-item {
      border-radius: 5px !important;
      font-size: 11px !important;
      font-weight: 600 !important;
      border: none !important;
      padding: 3px 8px !important;
      line-height: 1.4 !important;
      cursor: grab !important;
      transition: box-shadow 0.15s, transform 0.1s !important;
    }
    .vis-item:hover {
      box-shadow: 0 2px 8px rgba(0,0,0,0.15) !important;
      transform: translateY(-1px);
    }
    .vis-item.vis-selected {
      box-shadow: 0 0 0 2px var(--accent), 0 4px 12px rgba(0,0,0,0.15) !important;
    }

    /* 상태별 색상 */
    .vis-item.status-대기 {
      background: linear-gradient(135deg, #60A5FA, #3B82F6) !important;
      color: #fff !important;
    }
    .vis-item.status-반출중 {
      background: linear-gradient(135deg, #FBBF24, #F59E0B) !important;
      color: #fff !important;
    }
    .vis-item.status-반납완료 {
      background: linear-gradient(135deg, #34D399, #10B981) !important;
      color: #fff !important;
    }
    .vis-item.status-취소 {
      background: #E5E7EB !important;
      color: #9CA3AF !important;
      text-decoration: line-through !important;
    }
    .vis-item.status-기타 {
      background: linear-gradient(135deg, #A78BFA, #8B5CF6) !important;
      color: #fff !important;
    }

    /* 드래그 중 */
    .vis-item.vis-dragging {
      opacity: 0.85 !important;
      box-shadow: 0 6px 20px rgba(0,0,0,0.25) !important;
      cursor: grabbing !important;
    }

    /* 시간축 */
    .vis-time-axis .vis-text { font-size: 11px !important; color: var(--text-muted) !important; }
    .vis-time-axis .vis-text.vis-major { font-weight: 600 !important; color: var(--text-secondary) !important; }
    .vis-panel.vis-left { border-right: 1px solid var(--border) !important; }
    .vis-panel.vis-bottom { border-top: 1px solid var(--border) !important; }

    /* 현재 시간선 */
    .vis-current-time {
      background-color: var(--red) !important;
      width: 2px !important;
    }

    /* 그룹 행 구분 */
    .vis-foreground .vis-group { border-bottom: 1px solid var(--border) !important; }
    .vis-foreground .vis-group:nth-child(even) { background: rgba(0,0,0,0.015); }

    /* ── 상세 패널 ── */
    .detail-panel {
      display: none;
      position: absolute;
      right: 0; top: 0; bottom: 0;
      width: 320px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      box-shadow: -4px 0 16px rgba(0,0,0,0.06);
      z-index: 200;
      flex-direction: column;
      overflow-y: auto;
    }
    .detail-panel.open { display: flex; }

    .detail-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .detail-header h3 {
      font-size: 15px;
      font-weight: 700;
    }
    .detail-close {
      width: 28px; height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: var(--bg);
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      color: var(--text-secondary);
    }

    .detail-body { padding: 16px 20px; }
    .detail-row {
      display: flex;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-label {
      width: 72px;
      flex-shrink: 0;
      color: var(--text-muted);
      font-weight: 500;
    }
    .detail-value {
      color: var(--text-primary);
      font-weight: 500;
    }
    .status-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      color: #fff;
    }

    /* ── 로딩 ── */
    .loading-overlay {
      position: absolute; inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.92);
      z-index: 300;
      gap: 12px;
    }
    .loader {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 13px; color: var(--text-secondary); }

    /* ── 토스트 ── */
    .toast {
      position: fixed;
      bottom: 20px; left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--text-primary);
      color: #fff;
      padding: 10px 20px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      z-index: 500;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
  </style>
</head>
<body>

<!-- 헤더 -->
<div class="header">
  <span class="header-title">스케줄 타임라인</span>

  <div class="search-box">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" id="searchInput" placeholder="세트명 또는 고객명 검색..." autocomplete="off">
  </div>

  <div class="controls">
    <div class="pill-group">
      <button class="pill active" id="btnAll" onclick="setFilter('all')">전체</button>
      <button class="pill" id="btnActive" onclick="setFilter('active')">진행중</button>
    </div>

    <div class="pill-group" style="margin-left:4px">
      <button class="pill" onclick="zoomIn()" title="확대">+</button>
      <button class="pill" onclick="zoomOut()" title="축소">&minus;</button>
    </div>

    <button class="icon-btn" onclick="moveToday()" title="오늘">T</button>
    <button class="icon-btn" onclick="fitAll()" title="전체보기">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
        <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
      </svg>
    </button>
    <button class="icon-btn" onclick="reload()" title="새로고침">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
    </button>
  </div>
</div>

<!-- 범례 -->
<div class="info-bar">
  <div class="legend-group">
    <span class="legend-chip" data-status="대기" onclick="toggleLegend(this)"><span class="legend-bar" style="background:var(--blue)"></span>대기</span>
    <span class="legend-chip" data-status="반출중" onclick="toggleLegend(this)"><span class="legend-bar" style="background:var(--amber)"></span>반출중</span>
    <span class="legend-chip" data-status="반납완료" onclick="toggleLegend(this)"><span class="legend-bar" style="background:var(--green)"></span>반납완료</span>
    <span class="legend-chip" data-status="취소" onclick="toggleLegend(this)"><span class="legend-bar" style="background:var(--gray)"></span>취소</span>
    <span class="legend-chip" data-status="기타" onclick="toggleLegend(this)"><span class="legend-bar" style="background:var(--purple)"></span>기타</span>
  </div>
  <span class="stat-text" id="statInfo">불러오는 중...</span>
</div>

<!-- 타임라인 + 상세 패널 -->
<div class="timeline-area">
  <div id="timeline"></div>

  <!-- 상세 패널 (우측 슬라이드) -->
  <div class="detail-panel" id="detailPanel">
    <div class="detail-header">
      <h3 id="detailTitle">상세 정보</h3>
      <button class="detail-close" onclick="closeDetail()">&#10005;</button>
    </div>
    <div class="detail-body" id="detailBody"></div>
  </div>

  <!-- 로딩 -->
  <div class="loading-overlay" id="loading">
    <div class="loader"></div>
    <span class="loading-text">스케줄 불러오는 중...</span>
  </div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script src="https://unpkg.com/vis-timeline@7.7.3/standalone/umd/vis-timeline-graph2d.min.js"></script>
<script>
  var timeline, allGroups = [], allItems = [];
  var groups = new vis.DataSet();
  var items  = new vis.DataSet();
  var currentFilter = 'all';
  var hiddenStatuses = {};

  var STATUS_COLORS = {
    '대기':     '#3B82F6',
    '반출중':   '#F59E0B',
    '반납완료': '#10B981',
    '취소':     '#9CA3AF',
    '기타':     '#8B5CF6'
  };

  // ── 초기화 ──
  function init() {
    var container = document.getElementById('timeline');
    var now = new Date();

    timeline = new vis.Timeline(container, items, groups, {
      stack: true,
      stackSubgroups: true,
      groupOrder: 'content',
      orientation: { axis: 'both' },
      zoomMin:  1000 * 60 * 60 * 6,
      zoomMax:  1000 * 60 * 60 * 24 * 120,
      start:    new Date(now.getTime() - 1000*60*60*24*1),
      end:      new Date(now.getTime() + 1000*60*60*24*10),
      height:   '100%',
      margin:   { item: { horizontal: 4, vertical: 4 }, axis: 5 },
      locale:   'ko',
      showCurrentTime: true,
      moveable: true,
      zoomable: true,
      selectable: true,
      multiselect: false,
      snap: function(date) {
        var m = 30 * 60 * 1000;
        return new Date(Math.round(date.getTime() / m) * m);
      },
      editable: { updateTime: true, remove: false, add: false, updateGroup: false },
      tooltip: { followMouse: false, overflowMethod: 'cap' },
      groupHeightMode: 'auto'
    });

    // 아이템 클릭 → 상세 패널
    timeline.on('select', function(props) {
      if (props.items.length === 0) { closeDetail(); return; }
      var item = items.get(props.items[0]);
      if (item) showDetail(item);
    });

    // 드래그 완료 → 시트 업데이트
    items.on('update', function(event, properties) {
      properties.items.forEach(function(id) {
        var item = items.get(id);
        var original = allItems.find(function(i) { return i.id === id; });
        if (!item || !original || !original.rowIndex) return;

        var riJSON = original.rowIndices ? JSON.stringify(original.rowIndices) : null;
        google.script.run
          .withSuccessHandler(function(res) {
            if (res.success) {
              showToast('일정이 변경되었습니다');
              original.start = item.start;
              original.end   = item.end;
            } else {
              showToast('변경 실패: ' + res.message);
              items.update({ id: id, start: original.start, end: original.end });
            }
          })
          .withFailureHandler(function(err) {
            showToast('오류: ' + err.message);
            items.update({ id: id, start: original.start, end: original.end });
          })
          .updateScheduleTime(original.rowIndex, item.start, item.end, riJSON);
      });
    });
  }

  // ── 데이터 로드 ──
  function loadData() {
    showLoading(true);
    google.script.run
      .withSuccessHandler(function(data) {
        allGroups = data.groups || [];
        allItems  = data.items  || [];
        applyFilters();
        showLoading(false);
      })
      .withFailureHandler(function(err) {
        showLoading(false);
        showToast('데이터 로드 실패');
      })
      .getTimelineData();
  }

  // ── 필터 적용 ──
  function applyFilters() {
    var query = document.getElementById('searchInput').value.trim().toLowerCase();

    var matchedGroupIds = {};

    // 1) 그룹명(세트명) 매칭
    allGroups.forEach(function(g) {
      if (!query || g.content.toLowerCase().indexOf(query) >= 0) {
        matchedGroupIds[g.id] = true;
      }
    });

    // 2) 고객명 매칭 → 해당 그룹도 포함
    if (query) {
      allItems.forEach(function(item) {
        if (item.custName && item.custName.toLowerCase().indexOf(query) >= 0) {
          matchedGroupIds[item.group] = true;
        }
      });
    }

    // 아이템 필터
    var visibleItems = allItems.filter(function(item) {
      if (!matchedGroupIds[item.group]) {
        if (query && item.custName && item.custName.toLowerCase().indexOf(query) >= 0) {
          matchedGroupIds[item.group] = true;
        } else {
          return false;
        }
      }

      // 상태 필터
      if (currentFilter === 'active' && item.status !== '대기' && item.status !== '반출중') return false;

      // 범례 토글
      var st = ['대기','반출중','반납완료','취소'].indexOf(item.status) >= 0 ? item.status : '기타';
      if (hiddenStatuses[st]) return false;

      return true;
    });

    // 표시할 그룹
    var usedGroups = {};
    visibleItems.forEach(function(i) { usedGroups[i.group] = true; });
    var visibleGroups = allGroups.filter(function(g) { return usedGroups[g.id]; });

    groups.clear(); groups.add(visibleGroups);
    items.clear();  items.add(visibleItems);

    updateStat(visibleGroups.length, allGroups.length, visibleItems.length, allItems.length);
  }

  function updateStat(gShow, gTotal, iShow, iTotal) {
    var txt = gShow + '개 세트';
    if (gShow < gTotal) txt = gShow + '/' + gTotal + '개 세트';
    txt += ' · ' + iShow + '건';
    if (iShow < iTotal) txt += '/' + iTotal + '건';
    document.getElementById('statInfo').textContent = txt;
  }

  // ── 상세 패널 ──
  function showDetail(item) {
    var panel = document.getElementById('detailPanel');
    document.getElementById('detailTitle').textContent = item.custName || item.content;

    var statusColor = STATUS_COLORS[item.status] || STATUS_COLORS['기타'];

    var html =
      row('거래ID', item['거래ID'] || '-') +
      row('고객명', item.custName || '-') +
      row('연락처', item.tel || '-') +
      row('세트', item['세트명'] || '-') +
      row('장비', item['장비명'] || '-') +
      row('수량', item['수량'] || '-') +
      row('반출', item['반출'] || '-') +
      row('반납', item['반납'] || '-') +
      row('상태', '<span class="status-badge" style="background:' + statusColor + '">' + (item.status || '-') + '</span>') +
      (item['단가'] > 0 ? row('단가', Number(item['단가']).toLocaleString() + '원') : '');

    document.getElementById('detailBody').innerHTML = html;
    panel.classList.add('open');
  }

  function row(label, value) {
    return '<div class="detail-row"><span class="detail-label">' + label + '</span><span class="detail-value">' + value + '</span></div>';
  }

  function closeDetail() {
    document.getElementById('detailPanel').classList.remove('open');
    timeline.setSelection([]);
  }

  // ── 범례 토글 ──
  function toggleLegend(el) {
    var status = el.getAttribute('data-status');
    hiddenStatuses[status] = !hiddenStatuses[status];
    el.classList.toggle('dimmed', !!hiddenStatuses[status]);
    applyFilters();
  }

  // ── 컨트롤 ──
  function setFilter(type) {
    currentFilter = type;
    document.getElementById('btnAll').classList.toggle('active', type === 'all');
    document.getElementById('btnActive').classList.toggle('active', type === 'active');
    applyFilters();
  }

  function moveToday() {
    var now = new Date();
    timeline.setWindow(
      new Date(now.getTime() - 1000*60*60*24*1),
      new Date(now.getTime() + 1000*60*60*24*10),
      { animation: { duration: 400, easingFunction: 'easeInOutQuad' } }
    );
  }

  function zoomIn()  { timeline.zoomIn(0.4); }
  function zoomOut() { timeline.zoomOut(0.4); }

  function fitAll() {
    if (allItems.length > 0) timeline.fit({ animation: { duration: 400 } });
  }

  function reload() {
    document.getElementById('searchInput').value = '';
    currentFilter = 'all';
    hiddenStatuses = {};
    document.querySelectorAll('.legend-chip').forEach(function(el) { el.classList.remove('dimmed'); });
    document.getElementById('btnAll').classList.add('active');
    document.getElementById('btnActive').classList.remove('active');
    closeDetail();
    loadData();
  }

  function showLoading(show) {
    document.getElementById('loading').style.display = show ? 'flex' : 'none';
  }

  function showToast(msg) {
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(function() { el.classList.remove('show'); }, 2500);
  }

  // ── 검색 디바운스 ──
  var searchTimer;
  document.getElementById('searchInput').addEventListener('input', function() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(applyFilters, 200);
  });

  // ESC로 상세 패널 닫기
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeDetail();
  });

  // ── 시작 ──
  init();
  loadData();
</script>
</body>
</html>
