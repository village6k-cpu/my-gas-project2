<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="스케줄">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#F7F7F5">
<link rel="apple-touch-icon" sizes="180x180" href="https://village6k-cpu.github.io/my-gas-project2/icons/village-schedule-03-20260514-180.png?v=20260514a">
<link rel="icon" type="image/png" href="https://village6k-cpu.github.io/my-gas-project2/icons/village-schedule-03-20260514.png?v=20260514a">
<title>빌리지 스케줄</title>
<link href="https://unpkg.com/vis-timeline@7.7.3/styles/vis-timeline-graph2d.min.css" rel="stylesheet">
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  :root {
    --bg:#F7F7F5;
    --surface:#FFFFFF;
    --border:#E9E9E7;
    --border-light:#F0F0EE;
    --text-primary:#37352F;
    --text-secondary:#787774;
    --text-muted:#B4B4B0;
    --accent:#2383E2;
    --radius:6px;
  }
  body {
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;
    background:var(--bg); color:var(--text-primary);
    height:100vh; height:100dvh;
    display:flex; flex-direction:column;
    overflow:hidden;
    -webkit-user-select:none; user-select:none;
  }

  /* ── Header ── */
  .header {
    background:var(--surface);
    border-bottom:1px solid var(--border);
    padding:12px 20px 10px;
    flex-shrink:0;
    z-index:100;
  }
  .header-top,
  .header-workbar {
    display:flex; align-items:center; gap:8px; flex-wrap:wrap;
  }
  .header-top {
    justify-content:space-between;
    margin-bottom:10px;
  }
  .header-actions {
    display:flex; align-items:center; gap:8px; flex-wrap:wrap;
    justify-content:flex-end;
  }
  .app-switcher {
    display:flex; overflow:hidden; flex-shrink:0;
    border:1px solid var(--border);
    border-radius:var(--radius); background:var(--bg);
  }
  .app-tab {
    display:inline-flex; align-items:center; justify-content:center;
    min-height:32px; padding:6px 12px;
    color:var(--text-secondary); text-decoration:none; font-size:12px; font-weight:650;
    white-space:nowrap;
  }
  .app-tab:not(:last-child) { border-right:1px solid var(--border); }
  .app-tab.active { background:var(--accent); color:#fff; }
  a.app-tab:hover { background:rgba(0,0,0,.03); color:var(--accent); }
  .search-wrap {
    position:relative; flex:1; min-width:180px; max-width:280px;
  }
  .search-wrap input {
    width:100%; min-height:32px; padding:6px 10px 6px 32px;
    border-radius:var(--radius); border:1px solid var(--border);
    background:var(--bg);
    color:var(--text-primary); font-size:13px; outline:none;
  }
  .search-wrap input::placeholder { color:var(--text-muted); }
  .search-wrap input:focus { border-color:var(--accent); box-shadow:0 0 0 2px rgba(35,131,226,.15); }
  .search-icon { position:absolute; left:10px; top:50%; transform:translateY(-50%); font-size:14px; color:var(--text-muted); pointer-events:none; }
  .btn {
    display:inline-flex; align-items:center; justify-content:center;
    gap:6px;
    min-height:32px; padding:6px 12px; border-radius:var(--radius);
    border:1px solid var(--border);
    background:var(--surface);
    color:var(--text-secondary); font-size:12px; font-weight:650;
    cursor:pointer; white-space:nowrap;
    text-decoration:none;
    transition:all .15s;
  }
  .btn:hover { border-color:var(--accent); color:var(--accent); }
  .btn:active { background:var(--bg); }
  .btn.primary { background:var(--accent); border-color:var(--accent); color:#fff; }
  .btn.primary:hover { opacity:.9; color:#fff; }
  .icon-btn {
    width:32px; height:32px; padding:0; font-size:16px;
  }
  .request-link {
    min-height:36px;
    padding:7px 12px 7px 9px;
    background:#EAF4FF;
    border-color:rgba(35,131,226,.34);
    color:#0F5EA8;
    font-weight:800;
    box-shadow:0 1px 0 rgba(35,131,226,.08);
  }
  .request-link:hover {
    background:#DDEEFF;
    border-color:var(--accent);
    color:#0B5CAD;
  }
  .request-ai-badge {
    display:inline-flex;
    align-items:center;
    justify-content:center;
    height:20px;
    min-width:24px;
    padding:0 5px;
    border-radius:4px;
    background:var(--accent);
    color:#fff;
    font-size:10px;
    font-weight:850;
    line-height:1;
  }
  .request-main { white-space:nowrap; }
  .date-input {
    min-height:32px;
    padding:6px 10px;
    border:1px solid var(--border);
    border-radius:var(--radius);
    background:var(--surface);
    color:var(--text-primary);
    font-size:12px;
    outline:none;
  }
  .date-input:focus {
    border-color:var(--accent);
    box-shadow:0 0 0 2px rgba(35,131,226,.15);
  }
  .date-range-separator {
    color:var(--text-muted);
    font-size:12px;
  }

  /* ── 범례 ── */
  .legend {
    background:var(--surface); padding:10px 16px;
    display:flex; align-items:center; gap:14px;
    flex-shrink:0; border-bottom:1px solid var(--border);
    flex-wrap:wrap; font-size:14px; color:var(--text-secondary);
  }
  .legend-item { display:flex; align-items:center; gap:5px; }
  .legend-dot { width:12px; height:12px; border-radius:3px; flex-shrink:0; }
  .stat-info { margin-left:auto; color:#718096; }

  /* ── 타임라인 ── */
  .timeline-wrap {
    flex:1; overflow:hidden; background:#fff; position:relative;
  }
  #timeline { width:100%; height:100%; }

  /* vis.js 오버라이드 */
  .vis-timeline { border:none !important; font-family:inherit !important; }
  .vis-label .vis-inner {
    font-size:14px !important; padding:4px 10px !important;
    font-weight:600; color:#2D3748;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    max-width:140px;
  }
  .vis-item {
    border-radius:6px !important; font-size:13px !important;
    font-weight:600 !important; border-width:0 !important;
    padding:4px 8px !important;
    min-height:28px !important;
  }
  .vis-item.status-대기     { background:#3B82F6 !important; color:#fff !important; }
  .vis-item.status-반출중   { background:#F59E0B !important; color:#fff !important; }
  .vis-item.status-반납완료 { background:#10B981 !important; color:#fff !important; }
  .vis-item.status-취소     { background:#9CA3AF !important; color:#fff !important; opacity:.6 !important; }
  .vis-item.status-기타     { background:#8B5CF6 !important; color:#fff !important; }
  .vis-item.vis-selected { box-shadow:0 0 0 2px rgba(59,130,246,.6) !important; }

  .vis-tooltip {
    background:#1A1A2E !important; color:#E2E8F0 !important;
    border:1px solid rgba(255,255,255,.15) !important;
    border-radius:10px !important; padding:14px 16px !important;
    font-size:14px !important; line-height:1.8 !important;
    max-width:280px !important; white-space:pre-wrap !important;
    pointer-events:none !important;
  }
  .vis-time-axis .vis-text { font-size:13px !important; color:#718096 !important; }
  .vis-panel.vis-left { border-right:1px solid #E2E8F0 !important; }

  /* 로딩 */
  .loading {
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    background:rgba(255,255,255,.95); z-index:100;
    gap:12px; font-size:16px; color:#4A5568;
  }
  .spinner {
    width:40px; height:40px;
    border:3px solid #E2E8F0; border-top-color:#3B82F6;
    border-radius:50%; animation:spin .8s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }

  .empty-state {
    position:absolute; inset:0;
    display:none; flex-direction:column;
    align-items:center; justify-content:center;
    gap:10px; color:#9CA3AF; font-size:16px;
  }

  /* 상세 팝업 */
  .detail-overlay {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,.4); z-index:200;
    align-items:flex-end; justify-content:center;
  }
  .detail-overlay.show { display:flex; }
  .detail-card {
    background:#fff; border-radius:18px 18px 0 0;
    width:100%; max-width:540px; padding:24px;
    max-height:60vh; overflow-y:auto;
    animation:slideUp .25s ease;
  }
  @keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
  .detail-card h4 { font-size:19px; margin-bottom:16px; color:#1A1A2E; }
  .detail-row {
    display:flex; justify-content:space-between;
    padding:10px 0; border-bottom:1px solid #f0f0f0;
    font-size:16px;
  }
  .detail-row .label { color:#888; }
  .detail-row .value { font-weight:600; text-align:right; }
  .detail-close {
    display:block; width:100%; padding:16px; margin-top:16px;
    background:#f0f2f5; border:none; border-radius:10px;
    font-size:17px; font-weight:600; cursor:pointer;
  }
  .detail-actions { display:flex; gap:8px; margin-top:14px; }
  .detail-action {
    flex:1; border:none; border-radius:10px; padding:13px 10px;
    font-size:15px; font-weight:700; cursor:pointer;
    background:#EEF2FF; color:#1D4ED8;
  }
  .detail-action.danger { background:#FEE2E2; color:#B91C1C; }

  /* 자동갱신 표시 */
  .auto-refresh {
    font-size:12px; color:var(--text-muted);
    white-space:nowrap;
  }
  .modal-overlay {
    display:none; position:fixed; inset:0; z-index:260;
    background:rgba(0,0,0,.45); align-items:flex-end; justify-content:center;
  }
  .modal-overlay.show { display:flex; }
  .modal-box {
    width:100%; max-width:560px; max-height:86vh; overflow-y:auto;
    background:#fff; border-radius:18px 18px 0 0; padding:22px;
  }
  .modal-title { font-size:19px; font-weight:800; margin-bottom:14px; color:#1A1A2E; }
  .modal-label { display:block; font-size:13px; font-weight:700; color:#4A5568; margin:12px 0 6px; }
  .modal-input, .modal-select {
    width:100%; padding:13px 12px; border:1px solid #CBD5E1; border-radius:10px;
    font-size:16px; outline:none; background:#fff;
  }
  .modal-input:focus, .modal-select:focus { border-color:#3B82F6; box-shadow:0 0 0 3px rgba(59,130,246,.12); }
  .modal-row { display:grid; grid-template-columns:1fr 96px; gap:10px; }
  .multi-equip-list { display:flex; flex-direction:column; gap:8px; margin-top:6px; }
  .multi-equip-row {
    display:grid;
    grid-template-columns:minmax(0,1fr) 78px 34px;
    gap:8px;
    align-items:start;
  }
  .multi-equip-row .modal-input { margin:0; }
  .multi-row-remove {
    width:34px; height:34px;
    border:1px solid #CBD5E1;
    border-radius:8px;
    background:#fff;
    color:#94A3B8;
    font-size:18px;
    cursor:pointer;
  }
  .multi-row-remove:hover { border-color:#EF4444; color:#EF4444; }
  .multi-add-row-btn {
    margin-top:8px;
    min-height:34px;
    padding:7px 10px;
    border:1px dashed #94A3B8;
    border-radius:8px;
    background:transparent;
    color:#64748B;
    font-size:13px;
    font-weight:800;
    font-family:inherit;
    cursor:pointer;
  }
  .multi-add-row-btn:disabled { opacity:.5; cursor:not-allowed; }
  .modal-actions { display:flex; gap:8px; margin-top:16px; }
  .modal-btn {
    flex:1; border:none; border-radius:10px; padding:14px 10px;
    font-size:16px; font-weight:800; cursor:pointer;
    background:#E5E7EB; color:#374151;
  }
  .modal-btn.primary { background:#2563EB; color:#fff; }
  .modal-btn:disabled { opacity:.5; cursor:not-allowed; }
  .candidate-list { display:flex; flex-direction:column; gap:8px; margin-top:6px; max-height:220px; overflow-y:auto; }
  .candidate-card {
    border:1px solid #CBD5E1; border-radius:10px; padding:11px 12px;
    background:#fff; cursor:pointer;
  }
  .candidate-card.selected { border-color:#2563EB; background:#EFF6FF; box-shadow:0 0 0 2px rgba(37,99,235,.16); }
  .candidate-title { font-size:15px; font-weight:800; color:#1A1A2E; line-height:1.35; }
  .candidate-meta { font-size:13px; color:#64748B; margin-top:4px; line-height:1.35; }
  .candidate-empty { border:1px dashed #CBD5E1; border-radius:10px; padding:12px; color:#64748B; font-size:14px; }
  @media (max-width:560px) {
    .header { padding:8px 10px; }
    .app-switcher { width:100%; }
    .app-tab { flex:1; }
    .header-actions { width:100%; justify-content:flex-start; }
    .header-actions .request-link { flex:1; justify-content:center; }
    .header-workbar { width:100%; }
    .search-wrap { min-width:100%; }
    .date-input { flex:1; min-width:0; }
  }
  @media (min-width:768px) {
    .header { padding:12px 32px 10px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="app-switcher" aria-label="운영 화면 전환">
      <span class="app-tab active">빌리지 스케줄</span>
      <a class="app-tab" href="?page=dashboard">오늘 일정</a>
    </div>
    <div class="header-actions">
      <a class="btn request-link" href="https://village6k-cpu.github.io/my-gas-project2/request.html" title="AI 카톡 예약입력">
        <span class="request-ai-badge">AI</span>
        <span class="request-main">카톡 예약입력</span>
      </a>
      <button class="btn icon-btn" onclick="reload()" title="새로고침" aria-label="새로고침">↻</button>
    </div>
  </div>
  <div class="header-workbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="장비명 검색..." autocomplete="off">
    </div>
    <input type="date" class="date-input" id="dateFrom" title="시작일">
    <span class="date-range-separator">~</span>
    <input type="date" class="date-input" id="dateTo" title="종료일">
    <button class="btn" onclick="moveToday()">오늘</button>
    <button class="btn primary" onclick="openAddModal()">+ 장비 추가</button>
    <span class="auto-refresh" id="refreshInfo"></span>
  </div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#3B82F6"></div>대기</div>
  <div class="legend-item"><div class="legend-dot" style="background:#F59E0B"></div>반출중</div>
  <div class="legend-item"><div class="legend-dot" style="background:#10B981"></div>반납완료</div>
  <div class="legend-item"><div class="legend-dot" style="background:#9CA3AF"></div>취소</div>
  <div class="stat-info" id="statInfo">로딩 중...</div>
</div>

<div class="timeline-wrap">
  <div id="timeline"></div>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <span>스케줄 불러오는 중...</span>
  </div>
  <div class="empty-state" id="emptyState">
    <div style="font-size:36px">📭</div>
    <span>데이터가 없습니다</span>
  </div>
</div>

<!-- 상세 팝업 -->
<div class="detail-overlay" id="detailOverlay" onclick="closeDetail(event)">
  <div class="detail-card" id="detailCard"></div>
</div>

<!-- 장비 추가 모달 -->
<div class="modal-overlay" id="addModal" onclick="if(event.target===this)closeAddModal()">
  <div class="modal-box">
    <div class="modal-title">기존 예약에 장비 추가</div>
    <label class="modal-label">추가할 장비명 / 수량</label>
    <div id="addEquipRows" class="multi-equip-list"></div>
    <button type="button" id="addEquipRowBtn" class="multi-add-row-btn" onclick="addScheduleEquipRow()">+ 장비 행 추가</button>
    <datalist id="equipDatalist"></datalist>

    <label class="modal-label">예약 반출일(선택)</label>
    <input id="candidateDateInput" class="modal-input" type="date">

    <label class="modal-label">감독/거래ID 검색</label>
    <input id="candidateNameInput" class="modal-input" placeholder="예약자명, 업체명, 거래ID">

    <label class="modal-label">일정 선택</label>
    <input type="hidden" id="candidateSelect">
    <div id="candidateList" class="candidate-list"></div>

    <div class="modal-actions">
      <button class="modal-btn" onclick="closeAddModal()">취소</button>
      <button class="modal-btn primary" id="confirmAddBtn" onclick="confirmScheduleAdd()">가용 확인 후 추가</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/vis-timeline@7.7.3/standalone/umd/vis-timeline-graph2d.min.js"></script>
<script>
var API_URL = "";
var timeline, allGroups = [], allItems = [];
var groups = new vis.DataSet();
var items = new vis.DataSet();
var refreshTimer = null;
var REFRESH_INTERVAL = 60000; // 1분
var equipListCache = null;
var candidateSearchTimer = null;
var timelineRequestSeq = 0;
var timelineAbortController = null;
var timelineLastResponseKey = "";
var timelineRangeReloadTimer = null;
var TIMELINE_CACHE_PREFIX = "timelineCache_v4_";
var TIMELINE_CACHE_TTL_MS = 5 * 60 * 1000;
var TIMELINE_FETCH_TIMEOUT_MS = 15000;

// ━━━ 초기화 ━━━
function init() {
  var container = document.getElementById("timeline");
  var initialStart = new Date(Date.now() - 1000*60*60*24*1);
  var initialEnd = new Date(Date.now() + 1000*60*60*24*7);
  var options = {
    stack: false,
    groupOrder: "content",
    orientation: { axis: "top" },
    zoomMin: 1000*60*60*6,
    zoomMax: 1000*60*60*24*90,
    start: initialStart,
    end:   initialEnd,
    tooltip: { followMouse: false, overflowMethod: "cap" },
    groupHeightMode: "fixed",
    height: "100%",
    margin: { item: { horizontal: 2, vertical: 3 }, axis: 4 },
    locale: "ko",
    showCurrentTime: true,
    moveable: true,
    zoomable: true,
    selectable: true,
    snap: null
  };
  timeline = new vis.Timeline(container, items, groups, options);
  setDateRangeInputs(initialStart, initialEnd);

  // 아이템 클릭 → 상세 팝업
  timeline.on("select", function(props) {
    if (props.items.length > 0) showDetail(props.items[0]);
  });
  timeline.on("rangechanged", function(props) {
    setDateRangeInputs(props.start, props.end);
    clearTimeout(timelineRangeReloadTimer);
    timelineRangeReloadTimer = setTimeout(function() {
      loadData(false, { silent: true });
    }, 450);
  });
}

// ━━━ 데이터 로드 (API fetch) ━━━
function getTimelineFetchRange() {
  var fromVal = document.getElementById("dateFrom").value;
  var toVal = document.getElementById("dateTo").value;
  var start = fromVal ? new Date(fromVal + "T00:00:00") : null;
  var end = toVal ? new Date(toVal + "T23:59:59") : null;
  if ((!start || !end) && timeline) {
    var win = timeline.getWindow();
    if (!start) start = win.start;
    if (!end) end = win.end;
  }
  if (!start) start = new Date(Date.now() - 1000*60*60*24);
  if (!end) end = new Date(Date.now() + 1000*60*60*24*7);
  if (end < start) {
    var tmp = start;
    start = end;
    end = tmp;
  }
  var bufferedStart = new Date(start);
  bufferedStart.setDate(bufferedStart.getDate() - 1);
  var bufferedEnd = new Date(end);
  bufferedEnd.setDate(bufferedEnd.getDate() + 3);
  return { from: dateInputStr(bufferedStart), to: dateInputStr(bufferedEnd) };
}

function readTimelineLocalCache(requestKey) {
  try {
    var raw = localStorage.getItem(TIMELINE_CACHE_PREFIX + requestKey);
    if (!raw) return null;
    var entry = JSON.parse(raw);
    if (!entry || !entry.data) return null;
    if (Date.now() - Number(entry.savedAt || 0) > TIMELINE_CACHE_TTL_MS) {
      localStorage.removeItem(TIMELINE_CACHE_PREFIX + requestKey);
      return null;
    }
    return entry.data;
  } catch (e) {
    return null;
  }
}

function writeTimelineLocalCache(requestKey, data) {
  try {
    if (!requestKey || !data) return;
    localStorage.setItem(TIMELINE_CACHE_PREFIX + requestKey, JSON.stringify({
      savedAt: Date.now(),
      data: data
    }));
    pruneTimelineLocalCache(requestKey);
  } catch (e) {}
}

function pruneTimelineLocalCache(keepKey) {
  try {
    Object.keys(localStorage).forEach(function(key) {
      if (key.indexOf(TIMELINE_CACHE_PREFIX) !== 0) return;
      if (key !== TIMELINE_CACHE_PREFIX + keepKey) localStorage.removeItem(key);
    });
  } catch (e) {}
}

function expandTimelineResponse(data) {
  data = data || {};
  if (!data.compact) return data;
  var groupContentById = {};
  var expandedGroups = (data.groups || []).map(function(g) {
    if (!g) return g;
    var id = g.id || g.i;
    var content = g.content || g.c || id;
    if (id) groupContentById[id] = content;
    return g.id ? g : { id: id, content: content };
  });
  return {
    groups: expandedGroups,
    items: (data.items || []).map(function(it, idx) {
      return expandTimelineItem(it, groupContentById, idx);
    })
  };
}

function expandTimelineDate(value) {
  return typeof value === "number" ? new Date(value).toISOString() : value;
}

function timelineDateFromCompactValue(value) {
  if (value === undefined || value === null || value === "") return null;
  var d = typeof value === "number" ? new Date(value) : new Date(value);
  return isNaN(d.getTime()) ? null : d;
}

function formatTimelineDateTime(value) {
  var d = timelineDateFromCompactValue(value);
  if (!d) return "";
  try {
    var parts = new Intl.DateTimeFormat("en-CA", {
      timeZone: "Asia/Seoul",
      year: "numeric",
      month: "2-digit",
      day: "2-digit",
      hour: "2-digit",
      minute: "2-digit",
      hour12: false
    }).formatToParts(d);
    var map = {};
    parts.forEach(function(part) { map[part.type] = part.value; });
    var hour = map.hour === "24" ? "00" : map.hour;
    return map.year + "-" + map.month + "-" + map.day + " " + hour + ":" + map.minute;
  } catch (e) {
    return d.getFullYear() + "-" + ("0" + (d.getMonth() + 1)).slice(-2) + "-" + ("0" + d.getDate()).slice(-2) +
      " " + ("0" + d.getHours()).slice(-2) + ":" + ("0" + d.getMinutes()).slice(-2);
  }
}

function formatTimelineTime(value) {
  var text = formatTimelineDateTime(value);
  return text ? text.slice(11, 16) : "";
}

function timelineClassNameForStatus(status) {
  return ["대기", "반출중", "반납완료", "취소"].indexOf(status) >= 0 ? "status-" + status : "status-기타";
}

function expandTimelineItem(it, groupContentById, idx) {
  if (!it || it.id) return it;
  var status = it.st || "대기";
  var setName = it.set || (groupContentById && groupContentById[it.g]) || "";
  var equipName = it.eq || setName;
  return {
    id: it.i || ("item_" + idx),
    rowIndex: it.r,
    rowIndices: it.rs || (it.r ? [it.r] : []),
    group: it.g,
    content: it.cn || "",
    start: expandTimelineDate(it.s),
    end: expandTimelineDate(it.e),
    className: it.cl || timelineClassNameForStatus(status),
    status: status,
    editable: { updateTime: true, remove: false },
    custName: it.cn || "",
    tel: it.t || "",
    거래ID: it.tid || "",
    세트명: setName,
    장비명: equipName,
    수량: it.q || "",
    반출: it.out || formatTimelineDateTime(it.s),
    반납: it.ret || formatTimelineDateTime(it.e),
    단가: it.p || 0,
    반출시간: it.ot || formatTimelineTime(it.s),
    반납시간: it.rt || formatTimelineTime(it.e),
    회차: it.n || 1,
    재고: it.stock || 1,
    세트명원본: it.orig || setName,
    contractUrl: it.u || ""
  };
}

function renderTimelineData(data) {
  data = expandTimelineResponse(data);
  data = data || {};
  allGroups = data.groups || [];
  allItems = data.items || [];
  applyFilters();
}

function loadData(forceFresh, opts) {
  opts = opts || {};
  var requestId = ++timelineRequestSeq;
  if (timelineAbortController && timelineAbortController.abort) {
    try { timelineAbortController.abort(); } catch (e) {}
  }
  timelineAbortController = (typeof AbortController !== "undefined") ? new AbortController() : null;
  var fetchOptions = timelineAbortController ? { signal: timelineAbortController.signal } : {};
  var timedOut = false;
  var timeoutId = setTimeout(function() {
    timedOut = true;
    if (timelineAbortController && timelineAbortController.abort) {
      try { timelineAbortController.abort(); } catch (e) {}
    }
  }, TIMELINE_FETCH_TIMEOUT_MS);
  var range = getTimelineFetchRange();
  var requestKey = range.from + "_" + range.to;
  var url = API_URL + "?key=village2026&action=timeline"
    + "&from=" + encodeURIComponent(range.from)
    + "&to=" + encodeURIComponent(range.to)
    + "&compact=2"
    + (forceFresh ? "&nocache=1" : "");

  var cachedData = readTimelineLocalCache(requestKey);
  if (cachedData) {
    renderTimelineData(cachedData);
    updateRefreshInfo();
    opts.silent = true;
  }
  if (!opts.silent) showLoading(true);
  return fetch(url, fetchOptions)
    .then(function(r) { return r.text(); })
    .then(function(text) {
      clearTimeout(timeoutId);
      if (requestId !== timelineRequestSeq) return;
      var responseKey = requestKey + "\n" + text;
      if (!forceFresh && responseKey === timelineLastResponseKey) {
        if (!opts.silent) showLoading(false);
        updateRefreshInfo();
        return;
      }
      var data = JSON.parse(text);
      timelineLastResponseKey = responseKey;
      writeTimelineLocalCache(requestKey, data);
      renderTimelineData(data);
      if (!opts.silent) showLoading(false);
      updateRefreshInfo();
    })
    .catch(function(err) {
      clearTimeout(timeoutId);
      if (err && err.name === "AbortError" && !timedOut) return;
      if (requestId !== timelineRequestSeq) return;
      if (!opts.silent) showLoading(false);
      document.getElementById("statInfo").textContent = timedOut ? "오류: 데이터 로드 시간 초과" : "오류: " + err.message;
    });
}

// ━━━ 필터 ━━━
function applyFilters() {
  var query = document.getElementById("searchInput").value.trim().toLowerCase();
  var visibleGroups = allGroups.filter(function(g) {
    return !query || g.content.toLowerCase().indexOf(query) >= 0;
  });
  var gids = {};
  visibleGroups.forEach(function(g) { gids[g.id] = true; });

  var visibleItems = allItems.filter(function(item) {
    if (!gids[item.group]) return false;
    return true;
  });

  groups.clear(); groups.add(visibleGroups);
  items.clear(); items.add(visibleItems);

  document.getElementById("emptyState").style.display =
    visibleGroups.length === 0 ? "flex" : "none";
  updateStat();
}

function updateStat() {
  var q = document.getElementById("searchInput").value.trim();
  var s = groups.length, t = allGroups.length, ic = items.length;
  document.getElementById("statInfo").textContent =
    q ? s + "/" + t + "개 장비 · " + ic + "건"
      : t + "개 장비 · " + allItems.length + "건";
}

// ━━━ 상세 팝업 ━━━
function showDetail(itemId) {
  var item = allItems.find(function(i) { return i.id === itemId; });
  if (!item) return;

  var html = '<h4>' + escHtml(item.content || item.custName || "") + '</h4>';
  html += detailRow('거래ID', item['거래ID'] || '-');
  html += detailRow('고객명', item.custName || '-');
  html += detailRow('연락처', item.tel || '-');
  html += detailRow('장비명', item['세트명'] || item['장비명'] || '-');
  html += detailRow('수량', item['수량'] || '-');
  html += detailRow('반출', item['반출'] || '-');
  html += detailRow('반납', item['반납'] || '-');
  html += detailRow('상태', item.status || '-');
  html += '<div class="detail-actions">';
  html += '<button class="detail-action" onclick="event.stopPropagation();openAddModal(\'' + escJs(item['거래ID']) + '\',\'' + escJs(candidateDateForItem(item)) + '\')">장비 추가</button>';
  html += '<button class="detail-action danger" onclick="event.stopPropagation();deleteTimelineEquip(\'' + escJs(item['거래ID']) + '\',\'' + escJs(item['세트명'] || item['장비명']) + '\')">삭제</button>';
  html += '</div>';
  html += '<button class="detail-close" onclick="closeDetail()">닫기</button>';

  document.getElementById("detailCard").innerHTML = html;
  document.getElementById("detailOverlay").classList.add("show");
}

function detailRow(label, value) {
  return '<div class="detail-row"><span class="label">' + escHtml(label) +
    '</span><span class="value">' + escHtml(value) + '</span></div>';
}

function closeDetail(e) {
  if (!e || e.target === document.getElementById("detailOverlay")) {
    document.getElementById("detailOverlay").classList.remove("show");
  }
}

// ━━━ 컨트롤 ━━━
function moveToday() {
  if (!timeline) return;
  var now = new Date();
  var start = new Date(now.getFullYear(), now.getMonth(), now.getDate() - 1);
  var end = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 14, 23, 59, 59);
  timeline.setWindow(start, end, {
    animation: { duration: 350, easingFunction: "easeInOutQuad" }
  });
  setDateRangeInputs(start, end);
  loadData();
}

function reload() {
  document.getElementById("searchInput").value = "";
  loadData(false);
}

function dateInputStr(d) {
  return d.getFullYear() + '-' + ('0' + (d.getMonth() + 1)).slice(-2) + '-' + ('0' + d.getDate()).slice(-2);
}

function setDateRangeInputs(start, end) {
  document.getElementById("dateFrom").value = dateInputStr(start);
  document.getElementById("dateTo").value = dateInputStr(end);
}

function applyDateRangeWindow() {
  var from = document.getElementById("dateFrom").value;
  var to = document.getElementById("dateTo").value;
  if (!from && !to) return;
  var start = from ? new Date(from + "T00:00:00") : new Date(new Date(to + "T00:00:00").getTime() - 1000*60*60*24*7);
  var end = to ? new Date(to + "T23:59:59") : new Date(start.getTime() + 1000*60*60*24*7);
  if (end < start) {
    var tmp = start;
    start = end;
    end = tmp;
  }
  timeline.setWindow(start, end);
  setDateRangeInputs(start, end);
  loadData();
}

function showLoading(show) {
  document.getElementById("loading").style.display = show ? "flex" : "none";
}

// ━━━ 자동 갱신 ━━━
function startAutoRefresh() {
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(function() {
    loadData(false, { silent: true });
  }, REFRESH_INTERVAL);
}

function updateRefreshInfo() {
  var now = new Date();
  var t = ("0"+now.getHours()).slice(-2) + ":" + ("0"+now.getMinutes()).slice(-2);
  document.getElementById("refreshInfo").textContent = t + " 갱신 · 1분마다";
}

// ━━━ 검색 ━━━
document.getElementById("searchInput").addEventListener("input", applyFilters);
document.getElementById("dateFrom").addEventListener("change", applyDateRangeWindow);
document.getElementById("dateTo").addEventListener("change", applyDateRangeWindow);
document.getElementById("candidateNameInput").addEventListener("input", scheduleCandidateSearch);
document.getElementById("candidateDateInput").addEventListener("change", scheduleCandidateSearch);

function todayStr() {
  var d = new Date();
  return d.getFullYear() + '-' + ('0'+(d.getMonth()+1)).slice(-2) + '-' + ('0'+d.getDate()).slice(-2);
}

function candidateDateForItem(item) {
  var checkout = String((item && item['반출']) || '').slice(0, 10);
  if (/^\d{4}-\d{2}-\d{2}$/.test(checkout)) return checkout;
  return '';
}

function loadEquipList() {
  if (equipListCache) return Promise.resolve(equipListCache);
  return fetch(API_URL + '?key=village2026&action=read&sheet=' + encodeURIComponent('목록') + '&range=A2:A1000')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var rows = data.data || [];
      equipListCache = rows.map(function(r) { return Array.isArray(r) ? r[0] : r; })
        .filter(function(v) { return !!v; })
        .map(String);
      document.getElementById('equipDatalist').innerHTML = equipListCache.map(function(n) {
        return '<option value="' + escAttr(n) + '"></option>';
      }).join('');
      return equipListCache;
    })
    .catch(function() { equipListCache = []; return []; });
}

function addScheduleEquipRow(name, qty) {
  var container = document.getElementById('addEquipRows');
  if (!container) return null;

  var row = document.createElement('div');
  row.className = 'multi-equip-row';

  var input = document.createElement('input');
  input.className = 'modal-input schedule-equip-name';
  input.setAttribute('list', 'equipDatalist');
  input.placeholder = '예: FX3, 70-200';
  input.autocomplete = 'off';
  input.value = name || '';

  var qtyInput = document.createElement('input');
  qtyInput.className = 'modal-input schedule-equip-qty';
  qtyInput.type = 'number';
  qtyInput.min = '1';
  qtyInput.value = qty || '1';

  var removeBtn = document.createElement('button');
  removeBtn.type = 'button';
  removeBtn.className = 'multi-row-remove';
  removeBtn.title = '행 삭제';
  removeBtn.textContent = '×';
  removeBtn.onclick = function() {
    if (container.querySelectorAll('.multi-equip-row').length <= 1) {
      input.value = '';
      qtyInput.value = '1';
      input.focus();
      return;
    }
    row.remove();
  };

  row.appendChild(input);
  row.appendChild(qtyInput);
  row.appendChild(removeBtn);
  container.appendChild(row);
  return row;
}

function resetScheduleEquipRows(entries) {
  var container = document.getElementById('addEquipRows');
  if (!container) return;
  container.innerHTML = '';
  if (entries && entries.length) {
    entries.forEach(function(entry) { addScheduleEquipRow(entry.name, entry.qty); });
  } else {
    addScheduleEquipRow('', 1);
  }
}

function collectScheduleEquipEntries() {
  var rows = document.querySelectorAll('#addEquipRows .multi-equip-row');
  var merged = {};
  var order = [];
  rows.forEach(function(row) {
    var nameInput = row.querySelector('.schedule-equip-name');
    var qtyInput = row.querySelector('.schedule-equip-qty');
    var name = nameInput ? nameInput.value.trim() : '';
    if (!name) return;
    var qty = parseInt(qtyInput ? qtyInput.value : '1', 10);
    if (!qty || qty < 1) qty = 1;
    if (!merged[name]) {
      merged[name] = { name: name, qty: qty };
      order.push(name);
    } else {
      merged[name].qty += qty;
    }
  });
  return order.map(function(name) { return merged[name]; });
}

function setScheduleAddBusy(isBusy, label) {
  var btn = document.getElementById('confirmAddBtn');
  var addBtn = document.getElementById('addEquipRowBtn');
  btn.disabled = isBusy;
  btn.textContent = label || '가용 확인 후 추가';
  if (addBtn) addBtn.disabled = isBusy;
}

function postScheduleEquip(tid, entry) {
  return fetch(API_URL + '?key=village2026&action=scheduleAddEquip&tid=' + encodeURIComponent(tid) +
    '&equipName=' + encodeURIComponent(entry.name) + '&qty=' + encodeURIComponent(entry.qty))
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res.error) throw new Error(res.error);
      return res;
    });
}

function openAddModal(prefillTid, prefillDate) {
  var search = document.getElementById('searchInput').value.trim();
  resetScheduleEquipRows(search ? [{ name: search, qty: 1 }] : null);
  document.getElementById('candidateDateInput').value = prefillDate || '';
  document.getElementById('candidateNameInput').value = prefillTid || '';
  document.getElementById('candidateSelect').value = '';
  document.getElementById('candidateList').innerHTML = '<div class="candidate-empty">감독 이름이나 거래ID를 입력하면 일정이 표시됩니다</div>';
  setScheduleAddBusy(false);
  document.getElementById('addModal').classList.add('show');
  loadEquipList().then(function() {
    setTimeout(function() {
      var input = document.querySelector('#addEquipRows .schedule-equip-name');
      if (input) input.focus();
    }, 50);
    if (prefillTid) findCandidates();
  });
}

function closeAddModal() {
  document.getElementById('addModal').classList.remove('show');
}

function findCandidates() {
  var name = document.getElementById('candidateNameInput').value.trim();
  var date = document.getElementById('candidateDateInput').value;
  var selected = document.getElementById('candidateSelect');
  var list = document.getElementById('candidateList');
  selected.value = '';
  if (!name && !date) {
    list.innerHTML = '<div class="candidate-empty">감독 이름이나 거래ID를 입력하면 일정이 표시됩니다</div>';
    return;
  }
  list.innerHTML = '<div class="candidate-empty">일정 검색 중...</div>';
  fetch(API_URL + '?key=village2026&action=tradeCandidates&name=' + encodeURIComponent(name) + '&date=' + encodeURIComponent(date))
    .then(function(r) { return r.json(); })
    .then(function(res) {
      var arr = res.candidates || [];
      if (arr.length === 0) {
        list.innerHTML = '<div class="candidate-empty">일치하는 일정이 없습니다</div>';
        return;
      }
      list.innerHTML = '';
      arr.forEach(function(c) {
        var card = document.createElement('div');
        card.className = 'candidate-card';
        card.innerHTML = '<div class="candidate-title">' + escHtml(c.name || '-') + ' · ' + escHtml(c.checkout) + ' → ' + escHtml(c.checkin) + '</div>'
          + '<div class="candidate-meta">' + escHtml(c.tradeId) + (c.company ? ' · ' + escHtml(c.company) : '') + ' · ' + escHtml(c.status || '대기') + '</div>';
        card.addEventListener('click', function() {
          list.querySelectorAll('.candidate-card').forEach(function(el) { el.classList.remove('selected'); });
          card.classList.add('selected');
          selected.value = c.tradeId;
        });
        list.appendChild(card);
      });
    })
    .catch(function(err) {
      list.innerHTML = '<div class="candidate-empty">검색 실패</div>';
      alert('후보 검색 실패: ' + err.message);
    });
}

function scheduleCandidateSearch() {
  clearTimeout(candidateSearchTimer);
  candidateSearchTimer = setTimeout(findCandidates, 250);
}

function confirmScheduleAdd() {
  var tid = document.getElementById('candidateSelect').value;
  var entries = collectScheduleEquipEntries();
  if (!tid) { alert('일정을 선택하세요.'); return; }
  if (!entries.length) { alert('장비명을 하나 이상 입력하세요.'); return; }

  setScheduleAddBusy(true, '확인 중...');
  var successes = [];
  var failures = [];
  entries.reduce(function(promise, entry) {
    return promise.then(function() {
      return postScheduleEquip(tid, entry)
        .then(function() { successes.push(entry); })
        .catch(function(err) { failures.push({ entry: entry, message: err.message }); });
    });
  }, Promise.resolve()).then(function() {
      setScheduleAddBusy(false);
      if (failures.length) {
        if (successes.length) loadData(false, { silent: true });
        resetScheduleEquipRows(failures.map(function(f) { return f.entry; }));
        alert((successes.length ? successes.length + '개 추가 완료, ' : '')
          + failures.length + '개 추가 실패\n'
          + failures.map(function(f) { return '- ' + f.entry.name + ': ' + f.message; }).join('\n'));
        return;
      }
      closeAddModal();
      closeDetail();
      loadData(false, { silent: true });
    })
    .catch(function(err) {
      setScheduleAddBusy(false);
      alert('추가 실패: ' + err.message);
    });
}

function deleteTimelineEquip(tid, equipName) {
  if (!tid || !equipName) return;
  if (!confirm(equipName + ' 을(를) 이 거래에서 삭제할까요?')) return;
  fetch(API_URL + '?key=village2026&action=scheduleRemoveEquip&tid=' + encodeURIComponent(tid) +
    '&equipName=' + encodeURIComponent(equipName))
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res.error) { alert('삭제 실패: ' + res.error); return; }
      closeDetail();
      loadData(false, { silent: true });
    })
    .catch(function(err) { alert('삭제 실패: ' + err.message); });
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) { return escHtml(s).replace(/'/g,'&#39;'); }
function escJs(s) { return String(s || '').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,' '); }

// ━━━ 시작 ━━━
init();
loadData();
startAutoRefresh();
</script>
</body>
