<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>VILLAGE. 운영판</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@900&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: light;
      --bg: #f1f4f9;
      --surface: #ffffff;
      --surface-soft: #f8fafc;
      --ink: #0f172a;
      --ink-soft: #334155;
      --muted: #64748b;
      --line: #e2e8f0;
      --line-soft: #eef2f7;

      --urgent: #dc2626;
      --urgent-bg: #fef2f2;
      --urgent-ink: #991b1b;

      --high: #ea580c;
      --high-bg: #fff7ed;
      --high-ink: #9a3412;

      --normal: #0284c7;
      --normal-bg: #f0f9ff;
      --normal-ink: #0c4a6e;

      --low: #16a34a;
      --low-bg: #f0fdf4;
      --low-ink: #14532d;

      --primary: #0f172a;
      --primary-ink: #ffffff;

      --radius: 12px;
      --radius-sm: 8px;
      --shadow-card: 0 1px 2px rgba(15, 23, 42, 0.04), 0 4px 12px rgba(15, 23, 42, 0.04);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--ink);
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 16px;
    }

    /* Header */
    header.app {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(241, 244, 249, 0.92);
      backdrop-filter: saturate(180%) blur(12px);
      -webkit-backdrop-filter: saturate(180%) blur(12px);
      border-bottom: 1px solid var(--line);
    }
    .app-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px 8px;
      max-width: 960px;
      margin: 0 auto;
    }
    .brand { display: flex; flex-direction: column; min-width: 0; }
    .brand h1 {
      margin: 0;
      display: flex;
      align-items: center;
      gap: 9px;
      line-height: 1;
    }
    .brand .logo {
      font-family: "Big Shoulders Display", "Helvetica Neue", "Arial Black", sans-serif;
      font-weight: 900;
      font-size: 28px;
      letter-spacing: -0.01em;
      line-height: 1;
      color: var(--ink);
      text-transform: uppercase;
      display: inline-flex;
      align-items: center;
      gap: 0;
    }
    @media (min-width: 560px) {
      .brand .logo { font-size: 32px; }
    }
    @media (min-width: 900px) {
      .brand .logo { font-size: 38px; }
    }
    .brand .logo .v { color: #EA5B36; }
    .brand .logo .dot {
      display: inline-block;
      width: 0.21em;
      height: 0.21em;
      background: #EA5B36;
      margin-left: 0.04em;
      align-self: flex-end;
      margin-bottom: 0.05em;
    }
    .brand .page-name {
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Segoe UI", sans-serif;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: -0.01em;
      color: var(--ink-soft);
      padding-bottom: 2px;
    }
    .brand .updated {
      font-size: 12px;
      color: var(--muted);
      margin-top: 5px;
    }

    .controls { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
    .btn-refresh {
      width: 38px; height: 38px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--surface);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      color: var(--ink-soft);
    }
    .btn-refresh:hover { background: var(--surface-soft); }
    .btn-refresh.loading svg { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Tabs */
    nav.tabs {
      display: flex;
      gap: 4px;
      padding: 0 16px 10px;
      max-width: 960px;
      margin: 0 auto;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    nav.tabs::-webkit-scrollbar { display: none; }
    .tab {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      text-decoration: none;
      transition: background 0.1s ease, color 0.1s ease;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .tab.active {
      background: var(--primary);
      color: var(--primary-ink);
    }
    .tab:not(.active):hover {
      background: var(--surface-soft);
      color: var(--ink-soft);
    }
    .tab .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 18px;
      height: 18px;
      padding: 0 5px;
      border-radius: 999px;
      background: var(--urgent);
      color: white;
      font-size: 10px;
      font-weight: 800;
    }
    .tab.active .badge { background: rgba(255,255,255,0.22); }
    .tab .badge:empty { display: none; }

    /* KPI strip */
    .kpis {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 18px;
    }
    .kpi {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      box-shadow: var(--shadow-card);
      position: relative;
      overflow: hidden;
    }
    .kpi::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--normal);
    }
    .kpi.checkout::before { background: var(--high); }
    .kpi.checkin::before  { background: var(--low); }
    .kpi.unconfirmed::before { background: var(--urgent); }
    .kpi.missing::before { background: var(--urgent); }
    .kpi.imminent::before { background: var(--high); }
    .kpi .label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .kpi .value {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-top: 2px;
    }
    .kpi .unit {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      margin-left: 3px;
    }
    .kpi.attention .value { color: var(--urgent); }

    /* Sections */
    .section { margin-bottom: 20px; }
    .section-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
      margin: 0 2px 10px;
    }
    .section-head h2 {
      margin: 0;
      font-size: 14px;
      font-weight: 700;
      color: var(--ink-soft);
      letter-spacing: -0.01em;
    }
    .section-head .count {
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
    }
    .section-head .src {
      font-size: 11px;
      color: var(--muted);
      font-weight: 500;
    }

    /* List card */
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow-card);
      overflow: hidden;
    }
    .row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: start;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line-soft);
    }
    .row:last-child { border-bottom: none; }
    .row .time {
      font-size: 13px;
      font-weight: 700;
      color: var(--ink);
      font-variant-numeric: tabular-nums;
      min-width: 44px;
    }
    .row .main {
      min-width: 0;
    }
    .row .main .who {
      font-size: 14px;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 2px;
      word-break: keep-all;
    }
    .row .main .what {
      font-size: 12.5px;
      color: var(--muted);
      line-height: 1.45;
      word-break: break-word;
    }
    .equip-list {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 5px;
    }
    .equip-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      max-width: 100%;
      min-height: 24px;
      padding: 3px 8px;
      border-radius: 999px;
      background: var(--surface-soft);
      border: 1px solid var(--line-soft);
      color: var(--ink-soft);
      font-size: 12px;
      font-weight: 650;
      line-height: 1.25;
    }
    .equip-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .equip-qty {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
    }
    .equip-chip.more {
      background: transparent;
      color: var(--muted);
      border-style: dashed;
    }
    .row .right {
      font-size: 11px;
      color: var(--muted);
      font-weight: 600;
      white-space: nowrap;
      align-self: center;
    }
    .row .right .pill {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 999px;
      background: var(--surface-soft);
      color: var(--ink-soft);
      border: 1px solid var(--line-soft);
    }
    .row-actions {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }
    .schedule-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 26px;
      padding: 4px 8px;
      border-radius: 999px;
      background: var(--primary);
      color: var(--primary-ink);
      text-decoration: none;
      font-size: 11px;
      font-weight: 800;
      line-height: 1;
    }
    .schedule-link:hover { opacity: 0.88; }
    .row .right .pill.urgent { background: var(--urgent-bg); color: var(--urgent-ink); border-color: transparent; }
    .row .right .pill.high { background: var(--high-bg); color: var(--high-ink); border-color: transparent; }
    .row .right .pill.maint { background: var(--high-bg); color: var(--high-ink); border-color: transparent; }

    .empty-mini {
      padding: 22px 14px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    .weekly {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .weekly .label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
    }
    .weekly .value {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--ink);
    }
    .weekly .range {
      font-size: 11px;
      color: var(--muted);
      font-weight: 500;
      margin-top: 2px;
    }

    .error {
      background: var(--urgent-bg);
      color: var(--urgent-ink);
      border: 1px solid #fecaca;
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      margin-bottom: 14px;
      font-size: 13.5px;
    }
    .skeleton {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      height: 78px;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 0.55; } 50% { opacity: 1; } }

    /* Tablet+ */
    @media (min-width: 560px) {
      .kpis { grid-template-columns: repeat(3, 1fr); }
    }
    @media (min-width: 720px) {
      .wrap { padding: 20px; }
      .kpis { grid-template-columns: repeat(5, 1fr); gap: 12px; }
      .kpi { padding: 16px; }
      .kpi .value { font-size: 28px; }
      .section-head h2 { font-size: 15px; }
    }
    @media (min-width: 900px) {
      .brand h1 { font-size: 20px; }
      .columns {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        align-items: start;
      }
      .columns .section { margin-bottom: 16px; }
    }
  </style>
</head>
<body>
  <header class="app">
    <div class="app-top">
      <div class="brand">
        <h1><span class="logo"><span class="v">V</span><span>illage</span><span class="dot" aria-hidden="true"></span></span><span class="page-name">운영판</span></h1>
        <div class="updated" id="updated">불러오는 중…</div>
      </div>
      <div class="controls">
        <button class="btn-refresh" id="refresh" aria-label="새로고침" title="새로고침">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7L21 8"/><path d="M21 3v5h-5"/></svg>
        </button>
      </div>
    </div>
    <nav class="tabs" aria-label="페이지 전환">
      <a href="/" class="tab">후속조치 <span class="badge" id="follow-up-badge"></span></a>
      <a href="/operations" class="tab active" aria-current="page">운영판</a>
    </nav>
  </header>
  <main class="wrap">
    <div id="error" aria-live="polite"></div>

    <section class="kpis" id="kpis" aria-label="요약"></section>

    <div class="columns">
      <section class="section">
        <div class="section-head">
          <h2>오늘 반출</h2>
          <span class="count" id="checkout-count"></span>
        </div>
        <div id="checkout-panel"></div>
      </section>

      <section class="section">
        <div class="section-head">
          <h2>오늘 반납</h2>
          <span class="count" id="checkin-count"></span>
        </div>
        <div id="checkin-panel"></div>
      </section>

      <section class="section">
        <div class="section-head">
          <h2>임박 반출 (1~3일)</h2>
          <span class="count" id="imminent-count"></span>
        </div>
        <div id="imminent-panel"></div>
      </section>

      <section class="section">
        <div class="section-head">
          <h2>미확정 예약</h2>
          <span class="count" id="unconfirmed-count"></span>
        </div>
        <div id="unconfirmed-panel"></div>
      </section>

      <section class="section">
        <div class="section-head">
          <h2>계약서 미발송</h2>
          <span class="count" id="missing-count"></span>
        </div>
        <div id="missing-panel"></div>
      </section>

      <section class="section">
        <div class="section-head">
          <h2>정비 중 장비</h2>
          <span class="count" id="maint-count"></span>
        </div>
        <div id="maint-panel"></div>
      </section>
    </div>

    <section class="section">
      <div class="weekly">
        <div>
          <div class="label">이번주 신규 예약</div>
          <div class="range" id="week-range"></div>
        </div>
        <div class="value" id="week-value">—</div>
      </div>
    </section>
  </main>

<script>
(() => {
  const DASHBOARD_URL = 'https://village6k-cpu.github.io/my-gas-project2/dashboard.html';
  const $ = (s) => document.querySelector(s);
  const esc = (s = '') => String(s).replace(/[&<>"']/g, (m) => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[m]));
  let currentOperationsDate = '';
  const EQUIPMENT_VISIBLE_LIMIT = 4;

  function fmtClock(iso) {
    if (!iso) return '';
    const d = new Date(iso.replace(' ', 'T'));
    if (Number.isNaN(d.getTime())) return '';
    return d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
  }

  function normalizeEquipmentItems(items) {
    if (!Array.isArray(items)) return [];
    const order = [];
    const byName = new Map();
    items.forEach((item) => {
      const name = String((item && item.name) || '').trim();
      if (!name) return;
      const qty = Number(item.qty) > 0 ? Number(item.qty) : 1;
      if (!byName.has(name)) {
        byName.set(name, { name, qty: 0 });
        order.push(name);
      }
      byName.get(name).qty += qty;
    });
    return order.map((name) => byName.get(name));
  }

  function renderEquipmentList(items) {
    const normalized = normalizeEquipmentItems(items);
    if (!normalized.length) return '';
    const visible = normalized.slice(0, EQUIPMENT_VISIBLE_LIMIT);
    const hiddenCount = normalized.length - visible.length;
    const chips = visible.map((item) => {
      const qty = Number(item.qty) > 1 ? `<span class="equip-qty">×${esc(item.qty)}</span>` : '';
      return `<span class="equip-chip"><span class="equip-name">${esc(item.name)}</span>${qty}</span>`;
    });
    if (hiddenCount > 0) {
      chips.push('<span class="equip-chip more">' + '외 ' + hiddenCount + '개' + '</span>');
    }
    return '<div class="equip-list">' + chips.join('') + '</div>';
  }

  function dashboardUrl(item, phase, fallbackDate) {
    const params = new URLSearchParams();
    const date = String((item && (item.date || item.checkoutDate || item.checkinDate)) || fallbackDate || currentOperationsDate || '').trim();
    if (date) params.set('date', date);
    if (item && item.tid) params.set('search', item.tid);
    if (phase) params.set('tab', phase);
    return DASHBOARD_URL + (params.toString() ? '?' + params.toString() : '');
  }

  function scheduleLink(item, phase, fallbackDate) {
    if (!item || !item.tid) return '';
    return `<a class="schedule-link" href="${esc(dashboardUrl(item, phase, fallbackDate))}" target="_blank" rel="noopener">오늘 일정</a>`;
  }

  function kpi(label, value, cls, unit) {
    const u = unit ? `<span class="unit">${esc(unit)}</span>` : '';
    return `<div class="kpi ${cls || ''}"><div class="label">${esc(label)}</div><div class="value">${value}${u}</div></div>`;
  }

  function emptyMini(msg) {
    return `<div class="panel"><div class="empty-mini">${esc(msg)}</div></div>`;
  }

  function rowsCheckoutCheckin(list, phase, fallbackDate) {
    if (!list.length) return emptyMini('해당 없음');
    const rows = list.map((it) => `<div class="row">
      <div class="time">${esc(it.time || '—')}</div>
      <div class="main">
        <div class="who">${esc(it.customer || '고객명 미상')}</div>
        ${renderEquipmentList(it.items)}
      </div>
      <div class="right row-actions">${scheduleLink(it, phase, fallbackDate)}<span class="pill">${esc(it.tid)}</span></div>
    </div>`).join('');
    return `<div class="panel">${rows}</div>`;
  }

  function rowsImminent(list) {
    if (!list.length) return emptyMini('1~3일 내 출고 없음');
    const rows = list.map((it) => {
      const pillCls = it.daysAway === 1 ? 'urgent' : 'high';
      const dayLabel = `D-${it.daysAway}`;
      return `<div class="row">
        <div class="time">${esc(it.date.slice(5))}<br><span style="font-size:11px;color:var(--muted);font-weight:600">${esc(it.time || '')}</span></div>
        <div class="main">
          <div class="who">${esc(it.customer || '고객명 미상')}</div>
          ${renderEquipmentList(it.items)}
        </div>
        <div class="right row-actions">${scheduleLink(it, 'checkout', it.date)}<span class="pill ${pillCls}">${dayLabel}</span></div>
      </div>`;
    }).join('');
    return `<div class="panel">${rows}</div>`;
  }

  function rowsUnconfirmed(list) {
    if (!list.length) return emptyMini('미확정 예약 없음');
    const rows = list.map((it) => `<div class="row">
      <div class="time">${esc((it.checkoutDate || '').slice(5))}<br><span style="font-size:11px;color:var(--muted);font-weight:600">${esc(it.checkoutTime || '')}</span></div>
      <div class="main">
        <div class="who">${esc(it.customer || '고객명 미상')}${it.company ? ` · <span style="font-weight:500;color:var(--muted)">${esc(it.company)}</span>` : ''}</div>
        ${renderEquipmentList(it.items)}
      </div>
      <div class="right"><span class="pill">${esc(it.reqID)}</span></div>
    </div>`).join('');
    return `<div class="panel">${rows}</div>`;
  }

  function rowsMissing(list) {
    if (!list.length) return emptyMini('계약서 미발송 없음');
    const rows = list.slice(0, 30).map((it) => `<div class="row">
      <div class="time" style="min-width:0"></div>
      <div class="main">
        <div class="who">${esc(it.customer || '고객명 미상')}</div>
      </div>
      <div class="right row-actions">${scheduleLink(it, 'all', currentOperationsDate)}<span class="pill">${esc(it.tid)}</span></div>
    </div>`).join('');
    const tail = list.length > 30 ? `<div class="empty-mini">… 외 ${list.length - 30}건</div>` : '';
    return `<div class="panel">${rows}${tail}</div>`;
  }

  function rowsMaintenance(list) {
    if (!list.length) return emptyMini('정비 중인 장비 없음');
    const rows = list.map((it) => `<div class="row">
      <div class="time" style="min-width:0"></div>
      <div class="main">
        <div class="who">${esc(it.name || '이름 없음')}</div>
        ${it.note ? `<div class="what">${esc(it.note)}</div>` : ''}
      </div>
      <div class="right"><span class="pill maint">${esc(it.status)}</span></div>
    </div>`).join('');
    return `<div class="panel">${rows}</div>`;
  }

  function setError(msg) {
    $('#error').innerHTML = msg ? `<div class="error">${esc(msg)}</div>` : '';
  }

  let loading = false;
  async function load() {
    if (loading) return;
    loading = true;
    const btn = $('#refresh');
    btn.classList.add('loading');
    setError('');
    try {
      const res = await fetch('/api/operations');
      const data = await res.json();
      if (!res.ok || !data.success) throw new Error((data && data.error) || '불러오기 실패');
      render(data);
    } catch (e) {
      setError(e.message);
    } finally {
      btn.classList.remove('loading');
      loading = false;
    }
  }

  function render(data) {
    currentOperationsDate = data.date || currentOperationsDate || '';
    const s = data.summary || {};
    $('#updated').textContent = data.generatedAt ? `마지막 업데이트 ${fmtClock(data.generatedAt)}` : '';

    $('#kpis').innerHTML = [
      kpi('오늘 반출', s.todayCheckout ?? 0, 'checkout', '건'),
      kpi('오늘 반납', s.todayCheckin ?? 0, 'checkin', '건'),
      kpi('미확정 예약', s.unconfirmed ?? 0, (s.unconfirmed > 0 ? 'unconfirmed attention' : 'unconfirmed'), '건'),
      kpi('계약서 미발송', s.missingContract ?? 0, (s.missingContract > 0 ? 'missing attention' : 'missing'), '건'),
      kpi('임박 반출', s.imminent ?? 0, 'imminent', '건')
    ].join('');

    $('#checkout-count').textContent = `${(data.todayCheckout || []).length}건`;
    $('#checkout-panel').innerHTML = rowsCheckoutCheckin(data.todayCheckout || [], 'checkout', data.date);

    $('#checkin-count').textContent = `${(data.todayCheckin || []).length}건`;
    $('#checkin-panel').innerHTML = rowsCheckoutCheckin(data.todayCheckin || [], 'checkin', data.date);

    $('#imminent-count').textContent = `${(data.imminent || []).length}건`;
    $('#imminent-panel').innerHTML = rowsImminent(data.imminent || []);

    $('#unconfirmed-count').textContent = `${(data.unconfirmed || []).length}건`;
    $('#unconfirmed-panel').innerHTML = rowsUnconfirmed(data.unconfirmed || []);

    $('#missing-count').textContent = `${(data.missingContract || []).length}건`;
    $('#missing-panel').innerHTML = rowsMissing(data.missingContract || []);

    $('#maint-count').textContent = `${(data.maintenance || []).length}건`;
    $('#maint-panel').innerHTML = rowsMaintenance(data.maintenance || []);

    const wk = data.week || {};
    $('#week-range').textContent = (wk.start && wk.end) ? `${wk.start} ~ ${wk.end}` : '';
    $('#week-value').textContent = `${s.weeklyReservations ?? 0}건`;
  }

  async function loadBadge() {
    try {
      const res = await fetch('/api/follow-ups?status=active');
      const data = await res.json();
      if (!res.ok || !data || !data.summary) return;
      const open = Number(data.summary.open || 0);
      const el = $('#follow-up-badge');
      if (open > 0) el.textContent = String(open);
      else el.textContent = '';
    } catch (e) {
      // badge 실패는 무시
    }
  }

  $('#refresh').addEventListener('click', load);

  $('#kpis').innerHTML = '<div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>';
  load();
  loadBadge();
  setInterval(load, 60000);
  setInterval(loadBadge, 60000);
})();
</script>
</body>
</html>
