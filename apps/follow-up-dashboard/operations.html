<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>VILLAGE. 운영판</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@900&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: light;
      --bg: #f1f4f9;
      --surface: #ffffff;
      --surface-soft: #f8fafc;
      --ink: #0f172a;
      --ink-soft: #334155;
      --muted: #64748b;
      --line: #e2e8f0;
      --line-soft: #eef2f7;

      --urgent: #dc2626;
      --urgent-bg: #fef2f2;
      --urgent-ink: #991b1b;

      --high: #ea580c;
      --high-bg: #fff7ed;
      --high-ink: #9a3412;

      --normal: #0284c7;
      --normal-bg: #f0f9ff;
      --normal-ink: #0c4a6e;

      --low: #16a34a;
      --low-bg: #f0fdf4;
      --low-ink: #14532d;

      --primary: #0f172a;
      --primary-ink: #ffffff;

      --radius: 12px;
      --radius-sm: 8px;
      --shadow-card: 0 1px 2px rgba(15, 23, 42, 0.04), 0 4px 12px rgba(15, 23, 42, 0.04);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--ink);
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 16px;
    }

    /* Header */
    header.app {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(241, 244, 249, 0.92);
      backdrop-filter: saturate(180%) blur(12px);
      -webkit-backdrop-filter: saturate(180%) blur(12px);
      border-bottom: 1px solid var(--line);
    }
    .app-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px 8px;
      max-width: 960px;
      margin: 0 auto;
    }
    .brand { display: flex; flex-direction: column; min-width: 0; }
    .brand h1 {
      margin: 0;
      display: flex;
      align-items: center;
      gap: 9px;
      line-height: 1;
    }
    .brand .logo {
      font-family: "Big Shoulders Display", "Helvetica Neue", "Arial Black", sans-serif;
      font-weight: 900;
      font-size: 28px;
      letter-spacing: -0.01em;
      line-height: 1;
      color: var(--ink);
      text-transform: uppercase;
      display: inline-flex;
      align-items: center;
      gap: 0;
    }
    @media (min-width: 560px) {
      .brand .logo { font-size: 32px; }
    }
    @media (min-width: 900px) {
      .brand .logo { font-size: 38px; }
    }
    .brand .logo .v { color: #EA5B36; }
    .brand .logo .dot {
      display: inline-block;
      width: 0.21em;
      height: 0.21em;
      background: #EA5B36;
      margin-left: 0.04em;
      align-self: flex-end;
      margin-bottom: 0.05em;
    }
    .brand .page-name {
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Segoe UI", sans-serif;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: -0.01em;
      color: var(--ink-soft);
      padding-bottom: 2px;
    }
    .brand .updated {
      font-size: 12px;
      color: var(--muted);
      margin-top: 5px;
    }

    .controls { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
    .btn-dashboard {
      min-height: 38px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--ink-soft);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }
    .btn-dashboard:hover { background: var(--surface-soft); }
    .btn-refresh {
      width: 38px; height: 38px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--surface);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      color: var(--ink-soft);
    }
    .btn-refresh:hover { background: var(--surface-soft); }
    .btn-refresh.loading svg { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Tabs */
    nav.tabs {
      display: flex;
      gap: 4px;
      padding: 0 16px 10px;
      max-width: 960px;
      margin: 0 auto;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    nav.tabs::-webkit-scrollbar { display: none; }
    .tab {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      text-decoration: none;
      transition: background 0.1s ease, color 0.1s ease;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .tab.active {
      background: var(--primary);
      color: var(--primary-ink);
    }
    .tab:not(.active):hover {
      background: var(--surface-soft);
      color: var(--ink-soft);
    }
    .tab .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 18px;
      height: 18px;
      padding: 0 5px;
      border-radius: 999px;
      background: var(--urgent);
      color: white;
      font-size: 10px;
      font-weight: 800;
    }
    .tab.active .badge { background: rgba(255,255,255,0.22); }
    .tab .badge:empty { display: none; }

    /* Inventory alert — 접힘 토글, 펼치면 자연어 카드 */
    .alert-strip { margin-bottom: 16px; }

    /* 충돌 없을 때 슬림 메시지 */
    .alert-ok {
      background: var(--low-bg);
      border: 1px solid #86efac;
      border-left: 4px solid var(--low);
      border-radius: var(--radius);
      padding: 12px 16px;
      font-size: 13px;
      font-weight: 700;
      color: var(--low-ink);
    }

    /* details 토글 */
    details.alert-box {
      background: var(--urgent-bg);
      border: 1px solid #fca5a5;
      border-left: 4px solid var(--urgent);
      border-radius: var(--radius);
      box-shadow: var(--shadow-card);
      overflow: hidden;
    }
    details.alert-box.tight-only {
      background: var(--high-bg);
      border-color: #fdba74;
      border-left-color: var(--high);
    }
    details.alert-box > summary {
      list-style: none;
      cursor: pointer;
      padding: 13px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 14px;
      font-weight: 800;
      color: var(--urgent-ink);
      user-select: none;
    }
    details.alert-box.tight-only > summary { color: var(--high-ink); }
    details.alert-box > summary::-webkit-details-marker { display: none; }
    details.alert-box .alert-caret {
      font-size: 12px;
      transition: transform 0.15s ease;
      opacity: 0.7;
    }
    details.alert-box[open] .alert-caret { transform: rotate(180deg); }

    .conflict-list {
      padding: 4px 12px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .conflict-card {
      background: white;
      border-radius: var(--radius-sm);
      padding: 12px 14px 10px;
      border: 1px solid rgba(0,0,0,0.05);
      box-shadow: 0 1px 2px rgba(15,23,42,0.03);
    }
    .conflict-card.severity-conflict { border-left: 3px solid var(--urgent); }
    .conflict-card.severity-tight { border-left: 3px solid var(--high); }

    .conflict-head {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: baseline;
      margin-bottom: 6px;
    }
    .conflict-date {
      font-size: 13px;
      font-weight: 800;
      color: var(--ink);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .conflict-date .cd-wd {
      font-size: 11px;
      color: var(--muted);
      font-weight: 700;
      margin-left: 4px;
    }
    .conflict-equip {
      font-size: 14px;
      font-weight: 700;
      color: var(--ink);
      word-break: keep-all;
      line-height: 1.3;
    }
    .conflict-status {
      font-size: 12px;
      font-weight: 800;
      color: var(--urgent-ink);
      white-space: nowrap;
    }
    .severity-tight .conflict-status { color: var(--high-ink); }

    .conflict-totals {
      font-size: 12.5px;
      color: var(--muted);
      padding: 6px 0;
      border-top: 1px dashed var(--line);
      border-bottom: 1px dashed var(--line);
      margin: 8px 0;
    }
    .conflict-totals b { color: var(--ink-soft); font-weight: 700; }
    .conflict-totals b.over { color: var(--urgent); }

    .conflict-bookings {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .conflict-booking {
      display: grid;
      grid-template-columns: minmax(70px, auto) 1fr auto;
      gap: 10px;
      align-items: center;
      font-size: 12.5px;
      color: var(--ink-soft);
      padding: 2px 0;
    }
    .conflict-booking .booking-customer {
      font-weight: 700;
      color: var(--ink);
    }
    .conflict-booking .booking-range {
      font-size: 12px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }
    .conflict-booking .booking-qty {
      font-weight: 700;
      color: var(--ink-soft);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .conflict-more {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      padding: 6px 0 2px;
      font-weight: 600;
    }

    /* Health (가동률 영웅 + 페이스 보조) */
    .health {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-bottom: 18px;
    }
    @media (min-width: 720px) {
      .health { grid-template-columns: 1.7fr 1fr; gap: 12px; }
    }
    .hero-gauge, .pace-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px 18px 14px;
      box-shadow: var(--shadow-card);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .pace-card { padding-bottom: 22px; }
    .hg-head, .pc-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
    }
    .hg-label, .pc-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--ink-soft);
      letter-spacing: -0.01em;
    }
    .hg-value {
      font-size: 38px;
      font-weight: 900;
      letter-spacing: -0.03em;
      color: var(--ink);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .hg-value.good { color: var(--low-ink); }
    .hg-value.mid { color: var(--high-ink); }
    .hg-value.low { color: var(--urgent-ink); }
    .hg-value .unit, .pc-value .unit {
      font-size: 18px;
      font-weight: 700;
      color: var(--muted);
      margin-left: 3px;
    }
    .hg-bar {
      height: 14px;
      border-radius: 999px;
      background: var(--line-soft);
      overflow: hidden;
    }
    .hg-fill {
      height: 100%;
      background: var(--normal);
      border-radius: 999px;
      transition: width 0.5s ease;
    }
    .hg-fill.good { background: var(--low); }
    .hg-fill.mid { background: var(--high); }
    .hg-fill.low { background: var(--urgent); }
    .hg-foot, .pc-foot {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
    }
    .hg-foot b, .pc-foot b { color: var(--ink-soft); font-weight: 700; }
    .pc-value {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .pc-value.up { color: var(--low-ink); }
    .pc-value.flat { color: var(--ink); }
    .pc-value.down { color: var(--urgent-ink); }
    .pc-value.na { color: var(--muted); font-size: 22px; font-weight: 700; }
    .pc-bar {
      position: relative;
      height: 10px;
      border-radius: 999px;
      background: var(--line-soft);
      overflow: hidden;
    }
    .pc-fill {
      height: 100%;
      border-radius: 999px;
      background: var(--normal);
      transition: width 0.5s ease;
    }
    .pc-fill.up { background: var(--low); }
    .pc-fill.flat { background: var(--normal); }
    .pc-fill.down { background: var(--urgent); }
    .pc-bar .baseline {
      position: absolute;
      left: 50%;
      top: -3px; bottom: -3px;
      width: 2px;
      background: var(--muted);
      opacity: 0.45;
      border-radius: 1px;
      pointer-events: none;
    }
    .pc-bar .baseline-label {
      position: absolute;
      left: 50%;
      top: calc(100% + 4px);
      transform: translateX(-50%);
      font-size: 10px;
      color: var(--muted);
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    /* KPI strip */
    .kpis {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 18px;
    }
    .kpi {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      box-shadow: var(--shadow-card);
      position: relative;
      overflow: hidden;
    }
    .kpi::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--normal);
    }
    .kpi.checkout::before { background: var(--high); }
    .kpi.checkin::before  { background: var(--low); }
    .kpi.unconfirmed::before { background: var(--urgent); }
    .kpi.missing::before { background: var(--urgent); }
    .kpi.imminent::before { background: var(--high); }
    .kpi .label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .kpi .value {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-top: 2px;
    }
    .kpi .unit {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      margin-left: 3px;
    }
    .kpi.attention .value { color: var(--urgent); }

    /* Sections */
    .section { margin-bottom: 20px; }
    .section-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
      margin: 0 2px 10px;
    }
    .section-head h2 {
      margin: 0;
      font-size: 14px;
      font-weight: 700;
      color: var(--ink-soft);
      letter-spacing: -0.01em;
    }
    .section-head .count {
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
    }
    .section-head .src {
      font-size: 11px;
      color: var(--muted);
      font-weight: 500;
    }

    /* List card */
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow-card);
      overflow: hidden;
    }
    .row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: start;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line-soft);
    }
    .row:last-child { border-bottom: none; }
    .row .time {
      font-size: 13px;
      font-weight: 700;
      color: var(--ink);
      font-variant-numeric: tabular-nums;
      min-width: 44px;
    }
    .row .main {
      min-width: 0;
    }
    .row .main .who {
      font-size: 14px;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 2px;
      word-break: keep-all;
    }
    .row .main .what {
      font-size: 12.5px;
      color: var(--muted);
      line-height: 1.45;
      word-break: break-word;
    }
    .equip-list {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 5px;
    }
    .equip-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      max-width: 100%;
      min-height: 24px;
      padding: 3px 8px;
      border-radius: 999px;
      background: var(--surface-soft);
      border: 1px solid var(--line-soft);
      color: var(--ink-soft);
      font-size: 12px;
      font-weight: 650;
      line-height: 1.25;
    }
    .equip-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .equip-qty {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
    }
    .equip-chip.more {
      background: transparent;
      color: var(--muted);
      border-style: dashed;
    }
    .row .right {
      font-size: 11px;
      color: var(--muted);
      font-weight: 600;
      white-space: nowrap;
      align-self: center;
    }
    .row .right .pill {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 999px;
      background: var(--surface-soft);
      color: var(--ink-soft);
      border: 1px solid var(--line-soft);
    }
    .row .right .pill.urgent { background: var(--urgent-bg); color: var(--urgent-ink); border-color: transparent; }
    .row .right .pill.high { background: var(--high-bg); color: var(--high-ink); border-color: transparent; }
    .row .right .pill.maint { background: var(--high-bg); color: var(--high-ink); border-color: transparent; }

    .empty-mini {
      padding: 22px 14px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    .weekly {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .weekly .label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
    }
    .weekly .value {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--ink);
    }
    .weekly .range {
      font-size: 11px;
      color: var(--muted);
      font-weight: 500;
      margin-top: 2px;
    }

    .error {
      background: var(--urgent-bg);
      color: var(--urgent-ink);
      border: 1px solid #fecaca;
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      margin-bottom: 14px;
      font-size: 13.5px;
    }
    .skeleton {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      height: 78px;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 0.55; } 50% { opacity: 1; } }

    /* Tablet+ */
    @media (min-width: 560px) {
      .kpis { grid-template-columns: repeat(3, 1fr); }
    }
    @media (min-width: 720px) {
      .wrap { padding: 20px; }
      .kpis { grid-template-columns: repeat(4, 1fr); gap: 12px; }
      .kpi { padding: 16px; }
      .kpi .value { font-size: 28px; }
      .section-head h2 { font-size: 15px; }
    }
    @media (min-width: 900px) {
      .brand h1 { font-size: 20px; }
      .columns {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        align-items: start;
      }
      .columns .section { margin-bottom: 16px; }
    }
  </style>
</head>
<body>
  <header class="app">
    <div class="app-top">
      <div class="brand">
        <h1><span class="logo"><span class="v">V</span><span>illage</span><span class="dot" aria-hidden="true"></span></span><span class="page-name">운영판</span></h1>
        <div class="updated" id="updated">불러오는 중…</div>
      </div>
      <div class="controls">
        <a class="btn-dashboard" id="today-dashboard-link" href="https://village6k-cpu.github.io/my-gas-project2/dashboard.html" target="_blank" rel="noopener">오늘 일정</a>
        <button class="btn-refresh" id="refresh" aria-label="새로고침" title="새로고침">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7L21 8"/><path d="M21 3v5h-5"/></svg>
        </button>
      </div>
    </div>
    <nav class="tabs" aria-label="페이지 전환">
      <a href="/" class="tab">후속조치 <span class="badge" id="follow-up-badge"></span></a>
      <a href="/operations" class="tab active" aria-current="page">운영판</a>
    </nav>
  </header>
  <main class="wrap">
    <div id="error" aria-live="polite"></div>

    <section class="alert-strip" id="alert-strip" aria-label="재고 알림"></section>

    <section class="kpis" id="kpis" aria-label="요약"></section>

    <section class="health" id="health" aria-label="건강 지표">
      <div class="hero-gauge">
        <div class="hg-head">
          <div class="hg-label">장비 가동률</div>
          <div class="hg-value" id="hero-value">—<span class="unit">%</span></div>
        </div>
        <div class="hg-bar"><div class="hg-fill" id="hero-fill" style="width:0%"></div></div>
        <div class="hg-foot">
          <span id="hero-foot-left">대여 중 <b>—</b>개</span>
          <span id="hero-foot-right">전체 보유 <b>—</b>개</span>
        </div>
      </div>
      <div class="pace-card">
        <div class="pc-head">
          <div class="pc-label">이번주 출고 페이스</div>
          <div class="pc-value" id="pace-value">—<span class="unit">%</span></div>
        </div>
        <div class="pc-bar">
          <div class="pc-fill" id="pace-fill" style="width:0%"></div>
          <div class="baseline" aria-hidden="true"></div>
          <div class="baseline-label" aria-hidden="true">평균 100%</div>
        </div>
        <div class="pc-foot">
          <span id="pace-foot-left">이번주 <b>—</b>건</span>
          <span id="pace-foot-right">4주 평균 <b>—</b>건</span>
        </div>
      </div>
    </section>

    <div class="columns">
      <section class="section">
        <div class="section-head">
          <h2>오늘 반출</h2>
          <span class="count" id="checkout-count"></span>
        </div>
        <div id="checkout-panel"></div>
      </section>

      <section class="section">
        <div class="section-head">
          <h2>오늘 반납</h2>
          <span class="count" id="checkin-count"></span>
        </div>
        <div id="checkin-panel"></div>
      </section>

      <section class="section">
        <div class="section-head">
          <h2>임박 반출 (1~3일)</h2>
          <span class="count" id="imminent-count"></span>
        </div>
        <div id="imminent-panel"></div>
      </section>

      <section class="section">
        <div class="section-head">
          <h2>미확정 예약</h2>
          <span class="count" id="unconfirmed-count"></span>
        </div>
        <div id="unconfirmed-panel"></div>
      </section>

      <section class="section">
        <div class="section-head">
          <h2>정비 중 장비</h2>
          <span class="count" id="maint-count"></span>
        </div>
        <div id="maint-panel"></div>
      </section>
    </div>

    <section class="section">
      <div class="weekly">
        <div>
          <div class="label">이번주 신규 예약</div>
          <div class="range" id="week-range"></div>
        </div>
        <div class="value" id="week-value">—</div>
      </div>
    </section>
  </main>

<script>
(() => {
  const DASHBOARD_URL = 'https://village6k-cpu.github.io/my-gas-project2/dashboard.html';
  const $ = (s) => document.querySelector(s);
  const esc = (s = '') => String(s).replace(/[&<>"']/g, (m) => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[m]));
  let currentOperationsDate = '';
  const EQUIPMENT_VISIBLE_LIMIT = 4;

  function fmtClock(iso) {
    if (!iso) return '';
    const d = new Date(iso.replace(' ', 'T'));
    if (Number.isNaN(d.getTime())) return '';
    return d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
  }

  function normalizeEquipmentItems(items) {
    if (!Array.isArray(items)) return [];
    const order = [];
    const byName = new Map();
    items.forEach((item) => {
      const name = String((item && item.name) || '').trim();
      if (!name) return;
      const qty = Number(item.qty) > 0 ? Number(item.qty) : 1;
      if (!byName.has(name)) {
        byName.set(name, { name, qty: 0 });
        order.push(name);
      }
      byName.get(name).qty += qty;
    });
    return order.map((name) => byName.get(name));
  }

  function renderEquipmentList(items) {
    const normalized = normalizeEquipmentItems(items);
    if (!normalized.length) return '';
    const visible = normalized.slice(0, EQUIPMENT_VISIBLE_LIMIT);
    const hiddenCount = normalized.length - visible.length;
    const chips = visible.map((item) => {
      const qty = Number(item.qty) > 1 ? `<span class="equip-qty">×${esc(item.qty)}</span>` : '';
      return `<span class="equip-chip"><span class="equip-name">${esc(item.name)}</span>${qty}</span>`;
    });
    if (hiddenCount > 0) {
      chips.push('<span class="equip-chip more">' + '외 ' + hiddenCount + '개' + '</span>');
    }
    return '<div class="equip-list">' + chips.join('') + '</div>';
  }

  function todayDashboardUrl(date) {
    const params = new URLSearchParams();
    date = String(date || currentOperationsDate || '').trim();
    if (date) params.set('date', date);
    return DASHBOARD_URL + (params.toString() ? '?' + params.toString() : '');
  }

  function updateTodayDashboardLink(date) {
    const link = $('#today-dashboard-link');
    if (link) link.href = todayDashboardUrl(date);
  }

  function kpi(label, value, cls, unit) {
    const u = unit ? `<span class="unit">${esc(unit)}</span>` : '';
    return `<div class="kpi ${cls || ''}"><div class="label">${esc(label)}</div><div class="value">${value}${u}</div></div>`;
  }

  function emptyMini(msg) {
    return `<div class="panel"><div class="empty-mini">${esc(msg)}</div></div>`;
  }

  function rowsCheckoutCheckin(list) {
    if (!list.length) return emptyMini('해당 없음');
    const rows = list.map((it) => `<div class="row">
      <div class="time">${esc(it.time || '—')}</div>
      <div class="main">
        <div class="who">${esc(it.customer || '고객명 미상')}</div>
      </div>
      <div class="right"><span class="pill">${esc(it.tid)}</span></div>
    </div>`).join('');
    return `<div class="panel">${rows}</div>`;
  }

  function rowsImminent(list) {
    if (!list.length) return emptyMini('1~3일 내 출고 없음');
    const rows = list.map((it) => {
      const pillCls = it.daysAway === 1 ? 'urgent' : 'high';
      const dayLabel = `D-${it.daysAway}`;
      return `<div class="row">
        <div class="time">${esc(it.date.slice(5))}<br><span style="font-size:11px;color:var(--muted);font-weight:600">${esc(it.time || '')}</span></div>
        <div class="main">
          <div class="who">${esc(it.customer || '고객명 미상')}</div>
        </div>
        <div class="right"><span class="pill ${pillCls}">${dayLabel}</span></div>
      </div>`;
    }).join('');
    return `<div class="panel">${rows}</div>`;
  }

  function rowsUnconfirmed(list) {
    if (!list.length) return emptyMini('미확정 예약 없음');
    const rows = list.map((it) => `<div class="row">
      <div class="time">${esc((it.checkoutDate || '').slice(5))}<br><span style="font-size:11px;color:var(--muted);font-weight:600">${esc(it.checkoutTime || '')}</span></div>
      <div class="main">
        <div class="who">${esc(it.customer || '고객명 미상')}${it.company ? ` · <span style="font-weight:500;color:var(--muted)">${esc(it.company)}</span>` : ''}</div>
      </div>
      <div class="right"><span class="pill">${esc(it.reqID)}</span></div>
    </div>`).join('');
    return `<div class="panel">${rows}</div>`;
  }

  function rowsMissing(list) {
    if (!list.length) return emptyMini('계약서 미발송 없음');
    const rows = list.slice(0, 30).map((it) => `<div class="row">
      <div class="time" style="min-width:0"></div>
      <div class="main">
        <div class="who">${esc(it.customer || '고객명 미상')}</div>
      </div>
      <div class="right"><span class="pill">${esc(it.tid)}</span></div>
    </div>`).join('');
    const tail = list.length > 30 ? `<div class="empty-mini">… 외 ${list.length - 30}건</div>` : '';
    return `<div class="panel">${rows}${tail}</div>`;
  }

  function rowsMaintenance(list) {
    if (!list.length) return emptyMini('정비 중인 장비 없음');
    const rows = list.map((it) => `<div class="row">
      <div class="time" style="min-width:0"></div>
      <div class="main">
        <div class="who">${esc(it.name || '이름 없음')}</div>
        ${it.note ? `<div class="what">${esc(it.note)}</div>` : ''}
      </div>
      <div class="right"><span class="pill maint">${esc(it.status)}</span></div>
    </div>`).join('');
    return `<div class="panel">${rows}</div>`;
  }

  function setError(msg) {
    $('#error').innerHTML = msg ? `<div class="error">${esc(msg)}</div>` : '';
  }

  let loading = false;
  async function load() {
    if (loading) return;
    loading = true;
    const btn = $('#refresh');
    btn.classList.add('loading');
    setError('');
    try {
      const res = await fetch('/api/operations');
      const data = await res.json();
      if (!res.ok || !data.success) throw new Error((data && data.error) || '불러오기 실패');
      render(data);
    } catch (e) {
      setError(e.message);
    } finally {
      btn.classList.remove('loading');
      loading = false;
    }
  }

  function renderInventoryAlerts(alerts, horizonDays) {
    const el = document.getElementById('alert-strip');
    const list = Array.isArray(alerts) ? alerts : [];

    if (!list.length) {
      el.innerHTML = `<div class="alert-ok">✅ 향후 ${horizonDays || 90}일 재고 충돌 없음</div>`;
      return;
    }

    const conflictCount = list.filter((a) => a.severity === 'conflict').length;
    const tightCount = list.filter((a) => a.severity === 'tight').length;
    const onlyTight = conflictCount === 0;

    const summaryParts = [];
    if (conflictCount > 0) summaryParts.push(`🔴 재고 충돌 <b>${conflictCount}건</b>`);
    if (tightCount > 0) summaryParts.push(`🟠 부족 우려 <b>${tightCount}건</b>`);
    const summaryText = summaryParts.join(' · ') + ' — 펼쳐서 확인';

    const MAX_SHOW = 30;
    const shown = list.slice(0, MAX_SHOW);
    const cards = shown.map((a) => {
      let monthDay = '', wd = '';
      try {
        const d = new Date(a.date + 'T00:00:00');
        if (!isNaN(d.getTime())) {
          monthDay = `${d.getMonth() + 1}월 ${d.getDate()}일`;
          wd = ['일','월','화','수','목','금','토'][d.getDay()];
        }
      } catch (e) {}
      const sevText = a.severity === 'conflict'
        ? `🔴 ${a.overBy}개 부족`
        : `🟠 빠듯 (여유 0)`;
      const bookings = (a.bookings || []).map((b) => {
        const fromMD = b.from ? b.from.slice(5).replace('-', '/') : '';
        const toMD = b.to ? b.to.slice(5).replace('-', '/') : '';
        const range = fromMD && toMD
          ? (fromMD === toMD ? fromMD : `${fromMD} → ${toMD}`)
          : (fromMD || toMD || '');
        return `<div class="conflict-booking">
          <span class="booking-customer">${esc(b.customer || '미상')}</span>
          <span class="booking-range">${esc(range)}</span>
          <span class="booking-qty">${esc(String(b.qty))}개</span>
        </div>`;
      }).join('');

      return `<div class="conflict-card severity-${esc(a.severity)}">
        <div class="conflict-head">
          <div class="conflict-date">${esc(monthDay || a.date)}<span class="cd-wd">${esc(wd)}</span></div>
          <div class="conflict-equip">${esc(a.equipment)}</div>
          <div class="conflict-status">${sevText}</div>
        </div>
        <div class="conflict-totals">
          보유 <b>${esc(String(a.stock))}개</b> · 예약 합계 <b class="${a.severity === 'conflict' ? 'over' : ''}">${esc(String(a.booked))}개</b>
        </div>
        <div class="conflict-bookings">${bookings}</div>
      </div>`;
    }).join('');
    const tail = list.length > MAX_SHOW ? `<div class="conflict-more">… 외 ${list.length - MAX_SHOW}건</div>` : '';

    el.innerHTML = `<details class="alert-box ${onlyTight ? 'tight-only' : ''}">
      <summary>
        <span>${summaryText}</span>
        <span class="alert-caret">▾</span>
      </summary>
      <div class="conflict-list">${cards}${tail}</div>
    </details>`;
  }

  function renderHealth(health) {
    const u = health.utilization || {};
    const upct = Number(u.percent) || 0;
    const uCls = upct >= 50 ? 'good' : upct >= 30 ? 'mid' : 'low';
    $('#hero-value').innerHTML = `${upct}<span class="unit">%</span>`;
    $('#hero-value').className = 'hg-value ' + uCls;
    $('#hero-fill').style.width = Math.min(100, upct) + '%';
    $('#hero-fill').className = 'hg-fill ' + uCls;
    $('#hero-foot-left').innerHTML = `대여 중 <b>${u.inUse ?? 0}</b>개`;
    $('#hero-foot-right').innerHTML = `전체 보유 <b>${u.total ?? 0}</b>개`;

    const p = health.checkoutPace || {};
    const ppct = p.percent;
    if (ppct == null) {
      $('#pace-value').innerHTML = '데이터 부족';
      $('#pace-value').className = 'pc-value na';
      $('#pace-fill').style.width = '0%';
      $('#pace-fill').className = 'pc-fill';
      $('#pace-foot-left').innerHTML = `이번주 <b>${p.thisWeek ?? 0}</b>건`;
      $('#pace-foot-right').innerHTML = `4주 평균 <b>—</b>`;
    } else {
      const dir = ppct >= 110 ? 'up' : ppct >= 80 ? 'flat' : 'down';
      const arrow = dir === 'up' ? '▲ ' : dir === 'down' ? '▼ ' : '';
      $('#pace-value').innerHTML = `${arrow}${ppct}<span class="unit">%</span>`;
      $('#pace-value').className = 'pc-value ' + dir;
      $('#pace-fill').style.width = (Math.min(200, Math.max(0, ppct)) / 2) + '%';
      $('#pace-fill').className = 'pc-fill ' + dir;
      $('#pace-foot-left').innerHTML = `이번주 <b>${p.thisWeek ?? 0}</b>건`;
      $('#pace-foot-right').innerHTML = `4주 평균 <b>${p.avg4Week ?? 0}</b>건`;
    }
  }

  function render(data) {
    currentOperationsDate = data.date || currentOperationsDate || '';
    updateTodayDashboardLink(currentOperationsDate);
    const s = data.summary || {};
    $('#updated').textContent = data.generatedAt ? `마지막 업데이트 ${fmtClock(data.generatedAt)}` : '';

    $('#kpis').innerHTML = [
      kpi('오늘 반출', s.todayCheckout ?? 0, 'checkout', '건'),
      kpi('오늘 반납', s.todayCheckin ?? 0, 'checkin', '건'),
      kpi('미확정 예약', s.unconfirmed ?? 0, (s.unconfirmed > 0 ? 'unconfirmed attention' : 'unconfirmed'), '건'),
      kpi('임박 반출', s.imminent ?? 0, 'imminent', '건')
    ].join('');

    renderInventoryAlerts(data.inventoryAlerts || [], data.inventoryHorizonDays || 90);
    renderHealth(data.health || {});

    $('#checkout-count').textContent = `${(data.todayCheckout || []).length}건`;
    $('#checkout-panel').innerHTML = rowsCheckoutCheckin(data.todayCheckout || []);

    $('#checkin-count').textContent = `${(data.todayCheckin || []).length}건`;
    $('#checkin-panel').innerHTML = rowsCheckoutCheckin(data.todayCheckin || []);

    $('#imminent-count').textContent = `${(data.imminent || []).length}건`;
    $('#imminent-panel').innerHTML = rowsImminent(data.imminent || []);

    $('#unconfirmed-count').textContent = `${(data.unconfirmed || []).length}건`;
    $('#unconfirmed-panel').innerHTML = rowsUnconfirmed(data.unconfirmed || []);

    $('#maint-count').textContent = `${(data.maintenance || []).length}건`;
    $('#maint-panel').innerHTML = rowsMaintenance(data.maintenance || []);

    const wk = data.week || {};
    $('#week-range').textContent = (wk.start && wk.end) ? `${wk.start} ~ ${wk.end}` : '';
    $('#week-value').textContent = `${s.weeklyReservations ?? 0}건`;
  }

  async function loadBadge() {
    try {
      const res = await fetch('/api/follow-ups?status=active');
      const data = await res.json();
      if (!res.ok || !data || !data.summary) return;
      const open = Number(data.summary.open || 0);
      const el = $('#follow-up-badge');
      if (open > 0) el.textContent = String(open);
      else el.textContent = '';
    } catch (e) {
      // badge 실패는 무시
    }
  }

  $('#refresh').addEventListener('click', load);

  $('#kpis').innerHTML = '<div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>';
  load();
  loadBadge();
  setInterval(load, 60000);
  setInterval(loadBadge, 60000);
})();
</script>
</body>
</html>
