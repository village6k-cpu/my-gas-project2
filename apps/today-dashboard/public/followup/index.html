<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>VILLAGE. 후속조치</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@900&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: light;
      --bg: #f1f4f9;
      --surface: #ffffff;
      --surface-soft: #f8fafc;
      --ink: #0f172a;
      --ink-soft: #334155;
      --muted: #64748b;
      --line: #e2e8f0;
      --line-soft: #eef2f7;

      --urgent: #dc2626;
      --urgent-bg: #fef2f2;
      --urgent-ink: #991b1b;

      --high: #ea580c;
      --high-bg: #fff7ed;
      --high-ink: #9a3412;

      --normal: #0284c7;
      --normal-bg: #f0f9ff;
      --normal-ink: #0c4a6e;

      --low: #16a34a;
      --low-bg: #f0fdf4;
      --low-ink: #14532d;

      --primary: #0f172a;
      --primary-ink: #ffffff;

      --radius: 8px;
      --radius-sm: 6px;
      --shadow-card: 0 1px 2px rgba(15, 23, 42, 0.04), 0 4px 12px rgba(15, 23, 42, 0.04);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; overflow-x: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--ink);
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 16px;
    }

    /* ---------- Header ---------- */
    header.app {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(241, 244, 249, 0.92);
      backdrop-filter: saturate(180%) blur(12px);
      -webkit-backdrop-filter: saturate(180%) blur(12px);
      border-bottom: 1px solid var(--line);
    }
    .app-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px;
      max-width: 1280px;
      margin: 0 auto;
    }
    .brand { display: flex; flex-direction: column; min-width: 0; }
    .brand h1 {
      margin: 0;
      display: flex;
      align-items: center;
      gap: 9px;
      line-height: 1;
    }
    .brand .logo {
      font-family: "Big Shoulders Display", "Helvetica Neue", "Arial Black", sans-serif;
      font-weight: 900;
      font-size: 28px;
      letter-spacing: 0;
      line-height: 1;
      color: var(--ink);
      text-transform: uppercase;
      display: inline-flex;
      align-items: center;
      gap: 0;
    }
    @media (min-width: 560px) {
      .brand .logo { font-size: 32px; }
    }
    @media (min-width: 900px) {
      .brand .logo { font-size: 38px; }
    }
    .brand .logo .v { color: #EA5B36; }
    .brand .logo .dot {
      display: inline-block;
      width: 0.21em;
      height: 0.21em;
      background: #EA5B36;
      margin-left: 0.04em;
      align-self: flex-end;
      margin-bottom: 0.05em;
    }
    .brand .page-name {
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Segoe UI", sans-serif;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0;
      color: var(--ink-soft);
      padding-bottom: 2px;
    }
    .brand .updated {
      font-size: 12px;
      color: var(--muted);
      margin-top: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .controls { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
    .select-wrap { position: relative; }
    .select-wrap select {
      appearance: none;
      -webkit-appearance: none;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--ink);
      padding: 9px 30px 9px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      min-height: 38px;
    }
    .select-wrap::after {
      content: '';
      position: absolute;
      right: 12px;
      top: 50%;
      width: 7px; height: 7px;
      border-right: 2px solid var(--muted);
      border-bottom: 2px solid var(--muted);
      transform: translateY(-65%) rotate(45deg);
      pointer-events: none;
    }
    .btn-refresh {
      width: 38px; height: 38px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--surface);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      color: var(--ink-soft);
    }
    .btn-refresh:hover { background: var(--surface-soft); }
    .btn-refresh.loading svg { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---------- Tabs ---------- */
    nav.tabs {
      display: flex;
      gap: 4px;
      padding: 0 16px 10px;
      max-width: 1280px;
      margin: 0 auto;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    nav.tabs::-webkit-scrollbar { display: none; }
    .tab {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      text-decoration: none;
      transition: background 0.1s ease, color 0.1s ease;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .tab.active {
      background: var(--primary);
      color: var(--primary-ink);
    }
    .tab:not(.active):hover {
      background: var(--surface-soft);
      color: var(--ink-soft);
    }
    .tab .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 18px;
      height: 18px;
      padding: 0 5px;
      border-radius: 999px;
      background: var(--urgent);
      color: white;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0;
    }
    .tab.active .badge { background: rgba(255,255,255,0.22); }
    .tab .badge:empty { display: none; }

    /* ---------- Stats ---------- */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }
    .stat {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .stat .label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .stat .value {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 0;
      line-height: 1.1;
    }
    .stat.urgent .value { color: var(--urgent); }
    .stat.high .value { color: var(--high); }

    .mobile-lane-tabs {
      display: none;
    }

    /* ---------- Sections ---------- */
    .section { margin-bottom: 20px; }
    .section-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
      margin: 0 2px 10px;
    }
    .section-head h2 {
      margin: 0;
      font-size: 14px;
      font-weight: 700;
      color: var(--ink-soft);
      letter-spacing: 0;
    }
    .section-head .count {
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
    }

    .card-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ---------- Workbench ---------- */
    .workbench {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 14px;
      align-items: start;
      margin-bottom: 18px;
    }
    .workbench[hidden] { display: none; }
    .board {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      min-width: 0;
    }
    .lane {
      min-width: 0;
      background: rgba(255,255,255,0.68);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .lane-head {
      min-height: 42px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line-soft);
      background: rgba(248,250,252,0.86);
    }
    .lane-head h2 {
      margin: 0;
      font-size: 13px;
      font-weight: 800;
      color: var(--ink-soft);
      letter-spacing: 0;
    }
    .lane-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 22px;
      height: 22px;
      padding: 0 7px;
      border-radius: 999px;
      background: var(--surface);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }
    .lane.now .lane-count {
      background: var(--urgent-bg);
      border-color: #fecaca;
      color: var(--urgent-ink);
    }
    .task-list {
      display: flex;
      flex-direction: column;
      gap: 7px;
      padding: 8px;
      max-height: min(640px, calc(100vh - 244px));
      overflow-y: auto;
      overscroll-behavior: contain;
    }
    .task-empty {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }
    .task-row {
      display: grid;
      grid-template-columns: 24px minmax(0, 1fr);
      gap: 8px;
      width: 100%;
      max-width: 100%;
      border: 1px solid var(--line-soft);
      border-radius: var(--radius-sm);
      background: var(--surface);
      padding: 9px 9px 8px;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.03);
      cursor: pointer;
      transition: border-color 0.1s ease, box-shadow 0.1s ease, transform 0.05s ease;
    }
    .task-row:hover {
      border-color: #cbd5e1;
      box-shadow: 0 4px 10px rgba(15, 23, 42, 0.06);
    }
    .task-row:active { transform: scale(0.995); }
    .task-row.focused {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(15, 23, 42, 0.08);
    }
    .task-row.selected {
      background: #f8fafc;
      border-color: var(--primary);
    }
    .task-check {
      width: 18px;
      height: 18px;
      margin: 2px 0 0;
      accent-color: var(--primary);
      cursor: pointer;
    }
    .task-body { min-width: 0; }
    .task-line {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }
    .priority-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--normal);
      flex: 0 0 auto;
    }
    .priority-dot.urgent { background: var(--urgent); }
    .priority-dot.high { background: var(--high); }
    .priority-dot.normal { background: var(--normal); }
    .priority-dot.low { background: var(--low); }
    .task-title {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13.5px;
      font-weight: 800;
      color: var(--ink);
    }
    .task-meta {
      margin-top: 3px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--muted);
      font-size: 11.5px;
      font-weight: 650;
    }
    .task-summary {
      margin-top: 5px;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
      color: var(--ink-soft);
      font-size: 12.5px;
      line-height: 1.38;
      word-break: break-word;
    }
    .row-actions {
      grid-column: 2;
      display: none;
      gap: 5px;
      margin-top: 8px;
    }
    .task-row.focused .row-actions,
    .task-row:hover .row-actions {
      display: flex;
    }
    .row-actions .mini-btn {
      min-height: 28px;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: var(--surface-soft);
      color: var(--ink-soft);
      padding: 0 8px;
      font: inherit;
      font-size: 11.5px;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
    }
    .row-actions .mini-btn.primary {
      background: var(--primary);
      border-color: var(--primary);
      color: var(--primary-ink);
    }
    .detail-panel {
      position: sticky;
      top: 126px;
      min-width: 0;
    }
    .detail-panel .card {
      max-height: calc(100vh - 150px);
      overflow: auto;
    }
    .mobile-inline-detail {
      display: none;
    }
    .detail-empty {
      background: var(--surface);
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      padding: 24px 16px;
      color: var(--muted);
      text-align: center;
      font-size: 13px;
      font-weight: 650;
    }
    .closed-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 8px;
      padding: 0;
    }
    .closed-list .task-row {
      cursor: default;
    }
    .closed-list .row-actions {
      display: flex;
    }

    /* ---------- Card ---------- */
    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px 14px 12px;
      box-shadow: var(--shadow-card);
      position: relative;
      overflow: hidden;
    }
    .card.selected {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(15, 23, 42, 0.08), var(--shadow-card);
    }
    .card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: var(--normal);
    }
    .card.priority-urgent::before { background: var(--urgent); }
    .card.priority-high::before   { background: var(--high); }
    .card.priority-normal::before { background: var(--normal); }
    .card.priority-low::before    { background: var(--low); }

    .card-top {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .card-select {
      flex: 0 0 auto;
      width: 24px;
      height: 24px;
      margin-top: 1px;
      accent-color: var(--primary);
      cursor: pointer;
    }
    .card-main { min-width: 0; flex: 1 1 auto; }

    .card-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      padding: 3px 9px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      background: var(--surface-soft);
      color: var(--ink-soft);
      border: 1px solid var(--line-soft);
      letter-spacing: 0.02em;
    }
    .chip.priority-urgent { background: var(--urgent-bg); color: var(--urgent-ink); border-color: transparent; }
    .chip.priority-high   { background: var(--high-bg);   color: var(--high-ink);   border-color: transparent; }
    .chip.priority-normal { background: var(--normal-bg); color: var(--normal-ink); border-color: transparent; }
    .chip.priority-low    { background: var(--low-bg);    color: var(--low-ink);    border-color: transparent; }
    .chip.status-done       { background: #f1f5f9; color: var(--muted); }
    .chip.status-dismissed  { background: #f1f5f9; color: var(--muted); }
    .chip.status-in_progress { background: #ecfeff; color: #155e75; }
    .chip.status-waiting_customer,
    .chip.status-waiting_internal { background: #fefce8; color: #854d0e; }

    .card h3 {
      margin: 0 0 6px;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.35;
      letter-spacing: 0;
      color: var(--ink);
      word-break: keep-all;
    }
    .card .meta {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .card .meta b { color: var(--ink-soft); font-weight: 600; }
    .card .summary {
      font-size: 14px;
      color: var(--ink-soft);
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .action-box {
      margin-top: 10px;
      padding: 10px 12px;
      background: var(--surface-soft);
      border: 1px solid var(--line-soft);
      border-radius: var(--radius-sm);
      font-size: 13.5px;
      line-height: 1.5;
      color: var(--ink-soft);
    }
    .action-box.recommended {
      background: #fffbeb;
      border-color: #fde68a;
      color: #713f12;
    }
    .action-box .lbl {
      display: block;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      opacity: 0.75;
      margin-bottom: 4px;
    }
    .action-box .body {
      white-space: pre-wrap;
      word-break: break-word;
    }
    .reply-editor {
      margin-top: 10px;
      padding: 10px 12px;
      background: #f8fafc;
      border: 1px solid var(--line-soft);
      border-radius: var(--radius-sm);
    }
    .reply-editor label {
      display: block;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.04em;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .reply-editor textarea {
      width: 100%;
      min-height: 92px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 10px;
      font: inherit;
      font-size: 13.5px;
      line-height: 1.5;
      color: var(--ink);
      background: var(--surface);
    }

    details.foldable { margin-top: 10px; }
    details.foldable > summary {
      cursor: pointer;
      color: var(--muted);
      font-size: 12.5px;
      font-weight: 600;
      padding: 6px 0;
      list-style: none;
      user-select: none;
    }
    details.foldable > summary::-webkit-details-marker { display: none; }
    details.foldable > summary::before {
      content: '▸';
      display: inline-block;
      margin-right: 4px;
      transition: transform 0.1s ease;
    }
    details.foldable[open] > summary::before { transform: rotate(90deg); }
    details.foldable .fold-body {
      font-size: 12.5px;
      color: var(--muted);
      line-height: 1.55;
      padding: 4px 0 0 14px;
    }
    details.foldable .fold-body p { margin: 0 0 4px; }
    details.foldable .fold-body .blocking {
      margin-top: 6px;
      color: var(--urgent-ink);
    }

    .card-actions {
      display: flex;
      gap: 6px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .btn {
      flex: 1 1 auto;
      min-height: 40px;
      padding: 0 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--ink-soft);
      font-size: 13.5px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: transform 0.05s ease, background 0.1s ease;
    }
    .btn:hover { background: var(--surface-soft); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: progress; }
    .btn.primary {
      background: var(--primary);
      color: var(--primary-ink);
      border-color: var(--primary);
    }
    .btn.primary:hover { background: #1e293b; }
    .btn.ghost {
      background: transparent;
      color: var(--muted);
    }
    .btn.send {
      background: #0f766e;
      color: #fff;
      border-color: #0f766e;
    }
    .btn.send:hover { background: #115e59; }

    .bulkbar {
      position: sticky;
      top: 112px;
      z-index: 8;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      background: rgba(255,255,255,0.96);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 10px;
      margin-bottom: 14px;
      box-shadow: var(--shadow-card);
    }
    .bulkbar[hidden] { display: none; }
    .bulk-count {
      font-size: 13px;
      font-weight: 800;
      color: var(--ink-soft);
      white-space: nowrap;
    }
    .bulk-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .bulk-actions .btn {
      flex: 0 0 auto;
      min-height: 34px;
      padding: 0 10px;
      font-size: 12.5px;
    }

    /* ---------- Empty / Error / Skeleton ---------- */
    .empty {
      padding: 40px 20px;
      text-align: center;
      color: var(--muted);
      background: var(--surface);
      border: 1px dashed var(--line);
      border-radius: var(--radius);
    }
    .empty b { color: var(--ink-soft); font-size: 15px; }

    .error {
      background: var(--urgent-bg);
      color: var(--urgent-ink);
      border: 1px solid #fecaca;
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      margin-bottom: 14px;
      font-size: 13.5px;
    }

    .skeleton {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      height: 78px;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 0.55; } 50% { opacity: 1; } }

    /* ---------- Tablet+ tweaks ---------- */
    @media (min-width: 720px) {
      .wrap { padding: 20px; }
      .stats { gap: 12px; }
      .stat { padding: 16px; }
      .stat .value { font-size: 30px; }
      .card { padding: 16px; }
      .card h3 { font-size: 17px; }

      }
      .task-summary {

      .row-actions {

  </style>
<script>(function(){var _f=window.fetch;function tk(){try{for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(/^sb-.*-auth-token$/.test(k)){var v=JSON.parse(localStorage.getItem(k));return (v&&(v.access_token||(v.currentSession&&v.currentSession.access_token)))||"";}}}catch(e){}return "";}window.fetch=function(u,o){o=o||{};if(typeof u==="string"&&u.indexOf("/api/")===0){var t=tk();o.headers=Object.assign({},(o.headers||{}),t?{Authorization:"Bearer "+t}:{});}return _f(u,o);};})();</script>
</head>
<body>
  <header class="app">
    <div class="app-top">
      <div class="brand">
        <h1><span class="logo"><span class="v">V</span><span>illage</span><span class="dot" aria-hidden="true"></span></span><span class="page-name">후속조치</span></h1>
        <div class="updated" id="updated">불러오는 중…</div>
      </div>
      <div class="controls">
        <div class="select-wrap">
          <select id="status" aria-label="상태 필터">
            <option value="active">열린 업무</option>
            <option value="all">전체</option>
            <option value="done">완료</option>
            <option value="dismissed">무시</option>
          </select>
        </div>
        <button class="btn-refresh" id="refresh" aria-label="새로고침" title="새로고침">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7L21 8"/><path d="M21 3v5h-5"/></svg>
        </button>
      </div>
    </div>
    <nav class="tabs" aria-label="페이지 전환">
      <a href="index.html" class="tab active" aria-current="page">후속조치</a>
      <a href="operations.html" class="tab">운영판</a>
    </nav>
  </header>
  <main class="wrap">
    <div id="error" aria-live="polite"></div>
    <div class="bulkbar" id="bulkbar" hidden>
      <div class="bulk-count" id="bulk-count">0개 선택</div>
      <div class="bulk-actions">
        <button class="btn primary" data-bulk-action="done">완료</button>
        <button class="btn" data-bulk-action="in_progress">진행중</button>
        <button class="btn ghost" data-bulk-action="dismissed">무시</button>
        <button class="btn ghost" data-bulk-action="clear">선택 해제</button>
      </div>
    </div>
    <section class="stats" id="stats" aria-label="요약"></section>
    <nav class="mobile-lane-tabs" id="mobile-lanes" aria-label="모바일 업무 분류" hidden></nav>
    <section class="workbench" id="workbench" hidden>
      <div class="board" id="board" aria-label="업무 보드"></div>
      <aside class="detail-panel" id="detail-panel" aria-label="선택 업무 상세"></aside>
    </section>
    <section class="section" id="closed-section" hidden>
      <div class="section-head">
        <h2 id="closed-title">완료/무시</h2>

      </div>
      <div class="closed-list" id="closed-list"></div>
    </section>
    <div id="empty" hidden></div>
  </main>
<script>
(() => {
  const TYPE_LABELS = {
    reply_needed: '답변 필요',
    quote_send: '견적서 발송',
    tax_invoice: '세금계산서',
    schedule_check: '스케줄 확인',
    reservation_review: '예약 확인',
    price_review: '가격/할인',
    payment_check: '입금/결제',
    contract_document: '계약/서류',
    return_extension: '반납/연장',
    damage_repair: '파손/수리',
    sheet_duplicate_check: '시트 중복',
    completed_log: '처리 기록'
  };
  const PRIORITY_LABELS = { urgent: '긴급', high: '높음', normal: '보통', low: '낮음' };
  const STATUS_LABELS = {
    open: '대기',
    in_progress: '진행중',
    waiting_customer: '고객 대기',
    waiting_internal: '내부 대기',
    done: '완료',
    dismissed: '무시'
  };
  const PRIORITY_ORDER = { urgent: 0, high: 1, normal: 2, low: 3 };
  const CLOSED = new Set(['done', 'dismissed']);
  const LOCAL_BRIDGE_URL = 'http://127.0.0.1:8787';
  const LANE_DEFS = [
    { key: 'now', label: '지금', match: (x) => x.priority === 'urgent' || x.priority === 'high' },
    { key: 'reservation', label: '예약·스케줄', match: (x) => ['reservation_review', 'schedule_check', 'return_extension', 'sheet_duplicate_check'].includes(x.type) },
    { key: 'reply', label: '응답·견적', match: (x) => ['reply_needed', 'quote_send', 'price_review', 'tax_invoice', 'payment_check', 'contract_document'].includes(x.type) },
    { key: 'ops', label: '운영·기타', match: () => true }
  ];
  const selectedIds = new Set();
  let currentItems = [];
  let focusedId = null;
  let lastData = null;
  let mobileLaneKey = 'now';
  const mobileQuery = window.matchMedia('(max-width: 760px)');

  const $ = (sel) => document.querySelector(sel);

  const esc = (s = '') => String(s).replace(/[&<>"']/g, (m) => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[m]));

  function fmtRelative(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    if (Number.isNaN(d.getTime())) return '';
    const diff = Date.now() - d.getTime();
    const min = Math.floor(diff / 60000);
    if (min < 1) return '방금';
    if (min < 60) return `${min}분 전`;
    const hr = Math.floor(min / 60);
    if (hr < 24) return `${hr}시간 전`;
    const day = Math.floor(hr / 24);
    if (day < 7) return `${day}일 전`;
    return d.toLocaleDateString('ko-KR', { month: 'numeric', day: 'numeric' });
  }

  function fmtClock(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    if (Number.isNaN(d.getTime())) return '';
    return d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
  }

  function sortByPriorityThenNew(a, b) {
    const pa = PRIORITY_ORDER[a.priority] ?? 9;
    const pb = PRIORITY_ORDER[b.priority] ?? 9;
    if (pa !== pb) return pa - pb;
    return (b.created_at || '').localeCompare(a.created_at || '');
  }

  function renderStat(label, value, cls) {
    return `<div class="stat ${cls || ''}"><div class="label">${esc(label)}</div><div class="value">${value}</div></div>`;
  }

  function renderCard(x) {
    const evidence = Array.isArray(x.evidence) ? x.evidence : [];
    const typeLabel = TYPE_LABELS[x.type] || x.type || '';
    const prLabel = PRIORITY_LABELS[x.priority] || x.priority || '';
    const stLabel = STATUS_LABELS[x.status] || x.status || '';
    const closed = CLOSED.has(x.status);
    const selected = selectedIds.has(x.id);

    const chips = [
      typeLabel ? `<span class="chip">${esc(typeLabel)}</span>` : '',
      `<span class="chip priority-${esc(x.priority || 'normal')}">${esc(prLabel)}</span>`,
      `<span class="chip status-${esc(x.status || 'open')}">${esc(stLabel)}</span>`
    ].filter(Boolean).join('');

    const customer = x.customer_name ? `<b>${esc(x.customer_name)}</b>` : '<span>고객명 미상</span>';
    const when = x.created_at ? ` · ${esc(fmtRelative(x.created_at))}` : '';

    const recAction = x.recommended_action
      ? `<div class="action-box recommended"><span class="lbl">추천 조치</span><div class="body">${esc(x.recommended_action)}</div></div>`
      : '';

    const draft = x.suggested_reply_draft && !closed
      ? `<div class="reply-editor">
          <label for="draft-${esc(x.id)}">답변 초안</label>
          <textarea id="draft-${esc(x.id)}" data-draft-id="${esc(x.id)}">${esc(x.suggested_reply_draft)}</textarea>
          <div class="card-actions">
            <button class="btn send" data-action="send_reply" data-id="${esc(x.id)}">전송</button>
          </div>
        </div>`
      : x.suggested_reply_draft
        ? `<details class="foldable"><summary>답변 초안 보기</summary><div class="fold-body"><div class="action-box"><span class="lbl">답변 초안</span><div class="body">${esc(x.suggested_reply_draft)}</div></div></div></details>`
        : '';

    const selectBox = !closed
      ? `<input class="card-select" type="checkbox" aria-label="선택" data-select-id="${esc(x.id)}" ${selected ? 'checked' : ''}>`
      : '';

    const hasEvidence = evidence.length > 0 || x.blocking_reason;
    const evidenceBlock = hasEvidence
      ? `<details class="foldable"><summary>근거${evidence.length ? ` (${evidence.length})` : ''}</summary><div class="fold-body">${
          evidence.map((e) => `<p>• ${esc(e)}</p>`).join('') || '<p>근거 없음</p>'
        }${x.blocking_reason ? `<p class="blocking"><b>보류 사유:</b> ${esc(x.blocking_reason)}</p>` : ''}</div></details>`
      : '';

    const actions = closed
      ? `<div class="card-actions"><button class="btn" data-action="open" data-id="${esc(x.id)}">되살리기</button></div>`
      : `<div class="card-actions">
          <button class="btn primary" data-action="done" data-id="${esc(x.id)}">완료</button>
          <button class="btn" data-action="in_progress" data-id="${esc(x.id)}">진행중</button>
          <button class="btn ghost" data-action="dismissed" data-id="${esc(x.id)}">무시</button>
        </div>`;

    return `<article class="card priority-${esc(x.priority || 'normal')} ${selected ? 'selected' : ''}" data-card-id="${esc(x.id)}">
      <div class="card-top">
        ${selectBox}
        <div class="card-main">
          <div class="card-chips">${chips}</div>
          <h3>${esc(x.title || '제목 없음')}</h3>
          <div class="meta">${customer}${when}</div>
          ${x.summary ? `<div class="summary">${esc(x.summary)}</div>` : ''}
          ${recAction}
          ${draft}
          ${evidenceBlock}
          ${actions}
        </div>
      </div>
    </article>`;
  }

  function itemMeta(x) {
    const pieces = [];
    if (x.customer_name) pieces.push(x.customer_name);
    if (TYPE_LABELS[x.type]) pieces.push(TYPE_LABELS[x.type]);
    if (x.created_at) pieces.push(fmtRelative(x.created_at));
    return pieces.join(' · ');
  }

  function renderTaskRow(x, { closed = false } = {}) {
    const selected = selectedIds.has(x.id);
    const focused = focusedId === x.id;
    const pr = x.priority || 'normal';
    const selectBox = closed ? '' : `<input class="task-check" type="checkbox" aria-label="선택" data-select-id="${esc(x.id)}" ${selected ? 'checked' : ''}>`;
    const actions = closed
      ? `<div class="row-actions"><button class="mini-btn" data-action="open" data-id="${esc(x.id)}">되살리기</button></div>`
      : `<div class="row-actions">
          <button class="mini-btn primary" data-action="done" data-id="${esc(x.id)}">완료</button>
          <button class="mini-btn" data-action="in_progress" data-id="${esc(x.id)}">진행</button>
        </div>`;

    return `<article class="task-row priority-${esc(pr)} ${selected ? 'selected' : ''} ${focused ? 'focused' : ''}" data-focus-id="${esc(x.id)}">
      ${selectBox || '<span aria-hidden="true"></span>'}
      <div class="task-body">
        <div class="task-line">
          <span class="priority-dot ${esc(pr)}" aria-hidden="true"></span>
          <div class="task-title">${esc(x.title || '제목 없음')}</div>
        </div>
        <div class="task-meta">${esc(itemMeta(x) || '상세 정보 없음')}</div>
        ${x.summary ? `<div class="task-summary">${esc(x.summary)}</div>` : ''}
      </div>
      ${actions}
    </article>`;
  }

  function isMobileLayout() {
    return mobileQuery.matches;
  }

  function assignLanes(items) {
    const lanes = Object.fromEntries(LANE_DEFS.map((lane) => [lane.key, []]));
    for (const item of items.slice().sort(sortByPriorityThenNew)) {
      const lane = LANE_DEFS.find((def) => def.match(item)) || LANE_DEFS[LANE_DEFS.length - 1];
      lanes[lane.key].push(item);
    }
    return lanes;
  }

  function renderMobileLaneTabs(lanes, activeCount) {
    const el = $('#mobile-lanes');
    if (!isMobileLayout() || !activeCount) {
      el.hidden = true;
      el.innerHTML = '';
      return;
    }
    el.hidden = false;
    el.innerHTML = LANE_DEFS.map((def) => {
      const count = (lanes[def.key] || []).length;
      const active = def.key === mobileLaneKey ? ' active' : '';
      return `<button class="mobile-lane-tab${active}" type="button" data-mobile-lane="${esc(def.key)}">${esc(def.label)} ${count}</button>`;
    }).join('');
  }

  function renderLane(def, items, { inlineDetail = false } = {}) {
    const empty = items.length === 0
      ? '<div class="task-empty">없음</div>'
      : items.map((item) => {
          const detail = inlineDetail && item.id === focusedId
            ? `<div class="mobile-inline-detail">${renderDetailPanel(item)}</div>`
            : '';
          return `${renderTaskRow(item)}${detail}`;
        }).join('');
    return `<section class="lane ${esc(def.key)}">
      <div class="lane-head">
        <h2>${esc(def.label)}</h2>
        <span class="lane-count">${items.length}</span>
      </div>
      <div class="task-list">${empty}</div>
    </section>`;
  }

  function renderDetailPanel(item) {
    if (!item) {
      return '<div class="detail-empty">선택된 업무가 없습니다</div>';
    }
    return renderCard(item);
  }

  function setError(msg) {
    $('#error').innerHTML = msg ? `<div class="error">${esc(msg)}</div>` : '';
  }

  function updateBulkbar() {
    const count = selectedIds.size;
    const bar = $('#bulkbar');
    bar.hidden = count === 0;
    $('#bulk-count').textContent = `${count}개 선택`;
    document.querySelectorAll('[data-select-id]').forEach((input) => {
      const id = input.getAttribute('data-select-id');
      input.checked = selectedIds.has(id);
      input.closest('.card')?.classList.toggle('selected', selectedIds.has(id));
      input.closest('.task-row')?.classList.toggle('selected', selectedIds.has(id));
    });
  }

  function pruneSelections(items) {
    const liveIds = new Set(items.filter((item) => !CLOSED.has(item.status)).map((item) => item.id));
    for (const id of Array.from(selectedIds)) {
      if (!liveIds.has(id)) selectedIds.delete(id);
    }
  }

  async function patchStatus(id, status) {
    return patchStatuses([id], status);
  }

  async function patchStatuses(ids, status) {
    try {
      const res = await fetch('/api/follow-ups', {
        method: 'PATCH',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify(ids.length === 1 ? { id: ids[0], status } : { ids, status })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || '상태 변경 실패');
      ids.forEach((id) => selectedIds.delete(id));
      await load();
    } catch (e) {
      setError(e.message);
    }
  }

  async function sendReply(id) {
    const item = currentItems.find((x) => x.id === id);
    if (!item) throw new Error('카드를 찾을 수 없습니다');
    const textarea = document.querySelector(`[data-draft-id="${CSS.escape(id)}"]`);
    const replyText = String(textarea?.value || '').trim();
    if (!replyText) throw new Error('보낼 답변이 비어 있습니다');
    if (!item.customer_name && !item.room_key) throw new Error('고객명 또는 방 정보를 찾을 수 없습니다');

    const res = await fetch(`${LOCAL_BRIDGE_URL}/manual-send`, {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({
        followUpId: id,
        customerName: item.customer_name || '',
        roomTitle: item.customer_name ? `${item.customer_name} - 빌리지 - 카카오비즈니스 파트너센터` : '',
        text: replyText
      })
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok || !data.ok) {
      throw new Error(data.error || data.result?.reason || '카카오 전송 실패');
    }
    await patchStatus(id, 'done');
  }

  let loading = false;
  async function load() {
    if (loading) return;
    loading = true;
    const btn = $('#refresh');
    btn.classList.add('loading');
    setError('');
    try {
      const status = $('#status').value;
      const res = await fetch('/api/follow-ups?status=' + encodeURIComponent(status));
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || '불러오기 실패');
      render(data);
    } catch (e) {
      setError(e.message);
    } finally {
      btn.classList.remove('loading');
      loading = false;
    }
  }

  function render(data) {
    const items = Array.isArray(data.items) ? data.items : [];
    currentItems = items;
    lastData = data;
    pruneSelections(items);
    const summary = data.summary || {};
    const statusFilter = $('#status').value;

    $('#updated').textContent = data.updatedAt
      ? `마지막 업데이트 ${fmtClock(data.updatedAt)}`
      : '';

    const urgentCount = summary.urgent ?? 0;
    const highCount = summary.high ?? 0;
    $('#stats').innerHTML = [
      renderStat('할 일', summary.open ?? 0),
      renderStat('긴급', urgentCount, urgentCount > 0 ? 'urgent' : ''),
      renderStat('높음', highCount, highCount > 0 ? 'high' : '')
    ].join('');

    const active = items.filter((x) => !CLOSED.has(x.status));
    const closedItems = items.filter((x) => CLOSED.has(x.status));
    const activeSorted = active.slice().sort(sortByPriorityThenNew);
    const mobile = isMobileLayout();
    if (!focusedId || !items.some((item) => item.id === focusedId)) {
      focusedId = activeSorted[0]?.id || closedItems[0]?.id || null;
    }

    const workbench = $('#workbench');
    if (activeSorted.length) {
      const lanes = assignLanes(activeSorted);
      if (!LANE_DEFS.some((def) => def.key === mobileLaneKey)) mobileLaneKey = 'now';
      const currentLaneItems = lanes[mobileLaneKey] || [];
      if (mobile && currentLaneItems.length && !currentLaneItems.some((item) => item.id === focusedId)) {
        focusedId = currentLaneItems[0].id;
      }
      renderMobileLaneTabs(lanes, activeSorted.length);
      const laneDefs = mobile ? LANE_DEFS.filter((def) => def.key === mobileLaneKey) : LANE_DEFS;
      workbench.hidden = false;
      $('#board').innerHTML = laneDefs.map((def) => renderLane(def, lanes[def.key] || [], { inlineDetail: mobile })).join('');
      $('#detail-panel').innerHTML = mobile ? '' : renderDetailPanel(items.find((item) => item.id === focusedId));
    } else {
      workbench.hidden = true;
      $('#board').innerHTML = '';
      $('#detail-panel').innerHTML = '';
      renderMobileLaneTabs({}, 0);
    }

    const closedSec = $('#closed-section');
    const showClosed =
      (statusFilter === 'done' || statusFilter === 'dismissed' || statusFilter === 'all') &&
      closedItems.length > 0;
    if (showClosed) {
      closedSec.hidden = false;
      $('#closed-title').textContent =
        statusFilter === 'done' ? '완료' :
        statusFilter === 'dismissed' ? '무시' : '완료·무시';
      $('#closed-count').textContent = `${closedItems.length}건`;
      $('#closed-list').innerHTML = closedItems
        .slice()
        .sort((a, b) => (b.created_at || '').localeCompare(a.created_at || ''))
        .map((item) => renderTaskRow(item, { closed: true }))
        .join('');
    } else {
      closedSec.hidden = true;
      $('#closed-list').innerHTML = '';
    }

    const emptyEl = $('#empty');
    const totalShown = activeSorted.length + (showClosed ? closedItems.length : 0);
    if (totalShown === 0) {
      emptyEl.hidden = false;
      const msg = statusFilter === 'active'
        ? { title: '지금 할 일이 없습니다', sub: '모든 후속조치가 정리되었습니다.' }
        : { title: '표시할 항목이 없습니다', sub: '필터를 바꿔보세요.' };
      emptyEl.innerHTML = `<div class="empty"><b>${msg.title}</b><div style="margin-top:6px;font-size:13px;color:var(--muted)">${msg.sub}</div></div>`;
    } else {
      emptyEl.hidden = true;
      emptyEl.innerHTML = '';
    }
    updateBulkbar();
  }

  document.addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-action][data-id]');
    if (!btn) return;
    const action = btn.getAttribute('data-action');
    const id = btn.getAttribute('data-id');
    if (action === 'send_reply') {
      btn.disabled = true;
      sendReply(id)
        .catch((error) => setError(error.message))
        .finally(() => { btn.disabled = false; });
      return;
    }
    if (action === 'dismissed' && !confirm('이 업무를 무시 처리할까요?')) return;
    btn.disabled = true;
    patchStatus(id, action).finally(() => { btn.disabled = false; });
  });

  document.addEventListener('change', (e) => {
    const input = e.target.closest('[data-select-id]');
    if (input) {
      const id = input.getAttribute('data-select-id');
      if (input.checked) selectedIds.add(id);
      else selectedIds.delete(id);
      updateBulkbar();
      return;
    }
  });

  document.addEventListener('click', (e) => {
    if (e.target.closest('button, input, textarea, select, a, summary')) return;
    const row = e.target.closest('[data-focus-id]');
    if (!row) return;
    focusedId = row.getAttribute('data-focus-id');
    if (lastData) render(lastData);
  });

  document.addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-mobile-lane]');
    if (!btn) return;
    mobileLaneKey = btn.getAttribute('data-mobile-lane') || 'now';
    focusedId = null;
    if (lastData) render(lastData);
  });

  document.addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-bulk-action]');
    if (!btn) return;
    const action = btn.getAttribute('data-bulk-action');
    if (action === 'clear') {
      selectedIds.clear();
      updateBulkbar();
      return;
    }
    const ids = Array.from(selectedIds);
    if (!ids.length) return;
    if (action === 'dismissed' && !confirm(`${ids.length}개 업무를 무시 처리할까요?`)) return;
    btn.disabled = true;
    patchStatuses(ids, action).finally(() => { btn.disabled = false; });
  });

  $('#refresh').addEventListener('click', load);
  $('#status').addEventListener('change', () => {
    selectedIds.clear();
    focusedId = null;
    mobileLaneKey = 'now';
    load();
  });

  mobileQuery.addEventListener('change', () => {
    if (lastData) render(lastData);
  });

  $('#stats').innerHTML = '<div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>';
  load();
  setInterval(load, 30000);
})();
</script>
</body>
</html>
