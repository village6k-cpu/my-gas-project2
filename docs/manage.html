<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="확인요청">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#F7F7F5">
<link rel="apple-touch-icon" sizes="180x180" href="https://village6k-cpu.github.io/my-gas-project2/icons/village-confirm-01-20260514-180.png?v=20260514a">
<link rel="icon" type="image/png" href="https://village6k-cpu.github.io/my-gas-project2/icons/village-confirm-01-20260514.png?v=20260514a">
<title>확인요청 관리</title>
<style>
  :root {
    --bg: #F7F7F5;
    --surface: #FFFFFF;
    --border: #E9E9E7;
    --border-light: #F0F0EE;
    --text-primary: #37352F;
    --text-secondary: #787774;
    --text-muted: #B4B4B0;
    --accent: #2383E2;
    --blue-bg: #D3E5EF;
    --blue-text: #24609C;
    --amber-bg: #FDECC8;
    --amber-text: #93640D;
    --green-bg: #DBEDDB;
    --green-text: #2B6B2B;
    --red-bg: #FFE2DD;
    --red-text: #A33A2C;
    --gray-bg: #E8E8E5;
    --gray-text: #787774;
    --red: #EB5757;
    --radius: 6px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;
    background:var(--bg); color:var(--text-primary);
    font-size:15px; line-height:1.5;
    -webkit-text-size-adjust:100%;
  }

  .header {
    background:var(--surface);
    border-bottom:1px solid var(--border);
    padding:12px 20px 10px;
    position:sticky; top:0; z-index:100;
  }
  .header-top,
  .header-workbar {
    display:flex; align-items:center; gap:8px; flex-wrap:wrap;
  }
  .header-top {
    justify-content:space-between;
    margin-bottom:10px;
  }
  .header-actions {
    display:flex; align-items:center; gap:8px; flex-wrap:wrap;
    justify-content:flex-end;
  }
  .app-switcher {
    display:flex; overflow:hidden; flex-shrink:0;
    border:1px solid var(--border);
    border-radius:var(--radius);
    background:var(--bg);
  }
  .app-tab {
    display:inline-flex; align-items:center; justify-content:center;
    min-height:32px; padding:6px 12px;
    color:var(--text-secondary); text-decoration:none;
    font-size:12px; font-weight:650;
    white-space:nowrap;
  }
  .app-tab:not(:last-child) { border-right:1px solid var(--border); }
  .app-tab.active { background:var(--accent); color:#fff; }
  a.app-tab:hover { background:rgba(0,0,0,.03); color:var(--accent); }

  .hdr-btn {
    display:inline-flex; align-items:center; justify-content:center;
    gap:6px; min-height:32px; padding:6px 12px;
    border:1px solid var(--border); border-radius:var(--radius);
    background:var(--surface); color:var(--text-secondary);
    font-size:12px; font-weight:650; font-family:inherit;
    cursor:pointer; white-space:nowrap; text-decoration:none;
    transition:all .15s;
  }
  .hdr-btn:hover { border-color:var(--accent); color:var(--accent); }
  .hdr-btn:active { background:var(--bg); }
  .request-btn {
    min-height:36px;
    padding:7px 12px 7px 9px;
    background:#EAF4FF;
    border-color:rgba(35,131,226,.34);
    color:#0F5EA8;
    font-weight:800;
    box-shadow:0 1px 0 rgba(35,131,226,.08);
  }
  .request-btn:hover {
    background:#DDEEFF;
    border-color:var(--accent);
    color:#0B5CAD;
  }
  .request-ai-badge {
    display:inline-flex; align-items:center; justify-content:center;
    height:20px; min-width:24px; padding:0 5px;
    border-radius:4px;
    background:var(--accent); color:#fff;
    font-size:10px; font-weight:850; line-height:1;
  }
  .request-main { white-space:nowrap; }
  .icon-btn {
    width:32px; height:32px; padding:0; font-size:16px;
  }

  .page-title {
    display:flex; align-items:baseline; gap:8px;
    min-height:32px;
    color:var(--text-muted);
    font-size:12px;
  }
  .page-title strong {
    color:var(--text-primary);
    font-size:13px;
    font-weight:750;
  }
  .refresh-info {
    color:var(--text-muted);
    white-space:nowrap;
  }
  .summary-bar {
    min-height:32px;
    display:flex; align-items:center; gap:8px; flex-wrap:wrap;
    color:var(--text-secondary);
    font-size:12px;
  }
  .summary-badge {
    display:inline-flex; align-items:center; justify-content:center;
    min-height:24px; padding:3px 9px;
    border-radius:var(--radius);
    font-size:12px; font-weight:750;
  }
  .badge-pending { background:var(--blue-bg); color:var(--blue-text); }
  .badge-count { background:var(--gray-bg); color:var(--gray-text); }
  .summary-time { color:var(--text-muted); font-size:12px; }

  .card-list { padding:14px 20px 28px; }

  .req-card {
    background:var(--surface);
    border:1px solid var(--border);
    border-left:4px solid var(--accent);
    border-radius:8px;
    padding:16px;
    box-shadow:0 1px 2px rgba(15,23,42,.04);
    margin-bottom:10px;
  }
  .req-card.status-등록완료 { border-left-color:var(--green-text); }
  .req-card.status-거절 { border-left-color:var(--red); }
  .req-card.status-보류 { border-left-color:var(--amber-text); }

  .req-header {
    display:flex; justify-content:space-between; align-items:flex-start;
    margin-bottom:10px;
    gap:12px;
  }
  .req-tools {
    display:flex; gap:6px; align-items:center;
  }
  .req-id { font-size:12px; color:var(--text-muted); font-weight:650; }
  .req-status {
    display:inline-flex; align-items:center;
    min-height:24px; padding:3px 9px;
    border-radius:var(--radius);
    font-size:12px; font-weight:750;
  }
  .req-status.대기 { background:var(--blue-bg); color:var(--blue-text); }
  .req-status.등록완료 { background:var(--green-bg); color:var(--green-text); }
  .req-status.거절 { background:var(--red-bg); color:var(--red-text); }
  .req-status.보류 { background:var(--amber-bg); color:var(--amber-text); }

  .req-name { font-size:16px; font-weight:750; margin-bottom:4px; }
  .req-date,
  .req-tel {
    display:flex; align-items:center; gap:8px;
    font-size:13px; color:var(--text-secondary);
    margin-bottom:8px;
  }
  .meta-label {
    min-width:34px;
    color:var(--text-muted);
    font-size:12px;
    font-weight:700;
  }
  .edit-icon-btn {
    width:32px; height:32px;
    display:inline-flex; align-items:center; justify-content:center;
    border:1px solid var(--border);
    border-radius:var(--radius);
    background:var(--surface);
    color:var(--text-secondary);
    font-size:14px;
    cursor:pointer;
  }
  .edit-icon-btn:hover { border-color:var(--accent); color:var(--accent); }

  .equip-list { margin:10px 0; }
  .equip-item {
    display:flex; justify-content:space-between; align-items:center;
    gap:10px;
    padding:8px 0; border-bottom:1px solid var(--border-light);
    font-size:14px;
  }
  .equip-item:last-child { border-bottom:none; }
  .equip-check { display:flex; align-items:center; margin-right:10px; }
  .equip-check input { width:20px; height:20px; accent-color:var(--accent); }
  .equip-info { flex:1; }
  .equip-qty { color:var(--text-muted); font-size:13px; }
  .equip-result {
    font-size:12px; font-weight:750; text-align:right;
    max-width:120px;
  }
  .equip-result.ok { color:var(--green-text); }
  .equip-result.warn { color:var(--amber-text); }
  .equip-result.fail { color:var(--red); }
  .equip-detail { font-size:11px; color:var(--text-muted); font-weight:400; display:block; }

  .action-bar {
    display:flex; gap:8px; margin-top:14px; flex-wrap:wrap;
  }
  .action-btn {
    flex:1; min-width:80px; min-height:34px;
    padding:8px 10px;
    border:1px solid var(--border);
    border-radius:var(--radius);
    background:var(--surface);
    color:var(--text-secondary);
    font-size:13px; font-weight:750; font-family:inherit;
    cursor:pointer; text-align:center;
  }
  .action-btn:active { background:var(--bg); }
  .btn-confirm,
  .btn-register { background:var(--accent); border-color:var(--accent); color:#fff; }
  .btn-hold { background:var(--amber-bg); border-color:#E8D7A7; color:var(--amber-text); }
  .btn-reject { background:var(--red-bg); border-color:#F2C6BF; color:var(--red-text); }
  .btn-send { background:#E8DEEE; border-color:#DACBE3; color:#6940A5; }
  .action-btn:disabled { background:var(--gray-bg); color:var(--gray-text); cursor:not-allowed; }

  .edit-overlay {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,.28); z-index:200;
    align-items:flex-end; justify-content:center;
  }
  .edit-overlay.show { display:flex; }
  .edit-panel {
    background:var(--surface); border-radius:14px 14px 0 0;
    width:100%; max-width:560px; padding:22px;
    max-height:85vh; overflow-y:auto;
    animation:slideUp .25s ease;
  }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }

  .edit-panel h3 { font-size:17px; font-weight:800; margin-bottom:16px; color:var(--text-primary); }
  .edit-field { margin-bottom:12px; }
  .edit-field label { font-size:12px; color:var(--text-muted); display:block; margin-bottom:5px; font-weight:700; }
  .edit-field input, .edit-field select {
    width:100%; min-height:38px; padding:9px 11px;
    font-size:15px; font-family:inherit;
    border:1px solid var(--border); border-radius:var(--radius);
    background:var(--surface); color:var(--text-primary);
  }
  .edit-field input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 2px rgba(35,131,226,.15); }
  .edit-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .edit-equip-row {
    display:flex; gap:8px; margin-bottom:8px; align-items:center;
  }
  .edit-equip-row input:first-child { flex:3; }
  .edit-equip-row input:nth-child(2) { flex:1; text-align:center; }
  .edit-equip-row button {
    width:34px; height:34px;
    background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius);
    color:var(--red); font-size:18px; cursor:pointer;
  }

  .edit-actions { display:flex; gap:8px; margin-top:16px; }
  .edit-save,
  .edit-cancel {
    flex:1; min-height:38px; padding:9px 12px;
    border:1px solid var(--border); border-radius:var(--radius);
    font-size:14px; font-weight:750;
    font-family:inherit; cursor:pointer;
  }
  .edit-save { background:var(--accent); border-color:var(--accent); color:#fff; }
  .edit-cancel { background:var(--surface); color:var(--text-secondary); }

  .toast {
    display:none; position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
    background:var(--text-primary); color:#fff; padding:12px 18px; border-radius:8px;
    font-size:15px; font-weight:600; z-index:200;
    box-shadow:0 4px 16px rgba(0,0,0,.2);
  }
  .toast.show { display:block; animation:fadeInUp .3s ease; }
  @keyframes fadeInUp { from{opacity:0;transform:translate(-50%,20px)} to{opacity:1;transform:translate(-50%,0)} }

  .empty-state {
    text-align:center; padding:60px 20px; color:var(--text-muted);
  }
  .empty-state .empty-title {
    color:var(--text-primary);
    font-size:17px;
    font-weight:800;
    margin-bottom:6px;
  }
  .empty-state .msg { font-size:16px; }

  .loading-full {
    text-align:center; padding:60px 20px; color:var(--text-secondary); font-size:15px;
  }

  @media (max-width:600px) {
    .header { padding:10px 12px; }
    .app-switcher { width:100%; }
    .app-tab { flex:1; padding:6px 8px; }
    .header-actions { width:100%; justify-content:flex-start; }
    .header-actions .request-btn { flex:1; justify-content:center; }
    .header-workbar { align-items:flex-start; }
    .page-title { width:100%; }
    .summary-bar { width:100%; }
    .card-list { padding:12px 10px 24px; }
    .req-header { align-items:flex-start; }
    .equip-item { align-items:flex-start; }
    .equip-result { max-width:110px; }
    .edit-grid { grid-template-columns:1fr; }
  }
  @media (min-width:768px) {
    .header { padding:12px 32px 10px; }
    .card-list { padding:16px 32px 30px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="app-switcher" aria-label="운영 화면 전환">
      <a href="timeline.html" class="app-tab">빌리지 스케줄</a>
      <a href="dashboard.html" class="app-tab">오늘 일정</a>
      <span class="app-tab active">확인요청</span>
    </div>
    <div class="header-actions">
      <a href="request.html" class="hdr-btn request-btn" title="AI 카톡 예약입력">
        <span class="request-ai-badge">AI</span>
        <span class="request-main">카톡 예약입력</span>
      </a>
      <button class="hdr-btn icon-btn" onclick="loadRequests()" title="새로고침" aria-label="새로고침">↻</button>
    </div>
  </div>
  <div class="header-workbar">
    <div class="page-title">
      <strong>확인요청 관리</strong>
      <span class="refresh-info" id="refreshInfo"></span>
    </div>
    <div class="summary-bar" id="summaryBar">
      <span>로딩 중...</span>
    </div>
  </div>
</div>

<div class="card-list" id="cardList">
  <div class="loading-full">데이터 불러오는 중...</div>
</div>

<!-- 수정 패널 -->
<div class="edit-overlay" id="editOverlay" onclick="if(event.target===this)closeEdit()">
  <div class="edit-panel" id="editPanel"></div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script>
var API_URL = "https://script.google.com/macros/s/AKfycbyRff4-lLXmne-iPIEf87x4-CH_5wb-Uv5dCGymELLrpiKluhg2gDdLdVP4Y0MmxnnT/exec";
var requestData = [];

// ━━━ 데이터 로드 ━━━
// ── 첫 화면 즉시 표시: localStorage 스냅샷(5분 TTL) 먼저 렌더 → 백그라운드로 최신 갱신 ──
// GAS 호출이 2~5초(콜드 30초+)라 매 진입마다 빈 화면+스피너였다. 스냅샷은 표시용일 뿐,
// 항상 서버 응답으로 덮어쓴다.
var MANAGE_SNAPSHOT_KEY = "manageListSnapshot_v1";
var MANAGE_SNAPSHOT_TTL_MS = 5 * 60 * 1000;

function tryRenderSnapshot_() {
  try {
    var raw = localStorage.getItem(MANAGE_SNAPSHOT_KEY);
    if (!raw) return false;
    var snap = JSON.parse(raw);
    if (!snap || !snap.at || (Date.now() - snap.at) > MANAGE_SNAPSHOT_TTL_MS) return false;
    if (!Array.isArray(snap.items)) return false;
    requestData = snap.items;
    renderList();
    return true;
  } catch (e) { return false; }
}

function loadRequests() {
  var hadSnapshot = tryRenderSnapshot_();
  fetch(API_URL + "?key=village2026&action=list")
    .then(function(r) { return r.json(); })
    .then(function(data) {
      requestData = data.items || [];
      try {
        localStorage.setItem(MANAGE_SNAPSHOT_KEY, JSON.stringify({ at: Date.now(), items: requestData }));
      } catch (e) { /* 저장 실패해도 표시는 정상 */ }
      renderList();
    })
    .catch(function(e) {
      if (hadSnapshot) return; // 스냅샷이 이미 떠 있으면 에러로 덮지 않음 (다음 새로고침에서 재시도)
      document.getElementById("cardList").innerHTML =
        '<div class="empty-state"><div class="empty-title">로드 실패</div><div class="msg">' + e.message + '</div></div>';
    });
}

// ━━━ 목록 렌더링 ━━━
// 고객 자유입력(예약자명 등)이 innerHTML/속성으로 들어가므로 저장형 XSS 방지용 이스케이프.
// 텍스트/따옴표 속성 양쪽에서 안전하도록 " ' & < > 를 모두 처리한다.
function escHtml(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}

function renderList() {
  var el = document.getElementById("cardList");
  var summary = document.getElementById("summaryBar");

  if (requestData.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="empty-title">확인요청 없음</div><div class="msg">대기 중인 확인요청이 없습니다</div></div>';
    summary.innerHTML = '<span class="summary-badge badge-count">0건</span><span class="summary-text">대기 중</span>';
    updateRefreshInfo();
    return;
  }

  summary.innerHTML =
    '<span class="summary-badge badge-pending">' + requestData.length + '건</span>' +
    '<span class="summary-text">대기 중</span>' +
    '<span class="summary-time">' + new Date().toLocaleTimeString("ko-KR", {hour:"2-digit",minute:"2-digit"}) + ' 기준</span>';
  updateRefreshInfo();

  el.innerHTML = requestData.map(function(req, idx) {
    var statusClass = (req.등록상태 || "대기").replace(/\s/g, "");
    var statusLabel = req.등록상태 || "대기";

    var equipHtml = (req.장비목록 || []).map(function(e, eIdx) {
      var resultClass = "ok";
      var r = e.결과 || "";
      if (/부족|⚠/.test(r)) resultClass = "warn";
      if (/가용0|❌|없음/.test(r)) resultClass = "fail";
      var checkId = "chk_" + idx + "_" + eIdx;
      var isAvail = !/가용0|❌/.test(r);
      return '<div class="equip-item">' +
        '<label class="equip-check"><input type="checkbox" id="' + checkId + '" ' + (isAvail ? 'checked' : '') + '></label>' +
        '<div class="equip-info">' + escHtml(e.장비명) + ' <span class="equip-qty">×' + (e.수량||1) + '</span></div>' +
        '<div class="equip-result ' + resultClass + '">' + escHtml(r) +
          (e.상세 ? '<span class="equip-detail">' + escHtml(e.상세) + '</span>' : '') +
        '</div></div>';
    }).join("");

    var actionsHtml = '';
    if (statusLabel === "대기" || !statusLabel) {
      var hasResult = req.장비목록 && req.장비목록.some(function(e) { return e.결과; });
      if (!hasResult) {
        actionsHtml = '<button class="action-btn btn-confirm" onclick="doAction(\'확인\',\'' + req.reqID + '\')">확인</button>';
      } else {
        actionsHtml =
          '<button class="action-btn btn-register" onclick="doRegisterSelected(' + idx + ')">선택 등록</button>' +
          '<button class="action-btn btn-hold" onclick="doAction(\'보류\',\'' + req.reqID + '\')">전체 보류</button>' +
          '<button class="action-btn btn-reject" onclick="doAction(\'거절\',\'' + req.reqID + '\')">전체 거절</button>';
      }
    }

    return '<div class="req-card status-' + statusClass + '">' +
      '<div class="req-header">' +
        '<div><div class="req-id">' + escHtml(req.reqID) + '</div>' +
          '<div class="req-name">' + escHtml(req.예약자명 || "이름 없음") + '</div></div>' +
        '<div class="req-tools">' +
          '<button class="edit-icon-btn" onclick="openEdit(' + idx + ')" title="수정" aria-label="수정">✎</button>' +
          '<span class="req-status ' + statusLabel + '">' + statusLabel + '</span>' +
        '</div>' +
      '</div>' +
      '<div class="req-date"><span class="meta-label">기간</span><span>' + (req.반출일||"") + ' ' + (req.반출시간||"") + ' → ' + (req.반납일||"") + ' ' + (req.반납시간||"") + '</span></div>' +
      (req.연락처 ? '<div class="req-tel"><span class="meta-label">연락처</span><span>' + escHtml(req.연락처) + '</span></div>' : '') +
      '<div class="equip-list">' + equipHtml + '</div>' +
      (actionsHtml ? '<div class="action-bar">' + actionsHtml + '</div>' : '') +
    '</div>';
  }).join("");
}

function updateRefreshInfo() {
  var el = document.getElementById("refreshInfo");
  if (!el) return;
  el.textContent = new Date().toLocaleTimeString("ko-KR", {hour:"2-digit",minute:"2-digit"}) + " 갱신";
}

// ━━━ 선택 등록 (체크된 장비만) ━━━
function doRegisterSelected(idx) {
  var req = requestData[idx];
  if (!req) return;

  var items = req.장비목록 || [];
  var unchecked = [];

  for (var i = 0; i < items.length; i++) {
    var chk = document.getElementById("chk_" + idx + "_" + i);
    if (chk && !chk.checked) {
      unchecked.push(items[i].장비명);
    }
  }

  var checkedCount = items.length - unchecked.length;
  if (checkedCount === 0) return alert("등록할 장비를 1개 이상 선택하세요.");

  var msg = checkedCount + "/" + items.length + "개 장비를 등록하시겠습니까?";
  if (unchecked.length > 0) msg += "\n\n제외: " + unchecked.join(", ");
  if (!confirm(msg)) return;

  // 제외 장비가 있으면 먼저 해당 행을 보류 처리 후 등록
  if (unchecked.length > 0) {
    showToast("제외 장비 보류 처리 중...");
    var excludeArgs = encodeURIComponent(JSON.stringify({ reqID: req.reqID, 제외장비: unchecked }));
    fetch(API_URL + "?key=village2026&action=run&func=excludeEquipFromRequest&args=" + excludeArgs)
    .then(function(r) { return r.json(); })
    .then(function(excludeRes) {
      if (excludeRes.error) throw new Error(excludeRes.error);
      startAsyncRegister(req.reqID);
    })
    .catch(function(e) { showToast("통신 오류: " + e.message); });
  } else {
    // 전체 등록
    doAction("등록", req.reqID);
  }
}

// ━━━ 비동기 등록: registerAsync 접수 후 card 폴링 (동기 등록은 계약서 생성 포함 1~5분 블로킹) ━━━
function startAsyncRegister(reqID) {
  showToast("등록 접수 — 백그라운드 처리 중... (1~3분)");
  fetch(API_URL + "?key=village2026&action=registerAsync&reqID=" + encodeURIComponent(reqID))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data && data.success === false) {
        showToast("등록 접수 실패: " + (data.error || ""));
      }
    })
    .catch(function(e) { /* 접수 fetch가 끊겨도 폴링이 실제 상태를 확인한다 */ });

  var polls = 0;
  var pollTimer = setInterval(function() {
    polls++;
    if (polls > 30) { // 5분 초과
      clearInterval(pollTimer);
      showToast("등록 확인 시간 초과 — 목록을 새로고침해 확인해주세요");
      loadRequests();
      return;
    }
    fetch(API_URL + "?key=village2026&action=card&reqID=" + encodeURIComponent(reqID))
      .then(function(r) { return r.json(); })
      .then(function(res) {
        if (!res || res.status !== "OK") return; // 일시 오류 — 다음 폴링에서 재확인
        if (!res.card) { // 대기 목록에서 빠짐 = 등록완료
          clearInterval(pollTimer);
          showToast("등록 완료: " + reqID);
          loadRequests();
          return;
        }
        var st = String(res.card.등록상태 || "");
        if (/❌|실패/.test(st)) {
          clearInterval(pollTimer);
          showToast("등록 실패: " + st);
          loadRequests();
        }
      })
      .catch(function() { /* 다음 폴링에서 재확인 */ });
  }, 10000);
}

// ━━━ 액션 실행 (확인/등록/보류/거절) ━━━
function doAction(action, reqID) {
  if (action === "등록") {
    if (!confirm("등록하시겠습니까?")) return;
    startAsyncRegister(reqID);
    return;
  }
  if (action === "거절" && !confirm("거절하시겠습니까?")) return;

  showToast(action + " 처리 중...");

  // GET 방식으로 호출 (GAS 리다이렉트 문제 방지)
  fetch(API_URL + "?key=village2026&action=" + encodeURIComponent(action) + "&reqID=" + encodeURIComponent(reqID))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.status === "OK") {
        showToast(action + " 완료: " + reqID);
        setTimeout(loadRequests, 1000);
      } else {
        showToast("오류: " + (data.message || JSON.stringify(data)));
      }
    })
    .catch(function(e) { showToast("통신 오류: " + e.message); });
}

// ━━━ 수정 패널 ━━━
function openEdit(idx) {
  var req = requestData[idx];
  if (!req) return;

  var equipRows = (req.장비목록 || []).map(function(e, i) {
    return '<div class="edit-equip-row">' +
      '<input type="text" value="' + escHtml(e.장비명||"") + '" data-equip="' + i + '">' +
      '<input type="text" value="' + (e.수량||1) + '" data-qty="' + i + '">' +
      '<button onclick="this.parentElement.remove()">✕</button>' +
    '</div>';
  }).join("");

  document.getElementById("editPanel").innerHTML =
    '<h3>수정: ' + req.reqID + '</h3>' +
    '<div class="edit-grid">' +
      '<div class="edit-field"><label>예약자명</label><input type="text" id="editName" value="' + escHtml(req.예약자명||"") + '"></div>' +
      '<div class="edit-field"><label>연락처</label><input type="tel" id="editTel" value="' + escHtml(req.연락처||"") + '"></div>' +
      '<div class="edit-field"><label>반출일</label><input type="date" id="editStart" value="' + (req.반출일||"") + '"></div>' +
      '<div class="edit-field"><label>반출시간</label><input type="time" id="editStartTime" value="' + (req.반출시간||"") + '"></div>' +
      '<div class="edit-field"><label>반납일</label><input type="date" id="editEnd" value="' + (req.반납일||"") + '"></div>' +
      '<div class="edit-field"><label>반납시간</label><input type="time" id="editEndTime" value="' + (req.반납시간||"") + '"></div>' +
    '</div>' +
    '<div class="edit-field"><label>장비 목록</label><div id="editEquipList">' + equipRows + '</div></div>' +
    '<div class="edit-actions">' +
      '<button class="edit-save" onclick="saveEdit(\'' + req.reqID + '\')">저장</button>' +
      '<button class="edit-cancel" onclick="closeEdit()">취소</button>' +
    '</div>';

  document.getElementById("editOverlay").classList.add("show");
}

function closeEdit() {
  document.getElementById("editOverlay").classList.remove("show");
}

function saveEdit(reqID) {
  // 확인요청 시트에서 해당 reqID 행들을 업데이트
  var name = document.getElementById("editName").value;
  var tel = document.getElementById("editTel").value;
  var startDate = document.getElementById("editStart").value;
  var startTime = document.getElementById("editStartTime").value;
  var endDate = document.getElementById("editEnd").value;
  var endTime = document.getElementById("editEndTime").value;

  var equipRows = document.querySelectorAll("#editEquipList .edit-equip-row");
  var items = [];
  equipRows.forEach(function(row) {
    var name = row.querySelector("[data-equip]").value.trim();
    var qty = row.querySelector("[data-qty]").value.trim();
    if (name) items.push({ 이름: name, 수량: qty });
  });

  // API로 업데이트 (search → update 방식)
  showToast("저장 중...");
  var updateArgs = encodeURIComponent(JSON.stringify({
    reqID: reqID, 예약자명: name, 연락처: tel,
    반출일: startDate, 반출시간: startTime,
    반납일: endDate, 반납시간: endTime, 장비: items
  }));
  fetch(API_URL + "?key=village2026&action=run&func=updateRequest&args=" + updateArgs)
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.success || data.status === "OK") {
      showToast("저장 완료!");
      closeEdit();
      setTimeout(loadRequests, 800);
    } else {
      showToast("오류: " + (data.error || data.message || ""));
    }
  })
  .catch(function(e) { showToast("통신 오류: " + e.message); });
}

// ━━━ 토스트 ━━━
function showToast(msg) {
  var el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "toast show";
  clearTimeout(el._timer);
  el._timer = setTimeout(function() { el.className = "toast"; }, 3000);
}

// ━━━ 시작 ━━━
loadRequests();
</script>
