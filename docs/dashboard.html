  if (view.globalSearch) options.globalSearch = true;

  if (tab === 'checkout') {
    items = view.checkout || [];
    type = 'checkout';
  } else if (tab === 'checkin') {
    items = view.checkin || [];
    type = 'checkin';
  } else if (tab === 'all') {
    items = view.all || [];
    type = 'all';
  } else if (tab === 'attention') {
    items = view.attention || [];
    type = 'attention';
    options.emptyText = view.isSearching ? '검색된 확인필요 일정이 없습니다' : '확인필요 일정이 없습니다';
  } else {
    return null;
  }
  return { items: items, type: type, options: options };
}

function renderDashboardSection(tab, loadPhotos) {
  var section = document.getElementById(tab + 'Section');
  var config = getDashboardSectionConfig(tab);
  if (!section || !config) return false;
  if (dashboardRenderedSections[tab]) {
    if (loadPhotos) scheduleDashboardPhotoLoad(config.items);
    return true;
  }
  renderList(tab + 'Section', config.items, config.type, !!(dashboardCurrentView && dashboardCurrentView.isSearching), config.options);
  dashboardRenderedSections[tab] = true;
  if (loadPhotos) scheduleDashboardPhotoLoad(config.items);
  return true;
}

function renderActiveDashboardSection() {
  renderDashboardSection(activeDashboardTab || 'checkout', true);
}

function getDashboardActiveSectionItems(tab) {
  var config = getDashboardSectionConfig(tab || activeDashboardTab || 'checkout');
  return config ? config.items : [];
}

function scheduleDashboardSectionWarmup() {
  var seq = dashboardViewSeq;
  var run = function() {
    if (seq !== dashboardViewSeq) return;
    ['checkout', 'checkin', 'all', 'attention'].forEach(function(tab) {
      if (tab !== activeDashboardTab) renderDashboardSection(tab, false);
    });
  };
  if (window.requestIdleCallback) {
    window.requestIdleCallback(run, { timeout: 1500 });
  } else {
    setTimeout(run, 350);
  }
}

function renderDashboard(data, expectedDate) {
  if (dashboardSearchQuery && dashboardGlobalSearchData) {
    renderDashboardGlobalSearch(dashboardGlobalSearchData);
    return true;
  }
  if (!isDashboardDateMatch(data, expectedDate)) return false;
  data = data || {};
  var checkout = Array.isArray(data.checkout) ? data.checkout : [];
  var checkin = Array.isArray(data.checkin) ? data.checkin : [];
  var filteredCheckout = filterDashboardItems(checkout, 'checkout');
  var filteredCheckin = filterDashboardItems(checkin, 'checkin');
  var attention = buildDashboardAttentionItems(filteredCheckout, filteredCheckin);
  var isSearching = !!dashboardSearchQuery;
  document.getElementById('loadingArea').style.display = 'none';

  document.getElementById('tabCheckout').textContent = filteredCheckout.length;
  document.getElementById('tabCheckin').textContent = filteredCheckin.length;
  document.getElementById('tabAll').textContent = filteredCheckout.length + filteredCheckin.length;
  document.getElementById('tabAttention').textContent = attention.length;

  var all = filteredCheckout.map(function(c) { c._type = 'checkout'; return c; })
    .concat(filteredCheckin.map(function(c) { c._type = 'checkin'; return c; }));
  all.sort(compareDashboardGlobalSearchItems);

  dashboardCurrentView = {
    mode: 'date',
    isSearching: isSearching,
    globalSearch: false,
    checkout: filteredCheckout,
    checkin: filteredCheckin,
    all: all,
    attention: attention
  };
  resetDashboardRenderedSections();

  switchTab(activeDashboardTab || 'checkout');
  prefetchAdjacentDashboardDates(data.date || expectedDate || formatDate(currentDate));
  queueEquipListPrefetch();
  queueDashboardSearchIndexPrefetch();
  scheduleDashboardSectionWarmup();
  queueDashboardPendingContractStatusRefresh(1000);
  return true;
}

function renderDashboardGlobalSearch(data) {
  data = data || {};
  dashboardSearchGroupLabels = {};
  var checkout = Array.isArray(data.checkout) ? data.checkout : [];
  var checkin = Array.isArray(data.checkin) ? data.checkin : [];
  var all = checkout.map(function(c) { c._type = 'checkout'; return c; })
    .concat(checkin.map(function(c) { c._type = 'checkin'; return c; }));
  all.sort(compareScheduleItemsByTime);

  document.getElementById('loadingArea').style.display = 'none';
  document.getElementById('tabCheckout').textContent = checkout.length;
  document.getElementById('tabCheckin').textContent = checkin.length;
  document.getElementById('tabAll').textContent = all.length;
  var attention = buildDashboardAttentionItems(checkout, checkin);
  document.getElementById('tabAttention').textContent = attention.length;

  dashboardCurrentView = {
    mode: 'search',
    isSearching: true,
    globalSearch: true,
    checkout: checkout,
    checkin: checkin,
    all: all,
    attention: attention
  };
  resetDashboardRenderedSections();

  var total = Number(data.total || all.length);
  var suffix = total > all.length ? ' · 상위 ' + all.length + '건 표시' : ' · ' + all.length + '건';
  if (data.summaryMode) suffix += ' · 날짜별 요약';
  setDashboardSearchStatus('전체 예약에서 검색 중: "' + dashboardSearchQuery + '"' + suffix);
  switchTab('all');
  queueEquipListPrefetch();
  scheduleDashboardSectionWarmup();
  queueDashboardPendingContractStatusRefresh(1000);
}

function toggleDashboardSearchGroup(groupId) {
  if (!groupId) return;
  var isOpening = !!dashboardSearchCollapsedGroups[groupId];
  if (isOpening && dashboardGlobalSearchData && dashboardGlobalSearchData.summaryMode && !dashboardSearchDetailedGroups[groupId]) {
    dashboardSearchCollapsedGroups[groupId] = false;
    renderDashboardGlobalSearch(dashboardGlobalSearchData);
    loadDashboardSearchDetails(groupId);
    return;
  }
  dashboardSearchCollapsedGroups[groupId] = !dashboardSearchCollapsedGroups[groupId];
  if (dashboardGlobalSearchData) renderDashboardGlobalSearch(dashboardGlobalSearchData);
}

function loadDashboardSearchDetails(openGroupId) {
  var query = String(dashboardSearchQuery || '').trim();
  if (!query || dashboardSearchDetailLoading) return;
  dashboardSearchDetailLoading = true;
  var requestId = dashboardSearchRequestSeq;
  var groupLabel = dashboardSearchGroupLabels[openGroupId] || '';
  setDashboardSearchStatus('검색 상세 불러오는 중: "' + query + '"' + (groupLabel ? ' · ' + groupLabel : ''));

  var url = API_URL + '?key=village2026&action=dashboardSearch&limit=' + encodeURIComponent(DASHBOARD_SEARCH_LIMIT)
    + '&q=' + encodeURIComponent(query)
    + (groupLabel ? '&detailGroup=' + encodeURIComponent(groupLabel) : '');
  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      dashboardSearchDetailLoading = false;
      if (requestId !== dashboardSearchRequestSeq || query !== dashboardSearchQuery) return;
      mergeDashboardSearchDetails(openGroupId, data || {});
      dashboardSearchDetailedGroups[openGroupId] = true;
      if (openGroupId) dashboardSearchCollapsedGroups[openGroupId] = false;
      renderDashboardGlobalSearch(dashboardGlobalSearchData);
    })
    .catch(function(err) {
      dashboardSearchDetailLoading = false;
      if (requestId !== dashboardSearchRequestSeq) return;
      setDashboardSearchStatus('검색 상세 불러오기 실패: ' + err.message);
    });
}

function mergeDashboardSearchDetails(groupId, detailData) {
  if (!dashboardGlobalSearchData || !dashboardGlobalSearchData.summaryMode) {
    dashboardGlobalSearchData = detailData || {};
    return;
  }
  function itemGroupId(item) {
    return dashboardSearchGroupId((item && (item.searchGroupLabel || item.searchDate)) || '날짜 미정');
  }
  function mergeList(summaryList, detailList) {
    var kept = (summaryList || []).filter(function(item) {
      return itemGroupId(item) !== groupId;
    });
    return kept.concat(detailList || []);
  }
  dashboardGlobalSearchData.checkout = mergeList(dashboardGlobalSearchData.checkout, detailData.checkout);
  dashboardGlobalSearchData.checkin = mergeList(dashboardGlobalSearchData.checkin, detailData.checkin);
  dashboardGlobalSearchData.paymentOptions = detailData.paymentOptions || dashboardGlobalSearchData.paymentOptions;
  dashboardGlobalSearchData.proofTypeOptions = detailData.proofTypeOptions || dashboardGlobalSearchData.proofTypeOptions;
  dashboardGlobalSearchData.issueStatusOptions = detailData.issueStatusOptions || dashboardGlobalSearchData.issueStatusOptions;
  dashboardGlobalSearchData.depositStatusOptions = detailData.depositStatusOptions || dashboardGlobalSearchData.depositStatusOptions;
  dashboardGlobalSearchData.billingCompanyOptions = detailData.billingCompanyOptions || dashboardGlobalSearchData.billingCompanyOptions;
  dashboardGlobalSearchData.partialDetailMode = true;
}

function resetDashboardSearchCollapsedGroups(data, previousGroups) {
  dashboardSearchCollapsedGroups = {};
  var items = []
    .concat((data && data.checkout) || [])
    .concat((data && data.checkin) || []);
  items.forEach(function(item) {
    var groupId = dashboardSearchGroupId(item.searchGroupLabel || item.searchDate || '날짜 미정');
    dashboardSearchCollapsedGroups[groupId] = previousGroups && previousGroups[groupId] === false ? false : true;
  });
}

function dashboardSearchGroupId(label) {
  return 'search_' + String(label || 'unknown').replace(/[^A-Za-z0-9가-힣_-]+/g, '_');
}

function riskGuidanceLabel(state, reason) {
  state = String(state || '').trim();
  reason = String(reason || '').trim();
  if (reason === 'target_missing' || state === 'target_missing') return '대상 없음';
  if (state === 'recommend') return '발송 권장';
  if (state === 'recent_sent') return '최근 발송';
  if (state === 'recipient_missing') return '대상 없음';
  if (state === 'sendable') return '발송 가능';
  if (state === 'sent_recently') return '최근 발송';
  if (state === 'approval_required') return '승인 필요';
  if (state === 'history_unknown') {
    if (reason === 'backend_config_missing') return '연동 미설정';
    if (reason === 'backend_evaluation_failed') return '이력 확인 실패';
    return '이력 미확인';
  }
  return state || '상태 미확인';
}

function riskWarningSummaryHtml(item, cardType) {
  var warnings = (item && item.riskWarnings) || [];
  if (!warnings.length) return '';
  return '<div class="risk-warning-badge">주의 ' + warnings.length + '</div>';
}

function riskButtonPayload(item, warning, cardType, extra) {
  var payload = {
    tradeId: item.tradeId || '',
    cardType: cardType || item._type || '',
    customerName: item.name || '',
    customerPhone: item.customerPhone || item.tel || item.customerTel || '',
    customerTel: item.customerTel || item.tel || '',
    userType: item.userType || warning.userType || '',
    userId: item.userId || warning.userId || '',
    kakaoUser: item.kakaoUser || warning.kakaoUser || null,
    company: item.company || '',
    ruleId: warning.ruleId || '',
    ruleVersion: warning.ruleVersion || 1,
    equipmentName: warning.equipmentName || '',
    riskLevel: warning.riskLevel || '',
    customerMessage: warning.customerMessage || '',
    pickupStaffText: warning.pickupStaffText || '',
    returnCheckText: warning.returnCheckText || '',
    sensitive: !!warning.sensitive,
    cooldownDays: warning.cooldownDays || 90,
    riskItem: {
      ruleId: warning.ruleId || '',
      ruleVersion: warning.ruleVersion || 1,
      riskLevel: warning.riskLevel || '',
      equipmentName: warning.equipmentName || '',
      customerMessage: warning.customerMessage || '',
      sensitive: !!warning.sensitive,
      cooldownDays: warning.cooldownDays || 90
    }
  };
  Object.keys(extra || {}).forEach(function(key) { payload[key] = extra[key]; });
  return escAttr(JSON.stringify(payload));
}

function riskHasKakaoTarget(item, warning) {
  return !!(
    (item && item.kakaoUser) ||
    (item && item.userType && item.userId) ||
    (warning && warning.kakaoUser) ||
    (warning && warning.userType && warning.userId)
  );
}

function equipmentRiskPanelHtml(item, cardType) {
  var warnings = (item && item.riskWarnings) || [];
  if (!warnings.length || (cardType !== 'checkout' && cardType !== 'checkin')) return '';

  var html = '<div class="equipment-risk-panel" onclick="event.stopPropagation()">';
  warnings.forEach(function(warning) {
    var title = (warning.riskLevel || '주의') + ' · ' + (warning.equipmentName || warning.matchedAlias || '장비');
    var hasKakaoTarget = riskHasKakaoTarget(item, warning);
    var stateLabel = riskGuidanceLabel(warning.guidanceState, hasKakaoTarget ? warning.guidanceReason : 'target_missing');
    var text = cardType === 'checkout'
      ? (warning.pickupStaffText || warning.customerMessage || '반출 전 주의사항을 확인하세요.')
      : (warning.returnCheckText || '반납 시 상태를 확인하세요.');
    html += '<div class="equipment-risk-row">';
    html += '<div><div class="equipment-risk-title">' + escHtml(title) + '<span class="equipment-risk-state">' + escHtml(stateLabel) + '</span></div>';
    html += '<div class="equipment-risk-text">' + escHtml(text) + '</div></div>';
    html += '<div class="equipment-risk-actions">';
    if (cardType === 'checkout') {
      var hasRecentSend = warning.guidanceState === 'recent_sent' || warning.guidanceState === 'sent_recently' || !!warning.lastSentAt;
      var canDirectSend = !warning.sensitive && hasKakaoTarget && !hasRecentSend;
      var sendLabel = hasKakaoTarget ? '카톡 보내기' : '카톡 대상 없음';
      if (warning.sensitive && hasKakaoTarget) sendLabel = '발송 보류';
      if (hasRecentSend) sendLabel = '최근 발송됨';
      html += '<button type="button" class="equipment-risk-btn primary" data-risk-payload="' +
        riskButtonPayload(item, warning, cardType, { sendMode: 'direct' }) +
        '"' + (canDirectSend ? '' : ' disabled') + ' onclick="sendEquipmentRiskGuidance(this)">' + escHtml(sendLabel) + '</button>';
      html += '<button type="button" class="equipment-risk-btn" data-risk-payload="' +
        riskButtonPayload(item, warning, cardType, {}) +
        '" onclick="recordEquipmentRiskEvent(this, \'pickup_ack\')">확인함</button>';
    } else {
      html += '<button type="button" class="equipment-risk-btn" data-risk-payload="' +
        riskButtonPayload(item, warning, cardType, {}) +
        '" onclick="recordEquipmentRiskEvent(this, \'return_ok\')">이상 없음</button>';
      html += '<button type="button" class="equipment-risk-btn primary" data-risk-payload="' +
        riskButtonPayload(item, warning, cardType, {}) +
        '" onclick="recordEquipmentRiskEvent(this, \'return_issue\')">이상 있음</button>';
      html += '<button type="button" class="equipment-risk-btn" data-risk-payload="' +
        riskButtonPayload(item, warning, cardType, {}) +
        '" onclick="recordEquipmentRiskEvent(this, \'return_not_checked\')">확인 못함</button>';
    }
    html += '</div></div>';
  });
  html += '</div>';
  return html;
}

function parseRiskButtonPayload(btn) {
  try {
    return JSON.parse(btn.getAttribute('data-risk-payload') || '{}');
  } catch (e) {
    return {};
  }
}

function dashboardApiPayload(action, payload) {
  return {
    key: window.DASHBOARD_API_KEY || 'village2026',
    action: action,
    payload: payload || {}
  };
}

function sendEquipmentRiskGuidance(btn) {
  if (typeof event !== 'undefined' && event.stopPropagation) event.stopPropagation();
  var payload = parseRiskButtonPayload(btn);
  var message = payload.customerMessage || '';
  var confirmText = '고객에게 카톡으로 보낼까요?' +
    (message ? '\n\n고객 문구:\n' + message : '');
  if (!confirm(confirmText)) return;
  var originalText = btn.textContent;
  btn.disabled = true;
  btn.textContent = '처리 중';
  fetch(API_URL || '', {
    method: 'POST',
    body: JSON.stringify(dashboardApiPayload('equipmentRiskSend', payload))
  })
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res.error) throw new Error(res.error);
      clearDashboardCacheForDate(formatDate(currentDate));
      loadData(true);
    })
    .catch(function(err) {
      btn.disabled = false;
      btn.textContent = originalText;
      alert('주의사항 처리 실패: ' + err.message);
    });
}

function recordEquipmentRiskEvent(btn, eventType) {
  if (typeof event !== 'undefined' && event.stopPropagation) event.stopPropagation();
  var payload = parseRiskButtonPayload(btn);
  payload.eventType = eventType;
  if (eventType === 'return_issue') {
    var note = prompt('이상 내용을 짧게 남겨주세요.');
    if (note === null) return;
    payload.notes = note;
  }

  var originalText = btn.textContent;
  btn.disabled = true;
  btn.textContent = '저장 중';
  fetch(API_URL || '', {
    method: 'POST',
    body: JSON.stringify(dashboardApiPayload('equipmentRiskEvent', payload))
  })
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res.error) throw new Error(res.error);
      clearDashboardCacheForDate(formatDate(currentDate));
      loadData(true);
    })
    .catch(function(err) {
      btn.disabled = false;
      btn.textContent = originalText;
      alert('주의사항 기록 실패: ' + err.message);
    });
}

function renderList(containerId, items, type, isSearching, options) {
  options = options || {};
  var container = document.getElementById(containerId);

  if (!items || items.length === 0) {
    var emptyText = options.emptyText || (isSearching ? '검색 결과가 없습니다' :
      ((type === 'checkout' ? '반출' : type === 'checkin' ? '반납' : '') + ' 일정이 없습니다'));
    var emptyIcon = type === 'checkout' ? '📦' : type === 'checkin' ? '📥' : (type === 'attention' ? '!' : '📋');
    container.innerHTML =
      '<div class="empty-state"><div class="icon">' +
      emptyIcon +
      '</div><div class="text">' + emptyText + '</div></div>';
    return;
  }

  var groups = {};
  items.slice().sort(options.globalSearch ? compareDashboardGlobalSearchItems : compareScheduleItemsByTime).forEach(function(item) {
    var timeKey = options.globalSearch ? (item.searchGroupLabel || item.searchDate || '날짜 미정') : (item.time || '시간 미정');
    if (!groups[timeKey]) groups[timeKey] = [];
    groups[timeKey].push(item);
  });

  var html = '';
  Object.keys(groups).sort(options.globalSearch ? compareDashboardSearchGroupLabels : compareTimeLabels).forEach(function(timeKey) {
    var groupId = options.globalSearch ? dashboardSearchGroupId(timeKey) : '';
    if (options.globalSearch && groupId) dashboardSearchGroupLabels[groupId] = timeKey;
    var isCollapsed = options.globalSearch && dashboardSearchCollapsedGroups[groupId];
    html += '<div class="time-group' + (isCollapsed ? ' collapsed' : '') + '"' + (groupId ? ' data-search-group="' + escAttr(groupId) + '"' : '') + '>';
    if (options.globalSearch) {
      html += '<button type="button" class="time-group-header search-group-toggle" onclick="toggleDashboardSearchGroup(\'' + escJs(groupId) + '\')">';
      html += '<span class="search-group-title">' + escHtml(timeKey) + '</span>';
      html += '<span class="search-group-meta"><span>' + groups[timeKey].length + '건</span><span class="search-group-chevron">▾</span></span>';
      html += '</button>';
      html += '<div class="time-group-body">';
    } else {
      html += '<div class="time-group-header">' + escHtml(timeKey) + '</div>';
    }

    if (options.globalSearch && isCollapsed) {
      if (options.globalSearch) html += '</div>';
      html += '</div>';
      return;
    }

    groups[timeKey].forEach(function(item, idx) {
      var cardType = item._type || type;
      var cardId = cardType + '_' + timeKey.replace(/[: /\-.]/g,'') + '_' + idx;

      // 카드 타입별 done 플래그 분리: 반출=setupDone, 반납=returnDone
      var taskDone = (cardType === 'checkout' ? item.setupDone : (cardType === 'checkin' ? item.returnDone : false));
      var taskAction = (cardType === 'checkout' ? 'toggleSetup' : 'toggleReturn');
      var taskSaving = !!dashboardTaskToggleInFlight[dashboardTaskToggleKey(item.tradeId, taskAction)];
      var doneCls = taskDone ? ' task-done' : '';
      var toggleCls = (taskDone ? 'task-toggle checked' : 'task-toggle') + (taskSaving ? ' is-saving' : '');
      var toggleLabel = taskToggleLabel(cardType, taskDone, item);
      var attentionReasons = getDashboardAttentionReasons(item);
      html += '<div class="schedule-card type-' + cardType + (attentionReasons.length ? ' has-attention' : '') + doneCls + '" data-tid="' + escHtml(item.tradeId) + '" data-cardtype="' + cardType + '" onclick="toggleDetail(\'' + cardId + '\')">';
      html += '<div class="card-header">';
      html += '<div style="display:flex;align-items:flex-start;gap:0;">';
      // 반출/반납 모두 토글 노출
      if (cardType === 'checkout' || cardType === 'checkin') {
        html += '<button class="' + toggleCls + '" data-task-action="' + taskAction + '" data-trade-id="' + escAttr(item.tradeId) + '"' + (taskSaving ? ' disabled aria-busy="true"' : '') + ' onclick="event.stopPropagation();toggleTask(this,\'' + escHtml(item.tradeId) + '\',\'' + taskAction + '\')">' + escHtml(toggleLabel) + '</button>';
      }
      html += '<div>';
      html += '<div class="customer-name">' + escHtml(item.name) + '</div>';
      if (item.company) html += '<div class="customer-company">' + escHtml(item.company) + '</div>';
      html += '</div></div>';
      html += '<div class="card-badges' + (options.globalSearch ? ' search-card-badges' : '') + '">';
      if (options.globalSearch) {
        html += '<div class="search-date-badge">' + escHtml(item.searchDate || '') + ' ' + escHtml(item.searchPhaseLabel || '') + '</div>';
      }
      attentionReasons.forEach(function(reason) {
        html += '<div class="attention-reason-badge">' + escHtml(reason) + '</div>';
      });
      html += returnMemoSummaryHtml(item);
      html += riskWarningSummaryHtml(item, cardType);
      html += '<div class="time-badge">' + escHtml(item.time || '시간 미정') + '</div></div></div>';

      if (item.tel) {
        html += '<div class="card-meta"><span class="icon">📞</span>';
        html += '<a href="tel:' + item.tel + '" class="tel-link" onclick="event.stopPropagation()">' + escHtml(item.tel) + '</a></div>';
      }
      html += tradeReturnFieldsHtml(item, cardType);
      html += equipmentRiskPanelHtml(item, cardType);

      // ── 체크리스트 형태 (반출/반납 phase별 독립 체크) ──
      html += '<div class="equip-checklist">';
      (item.equipments || []).forEach(function(eq) {
        var rowCls = 'equip-row';
        if (eq.isSet || (eq.isHeader && !eq.isComponent)) rowCls += ' is-set';
        else if (eq.isComponent) rowCls += ' is-component';
        else rowCls += ' is-single';
        if (eq.pending) rowCls += ' is-pending';
        var checked = (cardType === 'checkout' ? eq.checkedCheckout : eq.checkedCheckin);
        if (checked) rowCls += ' checked';

        var phaseStr = (cardType === 'checkout' ? 'checkout' : 'checkin');
        var itemSaving = !!dashboardItemToggleInFlight[dashboardItemToggleKey(eq.scheduleId, phaseStr)];
        var cbCls = 'equip-checkbox' + (checked ? ' checked' : '') + (itemSaving ? ' is-saving' : '');
        var sidEsc = escJs(eq.scheduleId);
        var nameEsc = escJs(eq.name);
        var qtyValue = eq.qty || 1;
        var eqNameLower = String(eq.name || '').toLowerCase();
        var qtyClass = 'equip-qty-default';
        if (eqNameLower.indexOf('메모리') > -1 || eqNameLower.indexOf('memory') > -1 || eqNameLower.indexOf('sd') > -1 || eqNameLower.indexOf('cf') > -1 || eqNameLower.indexOf('cfast') > -1) {
          qtyClass = 'equip-qty-memory';
        } else if (eqNameLower.indexOf('배터리') > -1 || eqNameLower.indexOf('battery') > -1 || eqNameLower.indexOf('밧데리') > -1) {
          qtyClass = 'equip-qty-battery';
        }

        html += '<div class="' + rowCls + '" onclick="event.stopPropagation()">';
        html += '<div class="equip-row-main">';
        if (eq.pending) {
          html += '<span class="' + cbCls + '"></span>';
        } else {
          html += '<span class="' + cbCls + '" data-schedule-id="' + escAttr(eq.scheduleId) + '" data-phase="' + phaseStr + '"' + (itemSaving ? ' aria-disabled="true" aria-busy="true"' : '') + ' onclick="toggleItem(this,\'' + sidEsc + '\',\'' + phaseStr + '\')">' + (checked ? '✓' : '') + '</span>';
        }
        html += '<span class="equip-name">';
        if (eq.isSet) html += '<span class="equip-set-tag">SET</span>';
        html += escHtml(eq.name);
        html += '</span>';
        if (eq.pending) {
          html += '<span class="equip-save-state">저장중</span>';
        } else {
          html += '<button type="button" class="equip-qty equip-qty-edit ' + qtyClass + '" onclick="event.stopPropagation();editEquipQty(\'' + escJs(item.tradeId) + '\',\'' + sidEsc + '\',\'' + nameEsc + '\',\'' + escJs(String(qtyValue)) + '\')" title="수량 수정">×' + escHtml(qtyValue) + '</button>';
          html += '<span class="equip-row-remove" onclick="event.stopPropagation();removeEquip(\'' + escJs(item.tradeId) + '\',\'' + nameEsc + '\',\'' + sidEsc + '\',' + (eq.isSet ? 'true' : 'false') + ',' + (eq.isComponent ? 'true' : 'false') + ')" title="삭제">×</span>';
        }
        html += '</div>';
        html += '</div>';
      });
      html += '<div class="equip-add-actions">';
      if (cardType === 'checkout') {
        html += '<button class="equip-add-btn onsite" onclick="event.stopPropagation();addOnsiteAddon(\'' + escHtml(item.tradeId) + '\')">+ 현장추가</button>';
      } else {
        html += '<button class="equip-add-btn" onclick="event.stopPropagation();addEquip(\'' + escHtml(item.tradeId) + '\')">+ 장비추가</button>';
      }
      html += '</div>';
      html += '</div>';
      html += photoGalleryHtml(item);
      html += cardActionHtml(item, cardType);

      html += '<div class="card-detail" id="' + cardId + '">';
      html += '<div class="detail-row"><span>거래ID</span><span class="dl">' + escHtml(item.tradeId) + '</span></div>';
      var pLabel = cardType === 'checkout' ? '반납 예정' : '반출일';
      var pValue = cardType === 'checkout' ? item.returnDate : item.checkoutDate;
      if (pValue) html += '<div class="detail-row"><span>' + pLabel + '</span><span class="dl">' + escHtml(pValue) + '</span></div>';
      var detailStatusLabel = cardType === 'checkout' ? '계약상태' : '상태';
      var detailStatus = cardType === 'checkout'
        ? (normalizeContractStatus(item.contractStatus || item.status) || item.contractStatus || item.status || '예약')
        : (item.contractStatus === '반납완료' ? '반납완료' : (item.status || '대기'));
      html += '<div class="detail-row"><span>' + detailStatusLabel + '</span><span class="status-badge status-' + detailStatus + '">' + detailStatus + '</span></div>';
      if (item.equipments && item.equipments.length > 0) {
        var total = item.equipments.reduce(function(s, eq) { return s + (eq.qty || 1); }, 0);
        html += '<div class="detail-row"><span>총 장비 수</span><span class="dl">' + total + '건</span></div>';
      }
      html += '</div></div>';
    });
    if (options.globalSearch) html += '</div>';
    html += '</div>';
  });

  container.innerHTML = html;
}

function switchTab(tab) {
  if (!document.getElementById(tab + 'Section')) tab = 'checkout';
  activeDashboardTab = tab;
  document.querySelectorAll('.tab').forEach(function(t) {
    t.classList.toggle('active', t.dataset.tab === tab);
  });
  document.querySelectorAll('.section').forEach(function(s) { s.classList.remove('visible'); });
  document.getElementById(tab + 'Section').classList.add('visible');
  renderActiveDashboardSection();
}

function toggleDetail(id) {
  var el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

function removeEquip(tid, equipName, scheduleId, isSet, isComponent) {
  var message = '"' + equipName + '" 을(를) 삭제하시겠습니까?';
  if (isSet) message += '\n(세트 대표행 삭제 시 같은 세트 구성품도 함께 삭제됩니다)';
  else if (isComponent) message += '\n(선택한 구성품 행만 삭제됩니다)';
  if (!confirm(message)) return;

  var mutationToken = beginDashboardMutation();
  var snapshot = captureDashboardEquipmentSnapshot(tid);
  applyDashboardEquipmentMutation(tid, {}, {
    operation: 'remove',
    equipName: equipName,
    scheduleId: scheduleId,
    isSet: isSet,
    isComponent: isComponent
  });
  showDashboardToast('삭제 저장 중...');

  fetch(API_URL + '?key=village2026&action=removeEquip&tid=' + encodeURIComponent(tid)
    + '&equipName=' + encodeURIComponent(equipName)
    + '&scheduleId=' + encodeURIComponent(scheduleId || ''))
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res.error) {
        restoreDashboardEquipmentSnapshot(snapshot);
        finishDashboardMutation(mutationToken);
        alert("삭제 실패: " + res.error);
        return;
      }
      applyDashboardEquipmentMutation(tid, res, {
        operation: 'remove',
        equipName: equipName,
        scheduleId: scheduleId,
        isSet: isSet,
        isComponent: isComponent
      });
      queueDashboardContractRegeneration(tid);
      finishDashboardMutation(mutationToken);
      queueDashboardSilentRefresh(6500);
    })
    .catch(function(err) {
      restoreDashboardEquipmentSnapshot(snapshot);
      finishDashboardMutation(mutationToken);
      alert("네트워크 오류: " + err.message);
    });
}

function editEquipQty(tid, scheduleId, equipName, currentQty) {
  var raw = prompt('수량 수정: ' + equipName, currentQty || '1');
  if (raw === null) return;
  var qty = parseInt(String(raw).trim(), 10);
  if (!qty || qty < 1) {
    alert('수량은 1 이상 숫자로 입력하세요.');
    return;
  }

  var mutationToken = beginDashboardMutation();
  var snapshot = captureDashboardEquipmentSnapshot(tid);
  applyDashboardEquipmentMutation(tid, {}, {
    operation: 'qty',
    equipName: equipName,
    scheduleId: scheduleId,
    qty: qty
  });
  showDashboardToast('수량 저장 중...');

  fetch(API_URL + '?key=village2026&action=updateEquipQty&tid=' + encodeURIComponent(tid)
    + '&scheduleId=' + encodeURIComponent(scheduleId)
    + '&qty=' + encodeURIComponent(qty))
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res.error) {
        restoreDashboardEquipmentSnapshot(snapshot);
        finishDashboardMutation(mutationToken);
        alert('수량 수정 실패: ' + res.error);
        return;
      }
      applyDashboardEquipmentMutation(tid, res, {
        operation: 'qty',
        equipName: equipName,
        scheduleId: scheduleId,
        qty: qty
      });
      queueDashboardContractRegeneration(tid);
      finishDashboardMutation(mutationToken);
      queueDashboardSilentRefresh(6500);
    })
    .catch(function(err) {
      restoreDashboardEquipmentSnapshot(snapshot);
      finishDashboardMutation(mutationToken);
      alert('네트워크 오류: ' + err.message);
    });
}

function tradeReturnFieldsHtml(item, cardType) {
  var isCheckout = cardType === 'checkout';
  var status = isCheckout ? normalizeContractStatus(item.contractStatus || item.status || '') : (item.returnStatus || '');
  var memo = item.returnMemo || '';
  var memoKey = memoDraftKeyForTrade(item.tradeId);
  var hasMemoDraft = Object.prototype.hasOwnProperty.call(dashboardMemoDrafts, memoKey);
  var memoValue = hasMemoDraft ? dashboardMemoDrafts[memoKey] : memo;
  var memoDirty = memoValue !== memo;
  var attrs = ' data-trade-id="' + escAttr(item.tradeId) + '"' +
    ' data-label="' + escAttr(item.name) + '"';
  var html = '<div class="trade-return-meta" onclick="event.stopPropagation()">';
  if (isCheckout) {
    html += '<select class="return-status-select" data-field="contractStatus" data-prev="' + escAttr(status) + '"' + attrs + ' onchange="updateContractStatus(this)" onclick="event.stopPropagation()">';
    html += contractStatusOptionsHtml(status);
  } else {
    html += '<select class="return-status-select" data-field="returnStatus" data-prev="' + escAttr(status) + '"' + attrs + ' onchange="updateEquipmentCheck(this)" onclick="event.stopPropagation()">';
    html += returnStatusOptionsHtml(status);
  }
  html += '</select>';
  html += '<input class="return-memo-input" type="text" maxlength="500" placeholder="특이사항 메모" value="' + escAttr(memoValue) + '" data-field="memo" data-prev="' + escAttr(memo) + '"' + attrs + ' oninput="markEquipmentMemoDirty(this)" onclick="event.stopPropagation()">';
  html += '<button type="button" class="memo-save-btn' + (memoDirty ? ' is-dirty' : '') + '" onclick="event.stopPropagation();saveEquipmentMemo(this)"' + (memoDirty ? '' : ' disabled') + '>저장</button>';
  html += '<span class="equip-save-state"></span>';
  html += '</div>';
  return html;
}

function normalizeContractStatus(current) {
  current = String(current || '').trim();
  if (current === '확정') return '예약';
  if (current === '반납완료') return '반출';
  return CONTRACT_STATUS_OPTIONS.indexOf(current) >= 0 ? current : '';
}

function contractStatusOptionsHtml(current) {
  current = normalizeContractStatus(current);
  return CONTRACT_STATUS_OPTIONS.map(function(opt) {
    var label = opt || '계약상태';
    return '<option value="' + escAttr(opt) + '"' + (opt === current ? ' selected' : '') + '>' + escHtml(label) + '</option>';
  }).join('');
}

function returnStatusOptionsHtml(current) {
  current = normalizeReturnStatusForSelect(current);
  var options = RETURN_STATUS_OPTIONS.slice();
  if (current && options.indexOf(current) < 0) options.splice(1, 0, current);
  return options.map(function(opt) {
    var label = opt || '반납상태';
    return '<option value="' + escAttr(opt) + '"' + (opt === current ? ' selected' : '') + '>' + escHtml(label) + '</option>';
  }).join('');
}

function normalizeReturnStatusForSelect(current) {
  current = String(current || '').trim();
  if (current === '정상') return '반납완료';
  return current;
}

function equipmentCheckTimerKey(el) {
  return [
    el.getAttribute('data-trade-id') || '',
    el.getAttribute('data-field') || ''
  ].join('|');
}

function memoDraftKeyForTrade(tid) {
  return String(tid || '') + '|memo';
}

function memoDraftKey(input) {
  return memoDraftKeyForTrade(input.getAttribute('data-trade-id') || '');
}

function markEquipmentMemoDirty(input) {
  dashboardMemoDrafts[memoDraftKey(input)] = input.value || '';
  syncMemoSaveButton(input);
  var dirty = (input.getAttribute('data-prev') || '') !== input.value;
  setEquipmentCheckState(input, dirty ? '저장 전' : '', false);
}

function syncMemoSaveButton(input) {
  var box = input.closest('.trade-return-meta');
  var btn = box ? box.querySelector('.memo-save-btn') : null;
  if (!btn) return;
  var dirty = (input.getAttribute('data-prev') || '') !== input.value;
  btn.disabled = !dirty;
  btn.classList.toggle('is-dirty', dirty);
}

function saveEquipmentMemo(btn) {
  var box = btn.closest('.trade-return-meta');
  var input = box ? box.querySelector('.return-memo-input[data-field="memo"]') : null;
  if (!input) return;
  updateEquipmentCheck(input, btn);
}

function updateEquipmentCheck(el, triggerBtn) {
  var field = el.getAttribute('data-field') || '';
  var prev = el.getAttribute('data-prev') || '';
  var value = el.value || '';
  var payload = {
    key: 'village2026',
    action: 'updateEquipmentCheck',
    tid: el.getAttribute('data-trade-id') || '',
    label: el.getAttribute('data-label') || '',
    field: field,
    value: value
  };
  var key = equipmentCheckTimerKey(el);
  if (equipmentMemoSaveTimers[key]) {
    clearTimeout(equipmentMemoSaveTimers[key]);
    delete equipmentMemoSaveTimers[key];
  }
  if (prev === value) {
    setEquipmentCheckState(el, '', false);
    return;
  }

  var mutationToken = beginDashboardMutation();
  var snapshot = captureDashboardTradeFieldsSnapshot(payload.tid);
  syncEquipmentCheckInMemory(payload, null);
  el.classList.remove('is-error');
  el.classList.add('is-saving');
  if (el.tagName === 'SELECT') el.disabled = true;
  if (triggerBtn) triggerBtn.disabled = true;
  setEquipmentCheckState(el, '저장 중', false);

  fetch(API_URL || '', { method: 'POST', body: JSON.stringify(payload) })
    .then(function(r) { return r.json(); })
    .then(function(res) {
      el.classList.remove('is-saving');
      if (el.tagName === 'SELECT') el.disabled = false;
      if (triggerBtn) triggerBtn.disabled = false;
      if (res.error) throw new Error(res.error);
      el.setAttribute('data-prev', value);
      syncEquipmentCheckInMemory(payload, res);
      syncTradeFieldControls(payload.field, payload.tid, value);
      if (field === 'memo') syncMemoSaveButton(el);
      setEquipmentCheckState(el, '저장됨', false);
      finishDashboardMutation(mutationToken);
      if (field === 'memo' || field === 'returnStatus') renderDashboardEquipmentMutation();
      queueDashboardSilentRefresh(1500);
      setTimeout(function() { setEquipmentCheckState(el, '', false); }, 1200);
    })
    .catch(function(err) {
      el.classList.remove('is-saving');
      el.classList.add('is-error');
      if (triggerBtn) triggerBtn.disabled = false;
      if (el.tagName === 'SELECT') {
        el.disabled = false;
        el.value = prev;
      }
      if (field === 'memo') syncMemoSaveButton(el);
      restoreDashboardTradeFieldsSnapshot(snapshot);
      finishDashboardMutation(mutationToken);
      setEquipmentCheckState(el, '저장 실패: ' + err.message, true);
    });
}

function updateContractStatus(el) {
  var prev = el.getAttribute('data-prev') || '';
  var status = el.value || '';
  var tid = el.getAttribute('data-trade-id') || '';
  if (prev === status) {
    setEquipmentCheckState(el, '', false);
    return;
  }

  if (status === '취소' && !confirm('이 계약을 취소처리할까요?\n스케줄상세와 거래내역에서도 제거됩니다.')) {
    el.value = prev;
    setEquipmentCheckState(el, '', false);
    return;
  }

  var mutationToken = beginDashboardMutation();
  el.classList.remove('is-error');
  el.classList.add('is-saving');
  el.disabled = true;
  setEquipmentCheckState(el, '저장 중', false);

  fetch(API_URL || '', {
    method: 'POST',
    body: JSON.stringify({
      key: 'village2026',
      action: 'updateContractStatus',
      tid: tid,
      status: status
    })
  })
    .then(function(r) { return r.json(); })
    .then(function(res) {
      el.classList.remove('is-saving');
      el.disabled = false;
      if (res.error) throw new Error(res.error);
      el.setAttribute('data-prev', status);
      syncContractStatusInMemory(tid, status);
      syncTradeFieldControls('contractStatus', tid, status);
      clearDashboardCacheForDate(formatDate(currentDate));
      if (status === '취소') {
        setEquipmentCheckState(el, '취소 처리됨', false);
        finishDashboardMutation(mutationToken);
        loadData(true);
        return;
      }
      setEquipmentCheckState(el, '저장됨', false);
      finishDashboardMutation(mutationToken);
      queueDashboardSilentRefresh(1500);
      setTimeout(function() { setEquipmentCheckState(el, '', false); }, 1200);
    })
    .catch(function(err) {
      el.classList.remove('is-saving');
      el.classList.add('is-error');
      el.disabled = false;
      el.value = prev;
      finishDashboardMutation(mutationToken);
      setEquipmentCheckState(el, '저장 실패: ' + err.message, true);
    });
}

function cancelDashboardTrade(btn, tid, name) {
  tid = String(tid || '').trim();
  if (!tid) return;

  var label = name || tid;
  if (!confirm(label + ' 건을 취소처리할까요?\n스케줄상세와 거래내역에서도 제거됩니다.')) return;

  var originalText = btn.textContent;
  btn.disabled = true;
  btn.textContent = '처리 중';
  var mutationToken = beginDashboardMutation();

  fetch(API_URL || '', {
    method: 'POST',
    body: JSON.stringify({
      key: 'village2026',
      action: 'updateContractStatus',
      tid: tid,
      status: '취소'
    })
  })
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res.error) throw new Error(res.error);
      clearDashboardCacheForDate(formatDate(currentDate));
      finishDashboardMutation(mutationToken);
      loadData(true);
    })
    .catch(function(err) {
      btn.disabled = false;
      btn.textContent = originalText;
      finishDashboardMutation(mutationToken);
      alert('취소 처리 실패: ' + err.message);
    });
}

function setEquipmentCheckState(el, text, isError) {
  var box = el.closest('.trade-return-meta, .equip-return-meta');
  var state = box ? box.querySelector('.equip-save-state') : null;
  if (!state) return;
  state.textContent = text || '';
  state.classList.toggle('is-error', !!isError);
}

function syncContractStatusInMemory(tid, status) {
  dashboardItemsForTrade(tid).forEach(function(item) {
    item.contractStatus = status;
  });
  persistCurrentDashboardCache();
}

function syncTradeFieldControls(field, tid, value) {
  document.querySelectorAll('[data-field="' + field + '"][data-trade-id]').forEach(function(ctrl) {
    if ((ctrl.getAttribute('data-trade-id') || '') !== tid) return;
    ctrl.value = value;
    ctrl.setAttribute('data-prev', value);
    if (field === 'memo') syncMemoSaveButton(ctrl);
  });
}

function syncEquipmentCheckInMemory(payload, res) {
  dashboardItemsForTrade(payload.tid).forEach(function(item) {
    if (payload.field === 'returnStatus') item.returnStatus = payload.value;
    if (payload.field === 'memo') item.returnMemo = payload.value;
    if (res && res.row) item.equipmentCheckRow = res.row;
  });
  if (payload.field === 'memo') {
    var key = memoDraftKeyForTrade(payload.tid);
    dashboardMemoDrafts[key] = payload.value;
    setTimeout(function() {
      if (dashboardMemoDrafts[key] === payload.value) delete dashboardMemoDrafts[key];
    }, 15000);
  }
  persistCurrentDashboardCache();
}

function dashboardTaskToggleKey(tid, action) {
  return String(action || '') + '|' + String(tid || '').trim();
}

function dashboardItemToggleKey(scheduleId, phase) {
  return String(phase || '') + '|' + String(scheduleId || '').trim();
}

function setTaskToggleSaving(tid, action, saving) {
  document.querySelectorAll('.task-toggle[data-task-action][data-trade-id]').forEach(function(button) {
    if ((button.getAttribute('data-task-action') || '') !== action) return;
    if ((button.getAttribute('data-trade-id') || '') !== tid) return;
    button.disabled = !!saving;
    button.classList.toggle('is-saving', !!saving);
    if (saving) button.setAttribute('aria-busy', 'true');
    else button.removeAttribute('aria-busy');
  });
}

function setEquipmentCheckSaving(scheduleId, phase, saving) {
  document.querySelectorAll('.equip-checkbox[data-schedule-id][data-phase]').forEach(function(box) {
    if ((box.getAttribute('data-schedule-id') || '') !== scheduleId) return;
    if ((box.getAttribute('data-phase') || '') !== phase) return;
    box.classList.toggle('is-saving', !!saving);
    if (saving) {
      box.setAttribute('aria-disabled', 'true');
      box.setAttribute('aria-busy', 'true');
    } else {
      box.removeAttribute('aria-disabled');
      box.removeAttribute('aria-busy');
    }
  });
}

function captureDashboardTaskDoneSnapshot(tid, action) {
  var snapshot = { tid: tid, action: action, records: [], done: false, doneAt: '', contractStatus: '' };
  dashboardItemsForTrade(tid).forEach(function(item) {
    var record = {
      item: item,
      setupDone: !!item.setupDone,
      setupDoneAt: item.setupDoneAt || '',
      returnDone: !!item.returnDone,
      returnDoneAt: item.returnDoneAt || '',
      contractStatus: item.contractStatus || ''
    };
    if (snapshot.records.length === 0) {
      snapshot.done = action === 'toggleSetup' ? record.setupDone : record.returnDone;
      snapshot.doneAt = action === 'toggleSetup' ? record.setupDoneAt : record.returnDoneAt;
      snapshot.contractStatus = record.contractStatus;
    }
    snapshot.records.push(record);
  });
  return snapshot;
}

function restoreDashboardTaskDoneSnapshot(snapshot) {
  if (!snapshot) return;
  (snapshot.records || []).forEach(function(record) {
    record.item.setupDone = record.setupDone;
    record.item.setupDoneAt = record.setupDoneAt;
    record.item.returnDone = record.returnDone;
    record.item.returnDoneAt = record.returnDoneAt;
    record.item.contractStatus = record.contractStatus;
  });
  persistCurrentDashboardCache();
  syncTaskToggleDom(snapshot.tid, snapshot.action, snapshot.done, snapshot.doneAt);
  if (snapshot.action === 'toggleReturn') {
    syncContractStatusInMemory(snapshot.tid, snapshot.contractStatus);
  }
}

function captureDashboardItemCheckSnapshot(scheduleId, phase) {
  var snapshot = { scheduleId: scheduleId, phase: phase, records: [], checked: false };
  dashboardItemsForScheduleId(scheduleId).forEach(function(item) {
    (item.equipments || []).forEach(function(eq) {
      if (eq.scheduleId !== scheduleId) return;
      var record = {
        equipment: eq,
        checkedCheckout: !!eq.checkedCheckout,
        checkedCheckin: !!eq.checkedCheckin
      };
      if (snapshot.records.length === 0) {
        snapshot.checked = phase === 'checkout' ? record.checkedCheckout : record.checkedCheckin;
      }
      snapshot.records.push(record);
    });
  });
  return snapshot;
}

function restoreDashboardItemCheckSnapshot(snapshot) {
  if (!snapshot) return;
  (snapshot.records || []).forEach(function(record) {
    record.equipment.checkedCheckout = record.checkedCheckout;
    record.equipment.checkedCheckin = record.checkedCheckin;
  });
  persistCurrentDashboardCache();
  syncEquipmentCheckDom(snapshot.scheduleId, snapshot.phase, snapshot.checked);
}

function toggleItem(cb, scheduleId, phase) {
  var key = dashboardItemToggleKey(scheduleId, phase);
  if (!scheduleId || dashboardItemToggleInFlight[key]) return;
  var nowDone = !cb.classList.contains('checked');
  var mutationToken = beginDashboardMutation();
  var snapshot = captureDashboardItemCheckSnapshot(scheduleId, phase);
  dashboardItemToggleInFlight[key] = true;
  syncEquipmentCheckDom(scheduleId, phase, nowDone);
  syncItemCheckInMemory(scheduleId, phase, nowDone);
  setEquipmentCheckSaving(scheduleId, phase, true);

  fetch(API_URL || '', {
    method: 'POST',
    body: JSON.stringify({
      key: 'village2026',
      action: 'toggleItem',
      scheduleId: scheduleId,
      phase: phase,
      done: nowDone ? '1' : '0'
    })
  })
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res && res.error) throw new Error(res.error);
      var savedDone = res && Object.prototype.hasOwnProperty.call(res, 'checked') ? !!res.checked : nowDone;
      syncEquipmentCheckDom(scheduleId, phase, savedDone);
      syncItemCheckInMemory(scheduleId, phase, savedDone);
      finishDashboardMutation(mutationToken);
      delete dashboardItemToggleInFlight[key];
      setEquipmentCheckSaving(scheduleId, phase, false);
      queueDashboardSilentRefresh(1500);
    })
    .catch(function() {
      restoreDashboardItemCheckSnapshot(snapshot);
      finishDashboardMutation(mutationToken);
      delete dashboardItemToggleInFlight[key];
      setEquipmentCheckSaving(scheduleId, phase, false);
    });
}

function toggleTask(btn, tid, action) {
  // action = 'toggleSetup' (반출) 또는 'toggleReturn' (반납)
  var key = dashboardTaskToggleKey(tid, action);
  if (!tid || dashboardTaskToggleInFlight[key]) return;
  var nowDone = !btn.classList.contains('checked');
  var mutationToken = beginDashboardMutation();
  var snapshot = captureDashboardTaskDoneSnapshot(tid, action);
  dashboardTaskToggleInFlight[key] = true;
  var optimisticDoneAt = nowDone ? formatDashboardClientDoneAt(new Date()) : '';
  syncTaskToggleDom(tid, action, nowDone, optimisticDoneAt);
  syncTaskDoneInMemory(tid, action, nowDone, optimisticDoneAt);
  setTaskToggleSaving(tid, action, true);

  fetch(API_URL || '', {
    method: 'POST',
    body: JSON.stringify({
      key: 'village2026',
      action: action,
      tid: tid,
      done: nowDone ? '1' : '0'
    })
  })
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res && res.error) throw new Error(res.error);
      var savedDone = nowDone;
      if (action === 'toggleSetup' && res && Object.prototype.hasOwnProperty.call(res, 'setupDone')) savedDone = !!res.setupDone;
      if (action === 'toggleReturn' && res && Object.prototype.hasOwnProperty.call(res, 'returnDone')) savedDone = !!res.returnDone;
      var doneAt = savedDone ? (res && (res.doneAt || res.setupDoneAt || res.returnDoneAt || '') || optimisticDoneAt) : '';
      syncTaskToggleDom(tid, action, savedDone, doneAt);
      syncTaskDoneInMemory(tid, action, savedDone, doneAt);
      if (action === 'toggleReturn' && res && res.contractStatus) {
        syncContractStatusInMemory(tid, res.contractStatus);
      }
      finishDashboardMutation(mutationToken);
      delete dashboardTaskToggleInFlight[key];
      setTaskToggleSaving(tid, action, false);
      queueDashboardSilentRefresh(1500);
    })
    .catch(function() {
      restoreDashboardTaskDoneSnapshot(snapshot);
      finishDashboardMutation(mutationToken);
      delete dashboardTaskToggleInFlight[key];
      setTaskToggleSaving(tid, action, false);
    });
}

function syncTaskDoneInMemory(tid, action, done, doneAt) {
  dashboardItemsForTrade(tid).forEach(function(item) {
    if (action === 'toggleSetup') {
      item.setupDone = done;
      item.setupDoneAt = done ? (doneAt || item.setupDoneAt || '') : '';
    }
    if (action === 'toggleReturn') {
      item.returnDone = done;
      item.returnDoneAt = done ? (doneAt || item.returnDoneAt || '') : '';
      item.contractStatus = done ? '반납완료' : '반출';
    }
  });
  persistCurrentDashboardCache();
}

function taskToggleLabel(cardType, done, item) {
  var isCheckin = cardType === 'checkin';
  var prefix = isCheckin ? '반납' : '반출';
  if (!done) return prefix + '완료';
  var doneAt = isCheckin ? (item && item.returnDoneAt) : (item && item.setupDoneAt);
  var time = dashboardDoneTime(doneAt);
  return time ? prefix + ' ' + time : prefix + '완료';
}

function setTaskToggleLabel(btn, action, done, doneAt) {
  var prefix = action === 'toggleReturn' ? '반납' : '반출';
  if (!done) {
    btn.textContent = prefix + '완료';
    return;
  }
  var time = dashboardDoneTime(doneAt);
  btn.textContent = time ? prefix + ' ' + time : prefix + ' 저장중';
}

function syncTaskToggleDom(tid, action, done, doneAt) {
  document.querySelectorAll('.task-toggle[data-task-action][data-trade-id]').forEach(function(button) {
    if ((button.getAttribute('data-task-action') || '') !== action) return;
    if ((button.getAttribute('data-trade-id') || '') !== tid) return;
    button.classList.toggle('checked', done);
    setTaskToggleLabel(button, action, done, doneAt);
    var card = button.closest('.schedule-card');
    if (card) card.classList.toggle('task-done', done);
  });
}

function dashboardDoneTime(value) {
  var text = String(value || '').trim();
  if (!text) return '';
  var match = text.match(/(\d{1,2}):(\d{2})(?::\d{2})?/);
  if (!match) return '';
  return match[1].padStart(2, '0') + ':' + match[2];
}

function formatDashboardClientDoneAt(date) {
  date = date || new Date();
  return date.getFullYear() + '-' +
    ('0' + (date.getMonth() + 1)).slice(-2) + '-' +
    ('0' + date.getDate()).slice(-2) + ' ' +
    ('0' + date.getHours()).slice(-2) + ':' +
    ('0' + date.getMinutes()).slice(-2) + ':' +
    ('0' + date.getSeconds()).slice(-2);
}

function syncEquipmentCheckDom(scheduleId, phase, done) {
  document.querySelectorAll('.equip-checkbox[data-schedule-id][data-phase]').forEach(function(box) {
    if ((box.getAttribute('data-schedule-id') || '') !== scheduleId) return;
    if ((box.getAttribute('data-phase') || '') !== phase) return;
    box.classList.toggle('checked', done);
    box.textContent = done ? '✓' : '';
    var row = box.closest('.equip-row');
    if (row) row.classList.toggle('checked', done);
  });
}

function syncItemCheckInMemory(scheduleId, phase, done) {
  dashboardItemsForScheduleId(scheduleId).forEach(function(item) {
    (item.equipments || []).forEach(function(eq) {
      if (eq.scheduleId !== scheduleId) return;
      if (phase === 'checkout') eq.checkedCheckout = done;
      if (phase === 'checkin') eq.checkedCheckin = done;
    });
  });
  persistCurrentDashboardCache();
}

function scheduleDashboardPhotoLoad(items) {
  clearTimeout(dashboardPhotoBatchTimer);
  dashboardPhotoBatchTimer = setTimeout(function() {
    var tids = uniquePhotoTradeIds(items);
    if (!tids.length) return;
    tids.forEach(function(tid) { dashboardPhotoLoading[tid] = true; });
    updatePhotoPanels();
    fetchDashboardPhotosBatch(tids)
      .then(function(map) {
        Object.keys(map || {}).forEach(function(tid) {
          dashboardPhotoStore[tid] = normalizeDashboardPhotos(map[tid]);
          delete dashboardPhotoLoading[tid];
        });
        updatePhotoPanels();
      })
      .catch(function() {
        tids.forEach(function(tid) { delete dashboardPhotoLoading[tid]; });
        updatePhotoPanels();
      });
  }, 450);
}

function uniquePhotoTradeIds(items) {
  var seen = {};
  var tids = [];
  (items || []).forEach(function(item) {
    var tid = item && item.tradeId ? String(item.tradeId) : '';
    if (!tid || seen[tid] || dashboardPhotoStore[tid] || dashboardPhotoLoading[tid]) return;
    seen[tid] = true;
    tids.push(tid);
  });
  return tids;
}

function fetchDashboardPhotosBatch(tids) {
  return fetch(API_URL || '', {
    method: 'POST',
    body: JSON.stringify({
      key: 'village2026',
      action: 'dashboardPhotosBatch',
      tids: tids
    })
  })
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res.error) throw new Error(res.error);
      return res.photosByTrade || {};
    });
}

function updatePhotoPanels() {
  document.querySelectorAll('.photo-panel[data-photo-tid]').forEach(function(panel) {
    var tid = panel.getAttribute('data-photo-tid') || '';
    panel.outerHTML = photoGalleryHtml({ tradeId: tid, photos: dashboardPhotoStore[tid] });

function openPhotoPicker(tid, phase) {
  var input = document.getElementById('dashboardPhotoInput');
  if (!input) {
    input = document.createElement('input');
    input.id = 'dashboardPhotoInput';
    input.type = 'file';
    input.accept = 'image/*';
    input.multiple = true;
    input.style.display = 'none';
    document.body.appendChild(input);
  }
  input.onchange = function() {
    var files = Array.prototype.slice.call(input.files || []);
    input.value = '';
    uploadDashboardPhotoFiles(tid, phase, files);

function uploadDashboardPhotoFiles(tid, phase, files) {
  if (!files || !files.length) return;
  var label = phase === 'checkin' ? '반납' : '반출';
  setPhotoUploadState(tid, label + ' 사진 ' + files.length + '장 업로드 중', false);

  var successes = 0;
  var failures = [];
  var uploadedPhotos = [];
  files.reduce(function(chain, file) {
    return chain.then(function() {
      return compressDashboardPhoto(file)
        .then(function(payload) {
          return postDashboardPhoto(tid, phase, payload);
        })
        .then(function(res) {
          successes++;
          if (res && res.photo) uploadedPhotos.push({ phase: phase, photo: res.photo });
        })
        .catch(function(err) {
          failures.push(file.name + ': ' + err.message);
        });
    });
  }, Promise.resolve()).then(function() {
    if (successes > 0) {
      uploadedPhotos.forEach(function(entry) {
        appendDashboardPhotoToStore(tid, entry.phase, entry.photo);
      });
      delete dashboardPhotoLoading[tid];
      updatePhotoPanels();
    }
    if (failures.length) {
      setPhotoUploadState(tid, '업로드 실패 ' + failures.length + '건', true);
      alert('사진 업로드 실패\n' + failures.join('\n'));
      return;
    }
    setPhotoUploadState(tid, '업로드 완료', false);
    setTimeout(function() { setPhotoUploadState(tid, '', false); }, 1400);
  });
}

function compressDashboardPhoto(file) {
  return new Promise(function(resolve, reject) {
    if (!file || !/^image\//.test(file.type || '')) {
      reject(new Error('이미지 파일만 업로드할 수 있습니다'));
      return;
    }

    var reader = new FileReader();
    reader.onload = function(e) {
      var img = new Image();
      img.onload = function() {
        var maxSide = 1600;
        var scale = Math.min(1, maxSide / Math.max(img.width, img.height));
        var width = Math.max(1, Math.round(img.width * scale));
        var height = Math.max(1, Math.round(img.height * scale));
        var canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        var ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, width, height);
        ctx.drawImage(img, 0, 0, width, height);
        var baseName = (file.name || 'photo').replace(/\.[^.]+$/, '') + '.jpg';
        resolve({
          fileName: baseName,
          mimeType: 'image/jpeg',
          data: canvas.toDataURL('image/jpeg', 0.82)
        });
      };
      img.onerror = function() { reject(new Error('이미지를 읽지 못했습니다')); };
      img.src = e.target.result;
    };
    reader.onerror = function() { reject(new Error('파일을 읽지 못했습니다')); };
    reader.readAsDataURL(file);
  });
}

function postDashboardPhoto(tid, phase, payload) {
  return fetch(API_URL || '', {
    method: 'POST',
    body: JSON.stringify({
      key: 'village2026',
      action: 'uploadDashboardPhoto',
      tid: tid,
      phase: phase,
      fileName: payload.fileName,
      mimeType: payload.mimeType,
      data: payload.data
    })
  })
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res.error) throw new Error(res.error);
      return res;
    });
}

function appendDashboardPhotoToStore(tid, phase, photo) {
  if (!tid || !photo) return;
  var storePhotos = normalizeDashboardPhotos(dashboardPhotoStore[tid]);
  var targetPhase = phase === 'checkin' ? 'checkin' : 'checkout';
  mergePhotoList_(storePhotos[targetPhase], [photo]);
  dashboardPhotoStore[tid] = storePhotos;
}

function setPhotoUploadState(tid, text, isError) {
  document.querySelectorAll('[data-photo-state]').forEach(function(el) {
    if ((el.getAttribute('data-photo-state') || '') !== tid) return;
    el.textContent = text || '';
    el.classList.toggle('is-error', !!isError);
  });
}

function openPhotoGallery(tid) {

    dashboardPhotoLoading[tid] = true;
    updatePhotoPanels();
    fetchDashboardPhotosBatch([tid]).then(function(map) {
      dashboardPhotoStore[tid] = normalizeDashboardPhotos(map[tid]);
      delete dashboardPhotoLoading[tid];
      updatePhotoPanels();
      openPhotoGallery(tid);

      delete dashboardPhotoLoading[tid];
      updatePhotoPanels();
      alert('사진 불러오기 실패: ' + err.message);

  var photos = getDashboardPhotosByTrade(tid);

function closePhotoModal() {

function renderPhotoModalSection(title, list) {

  html += '<div class="photo-modal-thumbs">';

    var href = photo.url || photo.thumbnailUrl || '';

    html += '<a href="' + escAttr(href) + '" target="_blank" onclick="event.stopPropagation()">';
    html += '<img class="photo-modal-thumb" src="' + escAttr(src) + '" alt="' + escAttr(title) + '" loading="lazy">';
    html += '</a>';
  });
  html += '</div></div>';

}

function getDashboardPhotosByTrade(tid) {
  var merged = normalizeDashboardPhotos();
  var storePhotos = normalizeDashboardPhotos(dashboardPhotoStore[tid]);
  mergePhotoList_(merged.checkout, storePhotos.checkout);
  mergePhotoList_(merged.checkin, storePhotos.checkin);
  mergePhotoList_(merged.other, storePhotos.other);
  if (!dashboardData) return merged;
  ['checkout', 'checkin'].forEach(function(listName) {
    (dashboardData[listName] || []).forEach(function(item) {
      if (item.tradeId !== tid) return;
      var photos = normalizeDashboardPhotos(item.photos);
      mergePhotoList_(merged.checkout, photos.checkout);
      mergePhotoList_(merged.checkin, photos.checkin);
      mergePhotoList_(merged.other, photos.other);
    });
  });
  return merged;
}

function mergePhotoList_(target, source) {
  (source || []).forEach(function(photo) {
    var key = photo.fileId || photo.url || photo.thumbnailUrl;
    for (var i = 0; i < target.length; i++) {
      if ((target[i].fileId || target[i].url || target[i].thumbnailUrl) === key) return;
    }
    target.push(photo);
  });
}

function normalizeBillingCompanyText(value) {
  return String(value || '').trim().replace(/\s+/g, '').toLowerCase();
}

function getBillingCompanyMatches(query, limit) {
  var options = ((dashboardData && dashboardData.billingCompanyOptions) || [])
    .map(function(opt) { return String(opt || '').trim(); })
    .filter(Boolean);
  var seen = {};
  options = options.filter(function(opt) {
    if (seen[opt]) return false;
    seen[opt] = true;
    return true;
  });

  var needle = normalizeBillingCompanyText(query);
  if (!needle) return options.slice(0, limit || 8);
  return options
    .filter(function(opt) { return normalizeBillingCompanyText(opt).indexOf(needle) >= 0; })
    .sort(function(a, b) {
      var aStarts = normalizeBillingCompanyText(a).indexOf(needle) === 0 ? 0 : 1;
      var bStarts = normalizeBillingCompanyText(b).indexOf(needle) === 0 ? 0 : 1;
      return aStarts - bStarts;
    })
    .slice(0, limit || 8);
}

function billingCompanyMenuForInput(input) {
  var wrap = input && input.closest ? input.closest('.billing-company-combo') : null;
  return wrap ? wrap.querySelector('.billing-company-menu') : null;
}

function openBillingCompanyMenu(input) {
  var menu = billingCompanyMenuForInput(input);
  if (!menu) return;
  var value = input.value || '';
  var matches = getBillingCompanyMatches(value, 8);
  var exact = !!value.trim() && matches.some(function(opt) { return opt === value.trim(); });
  var html = matches.map(function(opt) {
    return '<button type="button" class="billing-company-option" data-value="' + escAttr(opt) + '" onmousedown="event.preventDefault()" onclick="chooseBillingCompanyOption(event,this)">' + escHtml(opt) + '</button>';
  }).join('');
  if (value.trim() && !exact) {

function dashboardItemsForTrade(tid) {
  var items = [];
  tid = String(tid || '').trim();
  if (!tid) return items;
  function collect(source) {
    if (!source) return;
    ['checkout', 'checkin'].forEach(function(listName) {
      (source[listName] || []).forEach(function(item) {
        if (item.tradeId === tid && items.indexOf(item) < 0) items.push(item);
      });
    });
  }
  collect(dashboardData);
  collect(dashboardGlobalSearchData);
  return items;
}

function dashboardItemsForScheduleId(scheduleId) {
  var items = [];
  scheduleId = String(scheduleId || '').trim();
  if (!scheduleId) return items;
  function collect(source) {
    if (!source) return;
    ['checkout', 'checkin'].forEach(function(listName) {
      (source[listName] || []).forEach(function(item) {
        var hasSchedule = (item.equipments || []).some(function(eq) {
          return String(eq.scheduleId || '').trim() === scheduleId;
        });
        if (hasSchedule && items.indexOf(item) < 0) items.push(item);
      });
    });
  }
  collect(dashboardData);
  collect(dashboardGlobalSearchData);
  return items;
}

function normalizeDashboardEquipmentItem(eq) {
  eq = eq || {};
  var setName = String(eq.setName || '').trim();
  var name = String(eq.name || '').trim();
  var isHeader = eq.isHeader !== undefined ? !!eq.isHeader : (!setName || setName === name);
  return {
    scheduleId: String(eq.scheduleId || '').trim(),
    name: name,
    qty: Number(eq.qty || eq.quantity) || 1,
    setName: setName,
    isHeader: isHeader,
    isSet: !!eq.isSet,
    isComponent: eq.isComponent !== undefined ? !!eq.isComponent : (!!setName && !isHeader),
    checkedCheckout: !!eq.checkedCheckout,
    checkedCheckin: !!eq.checkedCheckin,
    pending: !!eq.pending
  };
}

function syncDashboardEquipmentAdditions(tid, res, context) {
  var added = (res && res.addedItems) || [];
  if (!added.length && context && context.entries) {
    added = context.entries.map(function(entry) {
      return {
        scheduleId: 'pending:' + tid + ':' + entry.name,
        name: entry.name,
        qty: entry.qty,
        setName: entry.name,
        isHeader: true,
        pending: true
      };
    });
  }
  if (!added.length) return false;
  var replacePending = !!(res && res.addedItems && res.addedItems.length && context && context.entries);
  var pendingNames = {};
  if (replacePending) {
    context.entries.forEach(function(entry) {
      pendingNames[String(entry.name || '').trim()] = true;
    });
  }

  dashboardEquipmentMutationTargets(tid).forEach(function(item) {
    item.equipments = item.equipments || [];
    if (replacePending) {
      item.equipments = item.equipments.filter(function(eq) {
        return !(eq.pending && pendingNames[String(eq.name || '').trim()]);
      });
    }
    var existing = {};
    item.equipments.forEach(function(eq) {
      if (eq.scheduleId) existing[eq.scheduleId] = true;
    });
    added.forEach(function(eq) {
      var normalized = normalizeDashboardEquipmentItem(eq);
      if (normalized.scheduleId && existing[normalized.scheduleId]) return;
      item.equipments.push(normalized);
      if (normalized.scheduleId) existing[normalized.scheduleId] = true;
    });
  });
  return true;
}

function captureDashboardEquipmentSnapshot(tid) {

    return {
      item: item,
      equipments: (item.equipments || []).map(function(eq) {
        var copy = {};
        Object.keys(eq || {}).forEach(function(key) { copy[key] = eq[key]; });
        return copy;
      })
    };
  });
}

function restoreDashboardEquipmentSnapshot(snapshot) {
  (snapshot || []).forEach(function(entry) {
    entry.item.equipments = (entry.equipments || []).map(function(eq) {

      Object.keys(eq || {}).forEach(function(key) { copy[key] = eq[key]; });

  renderDashboardEquipmentMutation();

function syncDashboardEquipmentRemoval(tid, res, context) {
  context = context || {};
  var ids = (res && res.removedScheduleIds) || [];
  if (!ids.length && context.scheduleId) ids = [context.scheduleId];
  var idMap = {};
  ids.forEach(function(id) { if (id) idMap[String(id)] = true; });
  var removed = false;

  dashboardEquipmentMutationTargets(tid).forEach(function(item) {
    var before = (item.equipments || []).length;
    item.equipments = (item.equipments || []).filter(function(eq) {
      if (idMap[eq.scheduleId]) return false;
      if (!ids.length && context.isSet && (eq.scheduleId === context.scheduleId || eq.setName === context.equipName)) return false;
      if (!ids.length && context.equipName && eq.name === context.equipName) return false;
      return true;
    });
    if (item.equipments.length !== before) removed = true;
  });
  return removed;
}

function syncDashboardEquipmentQtyUpdate(tid, res, context) {
  context = context || {};
  var updates = (res && res.updatedItems) || [];
  if (!updates.length && context.scheduleId) {
    updates = [{ scheduleId: context.scheduleId, equipment: context.equipName, newQty: context.qty }];
  }
  if (!updates.length) return false;
  var changed = false;

  dashboardEquipmentMutationTargets(tid).forEach(function(item) {
    (item.equipments || []).forEach(function(eq) {
      updates.forEach(function(update) {
        var matchesId = update.scheduleId && eq.scheduleId === update.scheduleId;
        var matchesName = !update.scheduleId && update.equipment && eq.name === update.equipment;
        if (!matchesId && !matchesName) return;
        eq.qty = Number(update.newQty || update.qty) || eq.qty || 1;
        changed = true;
      });
    });
  });
  return changed;
}

function queueDashboardSilentRefresh(delayMs) {

  delayMs = Math.max(Number(delayMs) || 0, DASHBOARD_MUTATION_REFRESH_MIN_DELAY_MS);
  dashboardSilentRefreshTimer = setTimeout(function() {
    if (dashboardPendingMutationCount > 0) {
      queueDashboardSilentRefresh(1200);
      return;
    }
    var dateStr = formatDate(currentDate);
    var mutationSeqAtRequest = dashboardLocalMutationSeq;
    fetch(API_URL + '?key=village2026&action=dashboard&date=' + dateStr + '&nocache=1')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (!isDashboardDateMatch(data, dateStr)) return;
        if (!canApplyDashboardResponse(mutationSeqAtRequest)) return;
        dashboardData = data;
        syncDashboardContractFieldsFromData(data);
        writeDashboardLocalCache(dateStr, data);
        renderDashboardEquipmentMutation();
        if (collectDashboardContractStatusRefreshTids().length) {
          queueDashboardPendingContractStatusRefresh(1000);
          queueDashboardSilentRefresh(7000);
        }
      })
      .catch(function() {});
  }, delayMs);
}
