<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="오늘일정">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#F7F7F5">
<link rel="apple-touch-icon" sizes="180x180" href="https://village6k-cpu.github.io/my-gas-project2/icons/village-schedule-03-20260514-180.png?v=20260514a">
<link rel="icon" type="image/png" href="https://village6k-cpu.github.io/my-gas-project2/icons/village-schedule-03-20260514.png?v=20260514a">
<title>빌리지 오늘 일정</title>
<style>
  :root {
    --bg: #F7F7F5;
    --surface: #FFFFFF;
    --border: #E9E9E7;
    --border-light: #F0F0EE;
    --text-primary: #37352F;
    --text-secondary: #787774;
    --text-muted: #B4B4B0;
    --accent: #2383E2;
    --blue-bg: #D3E5EF;
    --blue-text: #24609C;
    --amber-bg: #FDECC8;
    --amber-text: #93640D;
    --green-bg: #DBEDDB;
    --green-text: #2B6B2B;
    --gray-bg: #E8E8E5;
    --gray-text: #787774;
    --red: #EB5757;
    --radius: 6px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    -webkit-user-select: none; user-select: none;
  }

  /* ── 헤더 ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px 10px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .date-context {
    display: flex;
    align-items: baseline;
    gap: 8px;
    color: var(--text-muted);
    font-size: 12px;
    margin-left: auto;
    white-space: nowrap;
  }
  .date-context strong {
    color: var(--text-primary);
    font-size: 13px;
    font-weight: 750;
  }
  .header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }
  .app-switcher {
    display: flex;
    overflow: hidden;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .app-tab {
    display: inline-flex;
    align-items: center;
    min-height: 32px;
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 650;
    color: var(--text-secondary);
    text-decoration: none;
    white-space: nowrap;
  }
  .app-tab:not(:last-child) { border-right: 1px solid var(--border); }
  .app-tab.active { background: var(--accent); color: #fff; }
  a.app-tab:hover { color: var(--accent); background: rgba(0,0,0,0.03); }

  .nav-link {
    min-height: 32px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-primary);
    background: var(--bg);
    text-decoration: none;
    font-size: 12px;
    font-weight: 650;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .nav-link:hover { border-color: var(--accent); color: var(--accent); }
  .nav-link.request-link {
    min-height: 36px;
    padding: 7px 12px 7px 9px;
    border-color: rgba(35,131,226,0.34);
    background: #EAF4FF;
    color: #0F5EA8;
    font-weight: 800;
    box-shadow: 0 1px 0 rgba(35,131,226,0.08);
  }
  .nav-link.request-link:hover {
    background: #DDEEFF;
    border-color: var(--accent);
    color: #0B5CAD;
  }
  .request-ai-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    height: 20px;
    min-width: 24px;
    padding: 0 5px;
    border-radius: 4px;
    background: var(--accent);
    color: #fff;
    font-size: 10px;
    font-weight: 850;
    line-height: 1;
  }
  .request-main { white-space: nowrap; }

  .icon-btn {
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    cursor: pointer;
    color: var(--text-secondary);
    font-size: 16px;
    transition: all 0.15s;
  }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
  .icon-btn:active { background: var(--bg); }
  .icon-btn.spinning { animation: spin 0.8s ease; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── 날짜 네비 ── */
  .date-nav {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .date-nav-btn {
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    cursor: pointer;
    color: var(--text-secondary);
    font-size: 13px;
    transition: all 0.15s;
  }
  .date-nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .date-nav-btn:active { background: var(--bg); }

  .date-input {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    min-height: 32px;
    padding: 6px 10px;
    font-size: 13px;
    font-family: inherit;
    color: var(--text-primary);
    background: var(--surface);
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
  }
  .date-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(35,131,226,0.15); }

  .today-btn {
    border: 1px solid var(--accent);
    background: var(--accent);
    color: #fff;
    min-height: 32px;
    padding: 6px 12px;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.15s;
  }
  .today-btn:hover { opacity: 0.9; }
  .today-btn:active { opacity: 0.85; }

  .dashboard-search {
    position: relative;
    flex: 1 1 240px;
    max-width: 360px;
    min-width: 190px;
  }
  .dashboard-search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 13px;
    pointer-events: none;
  }
  .dashboard-search input {
    width: 100%;
    min-height: 32px;
    padding: 6px 10px 6px 30px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg);
    color: var(--text-primary);
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .dashboard-search input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(35,131,226,0.15);
  }
  .dashboard-search input::placeholder { color: var(--text-muted); }
  .dashboard-search-status {
    display: none;
    margin: 10px 20px 0;
    padding: 9px 12px;
    border: 1px solid rgba(35,131,226,0.18);
    border-radius: var(--radius);
    background: #EAF4FF;
    color: #0F5EA8;
    font-size: 12px;
    font-weight: 750;
  }
  .dashboard-search-status.visible { display: block; }

  /* ── 인수인계 메모 ── */
  .notice-board {
    --notice-note-font-size: 15px;
    --notice-note-min-height: 54px;
    display: grid;
    grid-template-columns: minmax(150px, 210px) minmax(0, 1fr);
    gap: 12px;
    padding: 14px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .notice-lead,
  .notice-note {
    position: relative;
    border-radius: var(--radius);
    box-shadow: 0 4px 12px rgba(55,53,47,0.08);
  }
  .notice-lead {
    padding: 13px 15px;
    background: #FFF4BC;
    border: 1px solid #EED47A;
    transform: rotate(-0.5deg);
  }
  .notice-kicker {
    color: #93640D;
    font-size: 11px;
    font-weight: 800;
    margin-bottom: 4px;
  }
  .notice-title {
    color: var(--text-primary);
    font-size: 24px;
    font-weight: 850;
    line-height: 1.05;
  }
  .notice-controls {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 12px;
  }
  .notice-add-btn {
    width: 30px;
    height: 30px;
    border: 1px solid #D0B95D;
    border-radius: var(--radius);
    background: rgba(255,255,255,0.45);
    color: #93640D;
    font-size: 18px;
    font-weight: 800;
    line-height: 1;
    cursor: pointer;
  }
  .notice-add-btn:hover { background: rgba(255,255,255,0.7); }
  .notice-font-controls {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px;
    border: 1px solid rgba(147,100,13,0.28);
    border-radius: var(--radius);
    background: rgba(255,255,255,0.36);
  }
  .notice-font-btn {
    min-width: 28px;
    height: 24px;
    border: none;
    border-radius: 4px;
    background: transparent;
    color: #93640D;
    font-size: 12px;
    font-weight: 850;
    font-family: inherit;
    cursor: pointer;
  }
  .notice-font-btn:hover { background: rgba(255,255,255,0.68); }
  .notice-font-size {
    min-width: 34px;
    text-align: center;
    color: #93640D;
    font-size: 11px;
    font-weight: 800;
  }
  .notice-save-state {
    color: #93640D;
    font-size: 11px;
    font-weight: 700;
    min-width: 42px;
  }
  .notice-list {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
  }
  .notice-note {
    padding: 14px 36px 14px 17px;
    background: #FFFDF2;
    border: 1px solid #E8D99F;
    border-left: 4px solid #D99A00;
    color: var(--text-primary);
    font-size: var(--notice-note-font-size);
    font-weight: 750;
    line-height: 1.5;
  }
  .notice-note.secondary {
    background: #F2F7FB;
    border-color: #D8E5EF;
    border-left-color: var(--accent);
  }
  .notice-note::before {
    content: '';
    position: absolute;
    top: 9px;
    right: 32px;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: rgba(55,53,47,0.22);
  }
  .notice-textarea {
    width: 100%;
    min-height: var(--notice-note-min-height);
    border: none;
    outline: none;
    resize: none;
    overflow: hidden;
    background: transparent;
    color: inherit;
    font: inherit;
    line-height: inherit;
    letter-spacing: 0;
  }
  .notice-textarea:focus { box-shadow: inset 0 -1px 0 rgba(35,131,226,0.35); }
  .notice-delete-btn {
    position: absolute;
    top: 4px;
    right: 4px;
    width: 24px;
    height: 24px;
    border: 1px solid transparent;
    border-radius: var(--radius);
    background: transparent;
    color: var(--text-muted);
    font-size: 16px;
    line-height: 1;
    cursor: pointer;
  }
  .notice-delete-btn:hover { border-color: rgba(235,87,87,0.35); color: var(--red); background: rgba(235,87,87,0.06); }

  /* ── 탭 ── */
  .tabs {
    display: flex;
    padding: 10px 20px;
    gap: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 108px;
    z-index: 50;
  }
  .tabs-inner {
    display: flex;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .tab {
    flex: 1;
    padding: 6px 14px;
    border: none;
    border-right: 1px solid var(--border);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    background: transparent;
    color: var(--text-secondary);
    font-family: inherit;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .tab:last-child { border-right: none; }
  .tab:hover { background: rgba(0,0,0,0.03); }
  .tab.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .tab.attention-tab .badge { background: rgba(235,87,87,0.12); color: #B42318; }
  .tab.attention-tab.active { background: #B42318; border-color: #B42318; }
  .tab.attention-tab.active .badge { background: rgba(255,255,255,0.26); color: #fff; }
  .tab .badge {
    display: inline-block;
    background: rgba(0,0,0,0.08);
    border-radius: 10px;
    padding: 1px 7px;
    font-size: 11px;
    margin-left: 4px;
  }
  .tab.active .badge { background: rgba(255,255,255,0.25); }

  /* ── 컨텐츠 ── */
  .content { padding: 0 20px 30px; }
  .section { display: none; }
  .section.visible { display: block; }

  .time-group { margin-top: 16px; }
  .time-group-header {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 0.3px;
    padding: 0 2px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .time-group-header::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .search-group-toggle {
    width: 100%;
    min-height: 38px;
    justify-content: space-between;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text-primary);
    font-family: inherit;
    cursor: pointer;
  }
  .search-group-toggle::after { display: none; }
  .search-group-toggle:hover { border-color: var(--accent); }
  .search-group-title { font-size: 13px; font-weight: 850; }
  .search-group-meta {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--text-secondary);
    font-size: 12px;
    font-weight: 750;
  }
  .search-group-chevron {
    display: inline-block;
    transition: transform 0.15s;
  }
  .time-group.collapsed .search-group-chevron { transform: rotate(-90deg); }
  .time-group.collapsed .time-group-body { display: none; }

  /* ── 일정 카드 ── */
  .schedule-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 8px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: box-shadow 0.15s, border-color 0.15s;
  }
  .schedule-card:hover { box-shadow: 0 1px 4px rgba(55,53,47,0.08); border-color: #D4D4D0; }
  .schedule-card:active { box-shadow: 0 2px 8px rgba(55,53,47,0.1); }

  .schedule-card.type-checkout { border-left: 3px solid var(--accent); }
  .schedule-card.type-checkin  { border-left: 3px solid var(--gray-text); }

  /* 처리 완료 — 카드 흐릿 + 체크 아이콘 (반출세팅완료 / 반납검수완료 공통) */
  .schedule-card.task-done {
    opacity: 0.55;
    background: var(--green-bg);
    border-left-color: var(--green-text) !important;
  }
  .schedule-card.type-checkin.task-done {
    opacity: 0.68;
    background: #E8E8E5;
    border-left-color: #787774 !important;
  }
  .schedule-card.task-done .customer-name {
    text-decoration: line-through;
    color: var(--text-muted);
  }

  /* 토글 버튼 — 반출세팅 / 반납검수 공통 */
  .task-toggle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 64px;
    height: 28px;
    padding: 0 8px;
    border-radius: var(--radius);
    border: 1.5px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
    margin-right: 8px;
    transition: all 0.15s;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .task-toggle:hover { border-color: var(--green-text); color: var(--green-text); }
  .task-toggle.checked {
    background: var(--green-text);
    border-color: var(--green-text);
    color: #fff;
  }

  /* ── 체크리스트 스타일 ── */
  .equip-checklist {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-top: 6px;
    margin-bottom: 8px;
  }
  .equip-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    border-radius: var(--radius);
    background: var(--surface);
    border: 1px solid var(--border);
    font-size: 13px;
    position: relative;
  }
  .equip-row.is-set { background: var(--green-bg); border-color: #B8D8B8; font-weight: 700; }
  .equip-row.is-component { padding-left: 28px; background: var(--bg); border-color: transparent; font-size: 12px; color: var(--text-secondary); }
  .equip-row.is-component::before {
    content: '└';
    position: absolute;
    left: 14px;
    color: var(--text-muted);
  }
  .equip-row.is-single { background: var(--surface); }
  .equip-row.checked { opacity: 0.55; }
  .equip-row.checked .equip-name { text-decoration: line-through; }
  .equip-row-main {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
  }
  .equip-checkbox {
    width: 18px;
    height: 18px;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    background: var(--surface);
    color: transparent;
    font-weight: 700;
    font-size: 12px;
    line-height: 1;
    transition: all 0.15s;
  }
  .equip-checkbox.checked {
    background: var(--green-text);
    border-color: var(--green-text);
    color: #fff;
  }
  .equip-name { flex: 1; min-width: 0; word-break: break-word; }
  .equip-set-tag {
    display: inline-block;
    background: var(--green-text);
    color: #fff;
    font-size: 9px;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 3px;
    margin-right: 4px;
    vertical-align: middle;
  }
  .equip-qty {
    color: #0F5EA8;
    background: #EAF4FF;
    border: 1px solid #9FC8EE;
    font-size: 14px;
    font-weight: 850;
    min-width: 44px;
    height: 28px;
    padding: 0 10px;
    border-radius: 999px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-right: 4px;
    line-height: 1;
    letter-spacing: 0.1px;
    box-shadow: 0 1px 0 rgba(15, 94, 168, 0.12);
  }
  .equip-qty.equip-qty-memory {
    color: #174B9A;
    background: #DCEBFF;
    border-color: #7EA9E8;
    box-shadow: 0 1px 0 rgba(23, 75, 154, 0.18);
  }
  .equip-qty.equip-qty-battery {
    color: #9F3D09;
    background: #FFE6D6;
    border-color: #F4AE7D;
    box-shadow: 0 1px 0 rgba(159, 61, 9, 0.18);
  }
  .equip-qty-edit {
    border-radius: 999px;
    cursor: pointer;
    line-height: 1;
  }
  .equip-qty-edit:hover {
    transform: translateY(-1px);
    filter: saturate(1.08);
  }
  .equip-row-remove {
    width: 18px;
    height: 18px;
    line-height: 16px;
    text-align: center;
    color: var(--text-muted);
    cursor: pointer;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .equip-row-remove:hover { background: #FAE0E0; color: var(--red); }
  .equip-return-meta,
  .trade-return-meta {
    display: grid;
    grid-template-columns: 116px minmax(0, 1fr) 58px;
    gap: 6px;
    width: 100%;
    box-sizing: border-box;
  }
  .equip-return-meta {
    padding-left: 26px;
  }
  .trade-return-meta {
    margin-top: 10px;
    padding: 8px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg);
  }
  .return-status-select,
  .return-memo-input {
    min-height: 30px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text-primary);
    font-size: 12px;
    font-family: inherit;
    padding: 5px 8px;
    outline: none;
  }
  .return-memo-input { width: 100%; box-sizing: border-box; }
  .memo-save-btn {
    min-height: 30px;
    border: 1px solid var(--border);

<script>var API_URL = "https://script.google.com/macros/s/AKfycbyRff4-lLXmne-iPIEf87x4-CH_5wb-Uv5dCGymELLrpiKluhg2gDdLdVP4Y0MmxnnT/exec"; var DASHBOARD_API_KEY = "village2026";</script>

      반출 <span class="badge" id="tabCheckout">0</span>
    </button>
    <button class="tab" data-tab="checkin" onclick="switchTab('checkin')">
      반납 <span class="badge" id="tabCheckin">0</span>
    </button>
    <button class="tab" data-tab="all" onclick="switchTab('all')">
      전체 <span class="badge" id="tabAll">0</span>
    </button>
    <button class="tab attention-tab" data-tab="attention" onclick="switchTab('attention')">
      확인필요 <span class="badge" id="tabAttention">0</span>
    </button>
  </div>
</div>
<div id="dashboardSearchStatus" class="dashboard-search-status"></div>
<datalist id="billingCompanyOptionsList"></datalist>

<div class="content">
  <div id="loadingArea" class="loading">
    <div class="spinner"></div>
    <div>일정을 불러오는 중...</div>
  </div>
  <div id="checkoutSection" class="section"></div>
  <div id="checkinSection" class="section"></div>
  <div id="allSection" class="section"></div>
  <div id="attentionSection" class="section"></div>
</div>

<script>
var dashboardData = null;
var dashboardGlobalSearchData = null;
var currentDate = new Date();
var activeDashboardTab = 'checkout';
var dashboardSearchQuery = '';
var dashboardRequestSeq = 0;
var dashboardAbortController = null;
var dashboardSearchTimer = null;
var dashboardSearchRequestSeq = 0;
var dashboardSearchAbortController = null;
var dashboardSearchCollapsedGroups = {};
var DASHBOARD_CACHE_PREFIX = 'dashCache_v4_';
var DASHBOARD_OLD_CACHE_PREFIX = 'dashCache_v3_';
var CONTRACT_STATUS_OPTIONS = ['', '예약', '반출', '취소'];
var RETURN_STATUS_OPTIONS = ['', '확인필요', '파손', '분실', '미반납', '반납완료'];
var equipmentMemoSaveTimers = {};
var dashboardMemoDrafts = {};
var DEFAULT_DASHBOARD_NOTES = [
  '세부 구성품 및 추가 요청 사항은 카톡 대화 내용을 한번 더 확인 후 세팅',
  '매직암, 라인, 배터리 등 기타 악세사리류 갯수 철저하게 체크'
];
var DASHBOARD_NOTES_LOCAL_KEY = 'dashboardPostItNotes_fallback_v1';
var DASHBOARD_NOTE_FONT_KEY = 'dashboardPostItFontSize_v1';
var DASHBOARD_NOTE_FONT_DEFAULT = 15;
var DASHBOARD_NOTE_FONT_MIN = 12;
var DASHBOARD_NOTE_FONT_MAX = 24;
var dashboardNoteFontSize = DASHBOARD_NOTE_FONT_DEFAULT;
var dashboardNotes = DEFAULT_DASHBOARD_NOTES.slice();
var noteSaveTimer = null;
var dashboardPhotoStore = {};
var dashboardPhotoLoading = {};
var dashboardPhotoBatchTimer = null;
var dashboardDatePrefetching = {};

document.addEventListener('DOMContentLoaded', function() {
  // URL 파라미터로 날짜 전달 받기
  var urlParams = new URLSearchParams(window.location.search);
  var dateParam = urlParams.get('date');
  if (dateParam) {
    currentDate = new Date(dateParam + 'T00:00:00');
  }
  updateDateDisplay();
  loadDashboardNoteFontSize();
  renderDashboardNotes(dashboardNotes);
  loadDashboardNotes();
  loadData();
});

function updateDateDisplay() {
  var days = ['일','월','화','수','목','금','토'];
  var d = currentDate;
  document.getElementById('dateLabel').textContent =
    d.getFullYear() + '년 ' + (d.getMonth()+1) + '월 ' + d.getDate() + '일 (' + days[d.getDay()] + ')';
  document.getElementById('dateInput').value = formatDate(d);

  var today = formatDate(new Date());
  document.getElementById('headerTitle').textContent =
    formatDate(d) === today ? '오늘 일정' : (d.getMonth()+1) + '/' + d.getDate() + ' 일정';
}

function formatDate(d) {
  return d.getFullYear() + '-' + ('0'+(d.getMonth()+1)).slice(-2) + '-' + ('0'+d.getDate()).slice(-2);
}

function changeDate(offset) {
  currentDate.setDate(currentDate.getDate() + offset);
  updateDateDisplay();
  loadData();
}

function onDateChange() {
  var val = document.getElementById('dateInput').value;
  if (val) {
    currentDate = new Date(val + 'T00:00:00');
    updateDateDisplay();
    loadData();
  }
}

function goToday() {
  currentDate = new Date();
  updateDateDisplay();
  loadData();
}

function onDashboardSearchInput(value) {
  dashboardSearchQuery = String(value || '').trim();
  if (dashboardSearchTimer) clearTimeout(dashboardSearchTimer);
  if (!dashboardSearchQuery) {
    dashboardGlobalSearchData = null;
    setDashboardSearchStatus('');
    if (dashboardSearchAbortController && dashboardSearchAbortController.abort) {
      try { dashboardSearchAbortController.abort(); } catch (e) {}
    }
    if (dashboardData) renderDashboard(dashboardData, formatDate(currentDate));
    return;
  }

  activeDashboardTab = 'all';
  setDashboardSearchStatus('전체 예약에서 검색 중...');
  dashboardSearchTimer = setTimeout(function() {
    loadDashboardGlobalSearch(dashboardSearchQuery);
  }, 180);
}

function loadDashboardGlobalSearch(query) {
  query = String(query || '').trim();
  if (!query) return;

  var requestId = ++dashboardSearchRequestSeq;
  if (dashboardSearchAbortController && dashboardSearchAbortController.abort) {
    try { dashboardSearchAbortController.abort(); } catch (e) {}
  }
  dashboardSearchAbortController = (typeof AbortController !== 'undefined') ? new AbortController() : null;

  var url = API_URL + '?key=village2026&action=dashboardSearch&q=' + encodeURIComponent(query);
  var fetchOptions = dashboardSearchAbortController ? { signal: dashboardSearchAbortController.signal } : {};
  fetch(url, fetchOptions)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (requestId !== dashboardSearchRequestSeq || query !== dashboardSearchQuery) return;
      dashboardGlobalSearchData = data || {};
      resetDashboardSearchCollapsedGroups(dashboardGlobalSearchData);
      renderDashboardGlobalSearch(dashboardGlobalSearchData);
    })
    .catch(function(err) {
      if (err && err.name === 'AbortError') return;
      if (requestId !== dashboardSearchRequestSeq) return;
      setDashboardSearchStatus('전체 예약 검색 실패');
      renderDashboardGlobalSearch({ checkout: [], checkin: [], query: query, error: err.message });
    });
}

function setDashboardSearchStatus(text) {
  var el = document.getElementById('dashboardSearchStatus');
  if (!el) return;
  el.textContent = text || '';
  el.classList.toggle('visible', !!text);
}

function loadData(forceFresh) {
  var dateStr = formatDate(currentDate);
  var lsKey = DASHBOARD_CACHE_PREFIX + dateStr;
  var requestId = ++dashboardRequestSeq;
  var renderedCached = false;
  var cachedJson = null;

  if (dashboardAbortController && dashboardAbortController.abort) {
    try { dashboardAbortController.abort(); } catch (e) {}
  }
  dashboardAbortController = (typeof AbortController !== 'undefined') ? new AbortController() : null;

  try { cachedJson = localStorage.getItem(lsKey); } catch (e) {}
  if (cachedJson && !forceFresh) {
    try {
      var cachedData = readDashboardLocalCache(dateStr, cachedJson);
      dashboardData = cachedData;
      renderedCached = renderDashboard(cachedData, dateStr);
    } catch (e) {
      renderedCached = false;
    }
  }

  showDashboardLoading(dateStr, renderedCached);
  if (!renderedCached) {
    document.querySelectorAll('.section').forEach(function(s) { s.classList.remove('visible'); });
  }

  var url = API_URL + '?key=village2026&action=dashboard&date=' + dateStr;
  if (forceFresh) url += '&nocache=1';
  var fetchOptions = dashboardAbortController ? { signal: dashboardAbortController.signal } : {};

  fetch(url, fetchOptions)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!isCurrentDashboardRequest(requestId, dateStr) || !isDashboardDateMatch(data, dateStr)) return;
      dashboardData = data;
      renderDashboard(data, dateStr);
      writeDashboardLocalCache(dateStr, data);
    })
    .catch(function(err) {
      if (err && err.name === 'AbortError') return;
      if (!isCurrentDashboardRequest(requestId, dateStr)) return;
      if (!renderedCached) {
        document.getElementById('loadingArea').innerHTML =
          '<div class="empty-state"><div class="icon">!</div><div class="text">데이터 로드 실패</div></div>';
      } else {
        document.getElementById('loadingArea').style.display = 'none';
      }
    });
}

function refreshData() {
  var btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  setTimeout(function() { btn.classList.remove('spinning'); }, 800);
  clearDashboardCacheForDate(formatDate(currentDate));
  loadData(true);  // 캐시 우회
}

function showDashboardLoading(dateStr, keepVisible) {
  var loading = document.getElementById('loadingArea');
  if (!loading) return;
  loading.innerHTML = '<div class="spinner"></div><div>' + escHtml(dateStr) + ' 일정 불러오는 중...</div>';
  loading.style.display = keepVisible ? 'none' : 'block';
}

function isCurrentDashboardRequest(requestId, dateStr) {
  return requestId === dashboardRequestSeq && dateStr === formatDate(currentDate);
}

function isDashboardDateMatch(data, dateStr) {
  if (!dateStr) dateStr = formatDate(currentDate);
  return !data || !data.date || data.date === dateStr;
}

function clearDashboardCacheForDate(dateStr) {
  try {
    localStorage.removeItem(DASHBOARD_CACHE_PREFIX + dateStr);
    localStorage.removeItem(DASHBOARD_OLD_CACHE_PREFIX + dateStr);
  } catch (e) {}
}

function readDashboardLocalCache(dateStr, raw) {
  var parsed = JSON.parse(raw);
  var data = parsed && parsed.data ? parsed.data : parsed;
  if (data && !data.date) data.date = dateStr;
  return data;
}

function writeDashboardLocalCache(dateStr, data) {
  if (!dateStr || !data || data.error) return;
  try {
    localStorage.setItem(DASHBOARD_CACHE_PREFIX + dateStr, JSON.stringify({
      cachedAt: Date.now(),
      data: data
    }));
  } catch (e) {}
}

function persistCurrentDashboardCache() {
  if (!dashboardData) return;
  writeDashboardLocalCache(dashboardData.date || formatDate(currentDate), dashboardData);
}

function prefetchAdjacentDashboardDates(dateStr) {
  if (dashboardSearchQuery) return;
  [-1, 1].forEach(function(offset) {
    prefetchDashboardDate(addDaysToDateStr(dateStr, offset));
  });
}

function addDaysToDateStr(dateStr, offset) {
  var d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + offset);
  return formatDate(d);
}

function prefetchDashboardDate(dateStr) {
  if (!dateStr || dashboardDatePrefetching[dateStr]) return;
  try {
    if (localStorage.getItem(DASHBOARD_CACHE_PREFIX + dateStr)) return;
  } catch (e) {}

  dashboardDatePrefetching[dateStr] = true;
  fetch(API_URL + '?key=village2026&action=dashboard&date=' + encodeURIComponent(dateStr))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data && data.error) return;
      if (!isDashboardDateMatch(data, dateStr)) return;
      writeDashboardLocalCache(dateStr, data);
    })
    .catch(function() {})
    .then(function() { delete dashboardDatePrefetching[dateStr]; });
}

function normalizeDashboardNotes(notes) {
  if (!Array.isArray(notes)) return [];
  return notes.map(function(note) {
    return String(note || '').trim().slice(0, 180);
  }).filter(function(note) { return note !== ''; }).slice(0, 8);
}

function setNoticeSaveState(text) {
  var el = document.getElementById('noticeSaveState');
  if (el) el.textContent = text || '';
}

function clampDashboardNoteFont(size) {
  size = Number(size) || DASHBOARD_NOTE_FONT_DEFAULT;
  return Math.max(DASHBOARD_NOTE_FONT_MIN, Math.min(DASHBOARD_NOTE_FONT_MAX, Math.round(size)));
}

function getDashboardNoteMinHeight() {
  return Math.max(44, Math.round(dashboardNoteFontSize * 3.6));
}

function applyDashboardNoteFontSize(size, shouldSave) {
  dashboardNoteFontSize = clampDashboardNoteFont(size);
  var board = document.getElementById('noticeBoard');
  if (board) {
    board.style.setProperty('--notice-note-font-size', dashboardNoteFontSize + 'px');
    board.style.setProperty('--notice-note-min-height', getDashboardNoteMinHeight() + 'px');
  }
  var label = document.getElementById('noticeFontSize');
  if (label) label.textContent = dashboardNoteFontSize + 'px';
  document.querySelectorAll('.notice-textarea').forEach(autoSizeNoteTextarea);
  if (shouldSave) {
    try { localStorage.setItem(DASHBOARD_NOTE_FONT_KEY, String(dashboardNoteFontSize)); } catch (e) {}
  }
}

function loadDashboardNoteFontSize() {
  var saved = null;
  try { saved = localStorage.getItem(DASHBOARD_NOTE_FONT_KEY); } catch (e) {}
  applyDashboardNoteFontSize(saved || DASHBOARD_NOTE_FONT_DEFAULT, false);
}

function adjustDashboardNoteFont(delta) {
  applyDashboardNoteFontSize(dashboardNoteFontSize + delta, true);
}

function resetDashboardNoteFont() {
  applyDashboardNoteFontSize(DASHBOARD_NOTE_FONT_DEFAULT, true);
}

function autoSizeNoteTextarea(textarea) {
  if (!textarea) return;
  textarea.style.height = 'auto';
  textarea.style.height = Math.max(getDashboardNoteMinHeight(), textarea.scrollHeight) + 'px';
}

function renderDashboardNotes(notes) {
  dashboardNotes = Array.isArray(notes) ? notes.slice(0, 8) : [];
  var list = document.getElementById('noticeList');
  if (!list) return;
  list.innerHTML = '';

  dashboardNotes.forEach(function(note, index) {
    var card = document.createElement('div');
    card.className = 'notice-note' + (index % 2 === 1 ? ' secondary' : '');

    var textarea = document.createElement('textarea');
    textarea.className = 'notice-textarea';
    textarea.maxLength = 180;
    textarea.value = note;
    textarea.setAttribute('aria-label', '인수인계 메모 ' + (index + 1));
    textarea.addEventListener('input', function() {
      dashboardNotes[index] = textarea.value;
      autoSizeNoteTextarea(textarea);
      queueDashboardNotesSave();
    });

    var deleteBtn = document.createElement('button');
    deleteBtn.type = 'button';
    deleteBtn.className = 'notice-delete-btn';
    deleteBtn.title = '메모 삭제';
    deleteBtn.setAttribute('aria-label', '메모 삭제');
    deleteBtn.textContent = '×';
    deleteBtn.addEventListener('click', function() {
      dashboardNotes.splice(index, 1);
      renderDashboardNotes(dashboardNotes);
      saveDashboardNotesNow();
    });

    card.appendChild(textarea);
    card.appendChild(deleteBtn);
    list.appendChild(card);
    autoSizeNoteTextarea(textarea);
  });
}

function loadDashboardNotes() {
  fetch(API_URL + '?key=village2026&action=dashboardNotes&ts=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res && res.error) throw new Error(res.error);
      if (res && Array.isArray(res.notes)) renderDashboardNotes(res.notes);
    })
    .catch(function() {
      try {
        var localNotes = JSON.parse(localStorage.getItem(DASHBOARD_NOTES_LOCAL_KEY) || 'null');
        if (Array.isArray(localNotes)) renderDashboardNotes(localNotes);
      } catch (e) {}
    });
}

function queueDashboardNotesSave() {
  clearTimeout(noteSaveTimer);
  setNoticeSaveState('저장 중');
  noteSaveTimer = setTimeout(saveDashboardNotesNow, 600);
}

function saveDashboardNotesNow() {
  clearTimeout(noteSaveTimer);
  var notes = normalizeDashboardNotes(dashboardNotes);
  setNoticeSaveState('저장 중');
  fetch(API_URL + '?key=village2026&action=saveDashboardNotes&notes='
    + encodeURIComponent(JSON.stringify(notes)) + '&ts=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res && res.error) throw new Error(res.error);
      if (res && Array.isArray(res.notes)) dashboardNotes = res.notes.slice();
      setNoticeSaveState('저장됨');
      setTimeout(function() { setNoticeSaveState(''); }, 1200);
    })
    .catch(function() {
      try { localStorage.setItem(DASHBOARD_NOTES_LOCAL_KEY, JSON.stringify(notes)); } catch (e) {}
      setNoticeSaveState('로컬 저장');
      setTimeout(function() { setNoticeSaveState(''); }, 1200);
    });
}

function addDashboardNote() {
  if (dashboardNotes.length >= 8) {
    alert('메모는 최대 8개까지 추가할 수 있습니다.');
    return;
  }
  dashboardNotes.push('');
  renderDashboardNotes(dashboardNotes);
  setTimeout(function() {
    var inputs = document.querySelectorAll('.notice-textarea');
    if (inputs.length) inputs[inputs.length - 1].focus();
  }, 0);
}

function timeSortKey(timeValue) {
  var raw = String(timeValue || '').trim();
  if (!raw || raw === '시간 미정') return '99:99';

  var isPm = raw.indexOf('오후') >= 0 || /\bPM\b/i.test(raw);
  var isAm = raw.indexOf('오전') >= 0 || /\bAM\b/i.test(raw);
  var match = raw.match(/(\d{1,2})\s*(?::|시)\s*(\d{1,2})?/);
  if (!match) return '99:99';

  var hour = Number(match[1]);
  var minute = match[2] !== undefined ? Number(match[2]) : 0;
  if (isNaN(hour) || isNaN(minute) || hour < 0 || hour > 24 || minute < 0 || minute > 59) {
    return '99:99';
  }
  if (isPm && hour < 12) hour += 12;
  if (isAm && hour === 12) hour = 0;
  if (hour === 24 && minute > 0) return '99:99';

  return ('0' + hour).slice(-2) + ':' + ('0' + minute).slice(-2);
}

function compareScheduleItemsByTime(a, b) {
  var at = timeSortKey(a && (a.sortTime || a.time));
  var bt = timeSortKey(b && (b.sortTime || b.time));
  var timeCmp = at.localeCompare(bt);
  if (timeCmp) return timeCmp;

  var an = String((a && (a.name || a.tradeId)) || '');
  var bn = String((b && (b.name || b.tradeId)) || '');
  return an.localeCompare(bn);
}

function compareTimeLabels(a, b) {
  var timeCmp = timeSortKey(a).localeCompare(timeSortKey(b));
  if (timeCmp) return timeCmp;
  return String(a || '').localeCompare(String(b || ''));
}

function compareDashboardGlobalSearchItems(a, b) {
  var ad = String((a && a.sortDate) || (a && a.searchDate) || '');
  var bd = String((b && b.sortDate) || (b && b.searchDate) || '');
  var dateCmp = ad.localeCompare(bd);
  if (dateCmp) return dateCmp;
  return compareScheduleItemsByTime(a, b);
}

function compareDashboardSearchGroupLabels(a, b) {
  return String(a || '').localeCompare(String(b || ''), 'ko', { numeric: true });
}

function normalizeDashboardSearchText(value) {
  return String(value || '').toLowerCase().replace(/\s+/g, ' ').trim();
}

function dashboardItemMatchesSearch(item, type) {
  var terms = normalizeDashboardSearchText(dashboardSearchQuery).split(' ').filter(Boolean);
  if (!terms.length) return true;

  var parts = [
    type === 'checkout' ? '반출' : '반납',
    item.tradeId,
    item.name,
    item.company,
    item.tel,
    item.status,
    item.contractStatus,
    item.time,
    item.sortTime,
    item.checkoutDate,
    item.returnDate,
    item.paymentMethod,
    item.paymentSource,
    item.paymentWarning,
    item.depositStatus,
    item.proofType,
    item.issueStatus,
    item.billingCompany,
    item.issueNote,
    item.returnStatus,
    item.returnMemo
  ];
  (item.equipments || []).forEach(function(eq) {
    parts.push(eq.name, eq.setName, eq.qty, eq.isSet ? '세트 set' : '', eq.isComponent ? '구성품' : '');
  });

  var haystack = normalizeDashboardSearchText(parts.join(' '));
  return terms.every(function(term) { return haystack.indexOf(term) >= 0; });
}

function filterDashboardItems(items, type) {
  if (!dashboardSearchQuery) return items.slice();
  return items.filter(function(item) { return dashboardItemMatchesSearch(item, type); });
}

function normalizeAttentionStatus(value) {
  return String(value || '').replace(/\s+/g, '').trim();
}

function isReturnStatusAbnormal(item) {
  var status = normalizeAttentionStatus(item && item.returnStatus);
  return !!status && status !== '정상' && status !== '반납완료';
}

function isPaymentComplete(item) {
  var status = normalizeAttentionStatus(item && item.depositStatus);
  return status === '입금완료' || status === '결제완료' || status === '완납';
}

function isPaymentPending(item) {
  if (item && Object.prototype.hasOwnProperty.call(item, 'depositStatus')) {
    return !isPaymentComplete(item);
  }

  var method = normalizeAttentionStatus(item && item.paymentMethod);
  return !method || method === '미정' || method === '미입금' || method === '미결제';
}

function getDashboardAttentionReasons(item) {
  var reasons = [];
  if (isReturnStatusAbnormal(item)) {
    reasons.push('반납 ' + String(item.returnStatus || '').trim());
  }
  if (isPaymentPending(item)) {
    var status = String((item && item.depositStatus) || '').trim();
    reasons.push(status ? status : '미결제');
  }
  return reasons;
}

function buildDashboardAttentionItems(checkout, checkin) {
  var items = [];
  (checkout || []).forEach(function(item) {
    if (!getDashboardAttentionReasons(item).length) return;
    var copy = cloneDashboardListItem(item);
    copy._type = 'checkout';
    items.push(copy);
  });
  (checkin || []).forEach(function(item) {
    if (!getDashboardAttentionReasons(item).length) return;
    var copy = cloneDashboardListItem(item);
    copy._type = 'checkin';
    items.push(copy);
  });
  items.sort(compareDashboardGlobalSearchItems);
  return items;
}

function cloneDashboardListItem(item) {
  var copy = {};
  Object.keys(item || {}).forEach(function(key) { copy[key] = item[key]; });
  return copy;
}

function renderDashboard(data, expectedDate) {
  if (dashboardSearchQuery && dashboardGlobalSearchData) {
    renderDashboardGlobalSearch(dashboardGlobalSearchData);
    return true;
  }
  if (!isDashboardDateMatch(data, expectedDate)) return false;
  data = data || {};
  var checkout = Array.isArray(data.checkout) ? data.checkout : [];
  var checkin = Array.isArray(data.checkin) ? data.checkin : [];
  var filteredCheckout = filterDashboardItems(checkout, 'checkout');
  var filteredCheckin = filterDashboardItems(checkin, 'checkin');
  var attention = buildDashboardAttentionItems(filteredCheckout, filteredCheckin);
  var isSearching = !!dashboardSearchQuery;
  renderBillingCompanyDatalist(data);
  document.getElementById('loadingArea').style.display = 'none';

  document.getElementById('tabCheckout').textContent = filteredCheckout.length;
  document.getElementById('tabCheckin').textContent = filteredCheckin.length;
  document.getElementById('tabAll').textContent = filteredCheckout.length + filteredCheckin.length;
  document.getElementById('tabAttention').textContent = attention.length;

  renderList('checkoutSection', filteredCheckout, 'checkout', isSearching);
  renderList('checkinSection', filteredCheckin, 'checkin', isSearching);

  var all = filteredCheckout.map(function(c) { c._type = 'checkout'; return c; })
    .concat(filteredCheckin.map(function(c) { c._type = 'checkin'; return c; }));
  all.sort(compareDashboardGlobalSearchItems);
  renderList('allSection', all, 'all', isSearching);
  renderList('attentionSection', attention, 'attention', isSearching, { emptyText: isSearching ? '검색된 확인필요 일정이 없습니다' : '확인필요 일정이 없습니다' });

  switchTab(activeDashboardTab || 'checkout');
  prefetchAdjacentDashboardDates(data.date || expectedDate || formatDate(currentDate));
  scheduleDashboardPhotoLoad(checkout.concat(checkin));
  return true;
}

function renderDashboardGlobalSearch(data) {
  data = data || {};
  var checkout = Array.isArray(data.checkout) ? data.checkout : [];
  var checkin = Array.isArray(data.checkin) ? data.checkin : [];
  var all = checkout.map(function(c) { c._type = 'checkout'; return c; })
    .concat(checkin.map(function(c) { c._type = 'checkin'; return c; }));
  all.sort(compareScheduleItemsByTime);

  document.getElementById('loadingArea').style.display = 'none';
  document.getElementById('tabCheckout').textContent = checkout.length;
  document.getElementById('tabCheckin').textContent = checkin.length;
  document.getElementById('tabAll').textContent = all.length;
  var attention = buildDashboardAttentionItems(checkout, checkin);
  document.getElementById('tabAttention').textContent = attention.length;
  renderBillingCompanyDatalist(data);
  renderList('checkoutSection', [], 'checkout', true, { globalSearch: true });
  renderList('checkinSection', [], 'checkin', true, { globalSearch: true });
  renderList('allSection', all, 'all', true, { globalSearch: true });
  renderList('attentionSection', attention, 'attention', true, { globalSearch: true, emptyText: '검색된 확인필요 일정이 없습니다' });

  var total = Number(data.total || all.length);
  var suffix = total > all.length ? ' · 상위 ' + all.length + '건 표시' : ' · ' + all.length + '건';
  setDashboardSearchStatus('전체 예약에서 검색 중: "' + dashboardSearchQuery + '"' + suffix);
  switchTab('all');
  scheduleDashboardPhotoLoad(all);
}

function toggleDashboardSearchGroup(groupId) {
  if (!groupId) return;
  dashboardSearchCollapsedGroups[groupId] = !dashboardSearchCollapsedGroups[groupId];
  if (dashboardGlobalSearchData) renderDashboardGlobalSearch(dashboardGlobalSearchData);
}

function resetDashboardSearchCollapsedGroups(data) {
  dashboardSearchCollapsedGroups = {};
  var items = []
    .concat((data && data.checkout) || [])
    .concat((data && data.checkin) || []);
  items.forEach(function(item) {
    var groupId = dashboardSearchGroupId(item.searchGroupLabel || item.searchDate || '날짜 미정');
    dashboardSearchCollapsedGroups[groupId] = true;
  });
}

function dashboardSearchGroupId(label) {
  return 'search_' + String(label || 'unknown').replace(/[^A-Za-z0-9가-힣_-]+/g, '_');
}

function renderBillingCompanyDatalist(data) {
  var list = document.getElementById('billingCompanyOptionsList');
  if (!list) return;
  var options = (data && data.billingCompanyOptions) ||
    (dashboardData && dashboardData.billingCompanyOptions) || [];
  list.innerHTML = (options || []).filter(Boolean).map(function(opt) {
    return '<option value="' + escAttr(opt) + '"></option>';
  }).join('');
}

function riskGuidanceLabel(state, reason) {
  state = String(state || '').trim();
  reason = String(reason || '').trim();
  if (reason === 'target_missing' || state === 'target_missing') return '대상 없음';
  if (state === 'recommend') return '발송 권장';
  if (state === 'recent_sent') return '최근 발송';
  if (state === 'recipient_missing') return '대상 없음';
  if (state === 'sendable') return '발송 가능';
  if (state === 'sent_recently') return '최근 발송';
  if (state === 'approval_required') return '승인 필요';
  if (state === 'history_unknown') {
    if (reason === 'backend_config_missing') return '연동 미설정';
    if (reason === 'backend_evaluation_failed') return '이력 확인 실패';
    return '이력 미확인';
  }
  return state || '상태 미확인';
}

function riskWarningSummaryHtml(item, cardType) {
  var warnings = (item && item.riskWarnings) || [];
  if (!warnings.length) return '';
  return '<div class="risk-warning-badge">주의 ' + warnings.length + '</div>';
}

function riskButtonPayload(item, warning, cardType, extra) {
  var payload = {
    tradeId: item.tradeId || '',
    cardType: cardType || item._type || '',
    customerName: item.name || '',
    customerPhone: item.customerPhone || item.tel || item.customerTel || '',
    customerTel: item.customerTel || item.tel || '',
    userType: item.userType || warning.userType || '',
    userId: item.userId || warning.userId || '',
    kakaoUser: item.kakaoUser || warning.kakaoUser || null,
    company: item.company || '',
    ruleId: warning.ruleId || '',
    ruleVersion: warning.ruleVersion || 1,
    equipmentName: warning.equipmentName || '',
    riskLevel: warning.riskLevel || '',
    customerMessage: warning.customerMessage || '',
    pickupStaffText: warning.pickupStaffText || '',
    returnCheckText: warning.returnCheckText || '',
    sensitive: !!warning.sensitive,
    cooldownDays: warning.cooldownDays || 90,
    riskItem: {
      ruleId: warning.ruleId || '',
      ruleVersion: warning.ruleVersion || 1,
      riskLevel: warning.riskLevel || '',
      equipmentName: warning.equipmentName || '',
      customerMessage: warning.customerMessage || '',
      sensitive: !!warning.sensitive,
      cooldownDays: warning.cooldownDays || 90
    }
  };
  Object.keys(extra || {}).forEach(function(key) { payload[key] = extra[key]; });
  return escAttr(JSON.stringify(payload));
}

function riskHasKakaoTarget(item, warning) {
  return !!(
    (item && item.kakaoUser) ||
    (item && item.userType && item.userId) ||
    (warning && warning.kakaoUser) ||
    (warning && warning.userType && warning.userId)
  );
}

function equipmentRiskPanelHtml(item, cardType) {
  var warnings = (item && item.riskWarnings) || [];
  if (!warnings.length || (cardType !== 'checkout' && cardType !== 'checkin')) return '';

  var html = '<div class="equipment-risk-panel" onclick="event.stopPropagation()">';
  warnings.forEach(function(warning) {
    var title = (warning.riskLevel || '주의') + ' · ' + (warning.equipmentName || warning.matchedAlias || '장비');
    var hasKakaoTarget = riskHasKakaoTarget(item, warning);
    var stateLabel = riskGuidanceLabel(warning.guidanceState, hasKakaoTarget ? warning.guidanceReason : 'target_missing');
    var text = cardType === 'checkout'
      ? (warning.pickupStaffText || warning.customerMessage || '반출 전 주의사항을 확인하세요.')
      : (warning.returnCheckText || '반납 시 상태를 확인하세요.');
    html += '<div class="equipment-risk-row">';
    html += '<div><div class="equipment-risk-title">' + escHtml(title) + '<span class="equipment-risk-state">' + escHtml(stateLabel) + '</span></div>';
    html += '<div class="equipment-risk-text">' + escHtml(text) + '</div></div>';
    html += '<div class="equipment-risk-actions">';
    if (cardType === 'checkout') {
      var hasRecentSend = warning.guidanceState === 'recent_sent' || warning.guidanceState === 'sent_recently' || !!warning.lastSentAt;
      var canDirectSend = !warning.sensitive && hasKakaoTarget && !hasRecentSend;
      var sendLabel = hasKakaoTarget ? '카톡 보내기' : '카톡 대상 없음';
      if (warning.sensitive && hasKakaoTarget) sendLabel = '발송 보류';
      if (hasRecentSend) sendLabel = '최근 발송됨';
      html += '<button type="button" class="equipment-risk-btn primary" data-risk-payload="' +
        riskButtonPayload(item, warning, cardType, { sendMode: 'direct' }) +
        '"' + (canDirectSend ? '' : ' disabled') + ' onclick="sendEquipmentRiskGuidance(this)">' + escHtml(sendLabel) + '</button>';
      html += '<button type="button" class="equipment-risk-btn" data-risk-payload="' +
        riskButtonPayload(item, warning, cardType, {}) +
        '" onclick="recordEquipmentRiskEvent(this, \'pickup_ack\')">확인함</button>';
    } else {
      html += '<button type="button" class="equipment-risk-btn" data-risk-payload="' +
        riskButtonPayload(item, warning, cardType, {}) +
        '" onclick="recordEquipmentRiskEvent(this, \'return_ok\')">이상 없음</button>';
      html += '<button type="button" class="equipment-risk-btn primary" data-risk-payload="' +
        riskButtonPayload(item, warning, cardType, {}) +
        '" onclick="recordEquipmentRiskEvent(this, \'return_issue\')">이상 있음</button>';
      html += '<button type="button" class="equipment-risk-btn" data-risk-payload="' +
        riskButtonPayload(item, warning, cardType, {}) +
        '" onclick="recordEquipmentRiskEvent(this, \'return_not_checked\')">확인 못함</button>';
    }
    html += '</div></div>';
  });
  html += '</div>';
  return html;
}

function parseRiskButtonPayload(btn) {
  try {
    return JSON.parse(btn.getAttribute('data-risk-payload') || '{}');
  } catch (e) {
    return {};
  }
}

function dashboardApiPayload(action, payload) {
  return {
    key: window.DASHBOARD_API_KEY || 'village2026',
    action: action,
    payload: payload || {}
  };
}

function sendEquipmentRiskGuidance(btn) {
  if (typeof event !== 'undefined' && event.stopPropagation) event.stopPropagation();
  var payload = parseRiskButtonPayload(btn);
  var message = payload.customerMessage || '';
  var confirmText = '고객에게 카톡으로 보낼까요?' +
    (message ? '\n\n고객 문구:\n' + message : '');
  if (!confirm(confirmText)) return;
  var originalText = btn.textContent;
  btn.disabled = true;
  btn.textContent = '처리 중';
  fetch(API_URL || '', {
    method: 'POST',
    body: JSON.stringify(dashboardApiPayload('equipmentRiskSend', payload))
  })
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res.error) throw new Error(res.error);
      clearDashboardCacheForDate(formatDate(currentDate));
      loadData(true);
    })
    .catch(function(err) {
      btn.disabled = false;
      btn.textContent = originalText;
      alert('주의사항 처리 실패: ' + err.message);
    });
}

function recordEquipmentRiskEvent(btn, eventType) {
  if (typeof event !== 'undefined' && event.stopPropagation) event.stopPropagation();
  var payload = parseRiskButtonPayload(btn);
  payload.eventType = eventType;
  if (eventType === 'return_issue') {
    var note = prompt('이상 내용을 짧게 남겨주세요.');
    if (note === null) return;
    payload.notes = note;
  }

  var originalText = btn.textContent;
  btn.disabled = true;
  btn.textContent = '저장 중';
  fetch(API_URL || '', {
    method: 'POST',
    body: JSON.stringify(dashboardApiPayload('equipmentRiskEvent', payload))
  })
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res.error) throw new Error(res.error);
      clearDashboardCacheForDate(formatDate(currentDate));
      loadData(true);
    })
    .catch(function(err) {
      btn.disabled = false;
      btn.textContent = originalText;
      alert('주의사항 기록 실패: ' + err.message);
    });
}

function renderList(containerId, items, type, isSearching, options) {
  options = options || {};
  var container = document.getElementById(containerId);

  if (!items || items.length === 0) {
    var emptyText = options.emptyText || (isSearching ? '검색 결과가 없습니다' :
      ((type === 'checkout' ? '반출' : type === 'checkin' ? '반납' : '') + ' 일정이 없습니다'));
    var emptyIcon = type === 'checkout' ? '📦' : type === 'checkin' ? '📥' : (type === 'attention' ? '!' : '📋');
    container.innerHTML =
      '<div class="empty-state"><div class="icon">' +
      emptyIcon +
      '</div><div class="text">' + emptyText + '</div></div>';
    return;
  }

  var groups = {};
  items.slice().sort(options.globalSearch ? compareDashboardGlobalSearchItems : compareScheduleItemsByTime).forEach(function(item) {
    var timeKey = options.globalSearch ? (item.searchGroupLabel || item.searchDate || '날짜 미정') : (item.time || '시간 미정');
    if (!groups[timeKey]) groups[timeKey] = [];
    groups[timeKey].push(item);
  });

  var html = '';
  Object.keys(groups).sort(options.globalSearch ? compareDashboardSearchGroupLabels : compareTimeLabels).forEach(function(timeKey) {
    var groupId = options.globalSearch ? dashboardSearchGroupId(timeKey) : '';
    var isCollapsed = options.globalSearch && dashboardSearchCollapsedGroups[groupId];
    html += '<div class="time-group' + (isCollapsed ? ' collapsed' : '') + '"' + (groupId ? ' data-search-group="' + escAttr(groupId) + '"' : '') + '>';
    if (options.globalSearch) {
      html += '<button type="button" class="time-group-header search-group-toggle" onclick="toggleDashboardSearchGroup(\'' + escJs(groupId) + '\')">';
      html += '<span class="search-group-title">' + escHtml(timeKey) + '</span>';
      html += '<span class="search-group-meta"><span>' + groups[timeKey].length + '건</span><span class="search-group-chevron">▾</span></span>';
      html += '</button>';
      html += '<div class="time-group-body">';
    } else {
      html += '<div class="time-group-header">' + escHtml(timeKey) + '</div>';
    }

    groups[timeKey].forEach(function(item, idx) {
      var cardType = item._type || type;
      var cardId = cardType + '_' + timeKey.replace(/[: /\-.]/g,'') + '_' + idx;

      // 카드 타입별 done 플래그 분리: 반출=setupDone, 반납=returnDone
      var taskDone = (cardType === 'checkout' ? item.setupDone : (cardType === 'checkin' ? item.returnDone : false));
      var taskAction = (cardType === 'checkout' ? 'toggleSetup' : 'toggleReturn');
      var doneCls = taskDone ? ' task-done' : '';
      var toggleCls = taskDone ? 'task-toggle checked' : 'task-toggle';
      var toggleLabel = taskToggleLabel(cardType, taskDone, item);
      var attentionReasons = getDashboardAttentionReasons(item);
      html += '<div class="schedule-card type-' + cardType + (attentionReasons.length ? ' has-attention' : '') + doneCls + '" data-tid="' + escHtml(item.tradeId) + '" data-cardtype="' + cardType + '" onclick="toggleDetail(\'' + cardId + '\')">';
      html += '<div class="card-header">';
      html += '<div style="display:flex;align-items:flex-start;gap:0;">';
      // 반출/반납 모두 토글 노출
      if (cardType === 'checkout' || cardType === 'checkin') {
        html += '<button class="' + toggleCls + '" data-task-action="' + taskAction + '" onclick="event.stopPropagation();toggleTask(this,\'' + escHtml(item.tradeId) + '\',\'' + taskAction + '\')">' + escHtml(toggleLabel) + '</button>';
      }
      html += '<div>';
      html += '<div class="customer-name">' + escHtml(item.name) + '</div>';
      if (item.company) html += '<div class="customer-company">' + escHtml(item.company) + '</div>';
      html += '</div></div>';
      html += '<div class="card-badges' + (options.globalSearch ? ' search-card-badges' : '') + '">';
      if (options.globalSearch) {
        html += '<div class="search-date-badge">' + escHtml(item.searchDate || '') + ' ' + escHtml(item.searchPhaseLabel || '') + '</div>';
      }
      attentionReasons.forEach(function(reason) {
        html += '<div class="attention-reason-badge">' + escHtml(reason) + '</div>';
      });
      html += riskWarningSummaryHtml(item, cardType);
      html += '<div class="time-badge">' + escHtml(item.time || '시간 미정') + '</div></div></div>';

      if (item.tel) {
        html += '<div class="card-meta"><span class="icon">📞</span>';
        html += '<a href="tel:' + item.tel + '" class="tel-link" onclick="event.stopPropagation()">' + escHtml(item.tel) + '</a></div>';
      }
      html += tradeReturnFieldsHtml(item, cardType);
      html += equipmentRiskPanelHtml(item, cardType);

      // ── 체크리스트 형태 (반출/반납 phase별 독립 체크) ──
      html += '<div class="equip-checklist">';
      (item.equipments || []).forEach(function(eq) {
        var rowCls = 'equip-row';
        if (eq.isSet) rowCls += ' is-set';
        else if (eq.isComponent) rowCls += ' is-component';
        else rowCls += ' is-single';
        var checked = (cardType === 'checkout' ? eq.checkedCheckout : eq.checkedCheckin);
        if (checked) rowCls += ' checked';

        var cbCls = 'equip-checkbox' + (checked ? ' checked' : '');
        var phaseStr = (cardType === 'checkout' ? 'checkout' : 'checkin');
        var sidEsc = escJs(eq.scheduleId);
        var nameEsc = escJs(eq.name);
        var qtyValue = eq.qty || 1;
        var eqNameLower = String(eq.name || '').toLowerCase();
        var qtyClass = 'equip-qty-default';
        if (eqNameLower.indexOf('메모리') > -1 || eqNameLower.indexOf('memory') > -1 || eqNameLower.indexOf('sd') > -1 || eqNameLower.indexOf('cf') > -1 || eqNameLower.indexOf('cfast') > -1) {
          qtyClass = 'equip-qty-memory';
        } else if (eqNameLower.indexOf('배터리') > -1 || eqNameLower.indexOf('battery') > -1 || eqNameLower.indexOf('밧데리') > -1) {
          qtyClass = 'equip-qty-battery';
        }

        html += '<div class="' + rowCls + '" onclick="event.stopPropagation()">';
        html += '<div class="equip-row-main">';
        html += '<span class="' + cbCls + '" onclick="toggleItem(this,\'' + sidEsc + '\',\'' + phaseStr + '\')">' + (checked ? '✓' : '') + '</span>';
        html += '<span class="equip-name">';
        if (eq.isSet) html += '<span class="equip-set-tag">SET</span>';
        html += escHtml(eq.name);
        html += '</span>';
        html += '<button type="button" class="equip-qty equip-qty-edit ' + qtyClass + '" onclick="event.stopPropagation();editEquipQty(\'' + escJs(item.tradeId) + '\',\'' + sidEsc + '\',\'' + nameEsc + '\',\'' + escJs(String(qtyValue)) + '\')" title="수량 수정">×' + escHtml(qtyValue) + '</button>';
        html += '<span class="equip-row-remove" onclick="event.stopPropagation();removeEquip(\'' + escJs(item.tradeId) + '\',\'' + nameEsc + '\',\'' + sidEsc + '\',' + (eq.isSet ? 'true' : 'false') + ',' + (eq.isComponent ? 'true' : 'false') + ')" title="삭제">×</span>';
        html += '</div>';
        html += '</div>';
      });
      html += '<div class="equip-add-actions">';
      if (cardType === 'checkout') {
        html += '<button class="equip-add-btn onsite" onclick="event.stopPropagation();addOnsiteAddon(\'' + escHtml(item.tradeId) + '\')">+ 현장추가</button>';
      } else {
        html += '<button class="equip-add-btn" onclick="event.stopPropagation();addEquip(\'' + escHtml(item.tradeId) + '\')">+ 장비추가</button>';
      }
      html += '</div>';
      html += '</div>';
      html += photoGalleryHtml(item);
      html += cardActionHtml(item, cardType);

      html += '<div class="card-detail" id="' + cardId + '">';
      html += '<div class="detail-row"><span>거래ID</span><span class="dl">' + escHtml(item.tradeId) + '</span></div>';
      var pLabel = cardType === 'checkout' ? '반납 예정' : '반출일';
      var pValue = cardType === 'checkout' ? item.returnDate : item.checkoutDate;
      if (pValue) html += '<div class="detail-row"><span>' + pLabel + '</span><span class="dl">' + escHtml(pValue) + '</span></div>';
      var detailStatusLabel = cardType === 'checkout' ? '계약상태' : '상태';
      var detailStatus = cardType === 'checkout'
        ? (normalizeContractStatus(item.contractStatus || item.status) || item.contractStatus || item.status || '예약')
        : (item.contractStatus === '반납완료' ? '반납완료' : (item.status || '대기'));
      html += '<div class="detail-row"><span>' + detailStatusLabel + '</span><span class="status-badge status-' + detailStatus + '">' + detailStatus + '</span></div>';
      if (item.equipments && item.equipments.length > 0) {
        var total = item.equipments.reduce(function(s, eq) { return s + (eq.qty || 1); }, 0);
        html += '<div class="detail-row"><span>총 장비 수</span><span class="dl">' + total + '건</span></div>';
      }
      html += '</div></div>';
    });
    if (options.globalSearch) html += '</div>';
    html += '</div>';
  });

  container.innerHTML = html;
}

function switchTab(tab) {
  if (!document.getElementById(tab + 'Section')) tab = 'checkout';
  activeDashboardTab = tab;
  document.querySelectorAll('.tab').forEach(function(t) {
    t.classList.toggle('active', t.dataset.tab === tab);
  });
  document.querySelectorAll('.section').forEach(function(s) { s.classList.remove('visible'); });
  document.getElementById(tab + 'Section').classList.add('visible');
}

function toggleDetail(id) {
  var el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

function removeEquip(tid, equipName, scheduleId, isSet, isComponent) {
  var message = '"' + equipName + '" 을(를) 삭제하시겠습니까?';
  if (isSet) message += '\n(세트 대표행 삭제 시 같은 세트 구성품도 함께 삭제됩니다)';
  else if (isComponent) message += '\n(선택한 구성품 행만 삭제됩니다)';
  if (!confirm(message)) return;

  fetch(API_URL + '?key=village2026&action=removeEquip&tid=' + encodeURIComponent(tid)
    + '&equipName=' + encodeURIComponent(equipName)
    + '&scheduleId=' + encodeURIComponent(scheduleId || ''))
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res.error) { alert("삭제 실패: " + res.error); return; }
      clearDashboardCacheForDate(formatDate(currentDate));
      loadData(true);
    })
    .catch(function(err) { alert("네트워크 오류: " + err.message); });
}

function editEquipQty(tid, scheduleId, equipName, currentQty) {
  var raw = prompt('수량 수정: ' + equipName, currentQty || '1');
  if (raw === null) return;
  var qty = parseInt(String(raw).trim(), 10);
  if (!qty || qty < 1) {
    alert('수량은 1 이상 숫자로 입력하세요.');
    return;
  }

  fetch(API_URL + '?key=village2026&action=updateEquipQty&tid=' + encodeURIComponent(tid)
    + '&scheduleId=' + encodeURIComponent(scheduleId)
    + '&qty=' + encodeURIComponent(qty))
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res.error) { alert('수량 수정 실패: ' + res.error); return; }
      clearDashboardCacheForDate(formatDate(currentDate));
      loadData(true);
    })
    .catch(function(err) { alert('네트워크 오류: ' + err.message); });
}

function tradeReturnFieldsHtml(item, cardType) {
  var isCheckout = cardType === 'checkout';
  var status = isCheckout ? normalizeContractStatus(item.contractStatus || item.status || '') : (item.returnStatus || '');
  var memo = item.returnMemo || '';
  var memoKey = memoDraftKeyForTrade(item.tradeId);
  var hasMemoDraft = Object.prototype.hasOwnProperty.call(dashboardMemoDrafts, memoKey);
  var memoValue = hasMemoDraft ? dashboardMemoDrafts[memoKey] : memo;
  var memoDirty = memoValue !== memo;
  var attrs = ' data-trade-id="' + escAttr(item.tradeId) + '"' +
    ' data-label="' + escAttr(item.name) + '"';
  var html = '<div class="trade-return-meta" onclick="event.stopPropagation()">';
  if (isCheckout) {
    html += '<select class="return-status-select" data-field="contractStatus" data-prev="' + escAttr(status) + '"' + attrs + ' onchange="updateContractStatus(this)" onclick="event.stopPropagation()">';
    html += contractStatusOptionsHtml(status);
  } else {
    html += '<select class="return-status-select" data-field="returnStatus" data-prev="' + escAttr(status) + '"' + attrs + ' onchange="updateEquipmentCheck(this)" onclick="event.stopPropagation()">';
    html += returnStatusOptionsHtml(status);
  }
  html += '</select>';
  html += '<input class="return-memo-input" type="text" maxlength="500" placeholder="특이사항 메모" value="' + escAttr(memoValue) + '" data-field="memo" data-prev="' + escAttr(memo) + '"' + attrs + ' oninput="markEquipmentMemoDirty(this)" onclick="event.stopPropagation()">';
  html += '<button type="button" class="memo-save-btn' + (memoDirty ? ' is-dirty' : '') + '" onclick="event.stopPropagation();saveEquipmentMemo(this)"' + (memoDirty ? '' : ' disabled') + '>저장</button>';
  html += '<span class="equip-save-state"></span>';
  html += '</div>';
  return html;
}

function normalizeContractStatus(current) {
  current = String(current || '').trim();
  if (current === '확정') return '예약';
  if (current === '반납완료') return '반출';
  return CONTRACT_STATUS_OPTIONS.indexOf(current) >= 0 ? current : '';
}

function contractStatusOptionsHtml(current) {
  current = normalizeContractStatus(current);
  return CONTRACT_STATUS_OPTIONS.map(function(opt) {
    var label = opt || '계약상태';
    return '<option value="' + escAttr(opt) + '"' + (opt === current ? ' selected' : '') + '>' + escHtml(label) + '</option>';
  }).join('');
}

function returnStatusOptionsHtml(current) {
  current = normalizeReturnStatusForSelect(current);
  var options = RETURN_STATUS_OPTIONS.slice();
  if (current && options.indexOf(current) < 0) options.splice(1, 0, current);
  return options.map(function(opt) {
    var label = opt || '반납상태';
    return '<option value="' + escAttr(opt) + '"' + (opt === current ? ' selected' : '') + '>' + escHtml(label) + '</option>';
  }).join('');
}

function normalizeReturnStatusForSelect(current) {
  current = String(current || '').trim();
  if (current === '정상') return '반납완료';
  return current;
}

function equipmentCheckTimerKey(el) {
  return [
    el.getAttribute('data-trade-id') || '',
    el.getAttribute('data-field') || ''
  ].join('|');
}

function memoDraftKeyForTrade(tid) {
  return String(tid || '') + '|memo';
}

function memoDraftKey(input) {
  return memoDraftKeyForTrade(input.getAttribute('data-trade-id') || '');
}

function markEquipmentMemoDirty(input) {
  dashboardMemoDrafts[memoDraftKey(input)] = input.value || '';
  syncMemoSaveButton(input);
  var dirty = (input.getAttribute('data-prev') || '') !== input.value;
  setEquipmentCheckState(input, dirty ? '저장 전' : '', false);
}

function syncMemoSaveButton(input) {
  var box = input.closest('.trade-return-meta');
  var btn = box ? box.querySelector('.memo-save-btn') : null;
  if (!btn) return;
  var dirty = (input.getAttribute('data-prev') || '') !== input.value;
  btn.disabled = !dirty;
  btn.classList.toggle('is-dirty', dirty);
}

function saveEquipmentMemo(btn) {
  var box = btn.closest('.trade-return-meta');
  var input = box ? box.querySelector('.return-memo-input[data-field="memo"]') : null;
  if (!input) return;
  updateEquipmentCheck(input, btn);
}

function updateEquipmentCheck(el, triggerBtn) {
  var field = el.getAttribute('data-field') || '';
  var prev = el.getAttribute('data-prev') || '';
  var value = el.value || '';
  var payload = {
    key: 'village2026',
    action: 'updateEquipmentCheck',
    tid: el.getAttribute('data-trade-id') || '',
    label: el.getAttribute('data-label') || '',
    field: field,
    value: value
  };
  var key = equipmentCheckTimerKey(el);
  if (equipmentMemoSaveTimers[key]) {
    clearTimeout(equipmentMemoSaveTimers[key]);
    delete equipmentMemoSaveTimers[key];
  }
  if (prev === value) {
    setEquipmentCheckState(el, '', false);
    return;
  }

  el.classList.remove('is-error');
  el.classList.add('is-saving');
  if (el.tagName === 'SELECT') el.disabled = true;
  if (triggerBtn) triggerBtn.disabled = true;
  setEquipmentCheckState(el, '저장 중', false);

  fetch(API_URL || '', { method: 'POST', body: JSON.stringify(payload) })
    .then(function(r) { return r.json(); })
    .then(function(res) {
      el.classList.remove('is-saving');
      if (el.tagName === 'SELECT') el.disabled = false;
      if (triggerBtn) triggerBtn.disabled = false;
      if (res.error) throw new Error(res.error);
      el.setAttribute('data-prev', value);
      syncEquipmentCheckInMemory(payload, res);
      syncTradeFieldControls(payload.field, payload.tid, value);
      if (field === 'memo') syncMemoSaveButton(el);
      setEquipmentCheckState(el, '저장됨', false);
      setTimeout(function() { setEquipmentCheckState(el, '', false); }, 1200);
    })
    .catch(function(err) {
      el.classList.remove('is-saving');
      el.classList.add('is-error');
      if (triggerBtn) triggerBtn.disabled = false;
      if (el.tagName === 'SELECT') {
        el.disabled = false;
        el.value = prev;
      }
      if (field === 'memo') syncMemoSaveButton(el);
      setEquipmentCheckState(el, '저장 실패: ' + err.message, true);
    });
}

function updateContractStatus(el) {
  var prev = el.getAttribute('data-prev') || '';
  var status = el.value || '';
  var tid = el.getAttribute('data-trade-id') || '';
  if (prev === status) {
    setEquipmentCheckState(el, '', false);
    return;
  }

  if (status === '취소' && !confirm('이 계약을 취소처리할까요?\n스케줄상세와 거래내역에서도 제거됩니다.')) {
    el.value = prev;
    setEquipmentCheckState(el, '', false);
    return;
  }

  el.classList.remove('is-error');
  el.classList.add('is-saving');
  el.disabled = true;
  setEquipmentCheckState(el, '저장 중', false);

  fetch(API_URL || '', {
    method: 'POST',
    body: JSON.stringify({
      key: 'village2026',
      action: 'updateContractStatus',
      tid: tid,
      status: status
    })
  })
    .then(function(r) { return r.json(); })
    .then(function(res) {
      el.classList.remove('is-saving');
      el.disabled = false;
      if (res.error) throw new Error(res.error);
      el.setAttribute('data-prev', status);
      syncContractStatusInMemory(tid, status);
      syncTradeFieldControls('contractStatus', tid, status);
      clearDashboardCacheForDate(formatDate(currentDate));
      if (status === '취소') {
        setEquipmentCheckState(el, '취소 처리됨', false);
        loadData(true);
        return;
      }
      setEquipmentCheckState(el, '저장됨', false);
      setTimeout(function() { setEquipmentCheckState(el, '', false); }, 1200);
    })
    .catch(function(err) {
      el.classList.remove('is-saving');
      el.classList.add('is-error');
      el.disabled = false;
      el.value = prev;
      setEquipmentCheckState(el, '저장 실패: ' + err.message, true);
    });
}

function cancelDashboardTrade(btn, tid, name) {
  tid = String(tid || '').trim();
  if (!tid) return;

  var label = name || tid;
  if (!confirm(label + ' 건을 취소처리할까요?\n스케줄상세와 거래내역에서도 제거됩니다.')) return;

  var originalText = btn.textContent;
  btn.disabled = true;
  btn.textContent = '처리 중';

  fetch(API_URL || '', {
    method: 'POST',
    body: JSON.stringify({
      key: 'village2026',
      action: 'updateContractStatus',
      tid: tid,
      status: '취소'
    })
  })
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res.error) throw new Error(res.error);
      clearDashboardCacheForDate(formatDate(currentDate));
      loadData(true);
    })
    .catch(function(err) {
      btn.disabled = false;
      btn.textContent = originalText;
      alert('취소 처리 실패: ' + err.message);
    });
}

function setEquipmentCheckState(el, text, isError) {
  var box = el.closest('.trade-return-meta, .equip-return-meta');
  var state = box ? box.querySelector('.equip-save-state') : null;
  if (!state) return;
  state.textContent = text || '';
  state.classList.toggle('is-error', !!isError);
}

function syncContractStatusInMemory(tid, status) {
  if (!dashboardData) return;
  dashboardItemsForTrade(tid).forEach(function(item) {
    item.contractStatus = status;
  });
  persistCurrentDashboardCache();
}

function syncTradeFieldControls(field, tid, value) {
  document.querySelectorAll('[data-field="' + field + '"][data-trade-id]').forEach(function(ctrl) {
    if ((ctrl.getAttribute('data-trade-id') || '') !== tid) return;
    ctrl.value = value;
    ctrl.setAttribute('data-prev', value);
    if (field === 'memo') syncMemoSaveButton(ctrl);
  });
}

function syncEquipmentCheckInMemory(payload, res) {
  if (!dashboardData) return;
  dashboardItemsForTrade(payload.tid).forEach(function(item) {
    if (payload.field === 'returnStatus') item.returnStatus = payload.value;
    if (payload.field === 'memo') item.returnMemo = payload.value;
    if (res && res.row) item.equipmentCheckRow = res.row;
  });
  if (payload.field === 'memo') {
    var key = memoDraftKeyForTrade(payload.tid);
    dashboardMemoDrafts[key] = payload.value;
    setTimeout(function() {
      if (dashboardMemoDrafts[key] === payload.value) delete dashboardMemoDrafts[key];
    }, 15000);
  }
  persistCurrentDashboardCache();
}

function toggleItem(cb, scheduleId, phase) {
  var nowDone = !cb.classList.contains('checked');
  cb.classList.toggle('checked', nowDone);
  cb.textContent = nowDone ? '✓' : '';
  var row = cb.closest('.equip-row');
  if (row) row.classList.toggle('checked', nowDone);
  syncItemCheckInMemory(scheduleId, phase, nowDone);

  fetch(API_URL + '?key=village2026&action=toggleItem'
    + '&scheduleId=' + encodeURIComponent(scheduleId)
    + '&phase=' + phase
    + '&done=' + (nowDone ? '1' : '0'))
    .then(function(r) { return r.json(); })
    .catch(function() {
      cb.classList.toggle('checked', !nowDone);
      cb.textContent = !nowDone ? '✓' : '';
      if (row) row.classList.toggle('checked', !nowDone);
      syncItemCheckInMemory(scheduleId, phase, !nowDone);
    });
}

function toggleTask(btn, tid, action) {
  // action = 'toggleSetup' (반출) 또는 'toggleReturn' (반납)
  var nowDone = !btn.classList.contains('checked');
  // Optimistic UI — 토글 버튼이 속한 카드만 업데이트 (반출과 반납 따로 관리)
  btn.classList.toggle('checked', nowDone);
  setTaskToggleLabel(btn, action, nowDone, nowDone ? '' : '');
  var card = btn.closest('.schedule-card');
  if (card) card.classList.toggle('task-done', nowDone);
  syncTaskDoneInMemory(tid, action, nowDone, '');

  fetch(API_URL + '?key=village2026&action=' + action + '&tid=' + encodeURIComponent(tid) + '&done=' + (nowDone ? '1' : '0'))
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res && res.error) throw new Error(res.error);
      var doneAt = res && (res.doneAt || res.setupDoneAt || res.returnDoneAt || '');
      setTaskToggleLabel(btn, action, nowDone, doneAt);
      syncTaskDoneInMemory(tid, action, nowDone, doneAt);
      if (action === 'toggleReturn' && res && res.contractStatus) {
        syncContractStatusInMemory(tid, res.contractStatus);
      }
    })
    .catch(function() {
      btn.classList.toggle('checked', !nowDone);
      setTaskToggleLabel(btn, action, !nowDone, '');
      if (card) card.classList.toggle('task-done', !nowDone);
      syncTaskDoneInMemory(tid, action, !nowDone, '');
    });
}

function syncTaskDoneInMemory(tid, action, done, doneAt) {
  dashboardItemsForTrade(tid).forEach(function(item) {
    if (action === 'toggleSetup') {
      item.setupDone = done;
      item.setupDoneAt = done ? (doneAt || item.setupDoneAt || '') : '';
    }
    if (action === 'toggleReturn') {
      item.returnDone = done;
      item.returnDoneAt = done ? (doneAt || item.returnDoneAt || '') : '';
      item.contractStatus = done ? '반납완료' : '반출';
    }
  });
  persistCurrentDashboardCache();
}

function taskToggleLabel(cardType, done, item) {
  var isCheckin = cardType === 'checkin';
  var prefix = isCheckin ? '반납' : '반출';
  if (!done) return prefix + '완료';
  var doneAt = isCheckin ? (item && item.returnDoneAt) : (item && item.setupDoneAt);
  var time = dashboardDoneTime(doneAt);
  return time ? prefix + ' ' + time : prefix + '완료';
}

function setTaskToggleLabel(btn, action, done, doneAt) {
  var prefix = action === 'toggleReturn' ? '반납' : '반출';
  if (!done) {
    btn.textContent = prefix + '완료';
    return;
  }
  var time = dashboardDoneTime(doneAt);
  btn.textContent = time ? prefix + ' ' + time : prefix + ' 저장중';
}

function dashboardDoneTime(value) {
  var text = String(value || '').trim();
  if (!text) return '';
  var match = text.match(/(\d{1,2}):(\d{2})(?::\d{2})?/);
  if (!match) return '';
  return match[1].padStart(2, '0') + ':' + match[2];
}

function syncItemCheckInMemory(scheduleId, phase, done) {
  if (!dashboardData) return;
  ['checkout', 'checkin'].forEach(function(listName) {
    (dashboardData[listName] || []).forEach(function(item) {
      (item.equipments || []).forEach(function(eq) {
        if (eq.scheduleId !== scheduleId) return;
        if (phase === 'checkout') eq.checkedCheckout = done;
        if (phase === 'checkin') eq.checkedCheckin = done;
      });
    });
  });
  persistCurrentDashboardCache();
}

function photoGalleryHtml(item) {
  var cached = dashboardPhotoStore[item.tradeId];
  var isLoading = !cached && !!dashboardPhotoLoading[item.tradeId];
  var photos = normalizeDashboardPhotos(cached || item.photos);
  var emptyLabel = isLoading ? '불러오는 중' : '사진 없음';
  var html = '<div class="photo-panel" data-photo-tid="' + escAttr(item.tradeId) + '" onclick="event.stopPropagation()">';
  html += photoPhaseRowHtml(item.tradeId, 'checkout', '반출', photos.checkout, false, emptyLabel);
  html += photoPhaseRowHtml(item.tradeId, 'checkin', '반납', photos.checkin, false, emptyLabel);
  if (photos.other && photos.other.length) {
    html += photoPhaseRowHtml(item.tradeId, 'other', '기타', photos.other, true, emptyLabel);
  }
  html += '<div class="photo-upload-state" data-photo-state="' + escAttr(item.tradeId) + '"></div>';
  html += '</div>';
  return html;
}

function normalizeDashboardPhotos(photos) {
  photos = photos || {};
  return {
    checkout: photos.checkout || [],
    checkin: photos.checkin || [],
    other: photos.other || []
  };
}

function photoPhaseRowHtml(tid, phase, label, list, readOnly, emptyLabel) {
  list = list || [];
  var html = '<div class="photo-row">';
  html += '<div class="photo-label">' + escHtml(label) + '</div>';
  html += '<div class="photo-thumbs">';
  if (!list.length) {
    html += '<span class="photo-empty">' + escHtml(emptyLabel || '사진 없음') + '</span>';
  } else {
    list.slice(0, 4).forEach(function(photo) {
      var src = photo.thumbnailUrl || photo.url || '';
      if (!src) return;
      html += '<img class="photo-thumb" src="' + escAttr(src) + '" alt="' + escAttr(label + ' 사진') + '" loading="lazy" onclick="event.stopPropagation();openPhotoGallery(\'' + escJs(tid) + '\')">';
    });
    if (list.length > 4) {
      html += '<button class="photo-more" onclick="event.stopPropagation();openPhotoGallery(\'' + escJs(tid) + '\')">+' + (list.length - 4) + '</button>';
    }
  }
  html += '</div>';
  if (!readOnly) {
    html += '<button class="photo-add-btn" onclick="event.stopPropagation();openPhotoPicker(\'' + escJs(tid) + '\',\'' + phase + '\')">사진 추가</button>';
  }
  html += '</div>';
  return html;
}

function scheduleDashboardPhotoLoad(items) {
  clearTimeout(dashboardPhotoBatchTimer);
  dashboardPhotoBatchTimer = setTimeout(function() {
    var tids = uniquePhotoTradeIds(items);
    if (!tids.length) return;
    tids.forEach(function(tid) { dashboardPhotoLoading[tid] = true; });
    updatePhotoPanels();
    fetchDashboardPhotosBatch(tids)
      .then(function(map) {
        Object.keys(map || {}).forEach(function(tid) {
          dashboardPhotoStore[tid] = normalizeDashboardPhotos(map[tid]);
          delete dashboardPhotoLoading[tid];
        });
        updatePhotoPanels();
      })
      .catch(function() {
        tids.forEach(function(tid) { delete dashboardPhotoLoading[tid]; });
        updatePhotoPanels();
      });
  }, 80);
}

function uniquePhotoTradeIds(items) {
  var seen = {};
  var tids = [];
  (items || []).forEach(function(item) {
    var tid = item && item.tradeId ? String(item.tradeId) : '';
    if (!tid || seen[tid] || dashboardPhotoStore[tid] || dashboardPhotoLoading[tid]) return;
    seen[tid] = true;
    tids.push(tid);
  });
  return tids;
}
