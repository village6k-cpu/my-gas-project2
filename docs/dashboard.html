function fetchDashboardPhotosBatch(tids) {
  return fetch(API_URL || '', {
    method: 'POST',
    body: JSON.stringify({
      key: 'village2026',
      action: 'dashboardPhotosBatch',
      tids: tids
    })
  })
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res.error) throw new Error(res.error);
      return res.photosByTrade || {};
    });
}

function updatePhotoPanels() {
  document.querySelectorAll('.photo-panel[data-photo-tid]').forEach(function(panel) {
    var tid = panel.getAttribute('data-photo-tid') || '';
    panel.outerHTML = photoGalleryHtml({ tradeId: tid, photos: dashboardPhotoStore[tid] });
  });
}

function openPhotoPicker(tid, phase) {
  var input = document.getElementById('dashboardPhotoInput');
  if (!input) {
    input = document.createElement('input');
    input.id = 'dashboardPhotoInput';
    input.type = 'file';
    input.accept = 'image/*';
    input.multiple = true;
    input.style.display = 'none';
    document.body.appendChild(input);
  }
  input.onchange = function() {
    var files = Array.prototype.slice.call(input.files || []);
    input.value = '';
    uploadDashboardPhotoFiles(tid, phase, files);
  };
  input.click();
}

function uploadDashboardPhotoFiles(tid, phase, files) {
  if (!files || !files.length) return;
  var label = phase === 'checkin' ? '반납' : '반출';
  setPhotoUploadState(tid, label + ' 사진 ' + files.length + '장 업로드 중', false);

  var successes = 0;
  var failures = [];
  var uploadedPhotos = [];
  files.reduce(function(chain, file) {
    return chain.then(function() {
      return compressDashboardPhoto(file)
        .then(function(payload) {
          return postDashboardPhoto(tid, phase, payload);
        })
        .then(function(res) {
          successes++;
          if (res && res.photo) uploadedPhotos.push({ phase: phase, photo: res.photo });
        })
        .catch(function(err) {
          failures.push(file.name + ': ' + err.message);
        });
    });
  }, Promise.resolve()).then(function() {
    if (successes > 0) {
      uploadedPhotos.forEach(function(entry) {
        appendDashboardPhotoToStore(tid, entry.phase, entry.photo);
      });
      delete dashboardPhotoLoading[tid];
      updatePhotoPanels();
    }
    if (failures.length) {
      setPhotoUploadState(tid, '업로드 실패 ' + failures.length + '건', true);
      alert('사진 업로드 실패\n' + failures.join('\n'));
      return;
    }
    setPhotoUploadState(tid, '업로드 완료', false);
    setTimeout(function() { setPhotoUploadState(tid, '', false); }, 1400);
  });
}

function compressDashboardPhoto(file) {
  return new Promise(function(resolve, reject) {
    if (!file || !/^image\//.test(file.type || '')) {
      reject(new Error('이미지 파일만 업로드할 수 있습니다'));
      return;
    }

    var reader = new FileReader();
    reader.onload = function(e) {
      var img = new Image();
      img.onload = function() {
        var maxSide = 1600;
        var scale = Math.min(1, maxSide / Math.max(img.width, img.height));
        var width = Math.max(1, Math.round(img.width * scale));
        var height = Math.max(1, Math.round(img.height * scale));
        var canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        var ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, width, height);
        ctx.drawImage(img, 0, 0, width, height);
        var baseName = (file.name || 'photo').replace(/\.[^.]+$/, '') + '.jpg';
        resolve({
          fileName: baseName,
          mimeType: 'image/jpeg',
          data: canvas.toDataURL('image/jpeg', 0.82)
        });
      };
      img.onerror = function() { reject(new Error('이미지를 읽지 못했습니다')); };
      img.src = e.target.result;
    };
    reader.onerror = function() { reject(new Error('파일을 읽지 못했습니다')); };
    reader.readAsDataURL(file);
  });
}

function postDashboardPhoto(tid, phase, payload) {
  return fetch(API_URL || '', {
    method: 'POST',
    body: JSON.stringify({
      key: 'village2026',
      action: 'uploadDashboardPhoto',
      tid: tid,
      phase: phase,
      fileName: payload.fileName,
      mimeType: payload.mimeType,
      data: payload.data
    })
  })
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res.error) throw new Error(res.error);
      return res;
    });
}

function appendDashboardPhotoToStore(tid, phase, photo) {
  if (!tid || !photo) return;
  var storePhotos = normalizeDashboardPhotos(dashboardPhotoStore[tid]);
  var targetPhase = phase === 'checkin' ? 'checkin' : 'checkout';
  mergePhotoList_(storePhotos[targetPhase], [photo]);
  dashboardPhotoStore[tid] = storePhotos;
}

function setPhotoUploadState(tid, text, isError) {
  document.querySelectorAll('[data-photo-state]').forEach(function(el) {
    if ((el.getAttribute('data-photo-state') || '') !== tid) return;
    el.textContent = text || '';
    el.classList.toggle('is-error', !!isError);
  });
}

function openPhotoGallery(tid) {
  if (!dashboardPhotoStore[tid]) {
    dashboardPhotoLoading[tid] = true;
    updatePhotoPanels();
    fetchDashboardPhotosBatch([tid]).then(function(map) {
      dashboardPhotoStore[tid] = normalizeDashboardPhotos(map[tid]);
      delete dashboardPhotoLoading[tid];
      updatePhotoPanels();
      openPhotoGallery(tid);
    }).catch(function(err) {
      delete dashboardPhotoLoading[tid];
      updatePhotoPanels();
      alert('사진 불러오기 실패: ' + err.message);
    });
    return;
  }
  var photos = getDashboardPhotosByTrade(tid);
  var modal = document.getElementById('photoModal');
  var grid = document.getElementById('photoModalGrid');
  document.getElementById('photoModalTitle').textContent = tid + ' 사진';
  grid.innerHTML =
    renderPhotoModalSection('반출 사진', photos.checkout)
    + renderPhotoModalSection('반납 사진', photos.checkin)
    + renderPhotoModalSection('기타 사진', photos.other);
  if (!grid.innerHTML) grid.innerHTML = '<div class="empty-state"><div class="text">등록된 사진이 없습니다</div></div>';
  modal.classList.add('open');
}

function closePhotoModal() {
  document.getElementById('photoModal').classList.remove('open');
}

function renderPhotoModalSection(title, list) {
  list = list || [];
  if (!list.length) return '';
  var html = '<div class="photo-modal-section">';
  html += '<div class="photo-modal-section-title">' + escHtml(title) + '</div>';
  html += '<div class="photo-modal-thumbs">';
  list.forEach(function(photo) {
    var src = photo.thumbnailUrl || photo.url || '';
    var href = photo.url || photo.thumbnailUrl || '';
    if (!src) return;
    html += '<a href="' + escAttr(href) + '" target="_blank" onclick="event.stopPropagation()">';
    html += '<img class="photo-modal-thumb" src="' + escAttr(src) + '" alt="' + escAttr(title) + '" loading="lazy">';
    html += '</a>';
  });
  html += '</div></div>';
  return html;
}

function getDashboardPhotosByTrade(tid) {
  var merged = normalizeDashboardPhotos();
  var storePhotos = normalizeDashboardPhotos(dashboardPhotoStore[tid]);
  mergePhotoList_(merged.checkout, storePhotos.checkout);
  mergePhotoList_(merged.checkin, storePhotos.checkin);
  mergePhotoList_(merged.other, storePhotos.other);
  if (!dashboardData) return merged;
  ['checkout', 'checkin'].forEach(function(listName) {
    (dashboardData[listName] || []).forEach(function(item) {
      if (item.tradeId !== tid) return;
      var photos = normalizeDashboardPhotos(item.photos);
      mergePhotoList_(merged.checkout, photos.checkout);
      mergePhotoList_(merged.checkin, photos.checkin);
      mergePhotoList_(merged.other, photos.other);
    });
  });
  return merged;
}

function mergePhotoList_(target, source) {
  (source || []).forEach(function(photo) {
    var key = photo.fileId || photo.url || photo.thumbnailUrl;
    for (var i = 0; i < target.length; i++) {
      if ((target[i].fileId || target[i].url || target[i].thumbnailUrl) === key) return;
    }
    target.push(photo);
  });
}

function cardActionHtml(item, cardType) {
  var html = '<div class="card-actions" onclick="event.stopPropagation()">';
  if (item.contractUrl) {
    html += '<a class="card-contract-btn" href="' + escAttr(item.contractUrl) + '" target="_blank" onclick="event.stopPropagation()">계약서 열기</a>';
  } else {
    html += '<span class="card-contract-btn disabled">계약서 없음</span>';
  }
  html += '<button class="trade-action-btn" onclick="event.stopPropagation();runTradeOpsAction(this,\'' + escJs(item.tradeId) + '\',\'sendEstimate\')">견적서 발송</button>';
  if (cardType === 'checkin' && item.tradeId) {
    html += '<button class="trade-action-btn danger" onclick="event.stopPropagation();cancelDashboardTrade(this,\'' + escJs(item.tradeId) + '\',\'' + escJs(item.name || item.tradeId) + '\')">취소처리</button>';
  }
  html += paymentSelectHtml(item);
  html += depositStatusSelectHtml(item);
  html += billingCompanyInputHtml(item);
  html += proofTypeSelectHtml(item);
  html += issueStatusSelectHtml(item);
  html += '</div>';
  if (item.paymentWarning) html += '<div class="detail-note">' + escHtml(item.paymentWarning) + '</div>';
  if (item.issueNote && /실패|오류|증빙|발행/.test(item.issueNote)) html += '<div class="detail-note">' + escHtml(item.issueNote) + '</div>';
  return html;
}

function paymentSelectHtml(item) {
  var options = [''].concat((dashboardData && dashboardData.paymentOptions) || ['미정', '계좌', '카드', '현금', '기타']);
  var current = item.paymentMethod || '';
  var html = '<select class="payment-select" data-prev="' + escAttr(current) + '" onclick="event.stopPropagation()" onchange="updatePaymentMethod(event,this,\'' + escJs(item.tradeId) + '\')">';
  options.forEach(function(opt) {
    html += '<option value="' + escAttr(opt) + '"' + (opt === current ? ' selected' : '') + '>' + escHtml(opt || '결제수단') + '</option>';
  });
  html += '</select>';
  return html;
}

function billingCompanyInputHtml(item) {
  var current = item.billingCompany || '';
  return '<input class="billing-company-input" type="text" list="billingCompanyOptionsList" autocomplete="off" placeholder="발행처 상호" value="' + escAttr(current) + '" data-prev="' + escAttr(current) + '" onclick="event.stopPropagation()" onchange="updateBillingCompany(event,this,\'' + escJs(item.tradeId) + '\')" onblur="updateBillingCompany(event,this,\'' + escJs(item.tradeId) + '\')" onkeydown="if(event.key===\'Enter\'){event.preventDefault();this.blur();}">';
}

function updatePaymentMethod(event, select, tradeId) {
  event.stopPropagation();
  var prev = select.getAttribute('data-prev') || '';
  var method = select.value;
  select.disabled = true;
  fetch(API_URL + '?key=village2026&action=updatePayment&tid=' + encodeURIComponent(tradeId) + '&method=' + encodeURIComponent(method))
    .then(function(r) { return r.json(); })
    .then(function(res) {
      select.disabled = false;
      if (res.error) {
        alert('결제수단 저장 실패: ' + res.error);
        select.value = prev;
        return;
      }
      select.setAttribute('data-prev', method);
      syncPaymentInMemory(tradeId, method, res);
      if (res.warning) alert(res.warning);
    })
    .catch(function(err) {
      select.disabled = false;
      select.value = prev;
      alert('결제수단 저장 실패: ' + err.message);
    });
}

function updateBillingCompany(event, input, tradeId) {
  event.stopPropagation();
  var prev = input.getAttribute('data-prev') || '';
  var billingCompany = (input.value || '').trim();
  if (billingCompany === prev) return;
  input.disabled = true;
  fetch(API_URL || '', {
    method: 'POST',
    body: JSON.stringify({
      key: 'village2026',
      action: 'updateBillingCompany',
      tid: tradeId,
      billingCompany: billingCompany
    })
  })
    .then(function(r) { return r.json(); })
    .then(function(res) {
      input.disabled = false;
      if (res.error) {
        alert('발행처 상호 저장 실패: ' + res.error);
        input.value = prev;
        return;
      }
      var nextValue = res.billingCompany || billingCompany;
      input.value = nextValue;
      input.setAttribute('data-prev', nextValue);
      syncBillingCompanyInMemory(tradeId, nextValue);
    })
    .catch(function(err) {
      input.disabled = false;
      input.value = prev;
      alert('발행처 상호 저장 실패: ' + err.message);
    });
}

function proofTypeSelectHtml(item) {
  return tradeProofSelectHtml(item, 'proofType', (dashboardData && dashboardData.proofTypeOptions) || ['미발행', '세금계산서', '현금영수증(전화번호)', '현금영수증(사업자번호)'], '증빙유형');
}

function issueStatusSelectHtml(item) {
  return tradeProofSelectHtml(item, 'issueStatus', (dashboardData && dashboardData.issueStatusOptions) || ['미발행', '발행요청', '발행완료', '전송실패'], '발행상태');
}

function depositStatusSelectHtml(item) {
  return tradeProofSelectHtml(item, 'depositStatus', (dashboardData && dashboardData.depositStatusOptions) || ['미입금', '입금완료', '부분입금', '환불'], '입금상태');
}

function tradeProofSelectHtml(item, field, baseOptions, placeholder) {
  var current = '';
  if (field === 'proofType') current = item.proofType || '';
  if (field === 'issueStatus') current = item.issueStatus || '';
  if (field === 'depositStatus') current = item.depositStatus || '';
  var options = [''].concat((baseOptions || []).filter(Boolean));
  if (current && options.indexOf(current) < 0) options.splice(1, 0, current);
  var className = field === 'depositStatus' ? 'payment-select deposit-status-select' : 'proof-select';
  var html = '<select class="' + className + '" data-field="' + field + '" data-prev="' + escAttr(current) + '" onclick="event.stopPropagation()" onchange="updateTradeProofField(event,this,\'' + escJs(item.tradeId) + '\',\'' + field + '\')">';
  options.forEach(function(opt) {
    html += '<option value="' + escAttr(opt) + '"' + (opt === current ? ' selected' : '') + '>' + escHtml(opt || placeholder) + '</option>';
  });
  html += '</select>';
  return html;
}

function updateTradeProofField(event, select, tradeId, field) {
  event.stopPropagation();
  var prev = select.getAttribute('data-prev') || '';
  var value = select.value || '';
  var errorLabel = field === 'depositStatus' ? '입금상태 저장 실패' : '증빙 저장 실패';
  if (field === 'issueStatus' && value === '발행요청') {
    var issueItems = dashboardItemsForTrade(tradeId);
    var issueItem = issueItems.length ? issueItems[0] : {};
    if ((issueItem.proofType || '') === '세금계산서' && !(issueItem.billingCompany || '')) {
      alert('세금계산서 발행 전 발행처 상호를 선택하세요.');
      select.value = prev;
      return;
    }
    if (!confirm('이 거래건의 계산서/현금영수증을 실제 발행할까요?')) {
      select.value = prev;
      return;
    }
  }

  select.disabled = true;
  fetch(API_URL || '', {
    method: 'POST',
    body: JSON.stringify({
      key: 'village2026',
      action: 'updateTradeProof',
      tid: tradeId,
      field: field,
      value: value
    })
  })
    .then(function(r) { return r.json(); })
    .then(function(res) {
      select.disabled = false;
      if (res.error) {
        alert(errorLabel + ': ' + res.error);
        select.value = prev;
        return;
      }
      var nextValue = res.issueStatus || res.value || value;
      select.value = nextValue;
      select.setAttribute('data-prev', nextValue);
      syncTradeProofInMemory(tradeId, field, nextValue, res);
      if (res.message) alert(res.message);
    })
    .catch(function(err) {
      select.disabled = false;
      select.value = prev;
      alert(errorLabel + ': ' + err.message);
    });
}

function runTradeOpsAction(button, tradeId, action) {
  var isIssue = action === 'issueProof';
  if (isIssue && !confirm('이 거래건의 계산서/현금영수증을 실제 발행할까요?')) return;

  var label = button.textContent;
  button.disabled = true;
  button.textContent = '처리 중';

  fetch(API_URL || '', {
    method: 'POST',
    body: JSON.stringify({
      key: 'village2026',
      action: action,
      tid: tradeId
    })
  })
    .then(function(r) { return r.json(); })
    .then(function(res) {
      button.disabled = false;
      button.textContent = label;
      if (res.error) {
        alert((isIssue ? '계산서 발행 실패: ' : '견적서 발송 실패: ') + res.error);
        return;
      }
      if (isIssue) syncTradeProofInMemory(tradeId, 'issueStatus', res.issueStatus || '발행요청', res);
      alert(res.message || (isIssue ? '계산서 발행 요청 완료' : '견적서 발송 요청 완료'));
    })
    .catch(function(err) {
      button.disabled = false;
      button.textContent = label;
      alert((isIssue ? '계산서 발행 실패: ' : '견적서 발송 실패: ') + err.message);
    });
}

function syncTradeProofInMemory(tid, field, value, res) {
  if (!dashboardData) return;
  dashboardItemsForTrade(tid).forEach(function(item) {
    if (field === 'proofType') item.proofType = value;
    if (field === 'issueStatus') item.issueStatus = res && res.issueStatus ? res.issueStatus : value;
    if (field === 'depositStatus') item.depositStatus = value;
    if (res && Object.prototype.hasOwnProperty.call(res, 'billingCompany')) item.billingCompany = res.billingCompany;
    if (res && res.error) item.issueNote = res.error;
    if (res && res.message) item.issueNote = res.message;
  });
  persistCurrentDashboardCache();
  if (field === 'depositStatus' && !dashboardSearchQuery && activeDashboardTab === 'attention') {
    renderDashboard(dashboardData, dashboardData.date || formatDate(currentDate));
  }
}

function syncBillingCompanyInMemory(tid, billingCompany) {
  if (!dashboardData) return;
  dashboardItemsForTrade(tid).forEach(function(item) {
    item.billingCompany = billingCompany;
  });
  persistCurrentDashboardCache();
}

function syncPaymentInMemory(tid, method, res) {
  if (!dashboardData) return;
  var depositChangedByPayment = !!(res && res.sideEffects && res.sideEffects.applied && res.sideEffects.columns && res.sideEffects.columns.M);
  dashboardItemsForTrade(tid).forEach(function(item) {
    item.paymentMethod = method;
    item.paymentSource = method ? 'sheet:J' : '';
    if (res && res.warning) item.paymentWarning = res.warning;
    if (res && res.sideEffects && res.sideEffects.applied) {
      if (res.sideEffects.columns && res.sideEffects.columns.K) item.proofType = res.sideEffects.columns.K;
      if (res.sideEffects.columns && res.sideEffects.columns.L) item.issueStatus = res.sideEffects.columns.L;
      if (res.sideEffects.columns && res.sideEffects.columns.M) item.depositStatus = res.sideEffects.columns.M;
    }
  });
  persistCurrentDashboardCache();
  if (!dashboardSearchQuery && (activeDashboardTab === 'attention' || depositChangedByPayment)) {
    renderDashboard(dashboardData, dashboardData.date || formatDate(currentDate));
  }
}

function dashboardItemsForTrade(tid) {
  var items = [];
  if (!dashboardData) return items;
  ['checkout', 'checkin'].forEach(function(listName) {
    (dashboardData[listName] || []).forEach(function(item) {
      if (item.tradeId === tid) items.push(item);
    });
  });
  return items;
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) { return escHtml(s).replace(/'/g,'&#39;'); }
function escJs(s) { return String(s || '').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,' '); }

// ── 장비 목록 캐시 + 모달 ─────────────────────
var equipListCache = null;
function loadEquipList() {
  if (equipListCache) return Promise.resolve(equipListCache);
  return fetch(API_URL + '?key=village2026&action=read&sheet=' + encodeURIComponent('목록') + '&range=A2:A1000')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var arr = (d && d.data) ? d.data : [];
      equipListCache = arr.map(function(row) { return Array.isArray(row) ? row[0] : row; })
                          .filter(function(x) { return x; })
                          .map(String);
      // datalist에 옵션 채우기
      var dl = document.getElementById('equipDatalist');
      if (dl) {
        dl.innerHTML = equipListCache.map(function(n) {
          return '<option value="' + escHtml(n) + '"></option>';
        }).join('');
      }
      return equipListCache;
    })
    .catch(function() { equipListCache = []; return []; });
}

var pendingAddTid = null;
var pendingAddMode = 'schedule';

function addEquipRow(name, qty) {
  var container = document.getElementById('equipRows');
  if (!container) return null;

  var row = document.createElement('div');
  row.className = 'multi-equip-row';

  var input = document.createElement('input');
  input.className = 'modal-input equip-name-input';
  input.setAttribute('list', 'equipDatalist');
  input.placeholder = '장비명';
  input.autocomplete = 'off';
  input.value = name || '';

  var qtyInput = document.createElement('input');
  qtyInput.className = 'modal-input equip-qty-input';
  qtyInput.type = 'number';
  qtyInput.min = '1';
  qtyInput.value = qty || '1';

  var removeBtn = document.createElement('button');
  removeBtn.type = 'button';
  removeBtn.className = 'multi-row-remove';
  removeBtn.title = '행 삭제';
  removeBtn.textContent = '×';
  removeBtn.onclick = function() {
    if (container.querySelectorAll('.multi-equip-row').length <= 1) {
      input.value = '';
      qtyInput.value = '1';
      input.focus();
      return;
    }
    row.remove();
  };

  row.appendChild(input);
  row.appendChild(qtyInput);
  row.appendChild(removeBtn);
  container.appendChild(row);
  return row;
}

function resetEquipRows(entries) {
  var container = document.getElementById('equipRows');
  if (!container) return;
  container.innerHTML = '';
  if (entries && entries.length) {
    entries.forEach(function(entry) { addEquipRow(entry.name, entry.qty); });
  } else {
    addEquipRow('', 1);
  }
}

function collectEquipEntries() {
  var rows = document.querySelectorAll('#equipRows .multi-equip-row');
  var merged = {};
  var order = [];
  rows.forEach(function(row) {
    var nameInput = row.querySelector('.equip-name-input');
    var qtyInput = row.querySelector('.equip-qty-input');
    var name = nameInput ? nameInput.value.trim() : '';
    if (!name) return;
    var qty = parseInt(qtyInput ? qtyInput.value : '1', 10);
    if (!qty || qty < 1) qty = 1;
    if (!merged[name]) {
      merged[name] = { name: name, qty: qty };
      order.push(name);
    } else {
      merged[name].qty += qty;
    }
  });
  return order.map(function(name) { return merged[name]; });
}

function setAddEquipBusy(isBusy, label) {
  var btn = document.getElementById('addEquipConfirmBtn');
  var addBtn = document.getElementById('addEquipRowBtn');
  btn.disabled = isBusy;
  btn.textContent = label || (pendingAddMode === 'onsite' ? '가용 확인 후 현장추가' : '가용 확인 후 추가');
  if (addBtn) addBtn.disabled = isBusy;
}

function setAddEquipModalMode(mode) {
  pendingAddMode = mode === 'onsite' ? 'onsite' : 'schedule';
  var title = document.getElementById('addEquipModalTitle');
  var settlementRow = document.getElementById('addEquipSettlementRow');
  if (title) title.textContent = pendingAddMode === 'onsite' ? '현장 추가 반출' : '장비 추가';
  if (settlementRow) settlementRow.classList.toggle('is-visible', pendingAddMode === 'onsite');
  setAddEquipBusy(false);
}

function postAddEquipBatch(tid, entries) {
  return fetch(API_URL + '?key=village2026&action=addEquips&tid=' + encodeURIComponent(tid)
    + '&entries=' + encodeURIComponent(JSON.stringify(entries)))
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res.error) throw new Error(res.error);
      return res;
    });
}

function postOnsiteAddonBatch(tid, entries) {
  var settlement = document.getElementById('addEquipSettlement');
  var payload = {
    key: 'village2026',
    action: 'onsiteAddon',
    tid: tid,
    entries: entries,
    settlementStatus: settlement ? settlement.value : 'pending'
  };
  return fetch(API_URL || '', {
    method: 'POST',
    body: JSON.stringify(payload)
  })
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res.error) throw new Error(res.error);
      return res;
    });
}

function addEquip(tid) {
  pendingAddTid = tid;
  setAddEquipModalMode('schedule');
  resetEquipRows();
  setAddEquipBusy(false);
  document.getElementById('addEquipModal').classList.add('open');
  loadEquipList().then(function() {
    setTimeout(function() {
      var inp = document.querySelector('#equipRows .equip-name-input');
      if (inp) inp.focus();
    }, 50);
  });
}

function addOnsiteAddon(tid) {
  pendingAddTid = tid;
  setAddEquipModalMode('onsite');
  resetEquipRows();
  var settlement = document.getElementById('addEquipSettlement');
  if (settlement) settlement.value = 'pending';
  document.getElementById('addEquipModal').classList.add('open');
  loadEquipList().then(function() {
    setTimeout(function() {
      var inp = document.querySelector('#equipRows .equip-name-input');
      if (inp) inp.focus();
    }, 50);
  });
}

function closeAddEquipModal() {
  document.getElementById('addEquipModal').classList.remove('open');
  pendingAddTid = null;
  pendingAddMode = 'schedule';
}

function confirmAddEquip() {
  if (!pendingAddTid) { closeAddEquipModal(); return; }
  var entries = collectEquipEntries();
  if (!entries.length) { alert('장비명을 하나 이상 입력하거나 선택하세요.'); return; }

  setAddEquipBusy(true, pendingAddMode === 'onsite' ? '현장추가 중...' : '가용 확인 중...');

  var tid = pendingAddTid;
  var mode = pendingAddMode;
  var request = mode === 'onsite' ? postOnsiteAddonBatch(tid, entries) : postAddEquipBatch(tid, entries);
  request.then(function(res) {
    setAddEquipBusy(false);
    closeAddEquipModal();
    clearDashboardCacheForDate(formatDate(currentDate));
    loadData(true);
    if (res.onsiteAddonWarning) {
      alert('장비는 추가됐지만 현장 추가 기록은 확인 필요: ' + res.onsiteAddonWarning);
      return;
    }
    alert(mode === 'onsite'
      ? '현장 추가 반출 기록 완료. 장비 ' + (res.addedEquipments || entries.length) + '개를 추가했습니다.'
      : '가용 확인 완료. 장비 ' + (res.addedEquipments || entries.length) + '개를 추가했습니다.');
  }).catch(function(err) {
    setAddEquipBusy(false);
    alert((mode === 'onsite' ? '현장 추가 실패: ' : '가용 확인 실패: ') + err.message);
  });
}

// 페이지 로드 직후 장비 목록 미리 fetch (모달 열 때 즉시 표시)
window.addEventListener('load', function() { loadEquipList(); });
</script>

  <div class="modal-box">
    <div class="modal-title" id="addEquipModalTitle">장비 추가</div>
    <label class="modal-label">장비명 / 수량</label>
    <div id="equipRows" class="multi-equip-list"></div>
    <button type="button" id="addEquipRowBtn" class="multi-add-row-btn" onclick="addEquipRow()">+ 장비 행 추가</button>
    <div class="settlement-row" id="addEquipSettlementRow">
      <label for="addEquipSettlement">정산</label>
      <select id="addEquipSettlement" class="settlement-select">
        <option value="pending" selected>정산미정</option>
        <option value="free">무상</option>
        <option value="paid">유상</option>
      </select>
    </div>
    <datalist id="equipDatalist"></datalist>
    <div class="modal-actions">
      <button class="modal-btn modal-btn-cancel" onclick="closeAddEquipModal()">취소</button>
      <button id="addEquipConfirmBtn" class="modal-btn modal-btn-confirm" onclick="confirmAddEquip()">가용 확인 후 추가</button>
    </div>
  </div>
</div>

<div id="photoModal" class="modal-overlay" onclick="if(event.target===this)closePhotoModal()">
  <div class="modal-box photo-modal-box">
    <div class="modal-title" id="photoModalTitle">사진</div>
    <div id="photoModalGrid" class="photo-modal-grid"></div>
    <div class="modal-actions">
      <button class="modal-btn modal-btn-cancel" onclick="closePhotoModal()">닫기</button>
    </div>
  </div>
</div>
</body>
</html>
