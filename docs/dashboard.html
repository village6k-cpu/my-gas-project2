function parseDashboardMutationAmount(value) {
  if (typeof value === 'number' && isFinite(value)) return value;
  if (typeof value === 'string') {
    var parsed = Number(value.replace(/[^0-9.-]/g, ''));
    if (isFinite(parsed) && parsed > 0) return parsed;
  }
  return null;
}

function applyDashboardContractMutationResult(tid, res) {
  var result = dashboardMutationResult(res);
  var url = String(result.contractUrl || result.url || '').trim();
  var rawAmount = result.finalAmount != null ? result.finalAmount : result.amount;
  var amount = parseDashboardMutationAmount(rawAmount);
  var hasPending = Object.prototype.hasOwnProperty.call(result, 'contractRegenPending');
  var hasContractData = !!url || amount != null || hasPending;
  if (!hasContractData) return false;
  dashboardEquipmentMutationTargets(tid).forEach(function(item) {
    if (url) item.contractUrl = url;
    if (amount != null) {
      item.actualAmount = amount;
      item.amount = amount;
    }
    if (url || hasPending) item.contractRegenPending = url ? false : result.contractRegenPending !== false;
  });
  return true;
}

function collectDashboardPendingContractTids() {
  var seen = {};
  var tids = [];
  function collect(source) {
    if (!source) return;
    ['checkout', 'checkin'].forEach(function(listName) {
      (source[listName] || []).forEach(function(item) {
        var tid = String((item && item.tradeId) || '').trim();
        if (!tid || !item.contractRegenPending || seen[tid]) return;
        seen[tid] = true;
        tids.push(tid);
      });
    });
  }
  collect(dashboardData);
  collect(dashboardGlobalSearchData);
  return tids;
}

function dashboardContractNeedsLookup(item) {
  var tid = String((item && item.tradeId) || '').trim();
  if (!tid) return false;
  if (item.contractRegenPending) return true;
  if (item.contractUrl) return false;
  if (item.contractExtraChecked || dashboardContractStatusCheckedTids[tid]) return false;
  return true;
}

function collectDashboardContractStatusRefreshTids() {
  var seen = {};
  var tids = [];
  function collect(source) {
    if (!source) return;
    ['checkout', 'checkin'].forEach(function(listName) {
      (source[listName] || []).forEach(function(item) {
        var tid = String((item && item.tradeId) || '').trim();
        if (!tid || !dashboardContractNeedsLookup(item) || seen[tid]) return;
        seen[tid] = true;
        tids.push(tid);
      });
    });
  }
  collect(dashboardData);
  collect(dashboardGlobalSearchData);
  return tids;
}

function syncDashboardContractFieldsFromExtras(extras) {
  extras = extras || {};
  var changed = false;
  Object.keys(extras).forEach(function(tid) {
    var extra = extras[tid] || {};
    dashboardContractStatusCheckedTids[tid] = Date.now();
    dashboardEquipmentMutationTargets(tid).forEach(function(item) {
      var pending = !!extra.contractRegenPending;
      var url = Object.prototype.hasOwnProperty.call(extra, 'contractUrl') ? (extra.contractUrl || '') : item.contractUrl;
      item.contractExtraChecked = true;
      if (item.contractUrl !== url) {
        item.contractUrl = url;
        changed = true;
      }
      if (!!item.contractRegenPending !== pending) {
        item.contractRegenPending = pending;
        changed = true;
      }
    });
  });
  if (changed) {
    renderDashboardEquipmentMutation();
    persistCurrentDashboardCache();
  }
  return changed;
}

function queueDashboardPendingContractStatusRefresh(delayMs) {
  clearTimeout(dashboardContractStatusRefreshTimer);
  if (!collectDashboardContractStatusRefreshTids().length) return;
  dashboardContractStatusRefreshTimer = setTimeout(function() {
    refreshDashboardPendingContractStatus();
  }, Math.max(Number(delayMs) || 0, 1000));
}

function refreshDashboardPendingContractStatus() {
  var tids = collectDashboardContractStatusRefreshTids();
  if (!tids.length) return Promise.resolve(null);
  if (dashboardContractStatusRefreshInFlight) {
    dashboardContractStatusRefreshQueued = true;
    return Promise.resolve(null);
  }

  dashboardContractStatusRefreshInFlight = true;
  return fetch(API_URL + '?key=village2026&action=dashboardContractExtras&tids=' + encodeURIComponent(JSON.stringify(tids)))
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (!res || res.error) throw new Error((res && res.error) || '계약서 상태 조회 실패');
      syncDashboardContractFieldsFromExtras(res.items || {});
      if (collectDashboardContractStatusRefreshTids().length) queueDashboardPendingContractStatusRefresh(7000);
      return res;
    })
    .catch(function() {
      if (collectDashboardContractStatusRefreshTids().length) queueDashboardPendingContractStatusRefresh(7000);
      return null;
    })
    .then(function(res) {
      dashboardContractStatusRefreshInFlight = false;
      if (dashboardContractStatusRefreshQueued) {
        dashboardContractStatusRefreshQueued = false;
        queueDashboardPendingContractStatusRefresh(1000);
      }
      return res;
    });
}

function startDashboardContractRegeneration(tid) {
  tid = String(tid || '').trim();
  if (!tid) return Promise.resolve(null);
  if (dashboardContractRegenInFlight[tid]) {
    dashboardContractRegenQueued[tid] = true;
    return Promise.resolve(null);
  }

  dashboardContractRegenInFlight[tid] = true;
  showDashboardToast('계약서 갱신 중...');
  return fetch(API_URL || '', {
    method: 'POST',
    body: JSON.stringify({
      key: 'village2026',
      action: 'run',
      func: 'regenerateContractById',
      args: { tradeId: tid }
    })
  })
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (!res || res.error || res.success === false) {
        throw new Error((res && res.error) || '계약서 재생성 실패');
      }
      var result = res.result || {};
      if (result.error) throw new Error(result.error);
      applyDashboardContractMutationResult(tid, res);
      renderDashboardEquipmentMutation();
      showDashboardToast('계약서 갱신 완료');
      queueDashboardSilentRefresh(800);
      return res;
    })
    .catch(function() {
      showDashboardToast('계약서 갱신 재시도 대기');
      queueDashboardPendingContractStatusRefresh(7000);
      queueDashboardSilentRefresh(6500);
      return null;
    })
    .then(function(res) {
      dashboardContractRegenInFlight[tid] = false;
      if (dashboardContractRegenQueued[tid]) {
        dashboardContractRegenQueued[tid] = false;
        queueDashboardContractRegeneration(tid);
      }
      return res;
    });
}

function applyDashboardEquipmentMutation(tid, res, context) {
  context = context || {};
  var changed = false;
  if (context.operation === 'add') changed = syncDashboardEquipmentAdditions(tid, res, context);
  if (context.operation === 'remove') changed = syncDashboardEquipmentRemoval(tid, res, context);
  if (context.operation === 'qty') changed = syncDashboardEquipmentQtyUpdate(tid, res, context);
  if (context.operation === 'add' || context.operation === 'remove' || context.operation === 'qty') {
    if (!applyDashboardContractMutationResult(tid, res)) {
      markDashboardContractRegenPending(tid, !(res && res.contractRegenPending === false));
    }
    changed = true;
  }
  if (changed) renderDashboardEquipmentMutation();
  return changed;
}

function dashboardHasPendingContractRegen(data) {
  var pending = false;
  ['checkout', 'checkin'].forEach(function(listName) {
    ((data && data[listName]) || []).forEach(function(item) {
      if (item && item.contractRegenPending) pending = true;
    });
  });
  return pending;
}

function markDashboardContractRegenPending(tid, pending) {
  dashboardEquipmentMutationTargets(tid).forEach(function(item) {
    item.contractRegenPending = pending !== false;
  });
}

function syncDashboardContractFieldsFromData(data) {
  var byTid = {};
  ['checkout', 'checkin'].forEach(function(listName) {
    ((data && data[listName]) || []).forEach(function(item) {
      if (!item || !item.tradeId) return;
      byTid[item.tradeId] = {
        contractUrl: item.contractUrl || '',
        contractRegenPending: !!item.contractRegenPending,
        actualAmount: item.actualAmount,
        amount: item.amount
      };
    });
  });
  Object.keys(byTid).forEach(function(tid) {
    dashboardEquipmentMutationTargets(tid).forEach(function(item) {
      item.contractUrl = byTid[tid].contractUrl;
      item.contractRegenPending = byTid[tid].contractRegenPending;
      if (byTid[tid].actualAmount != null) item.actualAmount = byTid[tid].actualAmount;
      if (byTid[tid].amount != null) item.amount = byTid[tid].amount;
    });
  });
}

function showDashboardToast(message) {
  var el = document.getElementById('dashboardToast');
  if (!el) {
    el = document.createElement('div');
    el.id = 'dashboardToast';
    el.style.cssText = 'position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:9999;background:#222;color:#fff;padding:10px 14px;border-radius:6px;font-size:13px;font-weight:700;box-shadow:0 6px 18px rgba(0,0,0,.18);opacity:0;transition:opacity .18s;';
    document.body.appendChild(el);
  }
  el.textContent = message || '';
  el.style.opacity = '1';
  clearTimeout(el._hideTimer);
  el._hideTimer = setTimeout(function() { el.style.opacity = '0'; }, 1800);
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) { return escHtml(s).replace(/'/g,'&#39;'); }
function escJs(s) { return String(s || '').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,' '); }

// ── 장비 목록 캐시 + 모달 ─────────────────────
var equipListCache = null;
var equipListPromise = null;
var equipListPrefetchQueued = false;
var EQUIP_LIST_LOCAL_KEY = 'dashboardEquipNames_v1';
var EQUIP_LIST_LOCAL_TTL_MS = 6 * 60 * 60 * 1000;

function normalizeEquipList(list) {
  var seen = {};
  return (Array.isArray(list) ? list : []).map(function(name) {
    return String(name || '').trim();
  }).filter(function(name) {
    if (!name || seen[name]) return false;
    seen[name] = true;
    return true;
  });
}

function hydrateEquipDatalist(list) {
  var dl = document.getElementById('equipDatalist');
  if (!dl) return;
  dl.innerHTML = normalizeEquipList(list).map(function(n) {
    return '<option value="' + escAttr(n) + '"></option>';
  }).join('');
}

function setEquipListCache(list, persist) {
  equipListCache = normalizeEquipList(list);
  hydrateEquipDatalist(equipListCache);
  if (persist && equipListCache.length) {
    try {
      localStorage.setItem(EQUIP_LIST_LOCAL_KEY, JSON.stringify({
        ts: Date.now(),
        names: equipListCache
      }));
    } catch (e) {}
  }
  return equipListCache;
}

function hydrateInitialEquipList() {
  if (Array.isArray(INITIAL_EQUIP_NAMES) && INITIAL_EQUIP_NAMES.length) {
    setEquipListCache(INITIAL_EQUIP_NAMES, true);
    return;
  }
  try {
    var raw = localStorage.getItem(EQUIP_LIST_LOCAL_KEY);
    if (!raw) return;
    var cached = JSON.parse(raw);
    if (!cached || !cached.ts || Date.now() - cached.ts > EQUIP_LIST_LOCAL_TTL_MS) return;
    setEquipListCache(cached.names || [], false);
  } catch (e) {}
}

function queueEquipListPrefetch() {
  if ((equipListCache && equipListCache.length) || equipListPrefetchQueued) return;
  equipListPrefetchQueued = true;
  var run = function() { loadEquipList(); };
  if (window.requestIdleCallback) {
    window.requestIdleCallback(run, { timeout: 1200 });
  } else {
    setTimeout(run, 300);
  }
}

function loadEquipList(forceFresh) {
  if (equipListCache && equipListCache.length && !forceFresh) return Promise.resolve(equipListCache);
  if (equipListPromise) return equipListPromise;
  var key = encodeURIComponent(DASHBOARD_API_KEY || 'village2026');
  equipListPromise = fetch(API_URL + '?key=' + key + '&action=dashboardEquipNames')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      equipListPromise = null;
      var arr = d && (d.names || d.data) ? (d.names || d.data) : [];
      return setEquipListCache(arr, true);
    })
    .catch(function() {
      equipListPromise = null;
      return equipListCache || [];
    });
  return equipListPromise;
}

function hideEquipSuggestions(input) {
  var row = input && input.parentNode;
  if (!row) return;
  var box = row.querySelector('.equip-suggest-list');
  if (box) box.classList.remove('open');
}

function hideAllEquipSuggestions() {
  document.querySelectorAll('.equip-suggest-list.open').forEach(function(box) {
    box.classList.remove('open');
  });
}

function getEquipSuggestionBox(input) {
  var row = input && input.parentNode;
  if (!row) return null;
  var box = row.querySelector('.equip-suggest-list');
  if (!box) {
    box = document.createElement('div');
    box.className = 'equip-suggest-list';
    row.appendChild(box);
  }
  return box;
}

function renderEquipSuggestions(input, list, emptyText) {
  var box = getEquipSuggestionBox(input);
  if (!box) return;
  var query = String(input.value || '').trim().toLowerCase();
  var names = normalizeEquipList(list);
  var matches = names.filter(function(name) {
    return !query || name.toLowerCase().indexOf(query) !== -1;
  }).slice(0, 30);
  box.innerHTML = '';
  if (!matches.length) {
    var empty = document.createElement('div');
    empty.className = 'equip-suggest-empty';
    empty.textContent = emptyText || (query ? '일치하는 장비 없음' : '장비 목록 없음');
    box.appendChild(empty);
  } else {
    matches.forEach(function(name) {
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'equip-suggest-option';
      btn.textContent = name;
      btn.onmousedown = function(ev) {
        ev.preventDefault();
        input.value = name;
        hideAllEquipSuggestions();
        input.focus();
      };
      box.appendChild(btn);
    });
  }
  box.classList.add('open');
}

function openEquipSuggestions(input) {
  if (!input) return;
  if (equipListCache && equipListCache.length) {
    renderEquipSuggestions(input, equipListCache);
    return;
  }
  renderEquipSuggestions(input, [], '장비 목록 불러오는 중...');
  loadEquipList().then(function(list) {
    if (document.activeElement === input) renderEquipSuggestions(input, list);
  });
}

function attachEquipDropdown(input) {
  if (!input || input._equipDropdownAttached) return;
  input._equipDropdownAttached = true;
  input.addEventListener('focus', function() { openEquipSuggestions(input); });
  input.addEventListener('input', function() { openEquipSuggestions(input); });
  input.addEventListener('blur', function() {
    setTimeout(function() { hideEquipSuggestions(input); }, 120);
  });
}

function focusFirstEquipInputWithDropdown() {
  setTimeout(function() {
    var input = document.querySelector('#equipRows .equip-name-input');
    if (!input) return;
    input.focus();
    openEquipSuggestions(input);
  }, 50);
}

var pendingAddTid = null;
var pendingAddMode = 'schedule';

function addEquipRow(name, qty) {
  var container = document.getElementById('equipRows');
  if (!container) return null;

  var row = document.createElement('div');
  row.className = 'multi-equip-row';

  var input = document.createElement('input');
  input.className = 'modal-input equip-name-input';
  input.setAttribute('list', 'equipDatalist');
  input.placeholder = '장비명';
  input.autocomplete = 'off';
  input.value = name || '';

  var qtyInput = document.createElement('input');
  qtyInput.className = 'modal-input equip-qty-input';
  qtyInput.type = 'number';
  qtyInput.min = '1';
  qtyInput.value = qty || '1';

  var removeBtn = document.createElement('button');
  removeBtn.type = 'button';
  removeBtn.className = 'multi-row-remove';
  removeBtn.title = '행 삭제';
  removeBtn.textContent = '×';
  removeBtn.onclick = function() {
    if (container.querySelectorAll('.multi-equip-row').length <= 1) {
      input.value = '';
      qtyInput.value = '1';
      input.focus();
      return;
    }
    row.remove();
  };

  row.appendChild(input);
  row.appendChild(qtyInput);
  row.appendChild(removeBtn);
  container.appendChild(row);
  attachEquipDropdown(input);
  if (!name && document.getElementById('addEquipModal') && document.getElementById('addEquipModal').classList.contains('open')) {
    setTimeout(function() {
      input.focus();
      openEquipSuggestions(input);
    }, 0);
  }
  return row;
}

function resetEquipRows(entries) {
  var container = document.getElementById('equipRows');
  if (!container) return;
  container.innerHTML = '';
  if (entries && entries.length) {
    entries.forEach(function(entry) { addEquipRow(entry.name, entry.qty); });
  } else {
    addEquipRow('', 1);
  }
}

function collectEquipEntries() {
  var rows = document.querySelectorAll('#equipRows .multi-equip-row');
  var merged = {};
  var order = [];
  rows.forEach(function(row) {
    var nameInput = row.querySelector('.equip-name-input');
    var qtyInput = row.querySelector('.equip-qty-input');
    var name = nameInput ? nameInput.value.trim() : '';
    if (!name) return;
    var qty = parseInt(qtyInput ? qtyInput.value : '1', 10);
    if (!qty || qty < 1) qty = 1;
    if (!merged[name]) {
      merged[name] = { name: name, qty: qty };
      order.push(name);
    } else {
      merged[name].qty += qty;
    }
  });
  return order.map(function(name) { return merged[name]; });
}

function setAddEquipBusy(isBusy, label) {
  var btn = document.getElementById('addEquipConfirmBtn');
  var addBtn = document.getElementById('addEquipRowBtn');
  btn.disabled = isBusy;
  btn.textContent = label || (pendingAddMode === 'onsite' ? '가용 확인 후 현장추가' : '가용 확인 후 추가');
  if (addBtn) addBtn.disabled = isBusy;
}

function setAddEquipModalMode(mode) {
  pendingAddMode = mode === 'onsite' ? 'onsite' : 'schedule';
  var title = document.getElementById('addEquipModalTitle');
  var settlementRow = document.getElementById('addEquipSettlementRow');
  if (title) title.textContent = pendingAddMode === 'onsite' ? '현장 추가 반출' : '장비 추가';
  if (settlementRow) settlementRow.classList.toggle('is-visible', pendingAddMode === 'onsite');
  setAddEquipBusy(false);
}

function postAddEquipBatch(tid, entries) {
  return fetch(API_URL + '?key=village2026&action=addEquips&tid=' + encodeURIComponent(tid)
    + '&entries=' + encodeURIComponent(JSON.stringify(entries))
    + '&directRegenerate=true')
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res.error) throw new Error(res.error);
      return res;
    });
}

function postOnsiteAddonBatch(tid, entries) {
  var settlement = document.getElementById('addEquipSettlement');
  var payload = {
    key: 'village2026',
    action: 'onsiteAddon',
    tid: tid,
    entries: entries,
    settlementStatus: settlement ? settlement.value : 'pending',
    directRegenerate: true
  };
  return fetch(API_URL || '', {
    method: 'POST',
    body: JSON.stringify(payload)
  })
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res.error) throw new Error(res.error);
      return res;
    });
}

function addEquip(tid) {
  pendingAddTid = tid;
  setAddEquipModalMode('schedule');
  resetEquipRows();
  setAddEquipBusy(false);
  document.getElementById('addEquipModal').classList.add('open');
  focusFirstEquipInputWithDropdown();
}

function addOnsiteAddon(tid) {
  pendingAddTid = tid;
  setAddEquipModalMode('onsite');
  resetEquipRows();
  var settlement = document.getElementById('addEquipSettlement');
  if (settlement) settlement.value = 'pending';
  document.getElementById('addEquipModal').classList.add('open');
  focusFirstEquipInputWithDropdown();
}

function closeAddEquipModal() {
  document.getElementById('addEquipModal').classList.remove('open');
  hideAllEquipSuggestions();
  pendingAddTid = null;
  pendingAddMode = 'schedule';
}

function confirmAddEquip() {
  if (!pendingAddTid) { closeAddEquipModal(); return; }
  var entries = collectEquipEntries();
  if (!entries.length) { alert('장비명을 하나 이상 입력하거나 선택하세요.'); return; }

  setAddEquipBusy(true, pendingAddMode === 'onsite' ? '현장추가 중...' : '가용 확인 중...');

  var tid = pendingAddTid;
  var mode = pendingAddMode;
  var mutationToken = beginDashboardMutation();
  var snapshot = captureDashboardEquipmentSnapshot(tid);
  var request = mode === 'onsite' ? postOnsiteAddonBatch(tid, entries) : postAddEquipBatch(tid, entries);
  setAddEquipBusy(false);
  closeAddEquipModal();
  applyDashboardEquipmentMutation(tid, {}, {
    operation: 'add',
    entries: entries,
    mode: mode
  });
  showDashboardToast(mode === 'onsite' ? '현장추가 저장 중...' : '장비 추가 저장 중...');
  request.then(function(res) {
    applyDashboardEquipmentMutation(tid, res, {
      operation: 'add',
      entries: entries,
      mode: mode
    });
    var contractResult = dashboardMutationResult(res);
    if (contractResult.contractRegenPending !== false && !(contractResult.contractUrl || contractResult.url)) {
      queueDashboardContractRegeneration(tid);
    }
    if (res.onsiteAddonWarning) {
      finishDashboardMutation(mutationToken);
      queueDashboardSilentRefresh(6500);
      alert('장비는 추가됐지만 현장 추가 기록은 확인 필요: ' + res.onsiteAddonWarning);
      return;
    }
    showDashboardToast(mode === 'onsite'
      ? '현장 추가 반출 기록 완료. 장비 ' + (res.addedEquipments || entries.length) + '개를 추가했습니다.'
      : '가용 확인 완료. 장비 ' + (res.addedEquipments || entries.length) + '개를 추가했습니다.');
    finishDashboardMutation(mutationToken);
    queueDashboardSilentRefresh(6500);
  }).catch(function(err) {
    restoreDashboardEquipmentSnapshot(snapshot);
    finishDashboardMutation(mutationToken);
    alert((mode === 'onsite' ? '현장 추가 실패: ' : '가용 확인 실패: ') + err.message);
  });
}

</script>

<!-- 장비 추가 모달 -->
<div id="addEquipModal" class="modal-overlay" onclick="if(event.target===this)closeAddEquipModal()">
  <div class="modal-box">
    <div class="modal-title" id="addEquipModalTitle">장비 추가</div>
    <label class="modal-label">장비명 / 수량</label>
    <div id="equipRows" class="multi-equip-list"></div>
    <button type="button" id="addEquipRowBtn" class="multi-add-row-btn" onclick="addEquipRow()">+ 장비 행 추가</button>
    <div class="settlement-row" id="addEquipSettlementRow">
      <label for="addEquipSettlement">정산</label>
      <select id="addEquipSettlement" class="settlement-select">
        <option value="pending" selected>정산미정</option>
        <option value="free">무상</option>
        <option value="paid">유상</option>
      </select>
    </div>
    <datalist id="equipDatalist"></datalist>
    <div class="modal-actions">
      <button class="modal-btn modal-btn-cancel" onclick="closeAddEquipModal()">취소</button>
      <button id="addEquipConfirmBtn" class="modal-btn modal-btn-confirm" onclick="confirmAddEquip()">가용 확인 후 추가</button>
    </div>
  </div>
</div>

<div id="photoModal" class="modal-overlay" onclick="if(event.target===this)closePhotoModal()">
  <div class="modal-box photo-modal-box">
    <div class="modal-title" id="photoModalTitle">사진</div>
    <div id="photoModalGrid" class="photo-modal-grid"></div>
    <div class="modal-actions">
      <button class="modal-btn modal-btn-cancel" onclick="closePhotoModal()">닫기</button>
    </div>
  </div>
</div>
