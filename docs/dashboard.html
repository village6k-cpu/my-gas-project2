<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>빌리지 오늘 일정</title>
<style>
  :root {
    --bg: #FAFBFC;
    --surface: #FFFFFF;
    --border: #E8ECF0;
    --text-primary: #1B2332;
    --text-secondary: #5F6B7A;
    --text-muted: #9AA5B4;
    --accent: #2563EB;
    --blue-bg: #D3E5FF;
    --blue-text: #1D4ED8;
    --amber-bg: #FEF3C7;
    --amber-text: #B45309;
    --green-bg: #D1FAE5;
    --green-text: #065F46;
    --red: #EF4444;
    --radius: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    -webkit-user-select: none; user-select: none;
  }

  /* ── 헤더 ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px 14px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .header h1 {
    font-size: 20px;
    font-weight: 800;
    color: var(--text-primary);
  }
  .header .date-label {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .icon-btn {
    width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    cursor: pointer;
    color: var(--text-secondary);
    font-size: 16px;
    transition: all 0.15s;
  }
  .icon-btn:active { background: var(--bg); }
  .icon-btn.spinning { animation: spin 0.8s ease; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── 날짜 네비 ── */
  .date-nav {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .date-nav-btn {
    width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    cursor: pointer;
    color: var(--text-secondary);
    font-size: 13px;
  }
  .date-nav-btn:active { background: var(--bg); }

  .date-input {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 12px;
    font-size: 14px;
    font-family: inherit;
    color: var(--text-primary);
    background: var(--surface);
    cursor: pointer;
    outline: none;
  }
  .date-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }

  .today-btn {
    border: 1px solid var(--accent);
    background: var(--accent);
    color: #fff;
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  .today-btn:active { opacity: 0.85; }

  /* ── 요약 카드 ── */
  .summary-row {
    display: flex;
    gap: 10px;
    padding: 14px 20px;
  }
  .summary-card {
    flex: 1;
    border-radius: var(--radius);
    padding: 14px 16px;
    text-align: center;
    border: 1px solid var(--border);
  }
  .summary-card .num {
    font-size: 28px;
    font-weight: 800;
    line-height: 1.1;
  }
  .summary-card .label {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
    font-weight: 600;
  }
  .summary-card.checkout { background: #EFF6FF; border-color: #BFDBFE; }
  .summary-card.checkout .num { color: var(--blue-text); }
  .summary-card.checkin { background: #FFFBEB; border-color: #FDE68A; }
  .summary-card.checkin .num { color: var(--amber-text); }
  .summary-card.active { background: #ECFDF5; border-color: #A7F3D0; }
  .summary-card.active .num { color: var(--green-text); }

  /* ── 경고 문구 ── */
  .notice-bar {
    background: #FFFBEB;
    color: var(--amber-text);
    font-size: 12px;
    font-weight: 600;
    padding: 10px 20px;
    line-height: 1.6;
    border-bottom: 1px solid #FDE68A;
  }

  /* ── 탭 ── */
  .tabs {
    display: flex;
    padding: 12px 20px 0;
    gap: 4px;
    background: var(--bg);
    position: sticky;
    top: 108px;
    z-index: 50;
    padding-bottom: 12px;
  }
  .tab {
    flex: 1;
    padding: 10px 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    background: var(--surface);
    color: var(--text-secondary);
    font-family: inherit;
    transition: all 0.15s;
  }
  .tab.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .tab .badge {
    display: inline-block;
    background: rgba(0,0,0,0.06);
    border-radius: 6px;
    padding: 1px 7px;
    font-size: 11px;
    margin-left: 4px;
  }
  .tab.active .badge { background: rgba(255,255,255,0.25); }

  /* ── 컨텐츠 ── */
  .content { padding: 0 20px 30px; }
  .section { display: none; }
  .section.visible { display: block; }

  .time-group { margin-top: 16px; }
  .time-group-header {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 0.3px;
    padding: 0 2px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .time-group-header::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── 일정 카드 ── */
  .schedule-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 8px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: box-shadow 0.15s;
  }
  .schedule-card:active { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }

  .schedule-card.type-checkout { border-left: 3px solid #3B82F6; }
  .schedule-card.type-checkin  { border-left: 3px solid #F59E0B; }

  /* 처리 완료 — 카드 흐릿 + 체크 아이콘 (반출세팅완료 / 반납검수완료 공통) */
  .schedule-card.task-done {
    opacity: 0.55;
    background: #F0FDF4;
    border-left-color: #10B981 !important;
  }
  .schedule-card.task-done .customer-name {
    text-decoration: line-through;
    color: var(--text-muted);
  }

  /* 토글 버튼 — 반출세팅 / 반납검수 공통 */
  .task-toggle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    border-radius: 8px;
    border: 1.5px solid #D1D5DB;
    background: #fff;
    cursor: pointer;
    font-size: 14px;
    font-weight: 700;
    color: #9CA3AF;
    margin-right: 8px;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .task-toggle:hover { border-color: #10B981; color: #10B981; }
  .task-toggle.checked {
    background: #10B981;
    border-color: #10B981;
    color: #fff;
  }

  /* 장비 태그 안의 삭제 × 버튼 */
  .equip-tag {
    position: relative;
    padding-right: 24px !important;
  }
  .equip-remove {
    position: absolute;
    right: 6px;
    top: 50%;
    transform: translateY(-50%);
    width: 14px;
    height: 14px;
    line-height: 12px;
    text-align: center;
    color: #9CA3AF;
    cursor: pointer;
    border-radius: 50%;
    font-size: 11px;
    font-weight: 700;
  }
  .equip-remove:hover {
    background: #EF4444;
    color: #fff;
  }
  /* 장비 추가 버튼 */
  .equip-add-btn {
    display: inline-block;
    padding: 4px 10px;
    border: 1px dashed #9CA3AF;
    border-radius: 6px;
    color: #6B7280;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    background: transparent;
    margin-left: 4px;
  }
  .equip-add-btn:hover { border-color: #3B82F6; color: #3B82F6; }

  /* 장비 추가 모달 */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: #fff;
    border-radius: 14px;
    padding: 22px 22px 18px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
  }
  .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 14px; color: var(--text-primary); }
  .modal-label { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; display: block; font-weight: 600; }
  .modal-input {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    margin-bottom: 12px;
    box-sizing: border-box;
    outline: none;
  }
  .modal-input:focus { border-color: #3B82F6; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 6px; }
  .modal-btn {
    padding: 9px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid transparent;
  }
  .modal-btn-cancel { background: #fff; color: var(--text-secondary); border-color: var(--border); }
  .modal-btn-confirm { background: #3B82F6; color: #fff; }
  .modal-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* 개고생2.0 점프 버튼 */
  .gosu-link-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 6px 12px;
    background: #1F2937;
    color: #fff;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    text-decoration: none;
    margin-top: 8px;
  }
  .gosu-link-btn:hover { background: #111827; }
  .gosu-link-btn:active { transform: scale(0.97); }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
  }
  .customer-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-primary);
  }
  .customer-company {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .time-badge {
    font-size: 12px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 6px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .type-checkout .time-badge { background: var(--blue-bg); color: var(--blue-text); }
  .type-checkin  .time-badge { background: var(--amber-bg); color: var(--amber-text); }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 8px;
    font-size: 13px;
    color: var(--text-secondary);
  }
  .card-meta .icon { font-size: 13px; width: 16px; text-align: center; }

  .equip-list { display: flex; flex-wrap: wrap; gap: 5px; }
  .equip-tag {
    background: var(--bg);
    color: var(--text-secondary);
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 5px;
    font-weight: 600;
    border: 1px solid var(--border);
  }
  .equip-tag.set-tag {
    background: var(--green-bg);
    color: var(--green-text);
    border-color: #A7F3D0;
  }

  /* ── 상태 배지 ── */
  .status-badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 5px;
    font-weight: 600;
  }
  .status-대기     { background: var(--blue-bg); color: var(--blue-text); }
  .status-반출중   { background: var(--amber-bg); color: var(--amber-text); }
  .status-반납완료 { background: var(--green-bg); color: var(--green-text); }

  /* ── 빈 상태 ── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-state .icon { font-size: 40px; margin-bottom: 10px; opacity: 0.5; }
  .empty-state .text { font-size: 14px; }

  /* ── 로딩 ── */
  .loading { text-align: center; padding: 80px 20px; color: var(--text-muted); }
  .loading .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 14px;
  }

  .tel-link {
    color: var(--accent);
    text-decoration: none;
    font-weight: 600;
  }

  /* ── 카드 상세 펼침 ── */
  .card-detail {
    display: none;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .card-detail.open { display: block; }
  .detail-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    padding: 4px 0;
    color: var(--text-secondary);
  }
  .detail-row .dl { font-weight: 700; color: var(--text-primary); }

  /* ── 반응형 ── */
  @media (min-width: 768px) {
    .header { padding: 16px 32px 14px; }
    .summary-row { padding: 14px 32px; }
    .notice-bar { padding: 10px 32px; }
    .tabs { padding: 12px 32px 12px; }
    .content { padding: 0 32px 30px; }
  }
</style>
</head>
<body>
<script>var API_URL = "https://script.google.com/macros/s/AKfycbyRff4-lLXmne-iPIEf87x4-CH_5wb-Uv5dCGymELLrpiKluhg2gDdLdVP4Y0MmxnnT/exec";</script>

<div class="header">
  <div class="header-top">
    <div>
      <h1 id="headerTitle">오늘 일정</h1>
      <div class="date-label" id="dateLabel"></div>
    </div>
    <button class="icon-btn" onclick="refreshData()" id="refreshBtn" title="새로고침">↻</button>
  </div>
  <div class="date-nav">
    <button class="date-nav-btn" onclick="changeDate(-1)">◀</button>
    <input type="date" class="date-input" id="dateInput" onchange="onDateChange()">
    <button class="date-nav-btn" onclick="changeDate(1)">▶</button>
    <button class="today-btn" onclick="goToday()">오늘</button>
  </div>
</div>

<div class="summary-row">
  <div class="summary-card checkout">
    <div class="num" id="sumCheckout">-</div>
    <div class="label">반출</div>
  </div>
  <div class="summary-card checkin">
    <div class="num" id="sumCheckin">-</div>
    <div class="label">반납</div>
  </div>
  <div class="summary-card active">
    <div class="num" id="sumActive">-</div>
    <div class="label">현재 대여중</div>
  </div>
</div>

<div class="notice-bar">
  ⚠️ 세부 구성품 및 추가 요청 사항 등은 반드시 카톡 대화 내용을 한번 더 확인 후 완벽하게 세팅 바랍니다.<br>
  ⚠️ 매직암, 라인, 배터리 등 기타 악세사리류 갯수 철저하게 체크 바랍니다.
</div>

<div class="tabs">
  <button class="tab active" data-tab="checkout" onclick="switchTab('checkout')">
    반출 <span class="badge" id="tabCheckout">0</span>
  </button>
  <button class="tab" data-tab="checkin" onclick="switchTab('checkin')">
    반납 <span class="badge" id="tabCheckin">0</span>
  </button>
  <button class="tab" data-tab="all" onclick="switchTab('all')">
    전체 <span class="badge" id="tabAll">0</span>
  </button>
</div>

<div class="content">
  <div id="loadingArea" class="loading">
    <div class="spinner"></div>
    <div>일정을 불러오는 중...</div>
  </div>
  <div id="checkoutSection" class="section"></div>
  <div id="checkinSection" class="section"></div>
  <div id="allSection" class="section"></div>
</div>

<script>
var dashboardData = null;
var currentDate = new Date();

document.addEventListener('DOMContentLoaded', function() {
  updateDateDisplay();
  loadData();
});

function updateDateDisplay() {
  var days = ['일','월','화','수','목','금','토'];
  var d = currentDate;
  document.getElementById('dateLabel').textContent =
    d.getFullYear() + '년 ' + (d.getMonth()+1) + '월 ' + d.getDate() + '일 (' + days[d.getDay()] + ')';
  document.getElementById('dateInput').value = formatDate(d);

  var today = formatDate(new Date());
  document.getElementById('headerTitle').textContent =
    formatDate(d) === today ? '오늘 일정' : (d.getMonth()+1) + '/' + d.getDate() + ' 일정';
}

function formatDate(d) {
  return d.getFullYear() + '-' + ('0'+(d.getMonth()+1)).slice(-2) + '-' + ('0'+d.getDate()).slice(-2);
}

function changeDate(offset) {
  currentDate.setDate(currentDate.getDate() + offset);
  updateDateDisplay();
  loadData();
}

function onDateChange() {
  var val = document.getElementById('dateInput').value;
  if (val) {
    currentDate = new Date(val + 'T00:00:00');
    updateDateDisplay();
    loadData();
  }
}

function goToday() {
  currentDate = new Date();
  updateDateDisplay();
  loadData();
}

function loadData(forceFresh) {
  var dateStr = formatDate(currentDate);
  var lsKey = 'dashCache_v2_' + dateStr;

  // ⚡ Stale-while-revalidate:
  //   1) localStorage에 저장된 직전 응답이 있으면 0ms에 즉시 렌더 (스켈레톤 안 보이게)
  //   2) 동시에 fresh fetch 시작 → 받아서 UI 업데이트
  var cachedJson = null;
  try { cachedJson = localStorage.getItem(lsKey); } catch (e) {}
  if (cachedJson && !forceFresh) {
    try {
      var cachedData = JSON.parse(cachedJson);
      dashboardData = cachedData;
      renderDashboard(cachedData);
    } catch (e) {
      document.getElementById('loadingArea').style.display = 'block';
      document.querySelectorAll('.section').forEach(function(s) { s.classList.remove('visible'); });
    }
  } else {
    document.getElementById('loadingArea').style.display = 'block';
    document.querySelectorAll('.section').forEach(function(s) { s.classList.remove('visible'); });
  }

  var url = API_URL + '?key=village2026&action=dashboard&date=' + dateStr;
  if (forceFresh) url += '&nocache=1';

  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      dashboardData = data;
      renderDashboard(data);
      try { localStorage.setItem(lsKey, JSON.stringify(data)); } catch (e) {}
    })
    .catch(function(err) {
      // 캐시 표시 중이면 에러 표시 안 함 (사용자 경험 우선)
      if (!cachedJson) {
        document.getElementById('loadingArea').innerHTML =
          '<div class="empty-state"><div class="icon">⚠️</div><div class="text">데이터 로드 실패</div></div>';
      }
    });
}

function refreshData() {
  var btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  setTimeout(function() { btn.classList.remove('spinning'); }, 800);
  loadData(true);  // 캐시 우회
}

function renderDashboard(data) {
  document.getElementById('loadingArea').style.display = 'none';

  document.getElementById('sumCheckout').textContent = data.checkout.length;
  document.getElementById('sumCheckin').textContent = data.checkin.length;
  document.getElementById('sumActive').textContent = data.activeCount || 0;

  document.getElementById('tabCheckout').textContent = data.checkout.length;
  document.getElementById('tabCheckin').textContent = data.checkin.length;
  document.getElementById('tabAll').textContent = data.checkout.length + data.checkin.length;

  renderList('checkoutSection', data.checkout, 'checkout');
  renderList('checkinSection', data.checkin, 'checkin');

  var all = data.checkout.map(function(c) { c._type = 'checkout'; return c; })
    .concat(data.checkin.map(function(c) { c._type = 'checkin'; return c; }));
  all.sort(function(a, b) { return (a.sortTime || '').localeCompare(b.sortTime || ''); });
  renderList('allSection', all, 'all');

  switchTab('checkout');
}

function renderList(containerId, items, type) {
  var container = document.getElementById(containerId);

  if (!items || items.length === 0) {
    container.innerHTML =
      '<div class="empty-state"><div class="icon">' +
      (type === 'checkout' ? '📦' : type === 'checkin' ? '📥' : '📋') +
      '</div><div class="text">' +
      (type === 'checkout' ? '반출' : type === 'checkin' ? '반납' : '') +
      ' 일정이 없습니다</div></div>';
    return;
  }

  var groups = {};
  items.forEach(function(item) {
    var timeKey = item.time || '시간 미정';
    if (!groups[timeKey]) groups[timeKey] = [];
    groups[timeKey].push(item);
  });

  var html = '';
  Object.keys(groups).sort().forEach(function(timeKey) {
    html += '<div class="time-group">';
    html += '<div class="time-group-header">' + timeKey + '</div>';

    groups[timeKey].forEach(function(item, idx) {
      var cardType = item._type || type;
      var cardId = cardType + '_' + timeKey.replace(/[: ]/g,'') + '_' + idx;

      // 카드 타입별 done 플래그 분리: 반출=setupDone, 반납=returnDone
      var taskDone = (cardType === 'checkout' ? item.setupDone : (cardType === 'checkin' ? item.returnDone : false));
      var taskAction = (cardType === 'checkout' ? 'toggleSetup' : 'toggleReturn');
      var doneCls = taskDone ? ' task-done' : '';
      var toggleCls = taskDone ? 'task-toggle checked' : 'task-toggle';
      var toggleIcon = taskDone ? '✓' : '';
      html += '<div class="schedule-card type-' + cardType + doneCls + '" data-tid="' + escHtml(item.tradeId) + '" data-cardtype="' + cardType + '" onclick="toggleDetail(\'' + cardId + '\')">';
      html += '<div class="card-header">';
      html += '<div style="display:flex;align-items:flex-start;gap:0;">';
      // 반출/반납 모두 토글 노출
      if (cardType === 'checkout' || cardType === 'checkin') {
        html += '<button class="' + toggleCls + '" onclick="event.stopPropagation();toggleTask(this,\'' + escHtml(item.tradeId) + '\',\'' + taskAction + '\')">' + toggleIcon + '</button>';
      }
      html += '<div>';
      html += '<div class="customer-name">' + escHtml(item.name) + '</div>';
      if (item.company) html += '<div class="customer-company">' + escHtml(item.company) + '</div>';
      html += '</div></div>';
      html += '<div class="time-badge">' + timeKey + '</div></div>';

      if (item.tel) {
        html += '<div class="card-meta"><span class="icon">📞</span>';
        html += '<a href="tel:' + item.tel + '" class="tel-link" onclick="event.stopPropagation()">' + escHtml(item.tel) + '</a></div>';
      }

      html += '<div class="equip-list">';
      (item.equipments || []).forEach(function(eq) {
        var cls = eq.isSet ? 'equip-tag set-tag' : 'equip-tag';
        html += '<span class="' + cls + '">' + escHtml(eq.name + (eq.qty > 1 ? ' ×' + eq.qty : ''));
        html += '<span class="equip-remove" onclick="event.stopPropagation();removeEquip(\'' + escHtml(item.tradeId) + '\',\'' + escHtml(eq.name).replace(/'/g, "\\'") + '\')" title="삭제">×</span>';
        html += '</span>';
      });
      html += '<button class="equip-add-btn" onclick="event.stopPropagation();addEquip(\'' + escHtml(item.tradeId) + '\')">+ 장비추가</button>';
      html += '</div>';

      html += '<div class="card-detail" id="' + cardId + '">';
      html += '<div class="detail-row"><span>거래ID</span><span class="dl">' + escHtml(item.tradeId) + '</span></div>';
      var pLabel = cardType === 'checkout' ? '반납 예정' : '반출일';
      var pValue = cardType === 'checkout' ? item.returnDate : item.checkoutDate;
      if (pValue) html += '<div class="detail-row"><span>' + pLabel + '</span><span class="dl">' + escHtml(pValue) + '</span></div>';
      html += '<div class="detail-row"><span>상태</span><span class="status-badge status-' + (item.status || '대기') + '">' + (item.status || '대기') + '</span></div>';
      if (item.equipments && item.equipments.length > 0) {
        var total = item.equipments.reduce(function(s, eq) { return s + (eq.qty || 1); }, 0);
        html += '<div class="detail-row"><span>총 장비 수</span><span class="dl">' + total + '건</span></div>';
      }
      // 개고생2.0 AppSheet 거래 점프
      html += '<a class="gosu-link-btn" href="' + gosuAppsheetUrl(item.tradeId) + '" target="_blank" onclick="event.stopPropagation()">🔗 개고생2.0 거래 열기</a>';
      html += '</div></div>';
    });
    html += '</div>';
  });

  container.innerHTML = html;
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(function(t) {
    t.classList.toggle('active', t.dataset.tab === tab);
  });
  document.querySelectorAll('.section').forEach(function(s) { s.classList.remove('visible'); });
  document.getElementById(tab + 'Section').classList.add('visible');
}

function toggleDetail(id) {
  var el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

function addEquip(tid) {
  var name = prompt("추가할 장비/세트 이름을 입력하세요:");
  if (!name || !name.trim()) return;
  name = name.trim();
  var qtyStr = prompt("수량 (기본 1):", "1");
  var qty = parseInt(qtyStr, 10);
  if (!qty || qty < 1) qty = 1;

  fetch(API_URL + '?key=village2026&action=addEquip&tid=' + encodeURIComponent(tid)
    + '&equipName=' + encodeURIComponent(name) + '&qty=' + qty)
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res.error) { alert("추가 실패: " + res.error); return; }
      // localStorage 캐시 무효화 후 fresh fetch
      try { localStorage.removeItem('dashCache_v2_' + formatDate(currentDate)); } catch (e) {}
      loadData(true);
    })
    .catch(function(err) { alert("네트워크 오류: " + err.message); });
}

function removeEquip(tid, equipName) {
  if (!confirm('"' + equipName + '" 을(를) 삭제하시겠습니까?\n(같은 세트 구성품도 함께 삭제됩니다)')) return;

  fetch(API_URL + '?key=village2026&action=removeEquip&tid=' + encodeURIComponent(tid)
    + '&equipName=' + encodeURIComponent(equipName))
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res.error) { alert("삭제 실패: " + res.error); return; }
      try { localStorage.removeItem('dashCache_v2_' + formatDate(currentDate)); } catch (e) {}
      loadData(true);
    })
    .catch(function(err) { alert("네트워크 오류: " + err.message); });
}

function toggleTask(btn, tid, action) {
  // action = 'toggleSetup' (반출) 또는 'toggleReturn' (반납)
  var nowDone = !btn.classList.contains('checked');
  // Optimistic UI — 토글 버튼이 속한 카드만 업데이트 (반출과 반납 따로 관리)
  btn.classList.toggle('checked', nowDone);
  btn.textContent = nowDone ? '✓' : '';
  var card = btn.closest('.schedule-card');
  if (card) card.classList.toggle('task-done', nowDone);

  fetch(API_URL + '?key=village2026&action=' + action + '&tid=' + encodeURIComponent(tid) + '&done=' + (nowDone ? '1' : '0'))
    .then(function(r) { return r.json(); })
    .catch(function() {
      btn.classList.toggle('checked', !nowDone);
      btn.textContent = !nowDone ? '✓' : '';
      if (card) card.classList.toggle('task-done', !nowDone);
    });
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── 개고생2.0 AppSheet 거래 점프 URL 빌더 ────
// 원본 패턴(2026-04-26 기준): row=<거래ID> 부분만 치환
var GOSU_APPSHEET_TEMPLATE = "https://www.appsheet.com/start/9508843a-cebb-4336-8dbe-a55dd3306a76?platform=desktop#appName=%EA%B0%9C%EA%B3%A0%EC%83%9D20-603028247-26-03-14&row={TID}&view=%EA%B1%B0%EB%9E%98%EC%83%81%EC%84%B8";
function gosuAppsheetUrl(tid) {
  return GOSU_APPSHEET_TEMPLATE.replace("{TID}", encodeURIComponent(tid));
}

// ── 장비 목록 캐시 + 모달 ─────────────────────
var equipListCache = null;
function loadEquipList() {
  if (equipListCache) return Promise.resolve(equipListCache);
  return fetch(API_URL + '?key=village2026&action=read&sheet=' + encodeURIComponent('목록') + '&range=A2:A1000')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var arr = (d && d.data) ? d.data : [];
      equipListCache = arr.map(function(row) { return Array.isArray(row) ? row[0] : row; })
                          .filter(function(x) { return x; })
                          .map(String);
      // datalist에 옵션 채우기
      var dl = document.getElementById('equipDatalist');
      if (dl) {
        dl.innerHTML = equipListCache.map(function(n) {
          return '<option value="' + escHtml(n) + '"></option>';
        }).join('');
      }
      return equipListCache;
    })
    .catch(function() { equipListCache = []; return []; });
}

var pendingAddTid = null;

function addEquip(tid) {
  pendingAddTid = tid;
  document.getElementById('equipInput').value = '';
  document.getElementById('qtyInput').value = '1';
  document.getElementById('addEquipModal').classList.add('open');
  loadEquipList().then(function() {
    setTimeout(function() {
      var inp = document.getElementById('equipInput');
      if (inp) inp.focus();
    }, 50);
  });
}

function closeAddEquipModal() {
  document.getElementById('addEquipModal').classList.remove('open');
  pendingAddTid = null;
}

function confirmAddEquip() {
  if (!pendingAddTid) { closeAddEquipModal(); return; }
  var name = (document.getElementById('equipInput').value || '').trim();
  if (!name) { alert('장비/세트명을 입력하거나 선택하세요.'); return; }
  var qty = parseInt(document.getElementById('qtyInput').value, 10);
  if (!qty || qty < 1) qty = 1;

  var btn = document.getElementById('addEquipConfirmBtn');
  btn.disabled = true;
  btn.textContent = '추가 중...';

  var tid = pendingAddTid;
  fetch(API_URL + '?key=village2026&action=addEquip&tid=' + encodeURIComponent(tid)
    + '&equipName=' + encodeURIComponent(name) + '&qty=' + qty)
    .then(function(r) { return r.json(); })
    .then(function(res) {
      btn.disabled = false;
      btn.textContent = '추가';
      if (res.error) { alert('추가 실패: ' + res.error); return; }
      closeAddEquipModal();
      try { localStorage.removeItem('dashCache_v2_' + formatDate(currentDate)); } catch (e) {}
      loadData(true);
    })
    .catch(function(err) {
      btn.disabled = false;
      btn.textContent = '추가';
      alert('네트워크 오류: ' + err.message);
    });
}

// 페이지 로드 직후 장비 목록 미리 fetch (모달 열 때 즉시 표시)
window.addEventListener('load', function() { loadEquipList(); });
</script>

<!-- 장비 추가 모달 -->
<div id="addEquipModal" class="modal-overlay" onclick="if(event.target===this)closeAddEquipModal()">
  <div class="modal-box">
    <div class="modal-title">장비/세트 추가</div>
    <label class="modal-label">장비/세트명</label>
    <input id="equipInput" class="modal-input" list="equipDatalist" placeholder="입력하거나 목록에서 선택" autocomplete="off" />
    <datalist id="equipDatalist"></datalist>
    <label class="modal-label">수량</label>
    <input id="qtyInput" class="modal-input" type="number" min="1" value="1" />
    <div class="modal-actions">
      <button class="modal-btn modal-btn-cancel" onclick="closeAddEquipModal()">취소</button>
      <button id="addEquipConfirmBtn" class="modal-btn modal-btn-confirm" onclick="confirmAddEquip()">추가</button>
    </div>
  </div>
</div>
</body>
</html>
