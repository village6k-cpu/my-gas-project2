<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="오늘일정">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#F7F7F5">
<link rel="apple-touch-icon" sizes="180x180" href="https://village6k-cpu.github.io/my-gas-project2/icons/village-schedule-03-20260514-180.png?v=20260514a">
<link rel="icon" type="image/png" href="https://village6k-cpu.github.io/my-gas-project2/icons/village-schedule-03-20260514.png?v=20260514a">
<title>빌리지 오늘 일정</title>
<style>
  :root {
    --bg: #F7F7F5;
    --surface: #FFFFFF;
    --border: #E9E9E7;
    --border-light: #F0F0EE;
    --text-primary: #37352F;
    --text-secondary: #787774;
    --text-muted: #B4B4B0;
    --accent: #2383E2;
    --blue-bg: #D3E5EF;
    --blue-text: #24609C;
    --amber-bg: #FDECC8;
    --amber-text: #93640D;
    --green-bg: #DBEDDB;
    --green-text: #2B6B2B;
    --gray-bg: #E8E8E5;
    --gray-text: #787774;
    --red: #EB5757;
    --radius: 6px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    -webkit-user-select: none; user-select: none;
  }

  /* ── 헤더 ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px 10px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .date-context {
    display: flex;
    align-items: baseline;
    gap: 8px;
    color: var(--text-muted);
    font-size: 12px;
    margin-left: auto;
    white-space: nowrap;
  }
  .date-context strong {
    color: var(--text-primary);
    font-size: 13px;
    font-weight: 750;
  }
  .header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }
  .app-switcher {
    display: flex;
    overflow: hidden;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .app-tab {
    display: inline-flex;
    align-items: center;
    min-height: 32px;
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 650;
    color: var(--text-secondary);
    text-decoration: none;
    white-space: nowrap;
  }
  .app-tab:not(:last-child) { border-right: 1px solid var(--border); }
  .app-tab.active { background: var(--accent); color: #fff; }
  a.app-tab:hover { color: var(--accent); background: rgba(0,0,0,0.03); }

  .nav-link {
    min-height: 32px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-primary);
    background: var(--bg);
    text-decoration: none;
    font-size: 12px;
    font-weight: 650;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .nav-link:hover { border-color: var(--accent); color: var(--accent); }
  .nav-link.request-link {
    min-height: 36px;
    padding: 7px 12px 7px 9px;
    border-color: rgba(35,131,226,0.34);
    background: #EAF4FF;
    color: #0F5EA8;
    font-weight: 800;
    box-shadow: 0 1px 0 rgba(35,131,226,0.08);
  }
  .nav-link.request-link:hover {
    background: #DDEEFF;
    border-color: var(--accent);
    color: #0B5CAD;
  }
  .request-ai-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    height: 20px;
    min-width: 24px;
    padding: 0 5px;
    border-radius: 4px;
    background: var(--accent);
    color: #fff;
    font-size: 10px;
    font-weight: 850;
    line-height: 1;
  }
  .request-main { white-space: nowrap; }

  .icon-btn {
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    cursor: pointer;
    color: var(--text-secondary);
    font-size: 16px;
    transition: all 0.15s;
  }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
  .icon-btn:active { background: var(--bg); }
  .icon-btn.spinning { animation: spin 0.8s ease; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── 날짜 네비 ── */
  .date-nav {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .date-nav-btn {
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    cursor: pointer;
    color: var(--text-secondary);
    font-size: 13px;
    transition: all 0.15s;
  }
  .date-nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .date-nav-btn:active { background: var(--bg); }

  .date-input {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    min-height: 32px;
    padding: 6px 10px;
    font-size: 13px;
    font-family: inherit;
    color: var(--text-primary);
    background: var(--surface);
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
  }
  .date-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(35,131,226,0.15); }

  .today-btn {
    border: 1px solid var(--accent);
    background: var(--accent);
    color: #fff;
    min-height: 32px;
    padding: 6px 12px;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.15s;
  }
  .today-btn:hover { opacity: 0.9; }
  .today-btn:active { opacity: 0.85; }

  .dashboard-search {
    position: relative;
    flex: 1 1 240px;
    max-width: 360px;
    min-width: 190px;
  }
  .dashboard-search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 13px;
    pointer-events: none;
  }
  .dashboard-search input {
    width: 100%;
    min-height: 32px;
    padding: 6px 10px 6px 30px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg);
    color: var(--text-primary);
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .dashboard-search input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(35,131,226,0.15);
  }
  .dashboard-search input::placeholder { color: var(--text-muted); }
  .dashboard-search-status {
    display: none;
    margin: 10px 20px 0;
    padding: 9px 12px;
    border: 1px solid rgba(35,131,226,0.18);
    border-radius: var(--radius);
    background: #EAF4FF;
    color: #0F5EA8;
    font-size: 12px;
    font-weight: 750;
  }
  .dashboard-search-status.visible { display: block; }

  /* ── 인수인계 메모 ── */
  .notice-board {
    --notice-note-font-size: 15px;
    --notice-note-min-height: 54px;
    display: grid;
    grid-template-columns: minmax(150px, 210px) minmax(0, 1fr);
    gap: 12px;
    padding: 14px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .notice-lead,
  .notice-note {
    position: relative;
    border-radius: var(--radius);
    box-shadow: 0 4px 12px rgba(55,53,47,0.08);
  }
  .notice-lead {
    padding: 13px 15px;
    background: #FFF4BC;
    border: 1px solid #EED47A;
    transform: rotate(-0.5deg);
  }
  .notice-kicker {
    color: #93640D;
    font-size: 11px;
    font-weight: 800;
    margin-bottom: 4px;
  }
  .notice-title {
    color: var(--text-primary);
    font-size: 24px;
    font-weight: 850;
    line-height: 1.05;
  }
  .notice-controls {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 12px;
  }
  .notice-add-btn {
    width: 30px;
    height: 30px;
    border: 1px solid #D0B95D;
    border-radius: var(--radius);
    background: rgba(255,255,255,0.45);
    color: #93640D;
    font-size: 18px;
    font-weight: 800;
    line-height: 1;
    cursor: pointer;
  }
  .notice-add-btn:hover { background: rgba(255,255,255,0.7); }
  .notice-font-controls {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px;
    border: 1px solid rgba(147,100,13,0.28);
    border-radius: var(--radius);
    background: rgba(255,255,255,0.36);
  }
  .notice-font-btn {
    min-width: 28px;
    height: 24px;
    border: none;
    border-radius: 4px;
    background: transparent;
    color: #93640D;
    font-size: 12px;
    font-weight: 850;
    font-family: inherit;
    cursor: pointer;
  }
  .notice-font-btn:hover { background: rgba(255,255,255,0.68); }
  .notice-font-size {
    min-width: 34px;
    text-align: center;
    color: #93640D;
    font-size: 11px;
    font-weight: 800;
  }
  .notice-save-state {
    color: #93640D;
    font-size: 11px;
    font-weight: 700;
    min-width: 42px;
  }
  .notice-list {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
  }
  .notice-note {
    padding: 14px 36px 14px 17px;
    background: #FFFDF2;
    border: 1px solid #E8D99F;
    border-left: 4px solid #D99A00;
    color: var(--text-primary);
    font-size: var(--notice-note-font-size);
    font-weight: 750;
    line-height: 1.5;
  }
  .notice-note.secondary {
    background: #F2F7FB;
    border-color: #D8E5EF;
    border-left-color: var(--accent);
  }
  .notice-note::before {
    content: '';
    position: absolute;
    top: 9px;
    right: 32px;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: rgba(55,53,47,0.22);
  }
  .notice-textarea {
    width: 100%;
    min-height: var(--notice-note-min-height);
    border: none;
    outline: none;
    resize: none;
    overflow: hidden;
    background: transparent;
    color: inherit;
    font: inherit;
    line-height: inherit;
    letter-spacing: 0;
  }
  .notice-textarea:focus { box-shadow: inset 0 -1px 0 rgba(35,131,226,0.35); }
  .notice-delete-btn {
    position: absolute;
    top: 4px;
    right: 4px;
    width: 24px;
    height: 24px;
    border: 1px solid transparent;
    border-radius: var(--radius);
    background: transparent;
    color: var(--text-muted);
    font-size: 16px;
    line-height: 1;
    cursor: pointer;
  }
  .notice-delete-btn:hover { border-color: rgba(235,87,87,0.35); color: var(--red); background: rgba(235,87,87,0.06); }

  /* ── 탭 ── */
  .tabs {
    display: flex;
    padding: 10px 20px;
    gap: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 108px;
    z-index: 50;
  }
  .tabs-inner {
    display: flex;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .tab {
    flex: 1;
    padding: 6px 14px;
    border: none;
    border-right: 1px solid var(--border);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    background: transparent;
    color: var(--text-secondary);
    font-family: inherit;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .tab:last-child { border-right: none; }
  .tab:hover { background: rgba(0,0,0,0.03); }
  .tab.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .tab.attention-tab .badge { background: rgba(235,87,87,0.12); color: #B42318; }
  .tab.attention-tab.active { background: #B42318; border-color: #B42318; }
  .tab.attention-tab.active .badge { background: rgba(255,255,255,0.26); color: #fff; }
  .tab .badge {
    display: inline-block;
    background: rgba(0,0,0,0.08);
    border-radius: 10px;
    padding: 1px 7px;
    font-size: 11px;
    margin-left: 4px;
  }
  .tab.active .badge { background: rgba(255,255,255,0.25); }

  /* ── 컨텐츠 ── */
  .content { padding: 0 20px 30px; }
  .section { display: none; }
  .section.visible { display: block; }

  .time-group { margin-top: 16px; }
  .time-group-header {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 0.3px;
    padding: 0 2px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .time-group-header::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .search-group-toggle {
    width: 100%;
    min-height: 38px;
    justify-content: space-between;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text-primary);
    font-family: inherit;
    cursor: pointer;
  }
  .search-group-toggle::after { display: none; }
  .search-group-toggle:hover { border-color: var(--accent); }
  .search-group-title { font-size: 13px; font-weight: 850; }
  .search-group-meta {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--text-secondary);
    font-size: 12px;
    font-weight: 750;
  }
  .search-group-chevron {
    display: inline-block;
    transition: transform 0.15s;
  }
  .time-group.collapsed .search-group-chevron { transform: rotate(-90deg); }
  .time-group.collapsed .time-group-body { display: none; }

  /* ── 일정 카드 ── */
  .schedule-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 8px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: box-shadow 0.15s, border-color 0.15s;
  }
  .schedule-card:hover { box-shadow: 0 1px 4px rgba(55,53,47,0.08); border-color: #D4D4D0; }
  .schedule-card:active { box-shadow: 0 2px 8px rgba(55,53,47,0.1); }

  .schedule-card.type-checkout { border-left: 3px solid var(--accent); }
  .schedule-card.type-checkin  { border-left: 3px solid var(--gray-text); }

  /* 처리 완료 — 카드 흐릿 + 체크 아이콘 (반출세팅완료 / 반납검수완료 공통) */
  .schedule-card.task-done {
    opacity: 0.55;
    background: var(--green-bg);
    border-left-color: var(--green-text) !important;
  }
  .schedule-card.type-checkin.task-done {
    opacity: 0.68;
    background: #E8E8E5;
    border-left-color: #787774 !important;
  }
  .schedule-card.task-done .customer-name {
    text-decoration: line-through;
    color: var(--text-muted);
  }

  /* 토글 버튼 — 반출세팅 / 반납검수 공통 */
  .task-toggle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 64px;
    height: 28px;
    padding: 0 8px;
    border-radius: var(--radius);
    border: 1.5px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
    margin-right: 8px;
    transition: all 0.15s;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .task-toggle:hover { border-color: var(--green-text); color: var(--green-text); }
  .task-toggle.checked {
    background: var(--green-text);
    border-color: var(--green-text);
    color: #fff;
  }
  .task-toggle:disabled,
  .task-toggle.is-saving {
    opacity: 0.72;
    cursor: wait;
    pointer-events: none;
  }

  /* ── 체크리스트 스타일 ── */
  .equip-checklist {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-top: 6px;
    margin-bottom: 8px;
  }
  .equip-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    border-radius: var(--radius);
    background: var(--surface);
    border: 1px solid var(--border);
    font-size: 13px;
    position: relative;
  }
  .equip-row.is-set { background: var(--green-bg); border-color: #B8D8B8; font-weight: 700; }
  .equip-row.is-component { padding-left: 28px; background: var(--bg); border-color: transparent; font-size: 12px; color: var(--text-secondary); }
  .equip-row.is-component::before {
    content: '└';
    position: absolute;
    left: 14px;
    color: var(--text-muted);
  }
  .equip-row.is-single { background: var(--surface); }
  .equip-row.is-pending { opacity: 0.72; border-style: dashed; }
  .equip-row.checked { opacity: 0.55; }
  .equip-row.checked .equip-name { text-decoration: line-through; }
  .equip-row-main {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
  }
  .equip-checkbox {
    width: 18px;
    height: 18px;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    background: var(--surface);
    color: transparent;
    font-weight: 700;
    font-size: 12px;
    line-height: 1;
    transition: all 0.15s;
  }
  .equip-checkbox.checked {
    background: var(--green-text);
    border-color: var(--green-text);
    color: #fff;
  }
  .equip-checkbox.is-saving {
    opacity: 0.72;
    cursor: wait;
    pointer-events: none;
    box-shadow: 0 0 0 2px rgba(68, 131, 97, 0.18);
  }
  .equip-name { flex: 1; min-width: 0; word-break: break-word; }
  .equip-set-tag {
    display: inline-block;
    background: var(--green-text);
    color: #fff;
    font-size: 9px;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 3px;
    margin-right: 4px;
    vertical-align: middle;
  }
  .equip-qty {
    color: #0F5EA8;
    background: #EAF4FF;
    border: 1px solid #9FC8EE;
    font-size: 14px;
    font-weight: 850;
    min-width: 44px;
    height: 28px;
    padding: 0 10px;
    border-radius: 999px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-right: 4px;
    line-height: 1;
    letter-spacing: 0.1px;
    box-shadow: 0 1px 0 rgba(15, 94, 168, 0.12);
  }
  .equip-qty.equip-qty-memory {
    color: #174B9A;
    background: #DCEBFF;
    border-color: #7EA9E8;
    box-shadow: 0 1px 0 rgba(23, 75, 154, 0.18);
  }
  .equip-qty.equip-qty-battery {
    color: #9F3D09;
    background: #FFE6D6;
    border-color: #F4AE7D;
    box-shadow: 0 1px 0 rgba(159, 61, 9, 0.18);
  }
  .equip-qty-edit {
    border-radius: 999px;
    cursor: pointer;
    line-height: 1;
  }
  .equip-qty-edit:hover {
    transform: translateY(-1px);
    filter: saturate(1.08);
  }
  .equip-row-remove {
    width: 18px;
    height: 18px;
    line-height: 16px;
    text-align: center;
    color: var(--text-muted);
    cursor: pointer;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .equip-row-remove:hover { background: #FAE0E0; color: var(--red); }
  .equip-return-meta,
  .trade-return-meta {
    display: grid;
    grid-template-columns: 116px minmax(0, 1fr) 58px;
    gap: 6px;
    width: 100%;
    box-sizing: border-box;
  }
  .equip-return-meta {
    padding-left: 26px;
  }
  .trade-return-meta {
    margin-top: 10px;
    padding: 8px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg);
  }
  .return-status-select,
  .return-memo-input {
    min-height: 30px;

<script>
var dashboardData = null;
var dashboardGlobalSearchData = null;
var currentDate = new Date();
var activeDashboardTab = 'checkout';
var dashboardSearchQuery = '';
var dashboardInitialSearchQuery = '';
var dashboardRequestSeq = 0;
var dashboardAbortController = null;

var dashboardSearchCollapsedGroups = {};
var dashboardSearchDetailedGroups = {};
var dashboardSearchGroupLabels = {};
var dashboardSearchDetailLoading = false;
var dashboardSearchIndexCache = null;
var dashboardSearchIndexPromise = null;
var dashboardSearchIndexPrefetchQueued = false;

var dashboardSearchIndexStale = false;
var DASHBOARD_SEARCH_DEBOUNCE_MS = 220;

var DASHBOARD_SEARCH_INDEX_LOCAL_TTL_MS = 30 * 60 * 1000;
var DASHBOARD_SEARCH_INDEX_STALE_MAX_MS = 12 * 60 * 60 * 1000;
var DASHBOARD_SEARCH_INDEX_PACKED_COLUMNS = ['tid', 'n', 'tel', 'co', 'cs', 'st', 'od', 'ot', 'rd', 'rt', 'eq', 'x'];
var DASHBOARD_CACHE_PREFIX = 'dashCache_v4_';
var DASHBOARD_OLD_CACHE_PREFIX = 'dashCache_v3_';
var DASHBOARD_PREFETCH_ADJACENT_DATES = false;
var dashboardCurrentView = null;
var dashboardRenderedSections = {};
var dashboardViewSeq = 0;
var CONTRACT_STATUS_OPTIONS = ['', '예약', '반출', '취소'];
var RETURN_STATUS_OPTIONS = ['', '확인필요', '파손', '분실', '미반납', '반납완료'];
var equipmentMemoSaveTimers = {};
var dashboardMemoDrafts = {};
var DEFAULT_DASHBOARD_NOTES = [
  '세부 구성품 및 추가 요청 사항은 카톡 대화 내용을 한번 더 확인 후 세팅',
  '매직암, 라인, 배터리 등 기타 악세사리류 갯수 철저하게 체크'
];
var DASHBOARD_NOTES_LOCAL_KEY = 'dashboardPostItNotes_fallback_v1';
var DASHBOARD_NOTE_FONT_KEY = 'dashboardPostItFontSize_v1';
var DASHBOARD_NOTE_FONT_DEFAULT = 15;
var DASHBOARD_NOTE_FONT_MIN = 12;
var DASHBOARD_NOTE_FONT_MAX = 24;
var dashboardNoteFontSize = DASHBOARD_NOTE_FONT_DEFAULT;
var dashboardNotes = DEFAULT_DASHBOARD_NOTES.slice();
var noteSaveTimer = null;
var dashboardPhotoStore = {};
var dashboardPhotoLoading = {};
var dashboardPhotoBatchTimer = null;
var dashboardSilentRefreshTimer = null;
var dashboardDatePrefetching = {};
var dashboardPendingMutationCount = 0;
var dashboardLocalMutationSeq = 0;
var dashboardTaskToggleInFlight = {};
var dashboardItemToggleInFlight = {};
var dashboardContractRegenTimers = {};
var dashboardContractRegenInFlight = {};
var dashboardContractRegenQueued = {};
var dashboardContractStatusRefreshTimer = null;
var dashboardContractStatusRefreshInFlight = false;
var dashboardContractStatusRefreshQueued = false;
var dashboardContractStatusCheckedTids = {};
var DASHBOARD_MUTATION_REFRESH_MIN_DELAY_MS = 5000;

document.addEventListener('DOMContentLoaded', function() {
  var urlParams = new URLSearchParams(window.location.search);
  var dateParam = urlParams.get('date');
  if (dateParam) {
    currentDate = new Date(dateParam + 'T00:00:00');
  }
  dashboardInitialSearchQuery = String(urlParams.get('search') || urlParams.get('q') || urlParams.get('tid') || '').trim();
  var tabParam = String(urlParams.get('tab') || '').trim();
  if (['checkout', 'checkin', 'all', 'attention'].indexOf(tabParam) >= 0) {
    activeDashboardTab = tabParam;
  }
  updateDateDisplay();
  loadDashboardNoteFontSize();
  renderDashboardNotes(dashboardNotes);
  loadDashboardNotes();
  hydrateInitialEquipList();
  hydrateDashboardSearchIndex();
  queueDashboardSearchIndexPrefetch(0);
  if (INITIAL_DATA && isDashboardDateMatch(INITIAL_DATA, formatDate(currentDate))) {
    dashboardData = INITIAL_DATA;
    renderDashboard(INITIAL_DATA, formatDate(currentDate));
  } else {
    loadData(!!INITIAL_DATA);
  }
  applyDashboardInitialSearchQuery();
});

function applyDashboardInitialSearchQuery() {
  if (!dashboardInitialSearchQuery) return;
  var input = document.getElementById('dashboardSearchInput');
  if (input) input.value = dashboardInitialSearchQuery;
  setTimeout(function() {
    if (!dashboardInitialSearchQuery) return;
    onDashboardSearchInput(dashboardInitialSearchQuery);
    dashboardInitialSearchQuery = '';
  }, 0);
}

function updateDateDisplay() {
  var days = ['일','월','화','수','목','금','토'];
  var d = currentDate;
  document.getElementById('dateLabel').textContent =
    d.getFullYear() + '년 ' + (d.getMonth()+1) + '월 ' + d.getDate() + '일 (' + days[d.getDay()] + ')';
  document.getElementById('dateInput').value = formatDate(d);

  var today = formatDate(new Date());
  document.getElementById('headerTitle').textContent =
    formatDate(d) === today ? '오늘 일정' : (d.getMonth()+1) + '/' + d.getDate() + ' 일정';
}

function formatDate(d) {
  return d.getFullYear() + '-' + ('0'+(d.getMonth()+1)).slice(-2) + '-' + ('0'+d.getDate()).slice(-2);
}

function changeDate(offset) {
  currentDate.setDate(currentDate.getDate() + offset);
  updateDateDisplay();
  loadData();
}

function onDateChange() {
  var val = document.getElementById('dateInput').value;
  if (val) {
    currentDate = new Date(val + 'T00:00:00');
    updateDateDisplay();
    loadData();
  }
}

function goToday() {
  currentDate = new Date();
  updateDateDisplay();
  loadData();
}

function onDashboardSearchInput(value) {
  dashboardSearchQuery = String(value || '').trim();
  if (dashboardSearchTimer) clearTimeout(dashboardSearchTimer);
  if (!dashboardSearchQuery) {
    dashboardGlobalSearchData = null;
    setDashboardSearchStatus('');
    if (dashboardSearchAbortController && dashboardSearchAbortController.abort) {
      try { dashboardSearchAbortController.abort(); } catch (e) {}
    }
    if (dashboardData) renderDashboard(dashboardData, formatDate(currentDate));
    return;
  }

  activeDashboardTab = 'all';
  var renderedLocal = renderDashboardSearchFromLocalIndex(dashboardSearchQuery);
  if (!renderedLocal) {
    setDashboardSearchStatus('전체 예약에서 검색 중...');
    loadDashboardSearchIndex().then(function() {
      if (dashboardSearchQuery) renderDashboardSearchFromLocalIndex(dashboardSearchQuery);
    });
  }
  dashboardSearchTimer = setTimeout(function() {
    loadDashboardGlobalSearch(dashboardSearchQuery);
  }, DASHBOARD_SEARCH_DEBOUNCE_MS);
}

function loadDashboardGlobalSearch(query, options) {
  query = String(query || '').trim();
  if (!query) return;
  options = options || {};

  var requestId = ++dashboardSearchRequestSeq;
  if (dashboardSearchAbortController && dashboardSearchAbortController.abort) {
    try { dashboardSearchAbortController.abort(); } catch (e) {}
  }
  dashboardSearchAbortController = (typeof AbortController !== 'undefined') ? new AbortController() : null;

  var url = API_URL + '?key=village2026&action=dashboardSearch&summary=1&limit=' + encodeURIComponent(DASHBOARD_SEARCH_LIMIT)
    + '&q=' + encodeURIComponent(query);
  if (options.forceFresh) url += '&nocache=1&ts=' + Date.now();
  var fetchOptions = dashboardSearchAbortController ? { signal: dashboardSearchAbortController.signal } : {};
  fetch(url, fetchOptions)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (requestId !== dashboardSearchRequestSeq || query !== dashboardSearchQuery) return;
      var previousCollapsedGroups = dashboardSearchCollapsedGroups;
      dashboardGlobalSearchData = data || {};
      dashboardSearchDetailedGroups = {};
      resetDashboardSearchCollapsedGroups(dashboardGlobalSearchData, previousCollapsedGroups);
      renderDashboardGlobalSearch(dashboardGlobalSearchData);
    })
    .catch(function(err) {
      if (err && err.name === 'AbortError') return;
      if (requestId !== dashboardSearchRequestSeq) return;
      setDashboardSearchStatus('전체 예약 검색 실패');
      renderDashboardGlobalSearch({ checkout: [], checkin: [], query: query, error: err.message });
    });
}

function setDashboardSearchStatus(text) {
  var el = document.getElementById('dashboardSearchStatus');
  if (!el) return;
  el.textContent = text || '';
  el.classList.toggle('visible', !!text);
}

function clearDashboardSearchCaches() {
  dashboardSearchIndexRequestSeq++;
  dashboardSearchIndexCache = null;
  dashboardSearchIndexPromise = null;
  dashboardSearchIndexPrefetchQueued = false;
  dashboardSearchIndexStale = false;
  dashboardSearchDetailedGroups = {};
  dashboardSearchGroupLabels = {};
  try { localStorage.removeItem(DASHBOARD_SEARCH_INDEX_LOCAL_KEY); } catch (e) {}
}

function refreshDashboardSearchResults() {
  var query = String(dashboardSearchQuery || '').trim();
  if (!query) return false;
  if (dashboardSearchTimer) {
    clearTimeout(dashboardSearchTimer);
    dashboardSearchTimer = null;
  }
  dashboardGlobalSearchData = null;
  dashboardSearchCollapsedGroups = {};
  clearDashboardSearchCaches();
  setDashboardSearchStatus('전체 예약 다시 검색 중...');
  loadDashboardSearchIndex(true).then(function() {
    if (query === dashboardSearchQuery) renderDashboardSearchFromLocalIndex(query);
  });
  loadDashboardGlobalSearch(query, { forceFresh: true });
  return true;
}

// ── 견고한 대시보드 fetch: 타임아웃 + 자동 재시도 + 응답 검증 ──
// GAS 웹앱은 콜드 캐시 지연(최대 ~30초), 일시적 500/리다이렉트, HTML 오류페이지를 흔히 반환한다.
// 단순 fetch + r.json()은 이 경우 무한 스피너 또는 즉시 "로드 실패"로 끝나므로 아래로 감싼다.
//   - externalSignal: 중복 요청(날짜 이동/새로고침) 취소용. 취소되면 재시도하지 않는다.
//   - timeout: 한 번의 시도가 이 시간을 넘기면 중단하고 재시도 대상이 됨.
//   - retries: 추가 재시도 횟수 (총 시도 = retries + 1).
function dashboardFetchJson(url, externalSignal, opts) {
  opts = opts || {};
  var timeout = opts.timeout != null ? opts.timeout : 25000;
  var maxRetries = opts.retries != null ? opts.retries : 2;
  var attempt = 0;

  function abortError() { var e = new Error('superseded'); e.name = 'AbortError'; return e; }

  function tryOnce() {
    return new Promise(function(resolve, reject) {
      if (externalSignal && externalSignal.aborted) { reject(abortError()); return; }
      var ctrl = (typeof AbortController !== 'undefined') ? new AbortController() : null;
      var timedOut = false;
      var timer = setTimeout(function() {
        timedOut = true;
        if (ctrl) { try { ctrl.abort(); } catch (e) {} }
      }, timeout);
      var onExternalAbort = function() { if (ctrl) { try { ctrl.abort(); } catch (e) {} } };
      if (externalSignal && externalSignal.addEventListener) externalSignal.addEventListener('abort', onExternalAbort);
      var cleanup = function() {
        clearTimeout(timer);
        if (externalSignal && externalSignal.removeEventListener) externalSignal.removeEventListener('abort', onExternalAbort);
      };
      fetch(url, ctrl ? { signal: ctrl.signal } : {})
        .then(function(r) {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.text();
        })
        .then(function(text) {
          var data;
          try { data = JSON.parse(text); }
          catch (e) { throw new Error('비정상 응답(JSON 아님)'); }
          cleanup();
          resolve(data);
        })
        .catch(function(err) {
          cleanup();
          if (externalSignal && externalSignal.aborted && !timedOut) { reject(abortError()); return; }
          reject(timedOut ? new Error('시간 초과') : err);
        });
    });
  }

  function loop() {
    return tryOnce().catch(function(err) {
      if (err && err.name === 'AbortError') throw err;               // 다른 요청으로 대체됨 → 중단
      if (externalSignal && externalSignal.aborted) throw abortError();
      if (attempt >= maxRetries) throw err;
      attempt++;
      var backoff = Math.min(4000, 700 * Math.pow(2, attempt - 1));  // 0.7s → 1.4s
      return new Promise(function(res) { setTimeout(res, backoff); }).then(loop);
    });
  }
  return loop();
}

var dashboardSlowTimer = null;

function loadData(forceFresh) {
  var dateStr = formatDate(currentDate);
  var lsKey = DASHBOARD_CACHE_PREFIX + dateStr;
  var requestId = ++dashboardRequestSeq;
  var mutationSeqAtRequest = dashboardLocalMutationSeq;
  var renderedCached = false;
  var cachedJson = null;

  if (dashboardAbortController && dashboardAbortController.abort) {
    try { dashboardAbortController.abort(); } catch (e) {}
  }
  dashboardAbortController = (typeof AbortController !== 'undefined') ? new AbortController() : null;

  try { cachedJson = localStorage.getItem(lsKey); } catch (e) {}
  if (cachedJson && !forceFresh) {
    try {
      var cachedData = readDashboardLocalCache(dateStr, cachedJson);
      dashboardData = cachedData;
      renderedCached = renderDashboard(cachedData, dateStr);
      if (collectDashboardContractStatusRefreshTids().length) queueDashboardPendingContractStatusRefresh(1000);
    } catch (e) {
      renderedCached = false;
    }
  }

  var hasVisibleData = hasDashboardVisibleDataForDate(dateStr);
  showDashboardLoading(dateStr, renderedCached || hasVisibleData);
  if (!renderedCached && !hasVisibleData) {
    document.querySelectorAll('.section').forEach(function(s) { s.classList.remove('visible'); });
  }

  // 응답이 늦어질 때(콜드 캐시 등) 안심 메시지로 교체 — 빈 화면 체감 완화
  if (dashboardSlowTimer) { clearTimeout(dashboardSlowTimer); dashboardSlowTimer = null; }
  if (!renderedCached && !hasVisibleData) {
    dashboardSlowTimer = setTimeout(function() {
      if (!isCurrentDashboardRequest(requestId, dateStr)) return;
      var loading = document.getElementById('loadingArea');
      if (!loading || loading.style.display === 'none') return;
      var msg = loading.querySelector('.loading-msg');
      if (msg) msg.textContent = '서버 응답이 늦어지고 있어요. 잠시만 기다려주세요…';
    }, 7000);
  }

  var url = API_URL + '?key=village2026&action=dashboard&date=' + dateStr;
  if (forceFresh) url += '&nocache=1';
  var signal = dashboardAbortController ? dashboardAbortController.signal : null;

  dashboardFetchJson(url, signal, { timeout: 25000, retries: 2 })
    .then(function(data) {
      if (dashboardSlowTimer) { clearTimeout(dashboardSlowTimer); dashboardSlowTimer = null; }
      if (!isCurrentDashboardRequest(requestId, dateStr) || !isDashboardDateMatch(data, dateStr)) return;
      if (!canApplyDashboardResponse(mutationSeqAtRequest)) return;
      if (data && data.error) throw new Error(data.error);
      dashboardData = data;
      renderDashboard(data, dateStr);
      writeDashboardLocalCache(dateStr, data);
    })
    .catch(function(err) {
      if (dashboardSlowTimer) { clearTimeout(dashboardSlowTimer); dashboardSlowTimer = null; }
      if (err && err.name === 'AbortError') return;
      if (!isCurrentDashboardRequest(requestId, dateStr)) return;
      if (!renderedCached) {
        renderDashboardLoadError(!!forceFresh);
      } else {
        // 이미 캐시 데이터가 화면에 떠 있음 → 막다른 에러 대신 조용히 갱신실패만 표시
        var loading = document.getElementById('loadingArea');
        if (loading) loading.style.display = 'none';
        flagDashboardRefreshFailed();
      }
    });
}

// 캐시 미존재 상태에서 로드 실패 시: 막다른 길 대신 다시 시도 버튼 제공
function renderDashboardLoadError(wasForceFresh) {
  var loading = document.getElementById('loadingArea');
  if (!loading) return;
  loading.style.display = 'block';
  loading.innerHTML =
    '<div class="empty-state load-error">' +
      '<div class="icon">⚠️</div>' +
      '<div class="text">일정을 불러오지 못했어요</div>' +
      '<div class="sub">네트워크 또는 서버 응답이 일시적으로 불안정할 수 있어요.</div>' +
      '<button type="button" class="retry-btn" onclick="loadData(' + (wasForceFresh ? 'true' : 'false') + ')">다시 시도</button>' +
    '</div>';
}

// 캐시가 떠 있는 상태에서 갱신 실패 시: 새로고침 버튼을 잠깐 강조
function flagDashboardRefreshFailed() {
  var btn = document.getElementById('refreshBtn');
  if (!btn) return;
  btn.classList.add('refresh-failed');
  setTimeout(function() { btn.classList.remove('refresh-failed'); }, 4000);
}

function refreshData() {
  var btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  setTimeout(function() { btn.classList.remove('spinning'); }, 800);
  clearDashboardCacheForDate(formatDate(currentDate));
  if (dashboardSearchQuery) {
    refreshDashboardSearchResults();
    return;
  }
  loadData(true);  // 캐시 우회
}

function showDashboardLoading(dateStr, keepVisible) {
  var loading = document.getElementById('loadingArea');
  if (!loading) return;
  loading.innerHTML = '<div class="spinner"></div><div class="loading-msg">' + escHtml(dateStr) + ' 일정 불러오는 중...</div>';
  loading.style.display = keepVisible ? 'none' : 'block';
}

function isCurrentDashboardRequest(requestId, dateStr) {
  return requestId === dashboardRequestSeq && dateStr === formatDate(currentDate);
}

function isDashboardDateMatch(data, dateStr) {
  if (!dateStr) dateStr = formatDate(currentDate);
  return !data || !data.date || data.date === dateStr;
}

function clearDashboardCacheForDate(dateStr) {
  try {
    localStorage.removeItem(DASHBOARD_CACHE_PREFIX + dateStr);
    localStorage.removeItem(DASHBOARD_OLD_CACHE_PREFIX + dateStr);
  } catch (e) {}
}

function readDashboardLocalCache(dateStr, raw) {
  var parsed = JSON.parse(raw);
  var data = parsed && parsed.data ? parsed.data : parsed;
  if (data && !data.date) data.date = dateStr;
  return data;
}

function writeDashboardLocalCache(dateStr, data) {

      cachedAt: Date.now(),
      data: data
    }));

}

function persistCurrentDashboardCache() {

function hasDashboardVisibleDataForDate(dateStr) {

}

function beginDashboardMutation() {
  dashboardPendingMutationCount++;
  dashboardLocalMutationSeq++;
  return { done: false };
}

function finishDashboardMutation(token) {
  if (!token || token.done) return;
  token.done = true;
  dashboardPendingMutationCount = Math.max(0, dashboardPendingMutationCount - 1);
  dashboardLocalMutationSeq++;
  persistCurrentDashboardCache();
}

function canApplyDashboardResponse(mutationSeqAtRequest) {

}

function prefetchAdjacentDashboardDates(dateStr) {

function addDaysToDateStr(dateStr, offset) {

}

function prefetchDashboardDate(dateStr) {

function timeSortKey(timeValue) {
  var raw = String(timeValue || '').trim();
  if (!raw || raw === '시간 미정') return '99:99';

  var isPm = raw.indexOf('오후') >= 0 || /\bPM\b/i.test(raw);
  var isAm = raw.indexOf('오전') >= 0 || /\bAM\b/i.test(raw);
  var match = raw.match(/(\d{1,2})\s*(?::|시)\s*(\d{1,2})?/);
  if (!match) return '99:99';

  var hour = Number(match[1]);
  var minute = match[2] !== undefined ? Number(match[2]) : 0;
  if (isNaN(hour) || isNaN(minute) || hour < 0 || hour > 24 || minute < 0 || minute > 59) {
    return '99:99';
  }
  if (isPm && hour < 12) hour += 12;
  if (isAm && hour === 12) hour = 0;
  if (hour === 24 && minute > 0) return '99:99';

  return ('0' + hour).slice(-2) + ':' + ('0' + minute).slice(-2);
}

function compareScheduleItemsByTime(a, b) {
  var at = timeSortKey(a && (a.sortTime || a.time));
  var bt = timeSortKey(b && (b.sortTime || b.time));
  var timeCmp = at.localeCompare(bt);
  if (timeCmp) return timeCmp;

  var an = String((a && (a.name || a.tradeId)) || '');
  var bn = String((b && (b.name || b.tradeId)) || '');
  return an.localeCompare(bn);
}

function compareTimeLabels(a, b) {
  var timeCmp = timeSortKey(a).localeCompare(timeSortKey(b));
  if (timeCmp) return timeCmp;
  return String(a || '').localeCompare(String(b || ''));
}

function compareDashboardGlobalSearchItems(a, b) {
  var ad = String((a && a.sortDate) || (a && a.searchDate) || '');
  var bd = String((b && b.sortDate) || (b && b.searchDate) || '');
  var dateCmp = ad.localeCompare(bd);
  if (dateCmp) return dateCmp;
  return compareScheduleItemsByTime(a, b);
}

function compareDashboardSearchGroupLabels(a, b) {

}

function normalizeDashboardSearchText(value) {

function normalizeDashboardSearchIndexText(value) {

function hydrateDashboardSearchIndex() {
  try {
    var raw = localStorage.getItem(DASHBOARD_SEARCH_INDEX_LOCAL_KEY);
    if (!raw) return;
    var cached = JSON.parse(raw);
    if (!cached || !cached.ts) return;
    var ageMs = Date.now() - cached.ts;
    if (ageMs > DASHBOARD_SEARCH_INDEX_STALE_MAX_MS) return;
    setDashboardSearchIndexCache(cached.data || cached, false);
    dashboardSearchIndexStale = ageMs > DASHBOARD_SEARCH_INDEX_LOCAL_TTL_MS;
  } catch (e) {}
}

function expandPackedDashboardSearchIndexEntries(data) {
  if (!data || !Array.isArray(data.entries)) return [];
  if (!data.packed) return data.entries;
  var columns = Array.isArray(data.columns) && data.columns.length ? data.columns : DASHBOARD_SEARCH_INDEX_PACKED_COLUMNS;
  var tokens = Array.isArray(data.tokens) ? data.tokens : [];
  var textColumn = data.textColumn || 'x';
  return data.entries.map(function(row) {
    if (!Array.isArray(row)) return row || {};
    var entry = {};
    columns.forEach(function(key, index) {
      var value = row[index];
      if (data.tokenized && key === textColumn && Array.isArray(value)) {
        entry[key] = value.map(function(tokenIndex) {
          return tokens[tokenIndex] || '';
        }).filter(Boolean).join(' ');
      } else {
        entry[key] = value || '';
      }
    });
    return entry;
  });
}

function persistedDashboardSearchIndexPayload(data) {
  if (!data || !Array.isArray(data.entries)) return data;
  if (data.packed) return data;
  return {
    builtAt: data.builtAt || '',
    cacheVersion: data.cacheVersion || '',
    lastRow: data.lastRow || 0,
    entries: data.entries
  };
}

function setDashboardSearchIndexCache(data, persist) {
  if (!data || !Array.isArray(data.entries)) return null;
  dashboardSearchIndexCache = {
    builtAt: data.builtAt || '',
    cacheVersion: data.cacheVersion || '',
    lastRow: data.lastRow || 0,
    entries: expandPackedDashboardSearchIndexEntries(data)
  };
  dashboardSearchIndexStale = false;
  if (persist) {
    try {
      localStorage.setItem(DASHBOARD_SEARCH_INDEX_LOCAL_KEY, JSON.stringify({
        ts: Date.now(),
        data: persistedDashboardSearchIndexPayload(data)
      }));
    } catch (e) {}
  }
  return dashboardSearchIndexCache;
}

function loadDashboardSearchIndex(forceFresh) {
  if (dashboardSearchIndexCache && !forceFresh) return Promise.resolve(dashboardSearchIndexCache);
  if (dashboardSearchIndexPromise && !forceFresh) return dashboardSearchIndexPromise;
  var requestId = ++dashboardSearchIndexRequestSeq;
  var url = API_URL + '?key=village2026&action=dashboardSearchIndex';
  if (forceFresh) url += '&nocache=1&ts=' + Date.now();
  dashboardSearchIndexPromise = fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (requestId !== dashboardSearchIndexRequestSeq) return dashboardSearchIndexCache;
      dashboardSearchIndexPromise = null;
      return setDashboardSearchIndexCache(data, true);
    })
    .catch(function() {
      if (requestId === dashboardSearchIndexRequestSeq) dashboardSearchIndexPromise = null;
      return dashboardSearchIndexCache;
    });
  return dashboardSearchIndexPromise;
}

function queueDashboardSearchIndexPrefetch(delayMs) {
  if ((dashboardSearchIndexCache && !dashboardSearchIndexStale) || dashboardSearchIndexPrefetchQueued) return;
  dashboardSearchIndexPrefetchQueued = true;
  var run = function() { loadDashboardSearchIndex(dashboardSearchIndexStale); };
  if (delayMs === 0) {
    setTimeout(run, 0);
    return;
  }
  if (window.requestIdleCallback) {
    window.requestIdleCallback(run, { timeout: 1800 });
  } else {
    setTimeout(run, 700);
  }
}

function dashboardSearchDateKey(value) {
  var raw = String(value || '').trim();
  var m = raw.match(/(\d{4})\D+(\d{1,2})\D+(\d{1,2})/);
  if (!m) return raw;
  return m[1] + '-' + ('0' + m[2]).slice(-2) + '-' + ('0' + m[3]).slice(-2);
}

function dashboardSearchGroupLabel(dateValue, phaseLabel) {
  var key = dashboardSearchDateKey(dateValue);
  var m = key.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  var label = m ? (Number(m[2]) + '/' + Number(m[3])) : String(dateValue || '');
  return label + ' ' + phaseLabel;
}

function expandLocalDashboardSearchEquipments(items) {
  return (items || []).map(function(item) {
    if (Array.isArray(item)) {
      return {
        scheduleId: item[0] || '',
        name: item[1] || '',
        qty: item[2] || 1,
        setName: item[3] || '',
        isHeader: true,
        isSet: item[4] === 1 || item[4] === true,
        isComponent: false
      };
    }
    return item || {};
  });
}

function getDashboardSearchEntryEquipmentText(entry) {
  var parts = [];
  (entry && entry.eq || []).forEach(function(item) {
    if (Array.isArray(item)) {
      parts.push(item[1], item[3]);
    } else if (item) {
      parts.push(item.name, item.setName);
    }
  });
  return normalizeDashboardSearchIndexText(parts.join(' '));
}

function getDashboardSearchEntryScore(entry, terms) {
  entry = entry || {};
  terms = terms || [];
  var name = normalizeDashboardSearchIndexText(entry.n || '');
  var tradeId = normalizeDashboardSearchIndexText(entry.tid || '');
  var tel = normalizeDashboardSearchIndexText(entry.tel || '');
  var company = normalizeDashboardSearchIndexText(entry.co || '');
  var equipmentText = getDashboardSearchEntryEquipmentText(entry);
  var haystack = String(entry.x || '');
  var score = 0;
  terms.forEach(function(term) {
    if (!term) return;
    if (name === term) score += 0;
    else if (name.indexOf(term) === 0) score += 1;
    else if (name.indexOf(term) >= 0) score += 2;
    else if (tradeId.indexOf(term) >= 0 || tel.indexOf(term) >= 0 || company.indexOf(term) >= 0) score += 3;
    else if (equipmentText.indexOf(term) >= 0) score += 5;
    else if (haystack.indexOf(term) >= 0) score += 8;
    else score += 20;
  });
  return score;
}

function compareDashboardLocalSearchCandidates(a, b) {
  var dateCmp = String(a.sortDate || '').localeCompare(String(b.sortDate || ''));
  if (dateCmp) return dateCmp;
  var timeCmp = String(a.sortTime || '').localeCompare(String(b.sortTime || ''));
  if (timeCmp) return timeCmp;
  var tidCmp = String((a.entry && a.entry.tid) || '').localeCompare(String((b.entry && b.entry.tid) || ''));
  if (tidCmp) return tidCmp;
  return String(a.type || '').localeCompare(String(b.type || ''));
}

function buildLocalDashboardSearchItem(entry, type) {
  entry = entry || {};
  var isCheckout = type === 'checkout';
  var dateValue = isCheckout ? entry.od : entry.rd;
  var timeValue = isCheckout ? entry.ot : entry.rt;
  var otherDate = isCheckout ? entry.rd : entry.od;
  var otherTime = isCheckout ? entry.rt : entry.ot;
  var item = {
    tradeId: entry.tid || '',
    name: entry.n || entry.tid || '',
    tel: entry.tel || '',
    company: entry.co || '',
    status: entry.st || '',
    contractStatus: entry.cs || '',
    time: timeValue || '시간 미정',
    sortTime: timeSortKey(timeValue),
    sortDate: dashboardSearchDateKey(dateValue),
    searchDate: dateValue || '',
    searchPhaseLabel: isCheckout ? '반출' : '반납',
    searchGroupLabel: dashboardSearchGroupLabel(dateValue, isCheckout ? '반출' : '반납'),
    _type: type,
    equipments: expandLocalDashboardSearchEquipments(entry.eq),
    summaryOnly: true
  };
  if (isCheckout) item.returnDate = otherDate + (otherTime ? ' ' + otherTime : '');
  else item.checkoutDate = otherDate + (otherTime ? ' ' + otherTime : '');
  return item;
}

function buildLocalDashboardSearchSummary(query) {
  var index = dashboardSearchIndexCache;
  var entries = index && Array.isArray(index.entries) ? index.entries : [];
  var terms = normalizeDashboardSearchIndexText(query).split(' ').filter(Boolean);
  if (!entries.length || !terms.length) return null;
  var candidates = [];
  entries.forEach(function(entry) {
    var haystack = String(entry.x || '');
    if (!terms.every(function(term) { return haystack.indexOf(term) >= 0; })) return;
    var searchScore = getDashboardSearchEntryScore(entry, terms);
    candidates.push({ type: 'checkout', entry: entry, sortDate: dashboardSearchDateKey(entry.od), sortTime: timeSortKey(entry.ot), searchScore: searchScore });
    candidates.push({ type: 'checkin', entry: entry, sortDate: dashboardSearchDateKey(entry.rd), sortTime: timeSortKey(entry.rt), searchScore: searchScore });
  });
  candidates.sort(function(a, b) {
    var scoreCmp = (a.searchScore || 0) - (b.searchScore || 0);
    if (scoreCmp) return scoreCmp;
    return compareDashboardLocalSearchCandidates(a, b);
  });
  var visible = candidates.length > DASHBOARD_SEARCH_LIMIT ? candidates.slice(0, DASHBOARD_SEARCH_LIMIT) : candidates;
  var checkout = [];
  var checkin = [];
  visible.forEach(function(candidate) {
    var item = buildLocalDashboardSearchItem(candidate.entry, candidate.type);
    if (candidate.type === 'checkout') checkout.push(item);
    else checkin.push(item);
  });
  return {
    query: query,
    checkout: checkout,
    checkin: checkin,
    total: candidates.length,
    returned: visible.length,
    limit: DASHBOARD_SEARCH_LIMIT,
    summaryMode: true,
    localIndexMode: true
  };
}

function renderDashboardSearchFromLocalIndex(query) {
  var result = buildLocalDashboardSearchSummary(query);
  if (!result) return false;
  var previousCollapsedGroups = dashboardSearchCollapsedGroups;
  dashboardGlobalSearchData = result;
  dashboardSearchDetailedGroups = {};
  resetDashboardSearchCollapsedGroups(result, previousCollapsedGroups);
  renderDashboardGlobalSearch(result);
  return true;
}

function dashboardItemMatchesSearch(item, type) {
  var terms = normalizeDashboardSearchText(dashboardSearchQuery).split(' ').filter(Boolean);
  if (!terms.length) return true;

  var parts = [
    type === 'checkout' ? '반출' : '반납',
    item.tradeId,
    item.name,
    item.company,
    item.tel,
    item.status,
    item.contractStatus,
    item.time,
    item.sortTime,
    item.checkoutDate,
    item.returnDate,
    item.paymentMethod,
    item.paymentSource,
    item.paymentWarning,
    item.depositStatus,
    item.proofType,
    item.issueStatus,
    item.billingCompany,
    item.issueNote,
    item.returnStatus,
    item.returnMemo
  ];
  (item.equipments || []).forEach(function(eq) {
    parts.push(eq.name, eq.setName, eq.qty, eq.isSet ? '세트 set' : '', eq.isComponent ? '구성품' : '');
  });

  var haystack = normalizeDashboardSearchText(parts.join(' '));
  return terms.every(function(term) { return haystack.indexOf(term) >= 0; });
}

function filterDashboardItems(items, type) {
  if (!dashboardSearchQuery) return items.slice();
  return items.filter(function(item) { return dashboardItemMatchesSearch(item, type); });
}

function normalizeAttentionStatus(value) {
  return String(value || '').replace(/\s+/g, '').trim();
}

function isReturnStatusAbnormal(item) {
  var status = normalizeAttentionStatus(item && item.returnStatus);
  return !!status && status !== '정상' && status !== '반납완료';
}

function isPaymentComplete(item) {
  var status = normalizeAttentionStatus(item && item.depositStatus);
  return status === '입금완료' || status === '결제완료' || status === '완납';
}

function isPaymentPending(item) {
  if (item && Object.prototype.hasOwnProperty.call(item, 'depositStatus')) {
    return !isPaymentComplete(item);
  }

  var method = normalizeAttentionStatus(item && item.paymentMethod);
  return !method || method === '미정' || method === '미입금' || method === '미결제';
}

function dashboardReturnMemoValue(item) {
  if (!item) return '';
  var memoKey = memoDraftKeyForTrade(item.tradeId);
  if (Object.prototype.hasOwnProperty.call(dashboardMemoDrafts, memoKey)) {
    return dashboardMemoDrafts[memoKey] || '';
  }
  return item.returnMemo || '';
}

function returnMemoSummaryHtml(item) {
  var memo = String(dashboardReturnMemoValue(item) || '').replace(/\s+/g, ' ').trim();
  if (!memo) return '';
  var label = memo.length > 42 ? memo.slice(0, 42) + '...' : memo;
  return '<div class="return-memo-badge" title="' + escAttr(memo) + '">특이사항 ' + escHtml(label) + '</div>';
}

function getDashboardAttentionReasons(item) {
  var reasons = [];
  if (isReturnStatusAbnormal(item)) {
    reasons.push('반납 ' + String(item.returnStatus || '').trim());
  }
  if (isPaymentPending(item)) {
    var status = String((item && item.depositStatus) || '').trim();
    reasons.push(status ? status : '미결제');
  }
  return reasons;
}

function buildDashboardAttentionItems(checkout, checkin) {
  var items = [];
  (checkout || []).forEach(function(item) {
    if (!getDashboardAttentionReasons(item).length) return;
    var copy = cloneDashboardListItem(item);
    copy._type = 'checkout';
    items.push(copy);
  });
  (checkin || []).forEach(function(item) {
    if (!getDashboardAttentionReasons(item).length) return;
    var copy = cloneDashboardListItem(item);
    copy._type = 'checkin';
    items.push(copy);
  });
  items.sort(compareDashboardGlobalSearchItems);
  return items;
}

function cloneDashboardListItem(item) {
  var copy = {};
  Object.keys(item || {}).forEach(function(key) { copy[key] = item[key]; });
  return copy;
}

function resetDashboardRenderedSections() {

function getDashboardSectionConfig(tab) {

  var options = {};
  var type = tab;
