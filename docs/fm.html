<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#16141c">
<meta name="description" content="빌리지 FM — 먼 곳을 생각하는 사람들을 위한 음악.">
<meta property="og:title" content="빌리지 FM 🎵 먼 곳을 생각하는 사람들을 위한 음악">
<meta property="og:description" content="Press play and keep dreaming. 카메라 렌탈샵 빌리지가 틀어드립니다.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📻</text></svg>">
<title>빌리지 FM 🎵 먼 곳을 생각하는 사람들을 위한 음악</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; overflow:hidden; background:#0e0d12; }
  body {
    font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    color:#e8dfd0;
    display:flex; align-items:center; justify-content:center;
  }
  /* ── 스테이지 (16:9, contain) ── */
  #stage {
    position:relative;
    width:100vw; height:56.25vw;          /* 16:9 */
    max-height:100vh; max-width:177.78vh;
    overflow:hidden;
  }
  #scene {
    position:absolute; inset:0; width:100%; height:100%;
    image-rendering:pixelated; image-rendering:crisp-edges;
  }
  #grain {
    position:absolute; inset:0; width:100%; height:100%;
    image-rendering:pixelated; pointer-events:none;
  }
  #vig {
    position:absolute; inset:0; pointer-events:none;
    background:radial-gradient(ellipse at center, transparent 52%, rgba(8,6,12,.38) 100%);
  }

  /* ── 오버레이 공통 ── */
  .ov { position:absolute; text-shadow:0 1px 6px rgba(5,4,8,.7); }

  /* 좌상단: 워드마크 */
  #brand { top:4.6%; left:3.6%; user-select:none; opacity:.85; }
  #brand .mark { display:flex; align-items:baseline; gap:11px; }
  #brand .name { font-family:Georgia,'Times New Roman',serif; font-weight:700; font-size:clamp(16px,2.2vw,29px); letter-spacing:.04em; }
  #brand .live { display:inline-flex; align-items:center; gap:5px; font-size:clamp(7px,.8vw,10px); font-weight:700; letter-spacing:.24em; opacity:.8; }
  #brand .live i { width:.6em; height:.6em; border-radius:50%; background:#e5484d; animation:pulse 3s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:.9} 50%{opacity:.2} }
  #brand .tag  { margin-top:.55em; font-size:clamp(9px,.95vw,13px); opacity:.7; letter-spacing:.02em; }
  #brand .tag2 { margin-top:.3em; font-family:Georgia,serif; font-style:italic; font-size:clamp(8px,.85vw,11px); opacity:.45; }

  /* 우상단: 지금 재생 중 */
  #np { top:5%; right:3.6%; text-align:right; transition:opacity .8s; opacity:.85; }
  #np.fade { opacity:0; }
  #np .row { display:flex; align-items:center; justify-content:flex-end; gap:9px; }
  .eq { display:inline-flex; align-items:flex-end; gap:2px; height:.9em; }
  .eq span { width:2px; background:#e8dfd0; border-radius:1px; animation:eq 1.6s ease-in-out infinite; }
  .eq span:nth-child(1){ height:45%; animation-delay:0s; }
  .eq span:nth-child(2){ height:90%; animation-delay:.35s; }
  .eq span:nth-child(3){ height:60%; animation-delay:.7s; }
  @keyframes eq { 0%,100%{transform:scaleY(.35)} 50%{transform:scaleY(1)} }
  body.paused .eq span { animation-play-state:paused; transform:scaleY(.3); }
  #np .title  { font-family:'Menlo','Courier New',monospace; font-weight:700; font-size:clamp(11px,1.2vw,15px); letter-spacing:.03em; }
  #np .artist { margin-top:.35em; font-family:'Menlo','Courier New',monospace; font-size:clamp(8px,.85vw,11px); opacity:.55; }

  /* 좌하단: 캡션 */
  #caption { bottom:4%; left:3.6%; font-size:clamp(8px,.85vw,11px); opacity:.4; letter-spacing:.04em; }

  /* 우하단: 컨트롤 (마우스 멈추면 사라짐) */
  #ctrl {
    bottom:3.4%; right:3.6%;
    display:flex; align-items:center; gap:10px;
    background:rgba(14,12,20,.5); border:1px solid rgba(232,223,208,.14);
    border-radius:999px; padding:7px 14px;
    opacity:0; transition:opacity .5s; backdrop-filter:blur(4px);
  }
  body.showui #ctrl { opacity:1; }
  #ctrl button {
    background:none; border:none; color:#e8dfd0; cursor:pointer;
    font-size:14px; line-height:1; padding:2px 4px; opacity:.85;
  }
  #ctrl button:hover { opacity:1; }
  #vol { width:86px; accent-color:#c97a48; cursor:pointer; }
  #keys { font-size:9px; letter-spacing:.05em; opacity:.4; }

  /* 시작 오버레이 */
  #start {
    position:absolute; inset:0; z-index:10;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px;
    background:rgba(10,8,14,.5);
    cursor:pointer; transition:opacity 1.2s;
  }
  #start.hide { opacity:0; pointer-events:none; }
  #playbtn {
    width:clamp(58px,8vw,84px); height:clamp(58px,8vw,84px); border-radius:50%;
    background:rgba(201,122,72,.92); border:none; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 0 60px rgba(201,122,72,.35);
    transition:transform .2s;
  }
  #playbtn:hover { transform:scale(1.05); }
  #playbtn svg { width:36%; margin-left:6%; fill:#efe6d6; }
  #start .t1 { font-family:Georgia,serif; font-weight:700; font-size:clamp(20px,2.6vw,33px); letter-spacing:.05em; }
  #start .t2 { font-size:clamp(10px,1.1vw,14px); opacity:.75; }
  #start .t3 { font-family:Georgia,serif; font-style:italic; font-size:clamp(9px,.95vw,12px); opacity:.45; }

  body.uimin #brand, body.uimin #caption, body.uimin #ctrl { display:none; }
</style>
</head>
<body class="paused">
<div id="stage">
  <canvas id="scene" width="160" height="90"></canvas>
  <canvas id="grain" width="480" height="270"></canvas>
  <div id="vig"></div>

  <div class="ov" id="brand">
    <div class="mark">
      <span class="name">빌리지 FM</span>
      <span class="live"><i></i>LIVE</span>
    </div>
    <div class="tag">먼 곳을 생각하는 사람들을 위한 음악</div>
    <div class="tag2">press play and keep dreaming.</div>
  </div>

  <div class="ov" id="np">
    <div class="row">
      <span class="eq"><span></span><span></span><span></span></span>
      <span class="title" id="npTitle">—</span>
    </div>
    <div class="artist" id="npArtist">Village FM · ambient</div>
  </div>

  <div class="ov" id="caption">카메라 렌탈샵 빌리지</div>

  <div class="ov" id="ctrl">
    <button id="btnPlay" title="재생/일시정지 (Space)">▶</button>
    <button id="btnNext" title="다음 곡 (N)">≫</button>
    <input type="range" id="vol" min="0" max="100" value="70" title="볼륨 (↑/↓)">
    <span id="keys">space·n·m</span>
  </div>

  <div id="start">
    <button id="playbtn" aria-label="재생"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
    <div class="t1">빌리지 FM</div>
    <div class="t2">먼 곳을 생각하는 사람들을 위한 음악</div>
    <div class="t3">press play and keep dreaming.</div>
  </div>
</div>

<script>
'use strict';
/* ═══════════════════════════════════════════════════════
   빌리지 FM — Claude FM 오마주
   광활한 새벽 지평선, 작은 사람, 장비 카트, 필름 그레인.
   Web Audio 실시간 생성 앰비언트 (저작권 無).
   URL 파라미터: ?autoplay=1 (OBS용), &ui=min (오버레이 최소화)
   ═══════════════════════════════════════════════════════ */

const Q = new URLSearchParams(location.search);
if (Q.get('ui') === 'min') document.body.classList.add('uimin');

/* ───────────────────────── 트랙 정보 ───────────────────────── */
// 코드 보이싱 (루트 기준 반음 오프셋)
const SH = {
  M9:  [0, 7, 16, 23, 26],   // maj9
  m9:  [0, 7, 15, 22, 26],   // min9
  M6:  [0, 7, 16, 21, 24],   // maj6
  s9:  [0, 7, 14, 17, 24],   // sus + 9
  m11: [0, 7, 15, 20, 26]    // min11
};
const TP = (shift, shape) => shape.map(v => v + shift);
const PENT_m = [0, 3, 5, 7, 10, 12, 15, 17];  // 마이너 펜타토닉
const PENT_M = [0, 2, 4, 7, 9, 12, 14, 16];   // 메이저 펜타토닉

// root: MIDI 노트, dur: 코드 길이(초), pad/pk: 볼륨, plk: 멜로디 간격(초)
const TRACKS = [
  { t:'수평선',           root:45, wave:'sine',     dur:24, pad:.16, pk:.13, plk:9,  scl:PENT_m,
    prog:[TP(0,SH.m9), TP(-4,SH.M9), TP(3,SH.M6), TP(-2,SH.s9)] },
  { t:'먼 빛',            root:41, wave:'sine',     dur:22, pad:.14, pk:.14, plk:8,  scl:PENT_M,
    prog:[TP(0,SH.M9), TP(-3,SH.m9), TP(5,SH.M6), TP(7,SH.s9)] },
  { t:'아무도 듣지 않아도', root:43, wave:'triangle', dur:26, pad:.13, pk:.11, plk:12, scl:PENT_m,
    prog:[TP(0,SH.m11), TP(-2,SH.M9), TP(5,SH.m9), TP(-4,SH.s9)] },
  { t:'신호',             root:40, wave:'sine',     dur:22, pad:.16, pk:.12, plk:10, scl:PENT_m,
    prog:[TP(0,SH.m9), TP(-4,SH.M9), TP(5,SH.m11), TP(7,SH.s9)] },
  { t:'잔광',             root:46, wave:'triangle', dur:24, pad:.13, pk:.13, plk:9,  scl:PENT_M,
    prog:[TP(0,SH.M9), TP(-3,SH.m9), TP(5,SH.M6), TP(7,SH.s9)] },
  { t:'그리움',           root:47, wave:'sine',     dur:26, pad:.16, pk:.12, plk:11, scl:PENT_m,
    prog:[TP(0,SH.m9), TP(5,SH.M6), TP(-4,SH.M9), TP(7,SH.s9)] },
  { t:'무한',             root:48, wave:'sine',     dur:28, pad:.15, pk:.10, plk:14, scl:PENT_M,
    prog:[TP(0,SH.M9), TP(-7,SH.M9), TP(-3,SH.m9), TP(-5,SH.M6)] },
  { t:'새벽이 오기 전',   root:42, wave:'sine',     dur:24, pad:.16, pk:.12, plk:10, scl:PENT_m,
    prog:[TP(0,SH.m9), TP(-4,SH.M9), TP(3,SH.M6), TP(-2,SH.s9)] },
  { t:'주파수 너머',      root:50, wave:'triangle', dur:22, pad:.13, pk:.14, plk:8,  scl:PENT_m,
    prog:[TP(0,SH.m9), TP(-5,SH.M6), TP(-3,SH.M9), TP(5,SH.s9)] },
  { t:'빛이 있던 자리',   root:44, wave:'sine',     dur:26, pad:.15, pk:.11, plk:12, scl:PENT_M,
    prog:[TP(0,SH.M9), TP(-3,SH.m9), TP(-7,SH.M9), TP(2,SH.s9)] }
];

/* ───────────────────────── 오디오 엔진 ───────────────────────── */
const AC = window.AudioContext || window.webkitAudioContext;
let ctx = null;
let master, lpFilter, comp, revConv, revGain, dly, dlyFb, padBus, pkBus, windGain;
let playing = false;
let trackIdx = -1;
let chordN = 0;
let timers = [];
let volume = 0.7;
let mutedVol = null;

const mf = m => 440 * Math.pow(2, (m - 69) / 12);
const setT = (fn, ms) => { const id = setTimeout(fn, ms); timers.push(id); return id; };
const clearTimers = () => { timers.forEach(clearTimeout); timers = []; };

function makeIR(sec, decay) {
  const rate = ctx.sampleRate, len = Math.floor(rate * sec);
  const buf = ctx.createBuffer(2, len, rate);
  for (let c = 0; c < 2; c++) {
    const d = buf.getChannelData(c);
    for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, decay);
  }
  return buf;
}

function makeNoiseBuf(sec) {
  const rate = ctx.sampleRate, len = Math.floor(rate * sec);
  const buf = ctx.createBuffer(1, len, rate);
  const d = buf.getChannelData(0);
  let last = 0;
  for (let i = 0; i < len; i++) {
    const w = Math.random() * 2 - 1;
    last = (last + 0.02 * w) / 1.02; d[i] = last * 3.5;
  }
  return buf;
}

function buildGraph() {
  ctx = new AC();
  master = ctx.createGain();
  master.gain.value = volume * volume;

  comp = ctx.createDynamicsCompressor();
  comp.threshold.value = -20; comp.knee.value = 20; comp.ratio.value = 3;
  comp.attack.value = 0.01; comp.release.value = 0.4;

  lpFilter = ctx.createBiquadFilter();
  lpFilter.type = 'lowpass'; lpFilter.frequency.value = 3000; lpFilter.Q.value = 0.35;

  lpFilter.connect(comp); comp.connect(master); master.connect(ctx.destination);

  // 긴 리버브 (생성 IR) — 아득함의 핵심
  revConv = ctx.createConvolver(); revConv.buffer = makeIR(4.8, 2.2);
  revGain = ctx.createGain(); revGain.gain.value = 0.55;
  revConv.connect(revGain); revGain.connect(lpFilter);

  // 딜레이 (멜로디 잔향)
  dly = ctx.createDelay(2); dly.delayTime.value = 0.58;
  dlyFb = ctx.createGain(); dlyFb.gain.value = 0.4;
  const dlyLp = ctx.createBiquadFilter(); dlyLp.type = 'lowpass'; dlyLp.frequency.value = 1500;
  dly.connect(dlyLp); dlyLp.connect(dlyFb); dlyFb.connect(dly);
  dly.connect(lpFilter); dly.connect(revConv);

  padBus = ctx.createGain(); padBus.gain.value = 1.5;
  padBus.connect(lpFilter); padBus.connect(revConv);
  pkBus  = ctx.createGain(); pkBus.gain.value = 1.3;
  pkBus.connect(dly); pkBus.connect(revConv);

  // 필터에 아주 느린 움직임
  const lfo = ctx.createOscillator(); lfo.frequency.value = 0.02;
  const lfoG = ctx.createGain(); lfoG.gain.value = 450;
  lfo.connect(lfoG); lfoG.connect(lpFilter.frequency); lfo.start();

  // 바람 (낮게 깔리는 브라운 노이즈 + 느린 강약)
  const wind = ctx.createBufferSource(); wind.buffer = makeNoiseBuf(4); wind.loop = true;
  const windLp = ctx.createBiquadFilter(); windLp.type = 'lowpass'; windLp.frequency.value = 260;
  windGain = ctx.createGain(); windGain.gain.value = 0.02;
  wind.connect(windLp); windLp.connect(windGain); windGain.connect(master);
  wind.start();
  const wLfo = ctx.createOscillator(); wLfo.frequency.value = 0.045;
  const wLfoG = ctx.createGain(); wLfoG.gain.value = 0.009;
  wLfo.connect(wLfoG); wLfoG.connect(windGain.gain); wLfo.start();
}

function playChord(offsets, dur) {
  const tr = TRACKS[trackIdx], t = ctx.currentTime;
  const g = ctx.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.linearRampToValueAtTime(tr.pad, t + dur * 0.4);
  g.gain.setValueAtTime(tr.pad, t + dur * 0.7);
  g.gain.linearRampToValueAtTime(0.0001, t + dur * 1.2);
  g.connect(padBus);
  offsets.forEach(o => {
    [-4, 4].forEach(det => {
      const osc = ctx.createOscillator();
      osc.type = tr.wave;
      osc.frequency.value = mf(tr.root + o);
      osc.detune.value = det + (Math.random() * 2 - 1);
      const og = ctx.createGain(); og.gain.value = 0.5 / offsets.length;
      osc.connect(og); og.connect(g);
      osc.start(t); osc.stop(t + dur * 1.22);
    });
  });
  // 베이스 (한 옥타브 아래 사인)
  const b = ctx.createOscillator(); b.type = 'sine';
  b.frequency.value = mf(tr.root + offsets[0] - 12);
  const bg = ctx.createGain();
  bg.gain.setValueAtTime(0.0001, t);
  bg.gain.linearRampToValueAtTime(tr.pad * 0.75, t + dur * 0.45);
  bg.gain.linearRampToValueAtTime(0.0001, t + dur * 1.15);
  b.connect(bg); bg.connect(padBus);
  b.start(t); b.stop(t + dur * 1.2);
}

function chordLoop() {
  if (!playing) return;
  const tr = TRACKS[trackIdx];
  playChord(tr.prog[chordN % tr.prog.length], tr.dur);
  chordN++;
  setT(chordLoop, tr.dur * 1000);
}

function playPluck() {
  const tr = TRACKS[trackIdx], t = ctx.currentTime;
  const notes = 1 + (Math.random() < 0.25 ? 1 : 0);
  for (let i = 0; i < notes; i++) {
    const deg = tr.scl[Math.floor(Math.random() * tr.scl.length)];
    const chord = tr.prog[(chordN - 1 + tr.prog.length) % tr.prog.length];
    const base = tr.root + chord[0] + 24;
    const osc = ctx.createOscillator(); osc.type = 'sine';
    osc.frequency.value = mf(base + deg);
    const g = ctx.createGain();
    const v = tr.pk * (0.4 + Math.random() * 0.6);
    const st = t + i * (0.5 + Math.random() * 0.5);
    g.gain.setValueAtTime(0.0001, st);
    g.gain.linearRampToValueAtTime(v, st + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, st + 2.5 + Math.random() * 1.5);
    osc.connect(g); g.connect(pkBus);
    osc.start(st); osc.stop(st + 5);
  }
}

function pluckLoop() {
  if (!playing) return;
  playPluck();
  const tr = TRACKS[trackIdx];
  setT(pluckLoop, (tr.plk * 0.6 + Math.random() * tr.plk) * 1000);
}

function startSchedulers() {
  chordN = 0;
  chordLoop(); pluckLoop();
}

function nextTrack() {
  clearTimers();
  let n;
  do { n = Math.floor(Math.random() * TRACKS.length); } while (n === trackIdx && TRACKS.length > 1);
  trackIdx = n;
  updateNP();
  if (playing) startSchedulers();
  // 트랙 길이 3~4.5분
  setT(nextTrack, (180 + Math.random() * 90) * 1000);
}

function updateNP() {
  const np = document.getElementById('np');
  np.classList.add('fade');
  setTimeout(() => {
    document.getElementById('npTitle').textContent = TRACKS[trackIdx].t;
    np.classList.remove('fade');
  }, 800);
}

/* ── 재생 제어 ── */
const elStart = document.getElementById('start');
const btnPlay = document.getElementById('btnPlay');

function start() {
  if (!ctx) buildGraph();
  ctx.resume();
  playing = true;
  document.body.classList.remove('paused');
  btnPlay.textContent = '❚❚';
  elStart.classList.add('hide');
  if (trackIdx < 0) nextTrack();
  else {
    // 일시정지 후 재개: 스케줄러 + 트랙 로테이션 타이머 재가동
    startSchedulers();
    setT(nextTrack, (180 + Math.random() * 90) * 1000);
  }
}

function pause() {
  playing = false;
  clearTimers();
  if (ctx) ctx.suspend();
  document.body.classList.add('paused');
  btnPlay.textContent = '▶';
}

function toggle() { (playing ? pause : start)(); }

function setVol(v) {
  volume = Math.min(1, Math.max(0, v));
  document.getElementById('vol').value = Math.round(volume * 100);
  if (ctx) master.gain.setTargetAtTime(volume * volume, ctx.currentTime, 0.05);
}

elStart.addEventListener('click', start);
btnPlay.addEventListener('click', toggle);
document.getElementById('btnNext').addEventListener('click', () => {
  if (!ctx) return;
  clearTimers();
  nextTrack();
});
document.getElementById('vol').addEventListener('input', e => setVol(e.target.value / 100));

document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); toggle(); }
  else if (e.key === 'n' || e.key === 'N') { if (ctx && playing) { clearTimers(); nextTrack(); } }
  else if (e.key === 'm' || e.key === 'M') {
    if (mutedVol === null) { mutedVol = volume; setVol(0); }
    else { setVol(mutedVol); mutedVol = null; }
  }
  else if (e.key === 'ArrowUp')   { e.preventDefault(); setVol(volume + 0.05); }
  else if (e.key === 'ArrowDown') { e.preventDefault(); setVol(volume - 0.05); }
});

// 컨트롤 자동 숨김
let uiTimer = null;
function showUI() {
  document.body.classList.add('showui');
  clearTimeout(uiTimer);
  uiTimer = setTimeout(() => document.body.classList.remove('showui'), 2600);
}
document.addEventListener('mousemove', showUI);
document.addEventListener('touchstart', showUI);

// OBS 등 자동재생: ?autoplay=1
if (Q.get('autoplay') === '1') {
  try { start(); } catch (e) { /* 정책 차단 시 오버레이 유지 */ }
  setTimeout(() => {
    if (!ctx || ctx.state !== 'running') {
      // 자동재생 차단됨: 그래프를 버리고 클릭 시 새로 구성 (잔여 오실레이터 중복 방지)
      pause();
      if (ctx) { ctx.close(); ctx = null; }
      trackIdx = -1;
      elStart.classList.remove('hide');
    }
  }, 700);
}

/* ───────────────────────── 씬: 세상 끝의 송신탑 ───────────────────────── */
const cv = document.getElementById('scene');
const g2 = cv.getContext('2d');
const W = 160, H = 90;

function px(x, y, w, h, c) { g2.fillStyle = c; g2.fillRect(Math.round(x), Math.round(y), Math.round(w), Math.round(h)); }
function pa(x, y, w, h, c, a) { g2.globalAlpha = Math.max(0, Math.min(1, a)); px(x, y, w, h, c); g2.globalAlpha = 1; }
function trLine(x0, y0, x1, y1, c) {
  const steps = Math.max(Math.abs(x1 - x0), Math.abs(y1 - y0));
  for (let i = 0; i <= steps; i++) px(x0 + (x1 - x0) * i / steps, y0 + (y1 - y0) * i / steps, 1, 1, c);
}
const rnd1 = i => { const s = Math.sin(i * 127.1) * 43758.5453; return s - Math.floor(s); };

/* 능선 실루엣 (완만한 기복) */
const RIDGE = [];
{
  const ctrl = [[0,78],[22,77],[34,74],[48,76],[70,78],[95,77],[112,79],[135,80],[159,78]];
  for (let x = 0; x < W; x++) {
    let i = 0;
    while (i < ctrl.length - 2 && ctrl[i + 1][0] < x) i++;
    const u = Math.min(1, Math.max(0, (x - ctrl[i][0]) / (ctrl[i + 1][0] - ctrl[i][0] || 1)));
    const k = (1 - Math.cos(u * Math.PI)) / 2;
    RIDGE.push(Math.round(ctrl[i][1] + (ctrl[i + 1][1] - ctrl[i][1]) * k));
  }
}

/* 거대한 달 (절반쯤 떠오르는 중) */
const MX = 126, MY = 70, MR = 15;

/* 은하수 — 대각선으로 흐르는 희미한 별의 강 */
const MW = [];
for (let i = 0; i < 240; i++) {
  const s = rnd1(i * 3.7);
  const off1 = (rnd1(i * 1.3) + rnd1(i * 2.9) + rnd1(i * 5.1)) / 3 - 0.5;
  const off2 = (rnd1(i * 7.7) + rnd1(i * 4.3)) / 2 - 0.5;
  MW.push([150 - 135 * s + off1 * 26, 6 + 36 * s + off2 * 13, 0.04 + rnd1(i * 9.1) * 0.11]);
}

/* 별 */
const STARS = [];
for (let i = 0; i < 75; i++) STARS.push([Math.floor(rnd1(i) * W), Math.floor(rnd1(i + 99) * 68), rnd1(i + 55)]);

/* 전파 파문 / 연기 / 유성 / 인공위성 상태 */
let rings = [], ringNext = 4;
let smoke = [], smokeNext = 3;
let ssNext = 40 + Math.random() * 120, ss = null;
let satNext = 90 + Math.random() * 180, sat = null;

function drawScene(t) {
  /* 밤하늘 */
  for (let y = 0; y < 82; y++) {
    const k = y / 82;
    g2.fillStyle = 'rgb(' + Math.round(7 + 26 * k) + ',' + Math.round(9 + 29 * k) + ',' + Math.round(26 + 48 * k) + ')';
    g2.fillRect(0, y, W, 1);
  }

  /* 은하수 (집단적으로 아주 천천히 숨쉼) */
  const mwB = 0.85 + 0.15 * Math.sin(t * 0.05);
  MW.forEach(p => pa(p[0], p[1], 1, 1, '#dfe4f6', p[2] * mwB));

  /* 별 */
  STARS.forEach((s, i) => {
    const tw = i < 6 ? 0.45 + 0.55 * Math.sin(t * 0.7 + i * 2.7) : 0.7 + 0.3 * Math.sin(t * 0.3 + i);
    pa(s[0], s[1], 1, 1, '#e8e4f0', (0.1 + s[2] * 0.35) * tw);
  });

  /* 인공위성 — 아주 느리게 하늘을 가로지름 */
  if (!sat && t > satNext) sat = { x: -2, y: 6 + Math.random() * 20, v: 0.05 + Math.random() * 0.03 };
  if (sat) {
    sat.x += sat.v;
    pa(sat.x, sat.y, 1, 1, '#cbd4e8', 0.4 + 0.15 * Math.sin(t * 3));
    if (sat.x > W + 2) { sat = null; satNext = t + 150 + Math.random() * 200; }
  }

  /* 유성 */
  if (!ss && t > ssNext) ss = { t0: t, x0: 15 + Math.random() * 110, y0: 4 + Math.random() * 18 };
  if (ss) {
    const u = (t - ss.t0) / 0.9;
    if (u >= 1) { ss = null; ssNext = t + 90 + Math.random() * 180; }
    else {
      const x = ss.x0 + u * 22, y = ss.y0 + u * 13;
      pa(x, y, 1, 1, '#f6f1e7', (1 - u) * 0.9);
      pa(x - 1, y - 1, 1, 1, '#f6f1e7', (1 - u) * 0.45);
      pa(x - 2, y - 2, 1, 1, '#f6f1e7', (1 - u) * 0.2);
    }
  }

  /* 달빛 무리 + 달 */
  const gb = 0.9 + 0.1 * Math.sin(t * 0.1);
  g2.fillStyle = '#cfd3e8';
  [[MR + 11, 0.05], [MR + 6, 0.07], [MR + 2.5, 0.1]].forEach(gl => {
    g2.globalAlpha = gl[1] * gb;
    g2.beginPath(); g2.arc(MX, MY, gl[0], 0, 7); g2.fill();
  });
  g2.globalAlpha = 1;
  g2.fillStyle = '#d8d2c0';
  g2.beginPath(); g2.arc(MX, MY, MR, 0, 7); g2.fill();
  // 크레이터
  g2.fillStyle = '#c2bcaa';
  [[MX - 5, MY - 4, 2.2], [MX + 4, MY - 8, 1.5], [MX - 1, MY - 10, 1.1], [MX + 7, MY - 2, 1.8], [MX - 9, MY - 8, 1.3]].forEach(c => {
    g2.beginPath(); g2.arc(c[0], c[1], c[2], 0, 7); g2.fill();
  });

  /* 능선 — 거의 암흑, 달빛이 닿는 쪽만 희미한 윤곽 */
  for (let x = 0; x < W; x++) {
    px(x, RIDGE[x], 1, H - RIDGE[x], '#07070f');
    const rim = Math.max(0, 1 - Math.abs(x - MX) / 55) * 0.3;
    if (rim > 0.02) pa(x, RIDGE[x], 1, 1, '#9b96b3', rim);
  }
  pa(0, 84, W, 6, '#020208', 0.5);

  /* ── 오두막 (불 켜진 창 하나 — 빌리지) ── */
  const hb = RIDGE[28];
  px(24, hb - 6, 10, 6, '#0b0b15');
  px(23, hb - 7, 12, 1, '#15151f');
  px(25, hb - 8, 8, 1, '#15151f');
  px(31, hb - 10, 1, 2, '#0b0b15');
  const wf = 0.8 + 0.2 * Math.sin(t * 6.3 + Math.sin(t * 2.7));
  pa(25, hb - 5, 4, 4, '#ffb45e', 0.12 * wf);
  pa(26, hb - 4, 2, 2, '#ffb45e', wf);
  // 굴뚝 연기
  if (t > smokeNext) { smoke.push({ x: 31, y: hb - 11, t0: t }); smokeNext = t + 4 + Math.random() * 4; }
  smoke = smoke.filter(s => t - s.t0 < 9);
  smoke.forEach(s => {
    const u = (t - s.t0) / 9;
    pa(s.x + Math.sin((t + s.t0) * 0.8) * 1.5, s.y - u * 14, 1, 1, '#8a86a0', 0.14 * (1 - u));
  });

  /* ── 송신탑 ── */
  const tb = RIDGE[36], ty = tb - 30;   // ty: 비콘 위치
  trLine(33, tb, 36, tb - 26, '#10101c');
  trLine(39, tb, 36, tb - 26, '#10101c');
  for (let k = 1; k <= 4; k++) {
    const w = Math.max(1, Math.round(3 * (1 - k / 5.5)));
    px(36 - w, tb - 5 * k, w * 2 + 1, 1, '#10101c');
  }
  px(36, tb - 29, 1, 3, '#10101c');
  // 비콘 — 심장박동처럼
  const bk = Math.pow(Math.max(0, Math.sin(t * 0.9)), 14);
  if (bk > 0.03) { pa(36, ty, 1, 1, '#e5484d', bk); pa(35, ty - 1, 3, 3, '#e5484d', bk * 0.3); }

  /* 전파 파문 — 아무도 듣지 않아도, 계속 */
  if (t > ringNext) { rings.push({ t0: t }); ringNext = t + 6 + Math.random() * 5; }
  rings = rings.filter(r => t - r.t0 < 4.5);
  rings.forEach(r => {
    const rr = (t - r.t0) * 5 + 1;
    const a = Math.max(0, 0.16 * (1 - rr / 24));
    if (a <= 0) return;
    for (let i = 0; i < 40; i++) {
      const th = i / 40 * Math.PI * 2;
      const X = 36 + Math.cos(th) * rr, Y = ty + Math.sin(th) * rr * 0.8;
      const cx = Math.max(0, Math.min(W - 1, Math.round(X)));
      if (X >= 0 && X < W && Y > 0 && Y < RIDGE[cx]) pa(X, Y, 1, 1, '#cfe0ff', a);
    }
  });

  /* ── 달을 기다리는 사람 + 삼각대 ── */
  const wb = RIDGE[97];
  px(95, wb - 6, 2, 2, '#0e0e1a');            // 머리 (달 쪽을 향함)
  px(94, wb - 4, 3, 3, '#0e0e1a');            // 웅크린 몸
  px(96, wb - 1, 2, 1, '#0e0e1a');            // 뻗은 다리
  trLine(102, wb, 104, wb - 5, '#0e0e1a');    // 삼각대
  trLine(107, wb, 105, wb - 5, '#0e0e1a');
  px(104, wb - 5, 1, 2, '#0e0e1a');
  px(103, wb - 7, 3, 2, '#0e0e1a');           // 카메라
  px(106, wb - 7, 1, 1, '#0e0e1a');           // 렌즈 — 달을 향해
}

/* 필름 그레인 */
const gcv = document.getElementById('grain');
const gg = gcv.getContext('2d');
const GW = 480, GH = 270;
const gImg = gg.createImageData(GW, GH);
function drawGrain() {
  const d = gImg.data;
  for (let i = 0; i < d.length; i += 4) {
    const v = 95 + Math.random() * 95;
    d[i] = v; d[i+1] = v; d[i+2] = v;
    d[i+3] = Math.random() * 17;
  }
  gg.putImageData(gImg, 0, 0);
}

/* 렌더 루프 (씬 ~30fps, 그레인 ~8fps) */
let last = 0, lastG = 0;
function frame(ms) {
  if (ms - last >= 33) { last = ms; drawScene(ms / 1000); }
  if (ms - lastG >= 125) { lastG = ms; drawGrain(); }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
