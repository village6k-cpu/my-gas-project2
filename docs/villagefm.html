<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>VILLAGE. FM</title>
<meta name="description" content="빌리지 FM — 새벽 톤 3/4 입체 픽셀 로파이. 매장 일상과 먼 곳을 바라보는 쉼이 5분 주기로 무한 반복.">
<!--
  VILLAGE. FM — 3/4 입체 픽셀 로파이 무한루프 (새벽 톤 · 한 바퀴 약 5분)
  음악: Suno 곡을 이 폴더에 "villagefm.mp3"로 저장 → ▶ 누르면 무한반복. (없어도 화면은 동작)
  외부 리소스 0개 · 자체완결 · GitHub Pages 그대로 서빙.
-->
<style>
  :root{ --accent:#d0674a; --cream:#e7ddcc; --dim:#9a8f7e; }
  *{ box-sizing:border-box; }
  html,body{ height:100%; margin:0; background:#000; overflow:hidden; }
  body{ font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif; color:var(--cream); }
  .stage{ position:fixed; inset:0; background:#0a0810; }
  #cv{ position:absolute; inset:0; width:100%; height:100%; image-rendering:pixelated; image-rendering:crisp-edges; }
  .bar{ position:absolute; left:0; right:0; height:5.5%; background:#000; z-index:3; }
  .bar.top{ top:0; } .bar.bot{ bottom:0; }

  .hud{ position:absolute; inset:0; z-index:4; pointer-events:none; }
  .hud > *{ position:absolute; }
  .brand{ top:7.6%; left:2.4%; display:flex; align-items:center; gap:9px; }
  .wm{ font-weight:900; letter-spacing:.05em; font-size:clamp(15px,1.7vw,22px); color:var(--cream); text-shadow:0 1px 8px rgba(0,0,0,.6); }
  .wm .v,.wm .dot{ color:var(--accent); }
  .fm{ font-weight:900; letter-spacing:.2em; font-size:11px; color:var(--dim); align-self:flex-end; padding-bottom:2px; }
  .live{ display:flex; align-items:center; gap:5px; font-size:10px; letter-spacing:.14em; color:var(--dim); align-self:flex-end; padding-bottom:3px; }
  .live .d{ width:6px; height:6px; border-radius:50%; background:var(--accent); box-shadow:0 0 8px var(--accent); animation:pulse 2.4s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:.35;} }
  .track{ top:7.7%; right:2.4%; text-align:right; }
  .track .now{ font-size:clamp(12px,1.35vw,16px); color:#e2d9c8; text-shadow:0 1px 8px rgba(0,0,0,.7); }
  .track .now .note{ color:var(--accent); margin-right:6px; }
  .track .clock{ font-size:11px; letter-spacing:.06em; color:var(--dim); margin-top:3px; font-variant-numeric:tabular-nums; }
  .cap{ bottom:7.6%; left:2.4%; font-size:12px; color:var(--dim); font-style:italic; letter-spacing:.02em; text-shadow:0 1px 6px rgba(0,0,0,.6); }

  .sound{ bottom:7%; left:50%; transform:translateX(-50%); z-index:5; display:flex; align-items:center; gap:10px;
    background:rgba(14,10,18,.45); backdrop-filter:blur(7px); -webkit-backdrop-filter:blur(7px);
    border:1px solid rgba(231,221,204,.1); border-radius:999px; padding:6px 13px; opacity:0; transition:opacity .5s ease; pointer-events:auto; }
  .sound.show{ opacity:1; }
  .sound button{ all:unset; cursor:pointer; color:var(--cream); font-size:13px; line-height:1; padding:3px; border-radius:6px; }
  .sound button:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }
  .sound input[type=range]{ width:90px; accent-color:var(--accent); cursor:pointer; }
  .sound .hint{ font-size:11px; color:var(--dim); }

  .gate{ position:absolute; inset:0; z-index:9; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; text-align:center;
    background:radial-gradient(80% 80% at 50% 46%, rgba(12,9,16,.36), rgba(8,6,12,.72));
    backdrop-filter:blur(3px); -webkit-backdrop-filter:blur(3px); transition:opacity .8s ease, visibility .8s ease; }
  .gate.hidden{ opacity:0; visibility:hidden; }
  .gate .play{ all:unset; cursor:pointer; width:88px; height:88px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    background:var(--accent); box-shadow:0 12px 40px rgba(208,103,74,.4); transition:transform .25s ease; }
  .gate .play:hover{ transform:scale(1.06); }
  .gate .play:focus-visible{ outline:3px solid var(--cream); outline-offset:4px; }
  .gate .play svg{ width:34px; height:34px; margin-left:5px; fill:#fff; }
  .gate .gw{ font-weight:900; letter-spacing:.05em; font-size:clamp(20px,2.7vw,30px); }
  .gate .gw .v,.gate .gw .dot{ color:var(--accent); }
  .gate .gs{ font-size:13px; color:var(--dim); }
</style>
</head>
<body>
<div class="stage">
  <canvas id="cv" width="320" height="180"></canvas>
  <div class="bar top"></div><div class="bar bot"></div>

  <div class="hud">
    <div class="brand"><span class="wm"><span class="v">V</span>ILLAGE<span class="dot">.</span></span><span class="fm">FM</span><span class="live"><span class="d"></span>LIVE</span></div>
    <div class="track"><div class="now"><span class="note">♫</span><span id="trk">고요한 아침</span></div><div class="clock mono" id="clk">--:--</div></div>
    <div class="cap" id="cap">먼지를 털다, 문득 먼 곳</div>
  </div>

  <div class="sound" id="sound">
    <button id="mute" aria-label="음소거">🔊</button>
    <input type="range" id="vol" min="0" max="1" step="0.01" value="0.7" aria-label="볼륨">
    <span class="hint" id="hint"></span>
  </div>

  <div class="gate" id="gate">
    <button class="play" id="play" aria-label="빌리지 FM 시작"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg></button>
    <div class="gw"><span class="v">V</span>ILLAGE<span class="dot">.</span> FM</div>
    <div class="gs">클릭하면 음악과 함께 시작 · 무한반복</div>
  </div>

  <audio id="bgm" loop preload="none"><source src="villagefm.mp3" type="audio/mpeg"></audio>
</div>

<script>
(function(){
"use strict";
var W=320,H=180;
var cv=document.getElementById('cv'), ctx=cv.getContext('2d'); ctx.imageSmoothingEnabled=false;
var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function R(x,a,b,w,h,c){ x.fillStyle=c; x.fillRect(a|0,b|0,w|0,h|0); }
function gfill(x,y0,y1,st){ var g=x.createLinearGradient(0,y0,0,y1); for(var i=0;i<st.length;i++) g.addColorStop(st[i][0],st[i][1]); return g; }
function glow(x,cx,cy,rad,c,al){ var g=x.createRadialGradient(cx,cy,0,cx,cy,rad); g.addColorStop(0,c); g.addColorStop(1,'rgba(0,0,0,0)'); x.globalAlpha=al; x.fillStyle=g; x.fillRect(0,0,W,H); x.globalAlpha=1; }
function mk(){ var c=document.createElement('canvas'); c.width=W; c.height=H; var x=c.getContext('2d'); x.imageSmoothingEnabled=false; return {c:c,x:x}; }

// ── 평면 2D 블록 (단색) ──
function cube(x,px,py,w,h,base,top,side,d){ R(x,px,py,w,h,base); }
var CH='#a4623f', TOP='#c07a4e', SIDE='#733f26';

// 서 있는 캐릭터 (3/4 뒤·비스듬, 얼굴 없음). armDy: 가까운 팔 높이, prop(hx,hy) 손에 붙는 소품
function charStand(x,fx,fy,armDy,prop){
  cube(x,fx-5,fy-6,4,6,CH,TOP,SIDE,2); cube(x,fx+1,fy-6,4,6,CH,TOP,SIDE,2);   // 다리
  cube(x,fx-9,fy-16,3,7,CH,TOP,SIDE,2);                                       // 먼 팔
  cube(x,fx-6,fy-17,11,11,CH,TOP,SIDE,3);                                     // 몸통
  cube(x,fx-7,fy-29,13,12,CH,TOP,SIDE,3);                                     // 머리(뒤통수)
  var ay=fy-16+(armDy||0);
  cube(x,fx+6,ay,3,7,CH,TOP,SIDE,2);                                          // 가까운 팔
  if(prop) prop(fx+8, ay-2);                                                  // 손 위치
}
// 앉은 캐릭터 (뒷모습, 작게·아득)
function charSit(x,fx,fy){
  cube(x,fx-5,fy-9,11,9,CH,TOP,SIDE,2);                                       // 몸(앉음)
  cube(x,fx-6,fy-18,13,10,CH,TOP,SIDE,3);                                     // 머리
}

// ── 실내 (새벽 톤) ──
function interiorDawn(x,lightLeft){
  x.fillStyle=gfill(x,0,132,[[0,'#3f4668'],[.42,'#6d6480'],[.72,'#a67a72'],[1,'#c99a72']]); x.fillRect(0,0,W,132); // 벽(새벽)
  R(x,0,132,W,H-132,'#241f30'); R(x,0,132,W,1,'#33293c');                     // 바닥
  x.save(); x.globalAlpha=.12; x.fillStyle='#f2d2a2'; x.beginPath();
  if(lightLeft){ x.moveTo(0,8); x.lineTo(120,8); x.lineTo(64,132); x.lineTo(0,132); }
  else { x.moveTo(W,8); x.lineTo(200,8); x.lineTo(256,132); x.lineTo(W,132); }
  x.closePath(); x.fill(); x.restore();
  glow(x, lightLeft?24:296, 40, 92, 'rgba(242,204,152,.22)', .5);
}
// ── 야외 하늘 (새벽/노을/밤) ──
function sky(x,kind){
  var HZ, st;
  if(kind==='dawn'){ HZ=100; st=[[0,'#3f4668'],[.45,'#6d6480'],[.75,'#a67a72'],[1,'#c99a72']]; }
  else if(kind==='dusk'){ HZ=100; st=[[0,'#39355c'],[.4,'#5d4d6a'],[.72,'#9a5f58'],[1,'#c98a58']]; }
  else { HZ=104; st=[[0,'#1a1f37'],[.5,'#282b47'],[1,'#463f55']]; }
  x.fillStyle=gfill(x,0,HZ,st); x.fillRect(0,0,W,HZ);
  x.fillStyle=(kind==='dusk')?'#241a2c':'#221f32'; x.fillRect(0,HZ,W,H-HZ); R(x,0,HZ,W,1,'#2e2940');
  R(x,0,HZ-3,W,4,'rgba(200,192,196,.22)');
  return HZ;
}
var STARS=[[30,18],[62,30],[104,14],[150,22],[196,16],[238,26],[276,20],[300,32],[80,44],[176,40],[214,50],[130,52]];

// ── 철제 랙 (아이소 3D) ──
function rack3d(x){   // 평면 2D 랙(4단)
  var rx=176, sw=70, sh=[58,80,102,124];
  R(x,rx-3,50,3,80,'#2e2b3e'); R(x,rx+sw,50,3,80,'#2e2b3e');                 // 기둥
  for(var yy=54;yy<128;yy+=6){ R(x,rx-2,yy,1,2,'#48445e'); R(x,rx+sw+1,yy,1,2,'#48445e'); }
  sh.forEach(function(sy){ R(x,rx,sy,sw,3,'#3d3950'); R(x,rx,sy,sw,1,'#4c4866'); }); // 선반
  R(x,rx+8,sh[0]-12,12,12,'#494560'); R(x,rx+11,sh[0]-8,5,5,'#20262e'); R(x,rx+40,sh[0]-10,10,10,'#443f58'); // 카메라/박스
  R(x,rx+10,sh[1]-11,14,11,'#4a4664'); R(x,rx+13,sh[1]-9,8,6,'#20262e'); R(x,rx+44,sh[1]-9,9,9,'#443f58');
  R(x,rx+12,sh[2]-9,11,9,'#494560'); R(x,rx+40,sh[2]-11,10,11,'#443f58');
}
// ── 2D 데스크 ──
function desk3d(x,ox,dy,w){
  R(x,ox,dy,w,3,'#4a3f4e'); R(x,ox,dy,w,1,'#5a4e5e'); R(x,ox,dy+3,w,3,'#332a38');    // 상판
  R(x,ox+3,dy+6,3,10,'#2e2636'); R(x,ox+w-6,dy+6,3,10,'#2e2636');                    // 다리
}
// ── 2D 시네카트 (옆모습) ──
function cart3d(x,cx,gy){
  R(x,cx+8,gy-6,6,6,'#1c1a26'); R(x,cx+9,gy-5,4,4,'#4a465e'); R(x,cx+34,gy-7,8,8,'#1c1a26'); R(x,cx+36,gy-5,4,4,'#4a465e'); // 바퀴
  R(x,cx+2,gy-15,44,3,'#3d3950'); R(x,cx+2,gy-16,44,1,'#4c4866');            // 아래판
  R(x,cx+8,gy-31,2,16,'#5a5878'); R(x,cx+36,gy-31,2,16,'#5a5878');          // 기둥
  R(x,cx+6,gy-29,40,3,'#3d3950'); R(x,cx+6,gy-30,40,1,'#4c4866');           // 위판
  R(x,cx+2,gy-36,2,8,'#5a5878'); R(x,cx-3,gy-36,7,2,'#5a5878');             // 핸들
  R(x,cx+10,gy-40,11,11,'#494560'); R(x,cx+13,gy-36,5,5,'#20262e'); R(x,cx+34,gy-46,2,17,'#5a5878'); R(x,cx+32,gy-47,6,3,'#494560'); // 장비/스탠드
  R(x,cx+26,gy-38,9,9,'#443f58'); R(x,cx+14,gy-24,10,9,'#494560');
}

function vignette(x){ var v=x.createRadialGradient(160,84,58,160,90,205); v.addColorStop(0,'rgba(0,0,0,0)'); v.addColorStop(1,'rgba(8,6,12,.5)'); x.fillStyle=v; x.fillRect(0,0,W,H); }

// ══════════ 씬 (3/4 입체 · 최소 움직임 · 새벽) ══════════
var scenes=[];
var DUR=34000, GAZE=48000; // 6*34 + 2*48 = 300s ≈ 5분

// 1) 먼지 털기
scenes.push({ dur:DUR, cap:'선반 먼지를 털다', trk:'고요한 아침',
  bake:function(x){ interiorDawn(x,true); rack3d(x); vignette(x); },
  anim:function(x,t){
    var up=Math.round((Math.sin(t/1400)*0.5+0.5)*6);      // 0~6, 아주 천천히
    charStand(x,130,130,-12-up, function(hx,hy){ R(x,hx+2,hy-2,5,3,'#c9a24b'); R(x,hx+1,hy,1,3,'#7a5a3c'); }); // 먼지떨이(팔에 붙음)
    if(up>4){ R(x,148,60,1,1,'rgba(226,196,140,.5)'); R(x,152,56,1,1,'rgba(226,196,140,.35)'); } // 먼지 한 톨
  }});

// 2) 시네카트 밀기
scenes.push({ dur:DUR, cap:'장비를 싣고, 천천히', trk:'느린 바퀴',
  bake:function(x){ sky(x,'dawn'); glow(x,60,96,50,'rgba(214,160,110,.4)',.5); R(x,55,92,10,7,'#d8ad84'); R(x,56,93,8,5,'#e6c39a'); vignette(x); },
  anim:function(x,t){ var gx=Math.round(6 + (t%DUR)*0.010), gy=124;   // 아주 천천히 가로지름
    cart3d(x,gx,gy);
    charStand(x,gx-14,gy+6,-2, function(hx,hy){ R(x,hx,hy+2,3,2,CH); }); // 미는 팔(핸들쪽)
  }});

// 3) 쉼 · 노을 바다
scenes.push({ dur:GAZE, cap:'하던 걸 멈추고, 수평선', trk:'먼 바다',
  bake:function(x){ var HZ=sky(x,'dusk'); glow(x,168,HZ-2,52,'rgba(230,150,80,.5)',.7); R(x,162,HZ-11,11,11,'#e0a860'); R(x,163,HZ-10,9,9,'#f2ca88');
    x.fillStyle=gfill(x,HZ,HZ+22,[[0,'#b07444'],[1,'#241a2c']]); x.fillRect(0,HZ,W,22); vignette(x); },
  anim:function(x,t){ var HZ=100;
    for(var i=0;i<6;i++){ var a=(0.4-i*0.05)*(0.6+0.4*Math.sin(t*0.0018+i)); R(x,168,HZ+2+i*3,7-i,1,'rgba(250,224,160,'+(a<0?0:a).toFixed(2)+')'); } // 윤슬
    charSit(x,150,HZ+12);
  }});

// 4) 렌즈 닦기
scenes.push({ dur:DUR, cap:'렌즈를 살펴보며', trk:'맑은 유리',
  bake:function(x){ interiorDawn(x,false); desk3d(x,126,116,74); vignette(x); },
  anim:function(x,t){
    var w=Math.round(Math.sin(t/1600)*2);                 // 아주 천천히 좌우
    charStand(x,118,120,-4, function(hx,hy){ R(x,hx+w,hy-1,5,5,'#2e2b3e'); R(x,hx+1+w,hy,3,3,'#46586a'); }); // 렌즈(손에)
  }});

// 5) 커피 한잔
scenes.push({ dur:DUR, cap:'잠깐, 김이 오르는 한 잔', trk:'식지 않게',
  bake:function(x){ interiorDawn(x,true); vignette(x); },
  anim:function(x,t){ var p=(t%DUR)/DUR; var sip= (p>0.4&&p<0.5)? Math.round(Math.sin((p-0.4)/0.1*Math.PI)*7) : 0; // 사이클당 딱 한 번, 느린 한 모금
    charStand(x,150,130,-2-sip, function(hx,hy){ R(x,hx,hy-1,5,6,'#b0492e'); R(x,hx,hy-1,5,2,'#c85a3a');
      for(var i=0;i<3;i++){ var sy=hy-3-((t*0.015+i*8)%12); R(x,hx+1+Math.round(Math.sin(t*0.005+i)*2),sy,1,2,'rgba(210,190,164,.5)'); } }); // 김
  }});

// 6) 쉼 · 새벽 별
scenes.push({ dur:GAZE, cap:'아직 어두운, 여명 전', trk:'별이 지는 시간',
  bake:function(x){ var HZ=sky(x,'night'); for(var i=0;i<STARS.length;i++) R(x,STARS[i][0],STARS[i][1],1,1,'rgba(220,216,232,.5)');
    R(x,250,26,4,4,'#e6e0cf'); R(x,251,27,3,3,'#f2ecdb'); glow(x,252,28,24,'rgba(220,220,200,.22)',.5); vignette(x); },
  anim:function(x,t){ for(var i=0;i<STARS.length;i++){ if((i+((t/900)|0))%3===0) R(x,STARS[i][0],STARS[i][1],1,1,'rgba(255,248,224,.85)'); }
    charSit(x,112,116); }});

// 7) 장부 정리
scenes.push({ dur:DUR, cap:'오늘의 대여를, 한 줄씩', trk:'장부와 연필',
  bake:function(x){ interiorDawn(x,false); desk3d(x,126,116,74);
    R(x,150,110,22,6,'#cabfa6'); R(x,150,110,22,2,'#d6ccb4'); R(x,161,110,1,6,'#b3a88e'); }, // 장부(펼침)
  anim:function(x,t){
    var wx=Math.round(Math.sin(t/900)*3);                 // 천천히 끄적
    charStand(x,118,120,4, function(hx,hy){ R(x,hx+wx,hy,2,3,CH); R(x,hx+wx,hy+3,1,2,'#2c1a12'); }); // 손+펜
    vignette(x);
  }});

// 8) 꾸벅 졸기
scenes.push({ dur:DUR, cap:'스르륵, 잠깐만…', trk:'졸음',
  bake:function(x){ interiorDawn(x,true); desk3d(x,126,116,70);
    cube(x,150,106,14,8,'#2e2b3e','#3a3648','#1e1c28',3); cube(x,154,103,6,4,'#20262e','#2a3441','#161b22',2); }, // 책상 위 카메라
  anim:function(x,t){
    var nod = Math.round((Math.sin(t/2200 - Math.PI/2)*0.5+0.5)*5); // 천천히 숙였다 아주 가끔 듦
    // 머리만 살짝 숙임: charStand 대신 직접
    cube(x,118-5,120-6,4,6,CH,TOP,SIDE,2); cube(x,118+1,120-6,4,6,CH,TOP,SIDE,2);
    cube(x,118-6,120-17,11,11,CH,TOP,SIDE,3);
    cube(x,118-7,120-29+nod,13,12,CH,TOP,SIDE,3);          // 머리 꾸벅
    for(var i=0;i<3;i++){ var zp=((t*0.02)+i*33)%100; var za=1-zp/100; if(za>0){ var zw=3+Math.round(zp*0.03), zx=126+Math.round(zp*0.12), zy=90-Math.round(zp*0.34);
      x.fillStyle='rgba(232,216,168,'+za.toFixed(2)+')'; R(x,zx,zy,zw,1); for(var k=0;k<zw;k+=1){ R(x,zx+zw-1-k,zy+1+k,1,1); } R(x,zx,zy+zw+1,zw,1); } } // Z Z Z
    vignette(x);
  }});

// ══════════ 렌더 루프 ══════════
scenes.forEach(function(s){ s.bg=mk(); s.bake(s.bg.x); });
var bufA=mk(), bufB=mk(), FADE=3000;
function grain(x){ var im=x.getImageData(0,0,W,H),d=im.data; for(var i=0;i<d.length;i+=4){ var n=Math.random()*7-3.5; d[i]+=n; d[i+1]+=n; d[i+2]+=n; } x.putImageData(im,0,0); }
var idx=0, t0=0, last=0;
var trkEl=document.getElementById('trk'), capEl=document.getElementById('cap');
function setLabels(i){ trkEl.textContent=scenes[i].trk; capEl.textContent=scenes[i].cap; }
function drawScene(buf,i,tin){ buf.x.drawImage(scenes[i].bg.c,0,0); scenes[i].anim(buf.x,tin); }
function frame(now){ requestAnimationFrame(frame); if(now-last<55) return; last=now; if(!t0) t0=now;
  var tin=now-t0, cur=scenes[idx];
  if(tin>=cur.dur){ idx=(idx+1)%scenes.length; t0=now; tin=0; setLabels(idx); }
  drawScene(bufA,idx,tin); ctx.globalAlpha=1; ctx.drawImage(bufA.c,0,0);
  if(tin>cur.dur-FADE){ var ni=(idx+1)%scenes.length, a=(tin-(cur.dur-FADE))/FADE; drawScene(bufB,ni,tin-(cur.dur-FADE)); ctx.globalAlpha=a; ctx.drawImage(bufB.c,0,0); ctx.globalAlpha=1; }
  grain(ctx);
}
if(reduce){ drawScene(bufA,2,1000); ctx.drawImage(bufA.c,0,0); grain(ctx); setLabels(2); }
else { setLabels(0); requestAnimationFrame(frame); }

// 시계
var clk=document.getElementById('clk');
function tick(){ var d=new Date(), p=function(n){return(n<10?'0':'')+n;}; clk.textContent=p(d.getHours())+':'+p(d.getMinutes()); }
tick(); setInterval(tick,10000);

// 오디오
var bgm=document.getElementById('bgm'), gate=document.getElementById('gate'), play=document.getElementById('play');
var sound=document.getElementById('sound'), mute=document.getElementById('mute'), vol=document.getElementById('vol'), hint=document.getElementById('hint');
bgm.volume=0.7;
function start(){ gate.classList.add('hidden'); sound.classList.add('show'); var p=bgm.play(); if(p&&p.catch) p.catch(function(){ hint.textContent='🎵 villagefm.mp3 넣으면 재생'; }); }
play.addEventListener('click',start);
bgm.addEventListener('error',function(){ if(gate.classList.contains('hidden')) hint.textContent='🎵 villagefm.mp3 넣으면 재생'; });
mute.addEventListener('click',function(){ bgm.muted=!bgm.muted; mute.textContent=bgm.muted?'🔇':'🔊'; });
vol.addEventListener('input',function(){ bgm.volume=parseFloat(vol.value); if(bgm.muted&&bgm.volume>0){ bgm.muted=false; mute.textContent='🔊'; } });
document.addEventListener('keydown',function(e){ if((e.key===' '||e.key==='Enter')&&!gate.classList.contains('hidden')){ e.preventDefault(); start(); } });
})();
</script>
