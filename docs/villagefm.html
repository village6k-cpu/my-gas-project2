<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>VILLAGE. FM</title>
<meta name="description" content="빌리지 FM — 여명 톤 픽셀 로파이. 매장 일상과 먼 곳을 바라보는 쉼이 무한 반복되는 라이브.">
<!--
  ┌──────────────────────────────────────────────────────────────┐
  │ VILLAGE. FM  ·  픽셀 로파이 무한루프 (여명 톤)                  │
  ├──────────────────────────────────────────────────────────────┤
  │ 음악: Suno로 만든 곡을 이 폴더에 "villagefm.mp3"로 저장하면   │
  │       ▶ 눌렀을 때 무한반복 재생됨. (프롬프트는 villagefm.md)  │
  │       파일 없어도 화면은 그대로 돌아감 (소리만 없음).          │
  │ 외부 리소스 0개 · GitHub Pages 그대로 서빙 가능.              │
  └──────────────────────────────────────────────────────────────┘
-->
<style>
  :root{ --accent:#d0674a; --cream:#e7ddcc; --dim:#9a8f7e; }
  *{ box-sizing:border-box; }
  html,body{ height:100%; margin:0; background:#000; overflow:hidden; }
  body{ font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif; color:var(--cream); }
  .stage{ position:fixed; inset:0; background:#0a0810; }
  #cv{ position:absolute; inset:0; width:100%; height:100%; image-rendering:pixelated; image-rendering:crisp-edges; }
  .bar{ position:absolute; left:0; right:0; height:5.5%; background:#000; z-index:3; }
  .bar.top{ top:0; } .bar.bot{ bottom:0; }

  .hud{ position:absolute; inset:0; z-index:4; pointer-events:none; }
  .hud > *{ position:absolute; }
  .brand{ top:7.6%; left:2.4%; display:flex; align-items:center; gap:9px; }
  .wm{ font-weight:900; letter-spacing:.05em; font-size:clamp(15px,1.7vw,22px); color:var(--cream); text-shadow:0 1px 8px rgba(0,0,0,.6); }
  .wm .v,.wm .dot{ color:var(--accent); }
  .fm{ font-weight:900; letter-spacing:.2em; font-size:11px; color:var(--dim); align-self:flex-end; padding-bottom:2px; }
  .live{ display:flex; align-items:center; gap:5px; font-size:10px; letter-spacing:.14em; color:var(--dim); align-self:flex-end; padding-bottom:3px; }
  .live .d{ width:6px; height:6px; border-radius:50%; background:var(--accent); box-shadow:0 0 8px var(--accent); animation:pulse 2.4s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:.35;} }
  .track{ top:7.7%; right:2.4%; text-align:right; }
  .track .now{ font-size:clamp(12px,1.35vw,16px); color:#e2d9c8; text-shadow:0 1px 8px rgba(0,0,0,.7); }
  .track .now .note{ color:var(--accent); margin-right:6px; }
  .track .clock{ font-size:11px; letter-spacing:.06em; color:var(--dim); margin-top:3px; font-variant-numeric:tabular-nums; }
  .cap{ bottom:7.6%; left:2.4%; font-size:12px; color:var(--dim); font-style:italic; letter-spacing:.02em; text-shadow:0 1px 6px rgba(0,0,0,.6); }

  .sound{ bottom:7%; left:50%; transform:translateX(-50%); z-index:5; display:flex; align-items:center; gap:10px;
    background:rgba(14,10,18,.45); backdrop-filter:blur(7px); -webkit-backdrop-filter:blur(7px);
    border:1px solid rgba(231,221,204,.1); border-radius:999px; padding:6px 13px; opacity:0; transition:opacity .5s ease; pointer-events:auto; }
  .sound.show{ opacity:1; }
  .sound button{ all:unset; cursor:pointer; color:var(--cream); font-size:13px; line-height:1; padding:3px; border-radius:6px; }
  .sound button:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }
  .sound input[type=range]{ width:90px; accent-color:var(--accent); cursor:pointer; }
  .sound .hint{ font-size:11px; color:var(--dim); }

  .gate{ position:absolute; inset:0; z-index:9; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; text-align:center;
    background:radial-gradient(80% 80% at 50% 46%, rgba(12,9,16,.36), rgba(8,6,12,.72));
    backdrop-filter:blur(3px); -webkit-backdrop-filter:blur(3px); transition:opacity .8s ease, visibility .8s ease; }
  .gate.hidden{ opacity:0; visibility:hidden; }
  .gate .play{ all:unset; cursor:pointer; width:88px; height:88px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    background:var(--accent); box-shadow:0 12px 40px rgba(208,103,74,.4); transition:transform .25s ease; }
  .gate .play:hover{ transform:scale(1.06); }
  .gate .play:focus-visible{ outline:3px solid var(--cream); outline-offset:4px; }
  .gate .play svg{ width:34px; height:34px; margin-left:5px; fill:#fff; }
  .gate .gw{ font-weight:900; letter-spacing:.05em; font-size:clamp(20px,2.7vw,30px); }
  .gate .gw .v,.gate .gw .dot{ color:var(--accent); }
  .gate .gs{ font-size:13px; color:var(--dim); }
</style>
</head>
<body>
<div class="stage">
  <canvas id="cv" width="320" height="180"></canvas>
  <div class="bar top"></div><div class="bar bot"></div>

  <div class="hud">
    <div class="brand"><span class="wm"><span class="v">V</span>ILLAGE<span class="dot">.</span></span><span class="fm">FM</span><span class="live"><span class="d"></span>LIVE</span></div>
    <div class="track"><div class="now"><span class="note">♫</span><span id="trk">고요한 아침</span></div><div class="clock mono" id="clk">--:--</div></div>
    <div class="cap" id="cap">먼지를 털다, 문득 먼 곳</div>
  </div>

  <div class="sound" id="sound">
    <button id="mute" aria-label="음소거">🔊</button>
    <input type="range" id="vol" min="0" max="1" step="0.01" value="0.7" aria-label="볼륨">
    <span class="hint" id="hint"></span>
  </div>

  <div class="gate" id="gate">
    <button class="play" id="play" aria-label="빌리지 FM 시작"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg></button>
    <div class="gw"><span class="v">V</span>ILLAGE<span class="dot">.</span> FM</div>
    <div class="gs">클릭하면 음악과 함께 시작 · 무한반복</div>
  </div>

  <audio id="bgm" loop preload="none"><source src="villagefm.mp3" type="audio/mpeg"></audio>
</div>

<script>
(function(){
"use strict";
var W=320,H=180;
var cv=document.getElementById('cv'), ctx=cv.getContext('2d'); ctx.imageSmoothingEnabled=false;
var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

// ── 기본 드로잉 ──
function R(x,a,b,w,h,c){ x.fillStyle=c; x.fillRect(a|0,b|0,w|0,h|0); }
function gfill(x,y0,y1,st){ var g=x.createLinearGradient(0,y0,0,y1); for(var i=0;i<st.length;i++) g.addColorStop(st[i][0],st[i][1]); return g; }
function glow(x,cx,cy,rad,c,al){ var g=x.createRadialGradient(cx,cy,0,cx,cy,rad); g.addColorStop(0,c); g.addColorStop(1,'rgba(0,0,0,0)'); x.globalAlpha=al; x.fillStyle=g; x.fillRect(0,0,W,H); x.globalAlpha=1; }
function mk(){ var c=document.createElement('canvas'); c.width=W; c.height=H; var x=c.getContext('2d'); x.imageSmoothingEnabled=false; return {c:c,x:x}; }

// ── 블록 캐릭터 (단색, 큰 머리·작은 몸·짧은 팔다리) ──
var CH='#a4623f', EYE='#2c1a12';
var P={H:CH,e:EYE,s:'rgba(18,16,26,.4)'};
var FRONT=[" HHHHHHH "," HHHHHHH "," HeHHHeH "," HHHHHHH "," HHHHHHH ","  HHHHH  ","H HHHHH H","H HHHHH H","  HHHHH  ","  HH HH  "];
var SIDE =[" HHHHHH "," HHHHHH "," HHHeHH "," HHHHHH "," HHHHHH ","  HHHH  "," HHHHHH "," HHHHHH ","  HHHH  ","  HH H  "];
var BACK =[" HHHHHH "," HHHHHH "," HHHHHH "," HHHHHH ","  HHHH  "," HHHHHH "," HHHHHH ","  HHHH  ","  ssss  "];
function spr(x,map,ox,oy,s){ for(var j=0;j<map.length;j++){ var row=map[j]; for(var i=0;i<row.length;i++){ var ch=row[i]; if(ch===' ')continue; x.fillStyle=P[ch]||'#f0f'; x.fillRect(ox+i*s,oy+j*s,s,s);} } }
function bob(t){ return Math.round(Math.sin(t/1500)*0.6); }

// 시네카트 (2단 선반 + 튜브 기둥 + 커브 핸들 + 바퀴), 옆모습·오른쪽 진행
function cineCart(x,cx,gy,t){
  var frame='#312e46', shelf='#3f3b54', shelfTop='#4c4866', post='#5c5878', postHi='#7a7698',
      wheel='#191722', hub='#4a465e', g1='#464259', g2='#54506a', cam='#2b2838';
  var wr=(Math.round(t*0.02)%2); // 바퀴 스포크 깜빡(구르는 느낌)
  // 바퀴 (앞 크게 / 뒤 작게)
  R(x,cx+8,gy-6,6,6,wheel); R(x,cx+9,gy-5,4,4,hub); R(x,cx+10+(wr?0:1),gy-4,1,1,'#8a86a4');
  R(x,cx+34,gy-7,8,8,wheel); R(x,cx+36,gy-5,4,4,hub); R(x,cx+37+(wr?1:0),gy-4,1,1,'#8a86a4');
  // 아래 선반 + 립
  R(x,cx+2,gy-15,44,3,shelf); R(x,cx+2,gy-16,44,1,shelfTop); R(x,cx+2,gy-15,2,4,frame); R(x,cx+44,gy-15,2,4,frame);
  // 튜브 기둥 2개
  R(x,cx+10,gy-32,2,17,post); R(x,cx+10,gy-32,1,17,postHi);
  R(x,cx+38,gy-32,2,17,post); R(x,cx+38,gy-32,1,17,postHi);
  // 위 선반 + 립
  R(x,cx+6,gy-29,42,3,shelf); R(x,cx+6,gy-30,42,1,shelfTop); R(x,cx+6,gy-29,2,4,frame); R(x,cx+46,gy-29,2,4,frame);
  // 커브 핸들 (왼쪽 위로)
  R(x,cx+2,gy-36,2,8,post); R(x,cx-2,gy-36,6,2,post); R(x,cx-3,gy-35,3,2,postHi);
  // 위 선반 장비 (카메라 케이스 · 박스 · 라이트 스탠드)
  R(x,cx+9,gy-40,11,11,g1); R(x,cx+12,gy-37,5,5,cam); R(x,cx+13,gy-36,3,3,'#46586a');
  R(x,cx+24,gy-38,9,9,g2); R(x,cx+34,gy-46,2,17,post); R(x,cx+32,gy-47,6,3,g1); // 삼각대/스탠드
  // 아래 선반 장비 (박스들)
  R(x,cx+14,gy-25,10,10,g2); R(x,cx+27,gy-24,13,9,g1); R(x,cx+29,gy-22,4,4,cam);
}

// ── 여명/노을/밤 하늘 (muted) ──
function sky(x,kind){
  var HZ, st, stars=false;
  if(kind==='dawn'){ HZ=94; st=[[0,'#3f4668'],[.45,'#6d6480'],[.75,'#a67a72'],[1,'#c99a72']]; stars=true; }
  else if(kind==='dusk'){ HZ=96; st=[[0,'#39355c'],[.4,'#5d4d6a'],[.72,'#9a5f58'],[1,'#c98a58']]; }
  else { HZ=104; st=[[0,'#181d33'],[.5,'#242742'],[1,'#3f3850']]; stars=true; }
  x.fillStyle=gfill(x,0,HZ,st); x.fillRect(0,0,W,HZ);
  x.fillStyle=(kind==='dusk')?'#241a2c':'#201f30'; // 지면
  x.fillRect(0,HZ,W,H-HZ); R(x,0,HZ,W,2,'#2c2740');
  R(x,0,HZ-3,W,4,'rgba(200,192,196,.24)'); // 물안개
  return {HZ:HZ,stars:stars};
}
function starField(x,list){ for(var i=0;i<list.length;i++) R(x,list[i][0],list[i][1],1,1,'rgba(220,216,232,.55)'); }
var STARS=[[30,18],[62,30],[104,14],[150,22],[196,16],[238,26],[276,20],[300,32],[80,44],[176,40],[214,50],[130,52],[46,54]];

// 먼지/입자 (t로 결정)
function motes(x,t,n,x0,x1,ytop,ybot,col){
  for(var i=0;i<n;i++){
    var ph=i*1.7, span=ybot-ytop;
    var yy = ybot - ((t*0.006 + i*23) % span);
    var xx = x0 + ((x1-x0)*((i*37%100)/100)) + Math.sin(t*0.001+ph)*4;
    var a = 0.25 + 0.35*Math.sin(t*0.002+ph);
    if(a<0) a=0;
    x.fillStyle=col.replace('A',a.toFixed(2)); x.fillRect(xx|0,yy|0,1,1);
  }
}

// 실내 (muted 트와일라잇, 옆에서 은은한 여명빛)
function interior(x,lightLeft){
  x.fillStyle=gfill(x,0,H,[[0,'#33304a'],[.62,'#2a2738'],[1,'#232032']]); x.fillRect(0,0,W,H);
  x.save(); x.globalAlpha=.16; x.fillStyle='#c69a78';
  x.beginPath();
  if(lightLeft){ x.moveTo(0,10); x.lineTo(130,10); x.lineTo(64,180); x.lineTo(0,180); }
  else { x.moveTo(320,10); x.lineTo(190,10); x.lineTo(256,180); x.lineTo(320,180); }
  x.closePath(); x.fill(); x.restore();
  glow(x, lightLeft?26:294, 46, 92, 'rgba(226,168,116,.30)', .5);
  R(x,0,124,W,H-124,'#1f1d2b'); R(x,0,124,W,2,'#2a2740'); // 바닥
}

// ═══════════ 씬 정의 ═══════════
var scenes=[];

// 1) 먼지 털기
scenes.push({ dur:15000, cap:'먼지를 털다, 문득 먼 곳', trk:'고요한 아침',
  bake:function(x){ interior(x,true);
    R(x,150,68,84,3,'#3d3950'); // 선반
    R(x,162,55,14,13,'#494560'); R(x,166,58,6,6,'#2a3040'); R(x,184,57,11,11,'#443f58'); R(x,202,53,12,15,'#494560'); R(x,205,56,6,6,'#2a3040');
  },
  anim:function(x,t){ var b=bob(t); var ox=92, oy=100+b;
    spr(x,FRONT,ox,oy,2);
    var wig=Math.round(Math.sin(t/240)); // 팔 흔들
    R(x,ox+16,oy+3,2,7,CH); R(x,ox+16,oy-3+wig,2,5,'#7a5a3c'); R(x,ox+13,oy-8+wig,6,4,'#c9a24b'); // 팔+먼지떨이
    motes(x,t,7,150,222,44,110,'rgba(226,196,140,A)');
  }});

// 2) 시네카트 밀기 (천천히 이동)
scenes.push({ dur:20000, cap:'장비를 싣고, 천천히', trk:'느린 바퀴',
  bake:function(x){ sky(x,'dawn'); starField(x,STARS.slice(0,6)); glow(x,60,88,50,'rgba(214,160,110,.4)',.5); R(x,55,84,10,7,'#d8ad84'); R(x,56,85,8,5,'#e6c39a'); },
  anim:function(x,t){ var b=bob(t);
    var gx=Math.round(6 + t*0.010), gy=122+b;   // 카트 왼쪽 위치, 왼→오 천천히
    // 캐릭터(옆, 왼쪽 핸들에서 밀기) — 카트보다 먼저 그려 뒤에 둠
    spr(x,SIDE,gx-16,gy-20,2);
    R(x,gx-1,gy-12,4,2,CH); // 핸들 미는 팔
    cineCart(x,gx,gy,t);
  }});

// 3) 쉼 · 노을 바다 (아득)
scenes.push({ dur:21000, cap:'하던 걸 멈추고, 수평선', trk:'먼 바다',
  bake:function(x){ var s=sky(x,'dusk'); var HZ=s.HZ;
    glow(x,168,HZ-2,52,'rgba(230,150,80,.5)',.7); R(x,162,HZ-11,11,11,'#e0a860'); R(x,163,HZ-10,9,9,'#f2ca88');
    x.fillStyle=gfill(x,HZ,HZ+22,[[0,'#b07444'],[1,'#241a2c']]); x.fillRect(0,HZ,W,22);
  },
  anim:function(x,t){ var HZ=96;
    for(var i=0;i<6;i++){ var a=(0.4-i*0.05)*(0.6+0.4*Math.sin(t*0.002+i)); R(x,168,HZ+2+i*3,7-i,1,'rgba(250,224,160,'+(a<0?0:a).toFixed(2)+')'); } // 윤슬
    var b=bob(t); spr(x,BACK,150,HZ+8+b,2);
  }});

// 4) 렌즈 닦기
scenes.push({ dur:15000, cap:'렌즈에 후- 불고, 스윽', trk:'맑은 유리',
  bake:function(x){ interior(x,false);
    R(x,60,58,2,26,'#3a3650'); R(x,50,52,14,7,'#443f58'); R(x,52,59,10,2,'#d8a86a'); // 램프(왼 스탠드 대신 우측光이라 왼쪽 소품)
  },
  anim:function(x,t){ var b=bob(t); var ox=128, oy=92+b;
    // 상반신(책상 뒤)
    spr(x,FRONT,ox,oy,2);
    R(x,0,110,W,H-110,'#211f2d'); R(x,0,110,W,2,'#2c2940'); // 데스크(하반신 가림)
    // 렌즈 + 천 (책상 위)
    R(x,168,102,16,8,'#2e2b3e'); R(x,168,102,4,8,'#1c1a28'); R(x,178,104,6,6,'#28323e'); R(x,179,105,4,4,'#46586a');
    var wp=Math.round(Math.sin(t/300)*2);
    R(x,158+wp,105,5,3,'#3b4a5a'); // 닦는 손/천
    if(Math.sin(t/900)>0.7){ R(x,170,98,1,1,'rgba(230,220,200,.5)'); R(x,173,96,1,1,'rgba(230,220,200,.4)'); }
  }});

// 5) 커피 한잔
scenes.push({ dur:14000, cap:'잠깐, 김 나는 한 잔', trk:'식지 않게',
  bake:function(x){ interior(x,true);
    R(x,40,72,60,2,'#3d3950'); R(x,54,60,10,12,'#443f58'); R(x,74,62,12,10,'#494560'); // 뒤 선반
  },
  anim:function(x,t){ var b=bob(t); var ox=150, oy=100+b;
    spr(x,FRONT,ox,oy,2);
    R(x,ox+16,oy+8,2,2,CH); R(x,ox+18,oy+6,4,5,'#b0492e'); R(x,ox+18,oy+6,4,1,'#c85a3a'); // 팔+머그
    var s1=Math.sin(t*0.004), s2=Math.sin(t*0.004+2);
    R(x,ox+19+Math.round(s1),oy+1,1,4,'rgba(210,190,164,.55)'); R(x,ox+21+Math.round(s2),oy-1,1,5,'rgba(210,190,164,.4)'); // 김
  }});

// 6) 쉼 · 새벽 별 (아득)
scenes.push({ dur:21000, cap:'아직 어두운, 여명 전', trk:'별이 지는 시간',
  bake:function(x){ var s=sky(x,'night'); starField(x,STARS);
    R(x,250,26,4,4,'#e6e0cf'); R(x,251,27,3,3,'#f2ecdb'); glow(x,252,28,24,'rgba(220,220,200,.24)',.5); // 달
    R(x,0,s.HZ-2,W,3,'rgba(90,90,120,.25)');
  },
  anim:function(x,t){
    for(var i=0;i<STARS.length;i++){ if((i+((t/700)|0))%3===0) R(x,STARS[i][0],STARS[i][1],1,1,'rgba(255,248,224,.9)'); } // 반짝
    var b=bob(t); spr(x,BACK,112,116+b,2);
  }});

// 7) 장부 정리
scenes.push({ dur:15000, cap:'오늘의 대여를, 한 줄씩', trk:'장부와 연필',
  bake:function(x){ interior(x,false);
    R(x,250,56,2,26,'#3a3650'); R(x,244,50,12,7,'#443f58'); R(x,246,57,8,2,'#d8a86a'); // 램프(우)
  },
  anim:function(x,t){ var b=bob(t); var ox=120, oy=92+b;
    spr(x,FRONT,ox,oy,2);
    R(x,0,110,W,H-110,'#211f2d'); R(x,0,110,W,2,'#2c2940');
    R(x,150,104,24,7,'#cabfa6'); R(x,162,103,1,8,'#a89e86'); R(x,150,104,12,7,'#d6ccb4'); // 펼친 장부
    var pw=Math.round(Math.sin(t/260)*2);
    R(x,158+pw,102,2,3,CH); // 쓰는 손
  }});

// 8) 꾸벅 졸기
scenes.push({ dur:14000, cap:'스르륵, 잠깐만…', trk:'졸음',
  bake:function(x){ interior(x,true);
    R(x,60,58,2,26,'#3a3650'); R(x,50,52,12,7,'#443f58'); R(x,52,59,8,2,'#d8a86a');
  },
  anim:function(x,t){ var nod=Math.round(1+Math.sin(t/900)); var ox=130, oy=94;
    // 몸통(엎드림 느낌) + 머리 숙임
    R(x,ox+2,oy+8,14,10,CH); R(x,ox+2,oy+8,14,3,'#b06a44'); // 몸
    R(x,ox+4,oy+2+nod,10,8,CH); // 머리(끄덕)
    R(x,0,110,W,H-110,'#211f2d'); R(x,0,110,W,2,'#2c2940');
    R(x,150,104,18,6,'#2e2b3e'); R(x,154,102,6,4,'#28323e'); // 책상 위 카메라
    // z z Z
    var zf=(t/500)|0;
    if(zf%3!==2){ R(x,ox+18,oy-2,3,1,'#c9b78f'); R(x,ox+19,oy-4,1,1,'#c9b78f'); R(x,ox+18,oy-6,3,1,'#c9b78f'); }
    if(zf%3!==0){ R(x,ox+23,oy-8,2,1,'#d6c6a2'); R(x,ox+24,oy-9,1,1,'#d6c6a2'); R(x,ox+23,oy-10,2,1,'#d6c6a2'); }
  }});

// ═══════════ 렌더 루프 ═══════════
scenes.forEach(function(s){ s.bg=mk(); s.bake(s.bg.x); });
var bufA=mk(), bufB=mk();
var FADE=2800;

function overlay(x){
  var g=x.createRadialGradient(160,84,58,160,90,205);
  g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(1,'rgba(8,6,12,.5)');
  x.fillStyle=g; x.fillRect(0,0,W,H);
  var im=x.getImageData(0,0,W,H), d=im.data;
  for(var i=0;i<d.length;i+=4){ var n=Math.random()*7-3.5; d[i]+=n; d[i+1]+=n; d[i+2]+=n; }
  x.putImageData(im,0,0);
}

var idx=0, t0=0, last=0, started=false;
var trkEl=document.getElementById('trk'), capEl=document.getElementById('cap');
function setLabels(i){ trkEl.textContent=scenes[i].trk; capEl.textContent=scenes[i].cap; }

function drawScene(buf, i, tin){ buf.x.drawImage(scenes[i].bg.c,0,0); scenes[i].anim(buf.x, tin); }

function frame(now){
  requestAnimationFrame(frame);
  if(now-last<50) return; last=now;
  if(!t0) t0=now;
  var tin=now-t0;
  var cur=scenes[idx];
  if(tin>=cur.dur){ idx=(idx+1)%scenes.length; t0=now; tin=0; setLabels(idx); }
  drawScene(bufA, idx, tin);
  ctx.globalAlpha=1; ctx.drawImage(bufA.c,0,0);
  if(tin > cur.dur - FADE){
    var ni=(idx+1)%scenes.length; var a=(tin-(cur.dur-FADE))/FADE;
    drawScene(bufB, ni, tin-(cur.dur-FADE));
    ctx.globalAlpha=a; ctx.drawImage(bufB.c,0,0); ctx.globalAlpha=1;
  }
  overlay(ctx);
}

if(reduce){
  // 정지: 새벽 쉼 한 프레임
  var si=5; drawScene(bufA, si, 0); ctx.drawImage(bufA.c,0,0); overlay(ctx); setLabels(si);
} else {
  setLabels(0);
  requestAnimationFrame(frame);
}

// ── 실시간 시계 ──
var clk=document.getElementById('clk');
function tick(){ var d=new Date(), p=function(n){return(n<10?'0':'')+n;}; clk.textContent=p(d.getHours())+':'+p(d.getMinutes()); }
tick(); setInterval(tick,10000);

// ── 오디오 ──
var bgm=document.getElementById('bgm'), gate=document.getElementById('gate'), play=document.getElementById('play');
var sound=document.getElementById('sound'), mute=document.getElementById('mute'), vol=document.getElementById('vol'), hint=document.getElementById('hint');
bgm.volume=0.7;
function start(){ gate.classList.add('hidden'); sound.classList.add('show');
  var p=bgm.play(); if(p&&p.catch) p.catch(function(){ hint.textContent='🎵 villagefm.mp3 넣으면 재생'; }); }
play.addEventListener('click',start);
bgm.addEventListener('error',function(){ if(gate.classList.contains('hidden')) hint.textContent='🎵 villagefm.mp3 넣으면 재생'; });
mute.addEventListener('click',function(){ bgm.muted=!bgm.muted; mute.textContent=bgm.muted?'🔇':'🔊'; });
vol.addEventListener('input',function(){ bgm.volume=parseFloat(vol.value); if(bgm.muted&&bgm.volume>0){ bgm.muted=false; mute.textContent='🔊'; } });
document.addEventListener('keydown',function(e){ if((e.key===' '||e.key==='Enter')&&!gate.classList.contains('hidden')){ e.preventDefault(); start(); } });
})();
</script>
