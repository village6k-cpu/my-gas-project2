<style>

    font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    background:#f0f2f5; color:#2d3436;
    min-height:100vh; display:flex; flex-direction:column;

  .logo { font-size:48px; margin-bottom:8px; }

  .menu { width:100%; max-width:400px; }
  .menu-item {
    display:flex; align-items:center; gap:16px;
    background:#fff; border-radius:14px; padding:20px;
    box-shadow:0 2px 8px rgba(0,0,0,.06);
    margin-bottom:12px; text-decoration:none; color:#2d3436;
    transition:transform .1s;
  }
  .menu-item:active { transform:scale(.98); }
  .menu-icon { font-size:32px; }
  .menu-text h3 { font-size:17px; font-weight:700; }
  .menu-text p { font-size:13px; color:#888; margin-top:2px; }

  <div class="menu">

    </a>
    <a class="menu-item" href="timeline.html">
      <span class="menu-icon">📅</span>
