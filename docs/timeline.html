<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="스케줄">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#F7F7F5">
<title>빌리지 스케줄</title>
<style>
:root {
  --bg: #F7F7F5;
  --surface: #FFFFFF;
  --border: #E9E9E7;
  --border-light: #F0F0EE;
  --text-primary: #37352F;
  --text-secondary: #787774;
  --text-muted: #B4B4B0;
  --accent: #2383E2;
  --blue-bg: #D3E5EF; --blue-text: #24609C;
  --amber-bg: #FDECC8; --amber-text: #93640D;
  --green-bg: #DBEDDB; --green-text: #2B6B2B;
  --gray-bg: #E8E8E5; --gray-text: #787774;
  --purple-bg: #E8DEEE; --purple-text: #6940A5;
  --red: #EB5757;
  --today-bg: #EBF5FF;
  --radius: 6px;
  --col-w: 120px;
  --row-h: 40px;
  --label-w: 220px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  height: 100vh; height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  -webkit-user-select: none; user-select: none;
}

/* ── Header ── */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  flex-wrap: wrap;
  z-index: 100;
}
.header-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--text-primary);
  white-space: nowrap;
}
.view-tabs {
  display: flex;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.view-tab {
  padding: 5px 12px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
  cursor: pointer;
  border: none;
  background: transparent;
  transition: all 0.15s;
  white-space: nowrap;
}
.view-tab:not(:last-child) { border-right: 1px solid var(--border); }
.view-tab:hover { background: rgba(0,0,0,0.03); }
.view-tab.active { background: var(--accent); color: #fff; }

.group-select {
  padding: 5px 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  font-size: 12px;
  color: var(--text-primary);
  outline: none;
  cursor: pointer;
}
.group-select:focus { border-color: var(--accent); }

.search-box {
  position: relative;
  flex: 1;
  min-width: 120px;
  max-width: 240px;
}
.search-box input {
  width: 100%;
  padding: 6px 10px 6px 32px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg);
  font-size: 13px;
  color: var(--text-primary);
  outline: none;
  transition: border-color 0.2s;
}
.search-box input:focus { border-color: var(--accent); }
.search-box input::placeholder { color: var(--text-muted); }
.search-box .search-icon {
  position: absolute;
  left: 9px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  font-size: 14px;
  pointer-events: none;
}

.header-controls {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-left: auto;
}
.hdr-btn {
  padding: 5px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.hdr-btn:hover { border-color: var(--accent); color: var(--accent); }
.hdr-btn.primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.hdr-btn.primary:hover { opacity: 0.9; }
.refresh-info {
  font-size: 11px;
  color: var(--text-muted);
  white-space: nowrap;
}

/* ── Filter Bar ── */
.filter-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 6px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
  font-size: 12px;
  flex-wrap: wrap;
}
.status-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s;
  user-select: none;
}
.status-chip.dimmed { opacity: 0.3; }
.status-chip[data-status="대기"] { background: var(--blue-bg); color: var(--blue-text); }
.status-chip[data-status="반출중"] { background: var(--amber-bg); color: var(--amber-text); }
.status-chip[data-status="반납완료"] { background: var(--green-bg); color: var(--green-text); }
.status-chip[data-status="취소"] { background: var(--gray-bg); color: var(--gray-text); }
.status-chip[data-status="기타"] { background: var(--purple-bg); color: var(--purple-text); }
.filter-stats {
  margin-left: auto;
  color: var(--text-muted);
  font-size: 12px;
}

/* ── Main Layout ── */
.main-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}
.grid-wrapper {
  flex: 1;
  display: flex;
  overflow: hidden;
  position: relative;
}

/* ── Label Panel ── */
.label-panel {
  width: var(--label-w);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  background: var(--surface);
  z-index: 10;
}
.label-header {
  height: 52px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 12px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  flex-shrink: 0;
  background: var(--bg);
}
.label-body {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
}
.label-body::-webkit-scrollbar { width: 0; }

.label-group-header {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 12px;
  height: var(--row-h);
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
  cursor: pointer;
  background: var(--bg);
  border-bottom: 1px solid var(--border-light);
  user-select: none;
  position: sticky;
  top: 0;
  z-index: 2;
}
.label-group-header:hover { background: #EDEDEB; }
.label-group-toggle {
  font-size: 10px;
  color: var(--text-muted);
  transition: transform 0.2s;
  width: 16px;
  text-align: center;
  flex-shrink: 0;
}
.label-group-toggle.collapsed { transform: rotate(-90deg); }
.label-group-count {
  margin-left: auto;
  background: var(--border);
  color: var(--text-secondary);
  font-size: 10px;
  font-weight: 600;
  padding: 1px 6px;
  border-radius: 8px;
}
.label-item-row {
  display: flex;
  align-items: center;
  padding: 0 12px 0 34px;
  height: var(--row-h);
  font-size: 12px;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border-light);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.label-item-row:hover { background: var(--bg); }

/* ── Grid Panel ── */
.grid-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}
.date-header {
  display: flex;
  height: 52px;
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  z-index: 5;
  overflow: hidden;
}
.date-header-inner {
  display: flex;
  height: 100%;
}
.date-col-header {
  width: var(--col-w);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  border-right: 1px solid var(--border-light);
}
.date-col-header.weekend { background: rgba(0,0,0,0.015); }
.date-col-header.today { background: var(--today-bg); }
.date-month {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-muted);
  line-height: 1;
}
.date-day {
  font-size: 14px;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1.4;
}
.date-col-header.today .date-day { color: var(--accent); }
.date-weekday {
  font-size: 10px;
  color: var(--text-muted);
  line-height: 1;
}
.date-col-header.weekend .date-weekday { color: var(--red); }

.grid-scroll {
  flex: 1;
  overflow: auto;
}
.grid-scroll::-webkit-scrollbar { height: 8px; width: 0; }
.grid-scroll::-webkit-scrollbar-track { background: var(--bg); }
.grid-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.grid-body {
  position: relative;
  min-height: 100%;
}
.grid-row {
  display: flex;
  height: var(--row-h);
  border-bottom: 1px solid var(--border-light);
}
.grid-row.group-header-row {
  background: var(--bg);
}
.grid-cell {
  width: var(--col-w);
  flex-shrink: 0;
  border-right: 1px solid var(--border-light);
}
.grid-cell.weekend { background: rgba(0,0,0,0.012); }
.grid-cell.today { background: var(--today-bg); }

/* Today Line */
.today-line {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 2px;
  background: var(--red);
  z-index: 8;
  pointer-events: none;
}
.today-label {
  position: absolute;
  top: -18px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--red);
  color: #fff;
  font-size: 9px;
  font-weight: 700;
  padding: 1px 5px;
  border-radius: 3px;
  white-space: nowrap;
}

/* ── Timeline Bars ── */
.tl-bar {
  position: absolute;
  height: 28px;
  top: 6px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  line-height: 28px;
  padding: 0 8px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  cursor: grab;
  z-index: 6;
  transition: box-shadow 0.15s, transform 0.1s;
  touch-action: none;
}
.tl-bar:hover {
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  transform: translateY(-1px);
  z-index: 7;
}
.tl-bar.dragging {
  opacity: 0.85;
  box-shadow: 0 6px 20px rgba(0,0,0,0.2);
  cursor: grabbing;
  z-index: 20;
}
.tl-bar .resize-handle {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 8px;
  cursor: col-resize;
}
.tl-bar .resize-handle.left { left: 0; }
.tl-bar .resize-handle.right { right: 0; }
.tl-bar .resize-handle:hover { background: rgba(0,0,0,0.08); border-radius: 4px 0 0 4px; }
.tl-bar .resize-handle.right:hover { border-radius: 0 4px 4px 0; }

/* Status colors */
.bar-대기 { background: var(--blue-bg); color: var(--blue-text); }
.bar-반출중 { background: var(--amber-bg); color: var(--amber-text); }
.bar-반납완료 { background: var(--green-bg); color: var(--green-text); }
.bar-취소 { background: var(--gray-bg); color: var(--gray-text); text-decoration: line-through; }
.bar-기타 { background: var(--purple-bg); color: var(--purple-text); }

/* Today in/out icons */
.tl-bar.today-out::before { content: '\1F4E4 '; font-size: 10px; }
.tl-bar.today-in::after { content: ' \1F4E5'; font-size: 10px; }

/* Conflict */
.bar-conflict {
  outline: 2px solid var(--red);
  animation: conflict-pulse 2s infinite;
}
@keyframes conflict-pulse {
  0%, 100% { outline-color: var(--red); }
  50% { outline-color: rgba(235,87,87,0.3); }
}

/* ── Revenue Chart ── */
.revenue-bar-area {
  height: 48px;
  border-top: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  flex-shrink: 0;
  overflow: hidden;
  z-index: 5;
}
.revenue-label {
  width: var(--label-w);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  padding: 0 12px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  border-right: 1px solid var(--border);
}
.revenue-scroll {
  flex: 1;
  overflow-x: hidden;
  overflow-y: hidden;
  display: flex;
  align-items: flex-end;
}
.revenue-inner {
  display: flex;
  align-items: flex-end;
  height: 100%;
  padding: 4px 0;
}
.revenue-col {
  width: var(--col-w);
  flex-shrink: 0;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  height: 100%;
  position: relative;
}
.revenue-col-bar {
  width: 60%;
  background: var(--accent);
  opacity: 0.3;
  border-radius: 2px 2px 0 0;
  min-height: 2px;
  transition: opacity 0.15s;
  cursor: default;
}
.revenue-col:hover .revenue-col-bar { opacity: 0.6; }
.revenue-tooltip {
  display: none;
  position: absolute;
  bottom: 100%;
  left: 50%;
  transform: translateX(-50%);
  background: var(--text-primary);
  color: #fff;
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 3px;
  white-space: nowrap;
  z-index: 20;
}
.revenue-col:hover .revenue-tooltip { display: block; }

/* ── Zoom Control ── */
.zoom-control {
  position: fixed;
  bottom: 64px;
  right: 16px;
  display: flex;
  flex-direction: column;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  z-index: 50;
  overflow: hidden;
}
.zoom-btn {
  width: 36px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: none;
  background: transparent;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-secondary);
  transition: background 0.15s;
}
.zoom-btn:hover { background: var(--bg); }
.zoom-btn:not(:last-child) { border-bottom: 1px solid var(--border); }
.zoom-level {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-muted);
  padding: 2px 0;
  text-align: center;
  border-bottom: 1px solid var(--border);
}

/* ── Context Menu ── */
.ctx-menu {
  position: fixed;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: 0 4px 16px rgba(0,0,0,0.12);
  z-index: 300;
  min-width: 180px;
  padding: 4px 0;
  display: none;
}
.ctx-menu.open { display: block; }
.ctx-item {
  padding: 8px 14px;
  font-size: 13px;
  color: var(--text-primary);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
}
.ctx-item:hover { background: var(--bg); }
.ctx-item.danger { color: var(--red); }
.ctx-sep { height: 1px; background: var(--border); margin: 4px 0; }

/* ── Detail Panel ── */
.detail-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 200;
}
.detail-overlay.open { display: flex; justify-content: flex-end; }
.detail-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.1);
}
.detail-panel {
  position: relative;
  width: 320px;
  background: var(--surface);
  border-left: 1px solid var(--border);
  box-shadow: -4px 0 16px rgba(0,0,0,0.06);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  z-index: 1;
  animation: slideInRight 0.2s ease;
}
@keyframes slideInRight {
  from { transform: translateX(100%); }
  to { transform: translateX(0); }
}
.detail-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.detail-header h3 { font-size: 15px; font-weight: 700; }
.detail-close {
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  border: none; background: var(--bg);
  border-radius: 6px; cursor: pointer;
  font-size: 16px; color: var(--text-secondary);
}
.detail-close:hover { background: var(--border); }
.detail-body { padding: 16px 20px; }
.detail-row {
  display: flex;
  padding: 10px 0;
  border-bottom: 1px solid var(--border-light);
  font-size: 13px;
}
.detail-row:last-child { border-bottom: none; }
.detail-label { width: 72px; flex-shrink: 0; color: var(--text-muted); font-weight: 500; }
.detail-value { color: var(--text-primary); font-weight: 500; word-break: break-all; }
.status-badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 11px; font-weight: 600;
}
.badge-대기 { background: var(--blue-bg); color: var(--blue-text); }
.badge-반출중 { background: var(--amber-bg); color: var(--amber-text); }
.badge-반납완료 { background: var(--green-bg); color: var(--green-text); }
.badge-취소 { background: var(--gray-bg); color: var(--gray-text); }
.badge-기타 { background: var(--purple-bg); color: var(--purple-text); }

/* ── Modal ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.3);
  z-index: 400;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: var(--surface);
  border-radius: 12px;
  padding: 24px;
  width: 360px;
  max-width: 90vw;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
}
.modal-box h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
.modal-field { margin-bottom: 12px; }
.modal-field label { display: block; font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 4px; }
.modal-field input {
  width: 100%;
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 13px;
  color: var(--text-primary);
  outline: none;
}
.modal-field input:focus { border-color: var(--accent); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
.modal-actions button {
  padding: 7px 16px;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-primary);
}
.modal-actions button.primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: 20px; left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--text-primary);
  color: #fff;
  padding: 10px 20px;
  border-radius: var(--radius);
  font-size: 13px; font-weight: 500;
  z-index: 500; opacity: 0;
  transition: all 0.3s ease;
  pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* ── Loading ── */
.loading-overlay {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: rgba(255,255,255,0.92);
  z-index: 300; gap: 12px;
}
.loading-overlay.hidden { display: none; }
.loader {
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 13px; color: var(--text-secondary); }

/* ── Mobile Toggle ── */
.mobile-label-toggle {
  display: none;
  position: fixed;
  top: 50%;
  left: 0;
  transform: translateY(-50%);
  width: 24px;
  height: 48px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: none;
  border-radius: 0 var(--radius) var(--radius) 0;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  color: var(--text-muted);
  cursor: pointer;
  z-index: 15;
}

/* ── Responsive ── */
@media (max-width: 768px) {
  :root { --label-w: 160px; }
  .header { padding: 8px 10px; gap: 6px; }
  .search-box { max-width: 160px; min-width: 80px; }
}
@media (max-width: 600px) {
  .label-panel { display: none; position: fixed; left: 0; top: 0; bottom: 0; z-index: 50; box-shadow: 4px 0 16px rgba(0,0,0,0.1); }
  .label-panel.mobile-open { display: flex; }
  .mobile-label-toggle { display: flex; }

}
</style>

<div class="toast" id="toast"></div>

<script>
(function() {
"use strict";

var API_URL = "https://script.google.com/macros/s/AKfycbyRff4-lLXmne-iPIEf87x4-CH_5wb-Uv5dCGymELLrpiKluhg2gDdLdVP4Y0MmxnnT/exec";
var REFRESH_INTERVAL = 60000;

// State
var rawGroups = [];
var rawItems = [];
var groupMode = "세트별";
var hiddenStatuses = {};
var activeFilterOn = false;
var searchQuery = "";
var collapsedGroups = {};
var zoomLevels = [
  { name: "월", colW: 16 },
  { name: "주", colW: 40 },
  { name: "일", colW: 120 }
];
var currentZoomIdx = 2; // 일
var dateRange = { start: null, end: null, days: 0 };
var refreshTimer = null;
var ctxTarget = null; // item for context menu
var searchDebounce = null;
var scrollSyncFlag = false;
var longPressTimer = null;

// ── Utils ──
function escHtml(s) {
  if (!s) return "";
  var d = document.createElement("div");
  d.appendChild(document.createTextNode(s));
  return d.innerHTML;
}
function toDateStr(d) {
  return d.getFullYear() + "-" + pad2(d.getMonth()+1) + "-" + pad2(d.getDate());
}
function pad2(n) { return n < 10 ? "0" + n : "" + n; }
function parseDate(s) {
  if (!s) return null;
  if (s instanceof Date) return s;
  return new Date(s);
}
function daysBetween(a, b) {
  var msA = Date.UTC(a.getFullYear(), a.getMonth(), a.getDate());
  var msB = Date.UTC(b.getFullYear(), b.getMonth(), b.getDate());
  return Math.round((msB - msA) / 86400000);
}
function dateOnly(d) {
  return new Date(d.getFullYear(), d.getMonth(), d.getDate());
}
function isSameDay(a, b) {
  return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
}
function addDays(d, n) {
  var r = new Date(d);
  r.setDate(r.getDate() + n);
  return r;
}
function getWeekday(d) {
  return ["일","월","화","수","목","금","토"][d.getDay()];
}
function isWeekend(d) { var w = d.getDay(); return w === 0 || w === 6; }
function getColW() { return zoomLevels[currentZoomIdx].colW; }
function statusKey(s) {
  if (["대기","반출중","반납완료","취소"].indexOf(s) >= 0) return s;
  return "기타";
}
var STATUS_BADGE = { "대기":"badge-대기","반출중":"badge-반출중","반납완료":"badge-반납완료","취소":"badge-취소","기타":"badge-기타" };

// ── Data Loading ──
function loadData() {
  showLoading(true);
  fetch(API_URL + "?key=village2026&action=timeline")
    .then(function(r) { return r.json(); })
    .then(function(data) {
      rawGroups = data.groups || [];
      rawItems = (data.items || []).map(function(it) {
        it._start = parseDate(it.start);
        it._end = parseDate(it.end);
        it._startDay = dateOnly(it._start);
        it._endDay = dateOnly(it._end);
        return it;
      });
      computeDateRange();
      render();
      showLoading(false);
      updateRefreshInfo();
    })
    .catch(function() {
      showLoading(false);
      showToast("데이터 로드 실패");
    });
}

function computeDateRange() {
  var today = dateOnly(new Date());
  var minD = addDays(today, -7);
  var maxD = addDays(today, 30);
  rawItems.forEach(function(it) {
    if (it._startDay < minD) minD = it._startDay;
    if (it._endDay > maxD) maxD = it._endDay;
  });
  minD = addDays(minD, -2);
  maxD = addDays(maxD, 3);
  dateRange.start = minD;
  dateRange.end = maxD;
  dateRange.days = daysBetween(minD, maxD) + 1;
}

// ── Grouping ──
function buildGroups() {
  var groups = [];
  var itemsByGroup = {};

  var filtered = rawItems.filter(function(it) {
    if (activeFilterOn && it.status !== "대기" && it.status !== "반출중") return false;
    var sk = statusKey(it.status);
    if (hiddenStatuses[sk]) return false;
    if (searchQuery) {
      var q = searchQuery.toLowerCase();
      var match = (it.custName || "").toLowerCase().indexOf(q) >= 0 ||
                  (it["세트명"] || "").toLowerCase().indexOf(q) >= 0 ||
                  (it["장비명"] || "").toLowerCase().indexOf(q) >= 0 ||
                  (it["거래ID"] || "").toLowerCase().indexOf(q) >= 0;
      if (!match) return false;
    }
    return true;
  });

  if (groupMode === "세트별") {
    var gMap = {};
    rawGroups.forEach(function(g) { gMap[g.id] = g.content || g.id; });
    filtered.forEach(function(it) {
      var gid = it.group || "unknown";
      var gname = gMap[gid] || gid;
      if (!itemsByGroup[gname]) { itemsByGroup[gname] = []; groups.push(gname); }
      itemsByGroup[gname].push(it);
    });
  } else if (groupMode === "고객별") {
    filtered.forEach(function(it) {
      var gname = it.custName || "미지정";
      if (!itemsByGroup[gname]) { itemsByGroup[gname] = []; groups.push(gname); }
      itemsByGroup[gname].push(it);
    });
  } else {
    filtered.forEach(function(it) {
      var gname = statusKey(it.status);
      if (!itemsByGroup[gname]) { itemsByGroup[gname] = []; groups.push(gname); }
      itemsByGroup[gname].push(it);
    });
  }

  groups.sort();
  return { names: groups, items: itemsByGroup, filteredCount: filtered.length };
}

// ── Conflict Detection ──
function computeConflicts() {
  var byEquip = {};
  rawItems.forEach(function(it) {
    if (it.status === "취소") return;
    var key = it["장비명"] || it["세트명원본"] || "";
    if (!key) return;
    if (!byEquip[key]) byEquip[key] = [];
    byEquip[key].push(it);
  });

  var conflictIds = {};
  Object.keys(byEquip).forEach(function(key) {
    var items = byEquip[key];
    if (items.length < 2) return;
    for (var d = 0; d < dateRange.days; d++) {
      var day = addDays(dateRange.start, d);
      var overlapping = [];
      items.forEach(function(it) {
        if (it._startDay <= day && it._endDay >= day) overlapping.push(it);
      });
      if (overlapping.length > 0) {
        var stock = overlapping[0]["재고"] || 999;
        if (overlapping.length > stock) {
          overlapping.forEach(function(it) { conflictIds[it.id] = true; });
        }
      }
    }
  });
  return conflictIds;
}

// ── Today counts ──
function todayCounts() {
  var today = dateOnly(new Date());
  var out = 0, inn = 0;
  rawItems.forEach(function(it) {
    if (it.status === "취소") return;
    if (isSameDay(it._startDay, today)) out++;
    if (isSameDay(it._endDay, today)) inn++;
  });
  return { out: out, inn: inn };
}

// ── Status counts ──
function statusCounts() {
  var counts = { "대기": 0, "반출중": 0, "반납완료": 0, "취소": 0, "기타": 0 };
  rawItems.forEach(function(it) { counts[statusKey(it.status)]++; });
  return counts;
}

// ── Revenue Data ──
function revenueByDay() {
  var rev = {};
  rawItems.forEach(function(it) {
    if (it.status === "취소") return;
    var price = Number(it["단가"]) || 0;
    if (price <= 0) return;
    var days = daysBetween(it._startDay, it._endDay) + 1;
    if (days < 1) days = 1;
    var daily = price / days;
    for (var d = 0; d < days; d++) {
      var day = toDateStr(addDays(it._startDay, d));
      rev[day] = (rev[day] || 0) + daily;
    }
  });
  return rev;
}

// ── Render ──
function render() {
  var gd = buildGroups();
  var conflicts = computeConflicts();
  var today = dateOnly(new Date());
  var colW = getColW();
  var totalW = dateRange.days * colW;

  // Update status chips
  var sc = statusCounts();
  document.querySelectorAll(".status-chip").forEach(function(el) {
    var s = el.getAttribute("data-status");
    var cnt = el.querySelector(".chip-count");
    if (cnt) cnt.textContent = sc[s] || 0;
  });

  // Stats
  var tc = todayCounts();
  var statsEl = document.getElementById("filterStats");
  statsEl.textContent = gd.filteredCount + "건" +
    (tc.out > 0 || tc.inn > 0 ? " \u00B7 오늘 반출 " + tc.out + " 반납 " + tc.inn : "");

  // Build date header
  var dhInner = document.getElementById("dateHeaderInner");
  var dhHtml = "";
  for (var d = 0; d < dateRange.days; d++) {
    var day = addDays(dateRange.start, d);
    var cls = "date-col-header";
    if (isWeekend(day)) cls += " weekend";
    if (isSameDay(day, today)) cls += " today";
    var showMonth = d === 0 || day.getDate() === 1;
    dhHtml += '<div class="' + cls + '" style="width:' + colW + 'px;min-width:' + colW + 'px">';
    if (colW >= 40) {
      dhHtml += '<span class="date-month">' + (showMonth ? (day.getMonth()+1) + "월" : "") + '</span>';
      dhHtml += '<span class="date-day">' + day.getDate() + '</span>';
      if (colW >= 80) dhHtml += '<span class="date-weekday">' + getWeekday(day) + '</span>';
    } else {
      if (day.getDate() === 1 || d === 0) dhHtml += '<span class="date-month" style="font-size:8px">' + (day.getMonth()+1) + '</span>';
      dhHtml += '<span class="date-day" style="font-size:9px">' + day.getDate() + '</span>';
    }
    dhHtml += '</div>';
  }
  dhInner.innerHTML = dhHtml;
  dhInner.style.width = totalW + "px";

  // Build label panel + grid rows
  var labelHtml = "";
  var gridHtml = "";
  var barHtml = "";
  var rowIdx = 0;

  gd.names.forEach(function(gname) {
    var items = gd.items[gname];
    var isCollapsed = !!collapsedGroups[gname];

    // Group header label
    labelHtml += '<div class="label-group-header" onclick="toggleGroup(\'' + escHtml(gname).replace(/'/g,"&#39;") + '\')">' +
      '<span class="label-group-toggle' + (isCollapsed ? " collapsed" : "") + '">\u25BC</span>' +
      '<span style="overflow:hidden;text-overflow:ellipsis">' + escHtml(gname) + '</span>' +
      '<span class="label-group-count">' + items.length + '</span></div>';

    // Group header grid row
    gridHtml += '<div class="grid-row group-header-row" style="width:' + totalW + 'px">';
    for (var d = 0; d < dateRange.days; d++) {
      var day = addDays(dateRange.start, d);
      var ccls = "grid-cell";
      if (isWeekend(day)) ccls += " weekend";
      if (isSameDay(day, today)) ccls += " today";
      gridHtml += '<div class="' + ccls + '" style="width:' + colW + 'px;min-width:' + colW + 'px"></div>';
    }
    gridHtml += '</div>';
    rowIdx++;

    if (!isCollapsed) {
      items.forEach(function(it) {
        // Label row
        var itemLabel = it["장비명"] || it["세트명원본"] || it.content || "";
        labelHtml += '<div class="label-item-row" title="' + escHtml(itemLabel) + '">' + escHtml(itemLabel) + '</div>';

        // Grid row
        gridHtml += '<div class="grid-row" data-row-idx="' + rowIdx + '" style="width:' + totalW + 'px;position:relative">';
        for (var d2 = 0; d2 < dateRange.days; d2++) {
          var day2 = addDays(dateRange.start, d2);
          var ccls2 = "grid-cell";
          if (isWeekend(day2)) ccls2 += " weekend";
          if (isSameDay(day2, today)) ccls2 += " today";
          gridHtml += '<div class="' + ccls2 + '" style="width:' + colW + 'px;min-width:' + colW + 'px"></div>';
        }

        // Bar
        var startOff = daysBetween(dateRange.start, it._startDay);
        var span = daysBetween(it._startDay, it._endDay) + 1;
        var barLeft = startOff * colW + 2;
        var barWidth = span * colW - 4;
        if (barWidth < 8) barWidth = 8;

        var sk = statusKey(it.status);
        var barCls = "tl-bar bar-" + sk;
        if (conflicts[it.id]) barCls += " bar-conflict";
        if (isSameDay(it._startDay, today)) barCls += " today-out";
        if (isSameDay(it._endDay, today)) barCls += " today-in";

        var barText = escHtml(it["세트명원본"] || "") + " / " + escHtml(it.custName || "") + " / " +
          escHtml(it["반출시간"] || "") + "-" + escHtml(it["반납시간"] || "") +
          (it["회차"] ? "(" + it["회차"] + "회차)" : "");
        var barTitle = barText.replace(/&amp;/g,"&").replace(/&lt;/g,"<").replace(/&gt;/g,">");

        barHtml += '<div class="' + barCls + '" data-item-id="' + escHtml(it.id) + '" ' +
          'style="top:' + (rowIdx * parseInt(getComputedStyle(document.documentElement).getPropertyValue("--row-h")) || rowIdx * 40) + 'px;' +
          'top:calc(' + rowIdx + ' * var(--row-h) + 6px);' +
          'left:' + barLeft + 'px;width:' + barWidth + 'px" ' +
          'title="' + escHtml(barTitle) + '">' +
          '<div class="resize-handle left"></div>' +
          '<span class="bar-text">' + barText + '</span>' +
          '<div class="resize-handle right"></div></div>';

        rowIdx++;
        gridHtml += '</div>';
      });
    }
  });

  document.getElementById("labelBody").innerHTML = labelHtml;
  var gridBody = document.getElementById("gridBody");
  gridBody.innerHTML = gridHtml + '<div style="position:absolute;top:0;left:0;width:' + totalW + 'px;height:' + (rowIdx * 40) + 'px;pointer-events:none"></div>';
  gridBody.style.width = totalW + "px";
  gridBody.style.minHeight = (rowIdx * 40) + "px";

  // Insert bars into gridBody
  var barsContainer = document.createElement("div");
  barsContainer.style.cssText = "position:absolute;top:0;left:0;width:" + totalW + "px;height:" + (rowIdx * 40) + "px;pointer-events:none;z-index:6";
  barsContainer.innerHTML = barHtml;
  // Make bars interactive
  var barEls = barsContainer.querySelectorAll(".tl-bar");
  barEls.forEach(function(b) { b.style.pointerEvents = "auto"; });
  gridBody.appendChild(barsContainer);

  // Today line
  var todayOff = daysBetween(dateRange.start, today);
  if (todayOff >= 0 && todayOff < dateRange.days) {
    var lineLeft = todayOff * colW + Math.round(colW / 2);
    var todayLine = document.createElement("div");
    todayLine.className = "today-line";
    todayLine.style.left = lineLeft + "px";
    todayLine.style.height = (rowIdx * 40) + "px";
    todayLine.innerHTML = '<div class="today-label">\uC624\uB298</div>';
    gridBody.appendChild(todayLine);
  }

  // Revenue
  renderRevenue();

  // Setup interactions
  setupBarInteractions();
}

// ── Revenue ──
function renderRevenue() {
  var rev = revenueByDay();
  var colW = getColW();
  var maxRev = 0;
  var revArr = [];
  for (var d = 0; d < dateRange.days; d++) {
    var day = toDateStr(addDays(dateRange.start, d));
    var val = Math.round(rev[day] || 0);
    revArr.push(val);
    if (val > maxRev) maxRev = val;
  }
  var rInner = document.getElementById("revenueInner");
  var rHtml = "";
  for (var i = 0; i < revArr.length; i++) {
    var pct = maxRev > 0 ? Math.max(2, Math.round((revArr[i] / maxRev) * 36)) : 2;
    var formatted = revArr[i] > 0 ? Math.round(revArr[i]).toLocaleString() + "원" : "";
    rHtml += '<div class="revenue-col" style="width:' + colW + 'px;min-width:' + colW + 'px">';
    rHtml += '<div class="revenue-tooltip">' + formatted + '</div>';
    rHtml += '<div class="revenue-col-bar" style="height:' + pct + 'px"></div>';
    rHtml += '</div>';
  }
  rInner.innerHTML = rHtml;
  rInner.style.width = (dateRange.days * colW) + "px";
}

// ── Scroll Sync ──
function setupScrollSync() {
  var gridScroll = document.getElementById("gridScroll");
  var labelBody = document.getElementById("labelBody");
  var dateHeader = document.getElementById("dateHeader");
  var revenueScroll = document.getElementById("revenueScroll");

  gridScroll.addEventListener("scroll", function() {
    if (scrollSyncFlag) return;
    scrollSyncFlag = true;
    labelBody.scrollTop = gridScroll.scrollTop;
    dateHeader.scrollLeft = gridScroll.scrollLeft;
    revenueScroll.scrollLeft = gridScroll.scrollLeft;
    scrollSyncFlag = false;
  });

  labelBody.addEventListener("scroll", function() {
    if (scrollSyncFlag) return;
    scrollSyncFlag = true;
    gridScroll.scrollTop = labelBody.scrollTop;
    scrollSyncFlag = false;
  });
}

// ── Bar Interactions (drag, resize, click, context menu) ──
function setupBarInteractions() {
  var gridBody = document.getElementById("gridBody");
  var bars = gridBody.querySelectorAll(".tl-bar");
  bars.forEach(function(bar) {
    bar.addEventListener("pointerdown", onBarPointerDown);
    bar.addEventListener("click", onBarClick);
    bar.addEventListener("contextmenu", onBarContextMenu);
    // Long press for mobile
    bar.addEventListener("touchstart", onBarTouchStart, { passive: true });
    bar.addEventListener("touchend", onBarTouchEnd);
    bar.addEventListener("touchmove", onBarTouchCancel);
  });
}

function getItemById(id) {
  for (var i = 0; i < rawItems.length; i++) {
    if (rawItems[i].id === id) return rawItems[i];
  }
  return null;
}

function onBarClick(e) {
  if (e.target.classList.contains("resize-handle")) return;
  var item = getItemById(this.getAttribute("data-item-id"));
  if (item) showDetail(item);
}

function onBarContextMenu(e) {
  e.preventDefault();
  e.stopPropagation();
  var item = getItemById(this.getAttribute("data-item-id"));
  if (item) showContextMenu(e.clientX, e.clientY, item);
}

// Long press
function onBarTouchStart(e) {
  var self = this;
  longPressTimer = setTimeout(function() {
    var touch = e.changedTouches[0];
    var item = getItemById(self.getAttribute("data-item-id"));
    if (item) showContextMenu(touch.clientX, touch.clientY, item);
  }, 500);
}
function onBarTouchEnd() { clearTimeout(longPressTimer); }
function onBarTouchCancel() { clearTimeout(longPressTimer); }

// ── Drag / Resize ──
var dragState = null;

function onBarPointerDown(e) {
  if (e.button !== 0) return;
  var bar = this;
  var itemId = bar.getAttribute("data-item-id");
  var item = getItemById(itemId);
  if (!item) return;

  var isLeftHandle = e.target.classList.contains("left");
  var isRightHandle = e.target.classList.contains("right");
  var isResize = isLeftHandle || isRightHandle;

  var colW = getColW();
  var startX = e.clientX;
  var origLeft = parseInt(bar.style.left) || 0;
  var origWidth = parseInt(bar.style.width) || colW;
  var origStartDay = new Date(item._startDay);
  var origEndDay = new Date(item._endDay);

  bar.classList.add("dragging");
  bar.setPointerCapture(e.pointerId);

  function onMove(ev) {
    var dx = ev.clientX - startX;
    var dayShift = Math.round(dx / colW);

    if (isResize && isLeftHandle) {
      var newLeft = origLeft + dayShift * colW;
      var newWidth = origWidth - dayShift * colW;
      if (newWidth < colW) { newWidth = colW; newLeft = origLeft + origWidth - colW; }
      bar.style.left = newLeft + "px";
      bar.style.width = newWidth + "px";
    } else if (isResize && isRightHandle) {
      var newW = origWidth + dayShift * colW;
      if (newW < colW) newW = colW;
      bar.style.width = newW + "px";
    } else {
      bar.style.left = (origLeft + dayShift * colW) + "px";
    }
  }

  function onUp(ev) {
    bar.classList.remove("dragging");
    bar.releasePointerCapture(ev.pointerId);
    bar.removeEventListener("pointermove", onMove);
    bar.removeEventListener("pointerup", onUp);

    var dx = ev.clientX - startX;
    var dayShift = Math.round(dx / colW);
    if (dayShift === 0 && !isResize) return;

    var newStart, newEnd;
    if (isResize && isLeftHandle) {
      newStart = addDays(origStartDay, dayShift);
      newEnd = origEndDay;
      if (newStart > newEnd) newStart = newEnd;
    } else if (isResize && isRightHandle) {
      newStart = origStartDay;
      newEnd = addDays(origEndDay, dayShift);
      if (newEnd < newStart) newEnd = newStart;
    } else {
      if (dayShift === 0) return;
      newStart = addDays(origStartDay, dayShift);
      newEnd = addDays(origEndDay, dayShift);
    }

    // Preserve original times
    var origStartTime = item._start;
    var origEndTime = item._end;
    var startISO = new Date(newStart.getFullYear(), newStart.getMonth(), newStart.getDate(),
      origStartTime.getHours(), origStartTime.getMinutes(), origStartTime.getSeconds()).toISOString();
    var endISO = new Date(newEnd.getFullYear(), newEnd.getMonth(), newEnd.getDate(),
      origEndTime.getHours(), origEndTime.getMinutes(), origEndTime.getSeconds()).toISOString();

    var riParam = item.rowIndices ? "&rowIndices=" + encodeURIComponent(JSON.stringify(item.rowIndices)) : "";
    fetch(API_URL + "?key=village2026&action=updateTime&row=" + item.rowIndex +
      "&start=" + encodeURIComponent(startISO) + "&end=" + encodeURIComponent(endISO) + riParam)
      .then(function(r) { return r.json(); })
      .then(function(res) {
        if (res.success) {
          showToast("일정이 변경되었습니다");
          item._start = new Date(startISO);
          item._end = new Date(endISO);
          item._startDay = dateOnly(item._start);
          item._endDay = dateOnly(item._end);
          item.start = startISO;
          item.end = endISO;
          computeDateRange();
          render();
        } else {
          showToast("변경 실패: " + (res.error || ""));
          render();
        }
      })
      .catch(function() {
        showToast("네트워크 오류");
        render();
      });
  }

  bar.addEventListener("pointermove", onMove);
  bar.addEventListener("pointerup", onUp);
  e.preventDefault();
}

// ── Context Menu ──
function showContextMenu(x, y, item) {
  ctxTarget = item;
  var menu = document.getElementById("ctxMenu");
  var isMobile = window.innerWidth < 600;
  if (isMobile) {
    menu.style.left = "0";
    menu.style.right = "0";
    menu.style.bottom = "0";
    menu.style.top = "auto";
  } else {
    menu.style.left = x + "px";
    menu.style.top = y + "px";
    menu.style.right = "auto";
    menu.style.bottom = "auto";
    // Keep in viewport
    requestAnimationFrame(function() {
      var rect = menu.getBoundingClientRect();
      if (rect.right > window.innerWidth) menu.style.left = (x - rect.width) + "px";
      if (rect.bottom > window.innerHeight) menu.style.top = (y - rect.height) + "px";
    });
  }
  menu.classList.add("open");
}

function hideContextMenu() {
  document.getElementById("ctxMenu").classList.remove("open");
  ctxTarget = null;
}

function ctxAction(action) {
  hideContextMenu();
  if (!ctxTarget) return;
  var item = ctxTarget;

  if (action === "detail") {
    showDetail(item);
    return;
  }
  if (action === "contract") {
    showToast("계약서 열기: " + (item["거래ID"] || ""));
    return;
  }
  if (action === "alimtalk") {
    showToast("알림톡 발송: " + (item.custName || ""));
    return;
  }

  // Status change
  if (action === "반출중" || action === "반납완료" || action === "취소") {
    var riParam = item.rowIndices ? "&rowIndices=" + encodeURIComponent(JSON.stringify(item.rowIndices)) : "";
    fetch(API_URL + "?key=village2026&action=updateStatus&row=" + item.rowIndex +
      "&status=" + encodeURIComponent(action) + riParam)
      .then(function(r) { return r.json(); })
      .then(function(res) {
        if (res.success) {
          showToast("상태 변경: " + action);
          item.status = action;
          render();
        } else {
          showToast("상태 변경 실패");
        }
      })
      .catch(function() { showToast("네트워크 오류"); });
  }
}

window.ctxAction = ctxAction;

document.addEventListener("click", function(e) {
  if (!e.target.closest(".ctx-menu")) hideContextMenu();
});

// ── Detail Panel ──
function showDetail(item) {
  document.getElementById("detailTitle").textContent = item.custName || item.content || "";
  var sk = statusKey(item.status);
  var html =
    dRow("거래ID", escHtml(item["거래ID"] || "-")) +
    dRow("고객명", escHtml(item.custName || "-")) +
    dRow("연락처", escHtml(item.tel || "-")) +
    dRow("세트명", escHtml(item["세트명"] || "-")) +
    dRow("장비명", escHtml(item["장비명"] || "-")) +
    dRow("수량", escHtml(item["수량"] || "-")) +
    dRow("반출", escHtml(item["반출"] || "-")) +
    dRow("반납", escHtml(item["반납"] || "-")) +
    dRow("상태", '<span class="status-badge ' + STATUS_BADGE[sk] + '">' + escHtml(item.status || "-") + '</span>') +
    (item["단가"] > 0 ? dRow("단가", Number(item["단가"]).toLocaleString() + "원") : "");
  document.getElementById("detailBody").innerHTML = html;
  document.getElementById("detailOverlay").classList.add("open");
}

function dRow(label, value) {
  return '<div class="detail-row"><span class="detail-label">' + label + '</span><span class="detail-value">' + value + '</span></div>';
}

function closeDetail() {
  document.getElementById("detailOverlay").classList.remove("open");
}
window.closeDetail = closeDetail;

// ── Add Modal ──
function openAddModal() {
  document.getElementById("addModal").classList.add("open");
}
function closeAddModal() {
  document.getElementById("addModal").classList.remove("open");
}
function submitAddModal() {

  showToast("확인요청 시트를 통해 등록해주세요");
}
window.openAddModal = openAddModal;
window.closeAddModal = closeAddModal;
window.submitAddModal = submitAddModal;

// ── Scroll to Today ──
function scrollToToday() {
  var today = dateOnly(new Date());
  var off = daysBetween(dateRange.start, today);
  var colW = getColW();
  var gridScroll = document.getElementById("gridScroll");
  var target = off * colW - gridScroll.clientWidth / 2 + colW / 2;
  gridScroll.scrollTo({ left: Math.max(0, target), behavior: "smooth" });
}
window.scrollToToday = scrollToToday;

// ── Status Chips ──
function toggleStatusChip(el) {
  var s = el.getAttribute("data-status");
  hiddenStatuses[s] = !hiddenStatuses[s];
  el.classList.toggle("dimmed", !!hiddenStatuses[s]);
  render();
}
window.toggleStatusChip = toggleStatusChip;

// ── Active Filter ──
function toggleActiveFilter() {
  activeFilterOn = !activeFilterOn;
  var btn = document.getElementById("filterBtn");
  btn.style.background = activeFilterOn ? "var(--accent)" : "";
  btn.style.color = activeFilterOn ? "#fff" : "";

// ── Group Collapse ──
function toggleGroup(name) {

  render();
}
window.toggleGroup = toggleGroup;

// ── Group Mode ──

// ── Search ──
document.getElementById("searchInput").addEventListener("input", function() {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(function() {
    searchQuery = document.getElementById("searchInput").value.trim();
    render();
  }, 150);
});

// ── Zoom ──
function zoomIn() {
  if (currentZoomIdx < zoomLevels.length - 1) {
    currentZoomIdx++;
    applyZoom();
  }
}
function zoomOut() {
  if (currentZoomIdx > 0) {
    currentZoomIdx--;
    applyZoom();
  }
}
function applyZoom() {
  document.getElementById("zoomLevel").textContent = zoomLevels[currentZoomIdx].name;
  document.documentElement.style.setProperty("--col-w", zoomLevels[currentZoomIdx].colW + "px");
  render();
}
window.zoomIn = zoomIn;
window.zoomOut = zoomOut;

// Pinch zoom for mobile
var lastPinchDist = 0;
document.getElementById("gridScroll").addEventListener("touchstart", function(e) {
  if (e.touches.length === 2) {
    lastPinchDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
  }
}, { passive: true });
document.getElementById("gridScroll").addEventListener("touchmove", function(e) {
  if (e.touches.length === 2) {
    var dist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    if (lastPinchDist > 0) {
      var ratio = dist / lastPinchDist;
      if (ratio > 1.3) { zoomIn(); lastPinchDist = dist; }
      else if (ratio < 0.7) { zoomOut(); lastPinchDist = dist; }
    }
  }
}, { passive: true });

// ── Mobile Label Toggle ──
function toggleMobileLabel() {
  var lp = document.getElementById("labelPanel");
  lp.classList.toggle("mobile-open");
  var btn = document.getElementById("mobileToggle");
  btn.innerHTML = lp.classList.contains("mobile-open") ? "&#9664;" : "&#9654;";
  btn.style.left = lp.classList.contains("mobile-open") ? "var(--label-w)" : "0";
}
window.toggleMobileLabel = toggleMobileLabel;

// ── Loading ──
function showLoading(show) {
  document.getElementById("loading").classList.toggle("hidden", !show);
}

// ── Toast ──
function showToast(msg) {
  var el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(function() { el.classList.remove("show"); }, 2500);
}
window.showToast = showToast;

// ── Refresh ──
function updateRefreshInfo() {
  var now = new Date();
  var t = pad2(now.getHours()) + ":" + pad2(now.getMinutes());
  document.getElementById("refreshInfo").textContent = t + " 갱신 \u00B7 1분마다";
}
function startAutoRefresh() {
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(function() { loadData(); }, REFRESH_INTERVAL);
}

// ── Escape ──
document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") {
    closeDetail();
    closeAddModal();
    hideContextMenu();
  }
});

// Click on modal overlay
document.getElementById("addModal").addEventListener("click", function(e) {
  if (e.target === this) closeAddModal();
});

// ── Init ──
setupScrollSync();
loadData();
startAutoRefresh();

// After first render, scroll to today
var firstRenderDone = false;
var origRender = render;
render = function() {
  origRender();
  if (!firstRenderDone) {
    firstRenderDone = true;
    setTimeout(scrollToToday, 100);
  }
};

})();
