<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="스케줄">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#F7F7F5">
<link rel="apple-touch-icon" sizes="180x180" href="https://village6k-cpu.github.io/my-gas-project2/icons/village-schedule-03-20260514-180.png?v=20260514a">
<link rel="icon" type="image/png" href="https://village6k-cpu.github.io/my-gas-project2/icons/village-schedule-03-20260514.png?v=20260514a">
<title>빌리지 스케줄</title>
<style>
:root {
  --bg: #F7F7F5;
  --surface: #FFFFFF;
  --border: #E9E9E7;
  --border-light: #F0F0EE;
  --text-primary: #37352F;
  --text-secondary: #787774;
  --text-muted: #B4B4B0;
  --accent: #2383E2;
  --blue-bg: #D3E5EF; --blue-text: #24609C;
  --amber-bg: #FDECC8; --amber-text: #93640D;
  --green-bg: #DBEDDB; --green-text: #2B6B2B;
  --gray-bg: #E8E8E5; --gray-text: #787774;
  --purple-bg: #E8DEEE; --purple-text: #6940A5;
  --red: #EB5757;
  --today-bg: #EBF5FF;
  --radius: 6px;
  --col-w: 120px;
  --row-h: 40px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  height: 100vh; height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  -webkit-user-select: none; user-select: none;
}

/* ── Header ── */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px 10px;
  flex-shrink: 0;
  z-index: 100;
}
.header-top,
.header-workbar {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.header-top {
  justify-content: space-between;
  margin-bottom: 10px;
}
.header-workbar {
  min-width: 0;
}
.header-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: flex-end;
}
.app-switcher {
  display: flex;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  flex-shrink: 0;
}
.app-tab {
  display: inline-flex;
  align-items: center;
  min-height: 32px;
  padding: 6px 12px;
  font-size: 12px;
  font-weight: 650;
  color: var(--text-secondary);
  border: none;
  background: transparent;
  text-decoration: none;
  transition: all 0.15s;
  white-space: nowrap;
}
.app-tab:not(:last-child) { border-right: 1px solid var(--border); }
a.app-tab:hover { background: rgba(0,0,0,0.03); color: var(--accent); }
.app-tab.active { background: var(--accent); color: #fff; }

.group-select {
  min-height: 32px;
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  font-size: 12px;
  color: var(--text-primary);
  outline: none;
  cursor: pointer;
}
.group-select:focus { border-color: var(--accent); }

.search-box {
  position: relative;
  flex: 1;
  min-width: 180px;
  max-width: 280px;
}
.search-box input {
  width: 100%;
  min-height: 32px;
  padding: 6px 10px 6px 32px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg);
  font-size: 13px;
  color: var(--text-primary);
  outline: none;
  transition: border-color 0.2s;
}
.search-box input:focus { border-color: var(--accent); }
.search-box input::placeholder { color: var(--text-muted); }
.search-box .search-icon {
  position: absolute;
  left: 9px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  font-size: 14px;
  pointer-events: none;
}
.hdr-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  min-height: 32px;
  padding: 6px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  font-size: 12px;
  font-weight: 650;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  text-decoration: none;
}
.hdr-btn:hover { border-color: var(--accent); color: var(--accent); }
.hdr-btn.primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.hdr-btn.primary:hover { opacity: 0.9; }
.hdr-btn.request-btn {
  min-height: 36px;
  padding: 7px 12px 7px 9px;
  background: #EAF4FF;
  border-color: rgba(35,131,226,0.34);
  color: #0F5EA8;
  font-weight: 800;
  box-shadow: 0 1px 0 rgba(35,131,226,0.08);
}
.hdr-btn.request-btn:hover {
  background: #DDEEFF;
  border-color: var(--accent);
  color: #0B5CAD;
}
.request-ai-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  height: 20px;
  min-width: 24px;
  padding: 0 5px;
  border-radius: 4px;
  background: var(--accent);
  color: #fff;
  font-size: 10px;
  font-weight: 850;
  line-height: 1;
}
.request-main { white-space: nowrap; }
.icon-btn {
  width: 32px;
  height: 32px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  cursor: pointer;
  color: var(--text-secondary);
  font-size: 16px;
  transition: all 0.15s;
}
.icon-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}
.icon-btn:active,
.hdr-btn:active {
  background: var(--bg);
}
.date-range-separator {
  color: var(--text-muted);
  font-size: 12px;
}
.date-input {
  min-height: 32px;
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  font-size: 12px;
  color: var(--text-primary);
  outline: none;
  width: 120px;
}
.date-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(35,131,226,0.15);
}
.refresh-info {
  font-size: 11px;
  color: var(--text-muted);
  white-space: nowrap;
}

/* ── Main Layout ── */
.main-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}
.grid-wrapper {
  flex: 1;
  display: flex;
  overflow: hidden;
  position: relative;
}

/* ── Grid Panel ── */
.grid-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}
.date-header {
  display: flex;
  height: 52px;
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  z-index: 5;
  overflow: hidden;
}
.date-header-inner {
  display: flex;
  height: 100%;
}
.date-col-header {
  width: var(--col-w);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  border-right: 1px solid var(--border-light);
}
.date-col-header.weekend { background: rgba(0,0,0,0.015); }
.date-col-header.today { background: var(--today-bg); }
.date-month {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-muted);
  line-height: 1;
}
.date-day {
  font-size: 14px;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1.4;
}
.date-col-header.today .date-day { color: var(--accent); }
.date-weekday {
  font-size: 10px;
  color: var(--text-muted);
  line-height: 1;
}
.date-col-header.weekend .date-weekday { color: var(--red); }

.grid-scroll {
  flex: 1;
  overflow: auto;
}
.grid-scroll::-webkit-scrollbar { height: 8px; width: 0; }
.grid-scroll::-webkit-scrollbar-track { background: var(--bg); }
.grid-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.grid-body {
  position: relative;
  min-height: 100%;
}
.grid-row {
  display: flex;
  height: var(--row-h);
  border-bottom: 1px solid var(--border-light);
}
/* ── Inline Group Header Row ── */
.group-header-row {
  height: var(--row-h);
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 16px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  user-select: none;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
  position: sticky;
  left: 0;
  z-index: 5;
  min-width: fit-content;
}
.group-header-row:hover { background: #EFEEEB; }
.group-header-row .chevron {
  font-size: 10px;
  color: var(--text-muted);
  transition: transform 0.2s;
  width: 16px;
  text-align: center;
}
.group-header-row.collapsed .chevron { transform: rotate(-90deg); }
.group-header-row .group-count {
  font-size: 11px;
  font-weight: 400;
  color: var(--text-muted);
  background: var(--surface);
  padding: 1px 8px;
  border-radius: 10px;
}
.grid-cell {
  width: var(--col-w);
  flex-shrink: 0;
  border-right: 1px solid var(--border-light);
}
.grid-cell.weekend { background: rgba(0,0,0,0.012); }
.grid-cell.today { background: var(--today-bg); }

/* Today Line */
.today-line {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 2px;
  background: var(--red);
  z-index: 8;
  pointer-events: none;
}
.today-label {
  position: absolute;
  top: -18px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--red);
  color: #fff;
  font-size: 9px;
  font-weight: 700;
  padding: 1px 5px;
  border-radius: 3px;
  white-space: nowrap;
}

/* ── Timeline Bars ── */
.tl-bar {
  position: absolute;
  height: 28px;
  top: 6px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  line-height: 28px;
  padding: 0 8px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  cursor: grab;
  z-index: 6;
  transition: box-shadow 0.15s;  /* transform은 트랜지션 제외 → 드래그 시 0.1s 지연 없이 커서에 즉시 붙음 */
  touch-action: none;
}
.tl-bar:hover {
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  transform: translateY(-1px);
  z-index: 7;
}
.tl-bar.dragging {
  opacity: 0.72;
  box-shadow: 0 10px 28px rgba(0,0,0,0.28);
  cursor: grabbing;
  z-index: 30;
  will-change: transform;
}
.tl-bar .resize-handle {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 8px;
  cursor: col-resize;
}
.tl-bar .resize-handle.left { left: 0; }
.tl-bar .resize-handle.right { right: 0; }
.tl-bar .resize-handle:hover { background: rgba(0,0,0,0.08); border-radius: 4px 0 0 4px; }
.tl-bar .resize-handle.right:hover { border-radius: 0 4px 4px 0; }

/* Status colors */
.bar-대기 { background: var(--blue-bg); color: var(--blue-text); }
.bar-반출중 { background: var(--amber-bg); color: var(--amber-text); }
.bar-반납완료 { background: var(--green-bg); color: var(--green-text); }
.bar-취소 { background: var(--gray-bg); color: var(--gray-text); text-decoration: line-through; }
.bar-기타 { background: var(--purple-bg); color: var(--purple-text); }

/* Today in/out icons */
.tl-bar.today-out::before { content: '\1F4E4 '; font-size: 10px; }
.tl-bar.today-in::after { content: ' \1F4E5'; font-size: 10px; }

/* Conflict */
.bar-conflict {
  outline: 2px solid var(--red);
  animation: conflict-pulse 2s infinite;
}
@keyframes conflict-pulse {
  0%, 100% { outline-color: var(--red); }
  50% { outline-color: rgba(235,87,87,0.3); }
}

/* ── Revenue Chart ── */
.revenue-bar-area {
  height: 48px;
  border-top: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  flex-shrink: 0;
  overflow: hidden;
  z-index: 5;
}
.revenue-label {
  width: 80px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  padding: 0 12px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  border-right: 1px solid var(--border);
}
.revenue-scroll {
  flex: 1;
  overflow-x: hidden;
  overflow-y: hidden;
  display: flex;
  align-items: flex-end;
}
.revenue-inner {
  display: flex;
  align-items: flex-end;
  height: 100%;
  padding: 4px 0;
}
.revenue-col {
  width: var(--col-w);
  flex-shrink: 0;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  height: 100%;
  position: relative;
}
.revenue-col-bar {
  width: 60%;
  background: var(--accent);
  opacity: 0.3;
  border-radius: 2px 2px 0 0;
  min-height: 2px;
  transition: opacity 0.15s;
  cursor: default;
}
.revenue-col:hover .revenue-col-bar { opacity: 0.6; }
.revenue-tooltip {
  display: none;
  position: absolute;
  bottom: 100%;
  left: 50%;
  transform: translateX(-50%);
  background: var(--text-primary);
  color: #fff;
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 3px;
  white-space: nowrap;
  z-index: 20;
}
.revenue-col:hover .revenue-tooltip { display: block; }

/* ── Zoom Control ── */
.zoom-control {
  position: fixed;
  bottom: 64px;
  right: 16px;
  display: flex;
  flex-direction: column;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  z-index: 50;
  overflow: hidden;
}
.zoom-btn {
  width: 36px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: none;
  background: transparent;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-secondary);
  transition: background 0.15s;
}
.zoom-btn:hover { background: var(--bg); }
.zoom-btn:not(:last-child) { border-bottom: 1px solid var(--border); }
.zoom-level {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-muted);
  padding: 2px 0;
  text-align: center;
  border-bottom: 1px solid var(--border);
}

/* ── Context Menu ── */
.ctx-menu {
  position: fixed;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: 0 4px 16px rgba(0,0,0,0.12);
  z-index: 300;
  min-width: 180px;
  padding: 4px 0;
  display: none;
}
.ctx-menu.open { display: block; }
.ctx-item {
  padding: 8px 14px;
  font-size: 13px;
  color: var(--text-primary);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
}
.ctx-item:hover { background: var(--bg); }
.ctx-item.danger { color: var(--red); }
.ctx-sep { height: 1px; background: var(--border); margin: 4px 0; }

/* ── Detail Panel ── */
.detail-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 200;
}
.detail-overlay.open { display: flex; justify-content: flex-end; }
.detail-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.1);
}
.detail-panel {
  position: relative;
  width: 320px;
  background: var(--surface);
  border-left: 1px solid var(--border);
  box-shadow: -4px 0 16px rgba(0,0,0,0.06);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  z-index: 1;
  animation: slideInRight 0.2s ease;
}
@keyframes slideInRight {
  from { transform: translateX(100%); }
  to { transform: translateX(0); }
}
.detail-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.detail-header h3 { font-size: 15px; font-weight: 700; }
.detail-close {
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  border: none; background: var(--bg);
  border-radius: 6px; cursor: pointer;
  font-size: 16px; color: var(--text-secondary);
}
.detail-close:hover { background: var(--border); }
.detail-body { padding: 16px 20px; }
.detail-row {
  display: flex;
  padding: 10px 0;
  border-bottom: 1px solid var(--border-light);
  font-size: 13px;
}
.detail-row:last-child { border-bottom: none; }
.detail-label { width: 72px; flex-shrink: 0; color: var(--text-muted); font-weight: 500; }
.detail-value { color: var(--text-primary); font-weight: 500; word-break: break-all; }
.status-badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 11px; font-weight: 600;
}
.badge-대기 { background: var(--blue-bg); color: var(--blue-text); }
.badge-반출중 { background: var(--amber-bg); color: var(--amber-text); }
.badge-반납완료 { background: var(--green-bg); color: var(--green-text); }
.badge-취소 { background: var(--gray-bg); color: var(--gray-text); }
.badge-기타 { background: var(--purple-bg); color: var(--purple-text); }

/* ── Modal ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.3);
  z-index: 400;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: var(--surface);
  border-radius: 12px;
  padding: 24px;
  width: 360px;
  max-width: 90vw;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
}
.modal-box h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
.modal-field { margin-bottom: 12px; }
.modal-field label { display: block; font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 4px; }
.modal-field input {
  width: 100%;
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 13px;
  color: var(--text-primary);
  outline: none;
}
.modal-field input:focus { border-color: var(--accent); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
.modal-actions button {
  padding: 7px 16px;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-primary);
}
.modal-actions button.primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

/* ── Add Modal ── */
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
.modal-header h3 { font-size: 16px; font-weight: 700; margin-bottom: 0; }
.modal-close {
  width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
  border: none; background: var(--bg); border-radius: 6px; cursor: pointer;
  font-size: 14px; color: var(--text-secondary);
}
.modal-close:hover { background: var(--border); }
.modal-body { padding: 16px 20px; }
.modal-footer {
  display: flex; justify-content: flex-end; gap: 8px;
  padding: 12px 20px;
  border-top: 1px solid var(--border);
}
.form-group { margin-bottom: 12px; }
.form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 4px; }
.form-input {
  width: 100%; padding: 8px 10px;
  border: 1px solid var(--border); border-radius: var(--radius);
  background: var(--bg); font-size: 13px; color: var(--text-primary);
  outline: none; transition: border-color 0.15s;
}
.form-input:focus { border-color: var(--accent); }
.form-row { display: flex; gap: 12px; }
.multi-equip-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 8px;
}
.multi-equip-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 72px 30px;
  gap: 8px;
  align-items: start;
}
.multi-equip-row .form-input { margin-bottom: 0; }
.multi-row-remove {
  width: 30px;
  height: 30px;
  border: 1px solid var(--border);

<script>
(function() {
"use strict";

var API_URL = "https://script.google.com/macros/s/AKfycbyRff4-lLXmne-iPIEf87x4-CH_5wb-Uv5dCGymELLrpiKluhg2gDdLdVP4Y0MmxnnT/exec";
var REFRESH_INTERVAL = 60000;

// State
var rawGroups = [];
var rawItems = [];
var groupMode = "세트별";
var searchQuery = "";
var collapsedGroups = {};
var zoomLevels = [
  { name: "월", colW: 16 },
  { name: "주", colW: 40 },
  { name: "일", colW: 120 }
];
var currentZoomIdx = 2; // 일
var continuousColW = 120; // 연속 줌용 실제 colW 값
var MIN_COL_W = 10;
var MAX_COL_W = 200;
var dateRange = { start: null, end: null, days: 0 };
var viewStart = null;  // Date — left edge of visible grid
var viewEnd = null;    // Date — right edge of visible grid
var filterStart = null; // Date — user-set filter start (null = auto)
var filterEnd = null;   // Date — user-set filter end (null = auto)
var refreshTimer = null;
var ctxTarget = null; // item for context menu
var searchDebounce = null;
var scrollSyncFlag = false;
var longPressTimer = null;
var timelineRequestSeq = 0;
var timelineAbortController = null;
var timelineLastResponseKey = "";
var TIMELINE_CACHE_PREFIX = "timelineCache_v4_";
var TIMELINE_CACHE_TTL_MS = 5 * 60 * 1000;
var TIMELINE_FETCH_TIMEOUT_MS = 15000;

// ── Utils ──
function escHtml(s) {
  if (!s) return "";
  var d = document.createElement("div");
  d.appendChild(document.createTextNode(s));
  return d.innerHTML;
}
function toDateStr(d) {
  return d.getFullYear() + "-" + pad2(d.getMonth()+1) + "-" + pad2(d.getDate());
}
function pad2(n) { return n < 10 ? "0" + n : "" + n; }
function parseDate(s) {
  if (!s) return null;
  if (s instanceof Date) return s;
  return new Date(s);
}
function daysBetween(a, b) {
  var msA = Date.UTC(a.getFullYear(), a.getMonth(), a.getDate());
  var msB = Date.UTC(b.getFullYear(), b.getMonth(), b.getDate());
  return Math.round((msB - msA) / 86400000);
}
function dateOnly(d) {
  return new Date(d.getFullYear(), d.getMonth(), d.getDate());
}
function isSameDay(a, b) {
  return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
}
function addDays(d, n) {
  var r = new Date(d);
  r.setDate(r.getDate() + n);
  return r;
}
function getWeekday(d) {
  return ["일","월","화","수","목","금","토"][d.getDay()];
}
function isWeekend(d) { var w = d.getDay(); return w === 0 || w === 6; }
function getColW() { return continuousColW; }
function statusKey(s) {
  if (["대기","반출중","반납완료","취소"].indexOf(s) >= 0) return s;
  return "기타";
}
var STATUS_BADGE = { "대기":"badge-대기","반출중":"badge-반출중","반납완료":"badge-반납완료","취소":"badge-취소","기타":"badge-기타" };

// ── Data Loading ──
function getTimelineFetchRange() {
  var today = dateOnly(new Date());
  var start, end;
  if (filterStart && filterEnd) {
    start = dateOnly(filterStart);
    end = dateOnly(filterEnd);
  } else if (filterStart) {
    start = dateOnly(filterStart);
    end = addDays(start, 21);
  } else if (filterEnd) {
    end = dateOnly(filterEnd);
    start = addDays(end, -21);
  } else {
    start = addDays(today, -1);
    end = addDays(today, 14);
  }
  return { from: toDateStr(start), to: toDateStr(end) };
}

function readTimelineLocalCache(requestKey) {
  try {
    var raw = localStorage.getItem(TIMELINE_CACHE_PREFIX + requestKey);
    if (!raw) return null;
    var entry = JSON.parse(raw);
    if (!entry || !entry.data) return null;
    if (Date.now() - Number(entry.savedAt || 0) > TIMELINE_CACHE_TTL_MS) {
      localStorage.removeItem(TIMELINE_CACHE_PREFIX + requestKey);
      return null;
    }
    return entry.data;
  } catch (e) {
    return null;
  }
}

function writeTimelineLocalCache(requestKey, data) {
  try {
    if (!requestKey || !data) return;
    localStorage.setItem(TIMELINE_CACHE_PREFIX + requestKey, JSON.stringify({
      savedAt: Date.now(),
      data: data
    }));
    pruneTimelineLocalCache(requestKey);
  } catch (e) {}
}

function pruneTimelineLocalCache(keepKey) {
  try {
    Object.keys(localStorage).forEach(function(key) {
      if (key.indexOf(TIMELINE_CACHE_PREFIX) !== 0) return;
      if (key !== TIMELINE_CACHE_PREFIX + keepKey) localStorage.removeItem(key);
    });
  } catch (e) {}
}

function expandTimelineResponse(data) {
  data = data || {};
  if (!data.compact) return data;
  var groupContentById = {};
  var expandedGroups = (data.groups || []).map(function(g) {
    if (!g) return g;
    var id = g.id || g.i;
    var content = g.content || g.c || id;
    if (id) groupContentById[id] = content;
    return g.id ? g : { id: id, content: content };
  });
  return {
    groups: expandedGroups,
    items: (data.items || []).map(function(it, idx) {
      return expandTimelineItem(it, groupContentById, idx);
    })
  };
}

function expandTimelineDate(value) {
  return typeof value === "number" ? new Date(value).toISOString() : value;
}

function timelineDateFromCompactValue(value) {
  if (value === undefined || value === null || value === "") return null;
  var d = typeof value === "number" ? new Date(value) : new Date(value);
  return isNaN(d.getTime()) ? null : d;
}

function formatTimelineDateTime(value) {
  var d = timelineDateFromCompactValue(value);
  if (!d) return "";
  try {
    var parts = new Intl.DateTimeFormat("en-CA", {
      timeZone: "Asia/Seoul",
      year: "numeric",
      month: "2-digit",
      day: "2-digit",
      hour: "2-digit",
      minute: "2-digit",
      hour12: false
    }).formatToParts(d);
    var map = {};
    parts.forEach(function(part) { map[part.type] = part.value; });
    var hour = map.hour === "24" ? "00" : map.hour;
    return map.year + "-" + map.month + "-" + map.day + " " + hour + ":" + map.minute;
  } catch (e) {
    return d.getFullYear() + "-" + ("0" + (d.getMonth() + 1)).slice(-2) + "-" + ("0" + d.getDate()).slice(-2) +
      " " + ("0" + d.getHours()).slice(-2) + ":" + ("0" + d.getMinutes()).slice(-2);
  }
}

function formatTimelineTime(value) {
  var text = formatTimelineDateTime(value);
  return text ? text.slice(11, 16) : "";
}

function timelineClassNameForStatus(status) {
  return ["대기", "반출중", "반납완료", "취소"].indexOf(status) >= 0 ? "status-" + status : "status-기타";
}

function expandTimelineItem(it, groupContentById, idx) {
  if (!it || it.id) return it;
  var status = it.st || "대기";
  var setName = it.set || (groupContentById && groupContentById[it.g]) || "";
  var equipName = it.eq || setName;
  return {
    id: it.i || ("item_" + idx),
    rowIndex: it.r,
    rowIndices: it.rs || (it.r ? [it.r] : []),
    group: it.g,
    content: it.cn || "",
    start: expandTimelineDate(it.s),
    end: expandTimelineDate(it.e),
    className: it.cl || timelineClassNameForStatus(status),
    status: status,
    editable: { updateTime: true, remove: false },
    custName: it.cn || "",
    tel: it.t || "",
    거래ID: it.tid || "",
    세트명: setName,
    장비명: equipName,
    수량: it.q || "",
    반출: it.out || formatTimelineDateTime(it.s),
    반납: it.ret || formatTimelineDateTime(it.e),
    단가: it.p || 0,
    반출시간: it.ot || formatTimelineTime(it.s),
    반납시간: it.rt || formatTimelineTime(it.e),
    회차: it.n || 1,
    재고: it.stock || 999,
    세트명원본: it.orig || setName,
    contractUrl: it.u || ""
  };
}

function renderTimelineData(data) {
  data = expandTimelineResponse(data);
  data = data || {};
  rawGroups = data.groups || [];
  rawItems = (data.items || []).map(function(it) {
    it._start = parseDate(it.start);
    it._end = parseDate(it.end);
    it._startDay = dateOnly(it._start);
    it._endDay = dateOnly(it._end);
    return it;
  });
  computeDateRange();
  render();
}

function loadData(forceFresh, opts) {
  opts = opts || {};
  var requestId = ++timelineRequestSeq;
  if (timelineAbortController && timelineAbortController.abort) {
    try { timelineAbortController.abort(); } catch (e) {}
  }
  var range = getTimelineFetchRange();
  var requestKey = range.from + "_" + range.to;
  var url = API_URL + "?key=village2026&action=timeline"
    + "&from=" + encodeURIComponent(range.from)
    + "&to=" + encodeURIComponent(range.to)
    + "&compact=2"
    + (forceFresh ? "&nocache=1" : "");

  var cachedData = readTimelineLocalCache(requestKey);
  if (cachedData) {
    renderTimelineData(cachedData);
    showLoading(false);
    updateRefreshInfo();
    opts.silent = true;
  }
  if (!opts.silent) showLoading(true);

  var maxRetries = 2;  // 총 시도 = maxRetries + 1

  // GAS 콜드 캐시/일시 500/리다이렉트/HTML 오류페이지에 대해 타임아웃 + 자동 재시도.
  function attempt(tryNo) {
    if (requestId !== timelineRequestSeq) return Promise.resolve();  // 다른 요청으로 대체됨
    timelineAbortController = (typeof AbortController !== "undefined") ? new AbortController() : null;
    var fetchOptions = timelineAbortController ? { signal: timelineAbortController.signal } : {};
    var timedOut = false;
    var timeoutId = setTimeout(function() {
      timedOut = true;
      if (timelineAbortController && timelineAbortController.abort) {
        try { timelineAbortController.abort(); } catch (e) {}
      }
    }, TIMELINE_FETCH_TIMEOUT_MS);

    return fetch(url, fetchOptions)
      .then(function(r) {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.text();
      })
      .then(function(text) {
        clearTimeout(timeoutId);
        if (requestId !== timelineRequestSeq) return;
        var data;
        try { data = JSON.parse(text); }
        catch (e) { throw new Error("비정상 응답(JSON 아님)"); }
        var responseKey = requestKey + "\n" + text;
        if (!forceFresh && responseKey === timelineLastResponseKey) {
          showLoading(false);
          updateRefreshInfo();
          return;
        }
        timelineLastResponseKey = responseKey;
        writeTimelineLocalCache(requestKey, data);
        renderTimelineData(data);
        showLoading(false);
        updateRefreshInfo();
      })
      .catch(function(err) {
        clearTimeout(timeoutId);
        if (requestId !== timelineRequestSeq) return;             // 대체됨
        if (err && err.name === "AbortError" && !timedOut) return; // supersede에 의한 중단
        if (tryNo < maxRetries) {
          var backoff = Math.min(4000, 700 * Math.pow(2, tryNo));  // 0.7s → 1.4s
          return new Promise(function(res) { setTimeout(res, backoff); })
            .then(function() { return attempt(tryNo + 1); });
        }
        showLoading(false);
        // 캐시가 화면에 떠 있으면 조용히, 없으면 안내 토스트
        if (!cachedData) {
          showToast(timedOut ? "응답이 지연됐어요. 다시 시도해 주세요" : "데이터를 불러오지 못했어요. 다시 시도해 주세요");
        }
      });
  }

  return attempt(0);
}
window.loadData = loadData;

function computeDateRange() {
  var today = dateOnly(new Date());
  if (filterStart && filterEnd) {
    viewStart = dateOnly(filterStart);
    viewEnd = dateOnly(filterEnd);
  } else if (filterStart) {
    viewStart = dateOnly(filterStart);
    viewEnd = addDays(viewStart, 21);
  } else if (filterEnd) {
    viewEnd = dateOnly(filterEnd);
    viewStart = addDays(viewEnd, -21);
  } else {
    viewStart = addDays(today, -7);
    viewEnd = addDays(today, 14);
  }
  dateRange.start = viewStart;
  dateRange.end = viewEnd;
  dateRange.days = daysBetween(viewStart, viewEnd) + 1;
}

// ── Grouping ──
function buildGroups() {
  var groups = [];
  var itemsByGroup = {};

  var filtered = rawItems.filter(function(it) {
    if (searchQuery) {
      var q = searchQuery.toLowerCase();
      var match = (it.custName || "").toLowerCase().indexOf(q) >= 0 ||
                  (it["세트명"] || "").toLowerCase().indexOf(q) >= 0 ||
                  (it["장비명"] || "").toLowerCase().indexOf(q) >= 0 ||
                  (it["거래ID"] || "").toLowerCase().indexOf(q) >= 0;
      if (!match) return false;
    }
    // Date overlap filter: item must overlap with [viewStart, viewEnd]
    if (viewStart && viewEnd) {
      if (it._endDay < viewStart || it._startDay > viewEnd) return false;
    }
    return true;
  });

  if (groupMode === "세트별") {
    var gMap = {};
    rawGroups.forEach(function(g) { gMap[g.id] = g.content || g.id; });
    filtered.forEach(function(it) {
      var gid = it.group || "unknown";
      var gname = gMap[gid] || gid;
      if (!itemsByGroup[gname]) { itemsByGroup[gname] = []; groups.push(gname); }
      itemsByGroup[gname].push(it);
    });
  } else if (groupMode === "고객별") {
    filtered.forEach(function(it) {
      var gname = it.custName || "미지정";
      if (!itemsByGroup[gname]) { itemsByGroup[gname] = []; groups.push(gname); }
      itemsByGroup[gname].push(it);
    });
  } else {
    filtered.forEach(function(it) {
      var gname = statusKey(it.status);
      if (!itemsByGroup[gname]) { itemsByGroup[gname] = []; groups.push(gname); }
      itemsByGroup[gname].push(it);
    });
  }

  groups.sort();
  return { names: groups, items: itemsByGroup, filteredCount: filtered.length };
}

// ── Conflict Detection ──
function computeConflicts() {
  var byEquip = {};
  rawItems.forEach(function(it) {
    if (it.status === "취소") return;
    var key = it["장비명"] || it["세트명원본"] || "";
    if (!key) return;
    if (!byEquip[key]) byEquip[key] = [];
    byEquip[key].push(it);
  });

  var conflictIds = {};
  Object.keys(byEquip).forEach(function(key) {
    var items = byEquip[key];
    if (items.length < 2) return;
    for (var d = 0; d < dateRange.days; d++) {
      var day = addDays(dateRange.start, d);
      var overlapping = [];
      items.forEach(function(it) {
        if (it._startDay <= day && it._endDay >= day) overlapping.push(it);
      });
      if (overlapping.length > 0) {
        var stock = overlapping[0]["재고"] || 999;
        if (overlapping.length > stock) {
          overlapping.forEach(function(it) { conflictIds[it.id] = true; });
        }
      }
    }
  });
  return conflictIds;
}

// ── Revenue Data ──
function revenueByDay() {
  var rev = {};
  rawItems.forEach(function(it) {
    if (it.status === "취소") return;
    var price = Number(it["단가"]) || 0;
    if (price <= 0) return;
    var days = daysBetween(it._startDay, it._endDay) + 1;
    if (days < 1) days = 1;
    var daily = price / days;
    for (var d = 0; d < days; d++) {
      var day = toDateStr(addDays(it._startDay, d));
      rev[day] = (rev[day] || 0) + daily;
    }
  });
  return rev;
}

// ── Render ──
function render() {
  var gd = buildGroups();
  var conflicts = computeConflicts();
  var today = dateOnly(new Date());
  var colW = getColW();
  var totalW = dateRange.days * colW;

  // Build date header
  var dhInner = document.getElementById("dateHeaderInner");
  var dhHtml = "";
  for (var d = 0; d < dateRange.days; d++) {
    var day = addDays(dateRange.start, d);
    var cls = "date-col-header";
    if (isWeekend(day)) cls += " weekend";
    if (isSameDay(day, today)) cls += " today";
    var showMonth = d === 0 || day.getDate() === 1;
    dhHtml += '<div class="' + cls + '" style="width:' + colW + 'px;min-width:' + colW + 'px">';
    if (colW >= 40) {
      dhHtml += '<span class="date-month">' + (showMonth ? (day.getMonth()+1) + "월" : "") + '</span>';
      dhHtml += '<span class="date-day">' + day.getDate() + '</span>';
      if (colW >= 80) dhHtml += '<span class="date-weekday">' + getWeekday(day) + '</span>';
    } else {
      if (day.getDate() === 1 || d === 0) dhHtml += '<span class="date-month" style="font-size:8px">' + (day.getMonth()+1) + '</span>';
      dhHtml += '<span class="date-day" style="font-size:9px">' + day.getDate() + '</span>';
    }
    dhHtml += '</div>';
  }
  dhInner.innerHTML = dhHtml;
  dhInner.style.width = totalW + "px";

  // Build grid rows (inline group headers + item rows)
  var gridHtml = "";
  var barHtml = "";
  var rowIdx = 0;

  gd.names.forEach(function(gname) {
    var items = gd.items[gname];
    var isCollapsed = !!collapsedGroups[gname];

    // Inline group header row
    gridHtml += '<div class="group-header-row' + (isCollapsed ? " collapsed" : "") + '" data-group="' + escHtml(gname).replace(/"/g,"&quot;") + '" onclick="toggleGroup(\'' + escHtml(gname).replace(/'/g,"&#39;") + '\')" style="width:' + totalW + 'px">' +
      '<span class="chevron">\u25BC</span>' +
      '<span class="group-name">' + escHtml(gname) + '</span>' +
      '<span class="group-count">' + items.length + '건</span></div>';
    rowIdx++;

    if (!isCollapsed) {
      items.forEach(function(it) {
        // Grid row
        gridHtml += '<div class="grid-row" data-row-idx="' + rowIdx + '" style="width:' + totalW + 'px;position:relative">';
        for (var d2 = 0; d2 < dateRange.days; d2++) {
          var day2 = addDays(dateRange.start, d2);
          var ccls2 = "grid-cell";
          if (isWeekend(day2)) ccls2 += " weekend";
          if (isSameDay(day2, today)) ccls2 += " today";
          gridHtml += '<div class="' + ccls2 + '" style="width:' + colW + 'px;min-width:' + colW + 'px"></div>';
        }

        // Bar — clip to viewport
        var clipLeft = false, clipRight = false;
        var barStartDay = it._startDay;
        var barEndDay = it._endDay;
        if (barStartDay < dateRange.start) { barStartDay = dateRange.start; clipLeft = true; }
        if (barEndDay > dateRange.end) { barEndDay = dateRange.end; clipRight = true; }

        var startOff = daysBetween(dateRange.start, barStartDay);
        var span = daysBetween(barStartDay, barEndDay) + 1;
        var barLeft = startOff * colW + 2;
        var barWidth = span * colW - 4;
        if (barWidth < 8) barWidth = 8;

        var sk = statusKey(it.status);
        var barCls = "tl-bar bar-" + sk;
        if (conflicts[it.id]) barCls += " bar-conflict";
        if (isSameDay(it._startDay, today)) barCls += " today-out";
        if (isSameDay(it._endDay, today)) barCls += " today-in";

        var clipPrefix = clipLeft ? "\u25C0 " : "";
        var clipSuffix = clipRight ? " \u25B6" : "";
        var barText = clipPrefix + escHtml(it["세트명원본"] || "") + " / " + escHtml(it.custName || "") + " / " +
          escHtml(it["반출시간"] || "") + "-" + escHtml(it["반납시간"] || "") +
          (it["회차"] ? "(" + it["회차"] + "회차)" : "") + clipSuffix;
        var barTitle = barText.replace(/&amp;/g,"&").replace(/&lt;/g,"<").replace(/&gt;/g,">");

        barHtml += '<div class="' + barCls + '" data-item-id="' + escHtml(it.id) + '" ' +
          'style="top:' + (rowIdx * parseInt(getComputedStyle(document.documentElement).getPropertyValue("--row-h")) || rowIdx * 40) + 'px;' +
          'top:calc(' + rowIdx + ' * var(--row-h) + 6px);' +
          'left:' + barLeft + 'px;width:' + barWidth + 'px" ' +
          'title="' + escHtml(barTitle) + '">' +
          '<div class="resize-handle left"></div>' +
          '<span class="bar-text">' + barText + '</span>' +
          '<div class="resize-handle right"></div></div>';

        rowIdx++;
        gridHtml += '</div>';
      });
    }
  });

  var gridBody = document.getElementById("gridBody");
  gridBody.innerHTML = gridHtml + '<div style="position:absolute;top:0;left:0;width:' + totalW + 'px;height:' + (rowIdx * 40) + 'px;pointer-events:none"></div>';
  gridBody.style.width = totalW + "px";
  gridBody.style.minHeight = (rowIdx * 40) + "px";

  // Insert bars into gridBody
  var barsContainer = document.createElement("div");
  barsContainer.style.cssText = "position:absolute;top:0;left:0;width:" + totalW + "px;height:" + (rowIdx * 40) + "px;pointer-events:none;z-index:6";
  barsContainer.innerHTML = barHtml;
  // Make bars interactive
  var barEls = barsContainer.querySelectorAll(".tl-bar");
  barEls.forEach(function(b) { b.style.pointerEvents = "auto"; });
  gridBody.appendChild(barsContainer);

  // Today line
  var todayOff = daysBetween(dateRange.start, today);
  if (todayOff >= 0 && todayOff < dateRange.days) {
    var lineLeft = todayOff * colW + Math.round(colW / 2);
    var todayLine = document.createElement("div");
    todayLine.className = "today-line";
    todayLine.style.left = lineLeft + "px";
    todayLine.style.height = (rowIdx * 40) + "px";
    todayLine.innerHTML = '<div class="today-label">\uC624\uB298</div>';
    gridBody.appendChild(todayLine);
  }

  // Revenue
  renderRevenue();

  // Setup interactions
  setupBarInteractions();
}

// ── Revenue ──
function renderRevenue() {
  var rev = revenueByDay();
  var colW = getColW();
  var maxRev = 0;
  var revArr = [];
  for (var d = 0; d < dateRange.days; d++) {
    var day = toDateStr(addDays(dateRange.start, d));
    var val = Math.round(rev[day] || 0);
    revArr.push(val);
    if (val > maxRev) maxRev = val;
  }
  var rInner = document.getElementById("revenueInner");
  var rHtml = "";
  for (var i = 0; i < revArr.length; i++) {
    var pct = maxRev > 0 ? Math.max(2, Math.round((revArr[i] / maxRev) * 36)) : 2;
    var formatted = revArr[i] > 0 ? Math.round(revArr[i]).toLocaleString() + "원" : "";
    rHtml += '<div class="revenue-col" style="width:' + colW + 'px;min-width:' + colW + 'px">';
    rHtml += '<div class="revenue-tooltip">' + formatted + '</div>';
    rHtml += '<div class="revenue-col-bar" style="height:' + pct + 'px"></div>';
    rHtml += '</div>';
  }
  rInner.innerHTML = rHtml;
  rInner.style.width = (dateRange.days * colW) + "px";
}

// ── Scroll Sync ──
function setupScrollSync() {
  var gridScroll = document.getElementById("gridScroll");
  var dateHeader = document.getElementById("dateHeader");
  var revenueScroll = document.getElementById("revenueScroll");

  // rAF로 묶어 헤더/매출바 스크롤 동기화를 한 프레임에 1회만 → 가로 스크롤 부드럽게
  gridScroll.addEventListener("scroll", function() {
    if (scrollSyncFlag) return;
    scrollSyncFlag = true;
    requestAnimationFrame(function() {
      var x = gridScroll.scrollLeft;
      dateHeader.scrollLeft = x;
      revenueScroll.scrollLeft = x;
      scrollSyncFlag = false;
    });
  }, { passive: true });
}

// ── Bar Interactions (drag, resize, click, context menu) ──
function setupBarInteractions() {
  var gridBody = document.getElementById("gridBody");
  var bars = gridBody.querySelectorAll(".tl-bar");
  bars.forEach(function(bar) {
    bar.addEventListener("pointerdown", onBarPointerDown);
    bar.addEventListener("click", onBarClick);
    bar.addEventListener("contextmenu", onBarContextMenu);
    // Long press for mobile
    bar.addEventListener("touchstart", onBarTouchStart, { passive: true });
    bar.addEventListener("touchend", onBarTouchEnd);
    bar.addEventListener("touchmove", onBarTouchCancel);
  });
}

function getItemById(id) {
  for (var i = 0; i < rawItems.length; i++) {
    if (rawItems[i].id === id) return rawItems[i];
  }
  return null;
}

function onBarClick(e) {
  if (this.__dragMoved) { this.__dragMoved = false; return; }  // 방금 드래그한 바 → 상세 안 열림
  if (e.target.classList.contains("resize-handle")) return;
  var item = getItemById(this.getAttribute("data-item-id"));
  if (item) showDetail(item);
}

function onBarContextMenu(e) {
  e.preventDefault();
  e.stopPropagation();
  var item = getItemById(this.getAttribute("data-item-id"));
  if (item) showContextMenu(e.clientX, e.clientY, item);
}

// Long press
function onBarTouchStart(e) {
  var self = this;
  longPressTimer = setTimeout(function() {
    var touch = e.changedTouches[0];
    var item = getItemById(self.getAttribute("data-item-id"));
    if (item) showContextMenu(touch.clientX, touch.clientY, item);
  }, 500);
}
function onBarTouchEnd() { clearTimeout(longPressTimer); }
function onBarTouchCancel() { clearTimeout(longPressTimer); }

// ── Drag / Resize ──
var dragState = null;

function onBarPointerDown(e) {
  if (e.button !== 0) return;
  var bar = this;
  var itemId = bar.getAttribute("data-item-id");
  var item = getItemById(itemId);
  if (!item) return;

  var isLeftHandle = e.target.classList.contains("left");
  var isRightHandle = e.target.classList.contains("right");
  var isResize = isLeftHandle || isRightHandle;

  var colW = getColW();
  var startX = e.clientX;
  var startY = e.clientY;
  var origLeft = parseInt(bar.style.left) || 0;
  var origWidth = parseInt(bar.style.width) || colW;
  var origStartDay = new Date(item._startDay);
  var origEndDay = new Date(item._endDay);

  var DRAG_THRESHOLD = 4;  // 이 거리 미만 이동은 클릭으로 간주 (클릭/드래그 충돌 방지)
  var moved = false;

  try { bar.setPointerCapture(e.pointerId); } catch (err) {}

  // 살짝 관성(lerp): 매 프레임 커서 목표 쪽으로 일부만 따라붙어 부드러운 가중감. (CSS 지연과 달리 sluggish하지 않음)
  var targetX = 0, targetY = 0, curX = 0, curY = 0, dragRAF = 0;
  var DRAG_EASE = 0.3;  // 1=즉시, 작을수록 관성 큼 (0.3 = 살짝)

  function dragTick() {
    curX += (targetX - curX) * DRAG_EASE;
    curY += (targetY - curY) * DRAG_EASE;
    if (Math.abs(targetX - curX) < 0.1) curX = targetX;
    if (Math.abs(targetY - curY) < 0.1) curY = targetY;
    bar.style.transform = "translate3d(" + curX + "px," + curY + "px,0)";
    dragRAF = requestAnimationFrame(dragTick);
  }

  function beginDrag() {
    moved = true;
    bar.classList.add("dragging");
    bar.style.transition = "none";  // 드래그 중엔 CSS 전환 끔 (관성은 rAF가 담당)
    dragRAF = requestAnimationFrame(dragTick);
  }

  function onMove(ev) {
    var dx = ev.clientX - startX;
    var dy = ev.clientY - startY;
    if (!moved) {
      if (Math.abs(dx) < DRAG_THRESHOLD && Math.abs(dy) < DRAG_THRESHOLD) return;
      beginDrag();
    }
    if (isResize && isLeftHandle) {
      var newLeft = origLeft + dx;
      var newWidth = origWidth - dx;
      if (newWidth < colW) { newWidth = colW; newLeft = origLeft + origWidth - colW; }
      bar.style.left = newLeft + "px";
      bar.style.width = newWidth + "px";
    } else if (isResize && isRightHandle) {
      var newW = origWidth + dx;
      if (newW < colW) newW = colW;
      bar.style.width = newW + "px";
    } else {
      // 이동: 목표만 갱신 → rAF 루프가 살짝 관성을 주며 따라옴
      targetX = dx;
      targetY = dy;
    }
  }

  // 변경 없음/실패 시 원래 위치(행 제자리)로 부드럽게 복귀
  function snapBarBack() {
    bar.style.transition = "transform 0.15s ease, left 0.15s ease, width 0.15s ease";
    bar.style.transform = "translate(0px,0px)";
    bar.style.left = origLeft + "px";
    bar.style.width = origWidth + "px";
    setTimeout(function() { bar.style.transition = ""; bar.style.transform = ""; }, 180);
  }

  function cleanup(ev) {
    if (dragRAF) { cancelAnimationFrame(dragRAF); dragRAF = 0; }  // 관성 루프 정지
    bar.classList.remove("dragging");
    try { bar.releasePointerCapture(ev.pointerId); } catch (err) {}
    bar.removeEventListener("pointermove", onMove);
    bar.removeEventListener("pointerup", onUp);
    bar.removeEventListener("pointercancel", onCancel);
  }

  // 스크롤이 포인터를 가로채는 등으로 취소될 때 상태 정리 (멈춤/유령 드래그 방지)
  function onCancel(ev) {
    cleanup(ev);
    if (moved) snapBarBack();
  }

  function onUp(ev) {
    cleanup(ev);
    if (!moved) return;  // 임계값 미만 → 클릭으로 처리 (상세 패널 열림)

    bar.__dragMoved = true;  // 드래그 직후 따라오는 click 억제

    var dx = ev.clientX - startX;
    var dayShift = Math.round(dx / colW);
    if (dayShift === 0) { snapBarBack(); return; }  // 반나절 미만 이동 → 변경 없이 복귀

    // 손 떼면: 떠 있던 위치에서 → 제 행의 새 날짜 칸으로 살짝 안착(세로 복귀 + 가로 스냅)
    if (!isResize) {
      bar.style.transition = "transform 0.14s ease";
      bar.style.transform = "translate(" + (dayShift * colW) + "px, 0px)";
    }

    var newStart, newEnd;
    if (isResize && isLeftHandle) {
      newStart = addDays(origStartDay, dayShift);
      newEnd = origEndDay;
      if (newStart > newEnd) newStart = newEnd;
    } else if (isResize && isRightHandle) {
      newStart = origStartDay;
      newEnd = addDays(origEndDay, dayShift);
      if (newEnd < newStart) newEnd = newStart;
    } else {
      newStart = addDays(origStartDay, dayShift);
      newEnd = addDays(origEndDay, dayShift);
    }

    // 원래 시각 보존 (날짜만 이동/조정)
    var origStartTime = item._start;
    var origEndTime = item._end;
    var startISO = new Date(newStart.getFullYear(), newStart.getMonth(), newStart.getDate(),
      origStartTime.getHours(), origStartTime.getMinutes(), origStartTime.getSeconds()).toISOString();
    var endISO = new Date(newEnd.getFullYear(), newEnd.getMonth(), newEnd.getDate(),
      origEndTime.getHours(), origEndTime.getMinutes(), origEndTime.getSeconds()).toISOString();

    var riParam = item.rowIndices ? "&rowIndices=" + encodeURIComponent(JSON.stringify(item.rowIndices)) : "";
    fetch(API_URL + "?key=village2026&action=updateTime&row=" + item.rowIndex +
      "&start=" + encodeURIComponent(startISO) + "&end=" + encodeURIComponent(endISO) + riParam)
      .then(function(r) { return r.json(); })
      .then(function(res) {
        if (res && res.success) {
          showToast("일정이 변경되었습니다");
          item._start = new Date(startISO);
          item._end = new Date(endISO);
          item._startDay = dateOnly(item._start);
          item._endDay = dateOnly(item._end);
          item.start = startISO;
          item.end = endISO;
          computeDateRange();
          render();
        } else {
          showToast("변경 실패: " + ((res && res.error) || ""));
          snapBarBack();
        }
      })
      .catch(function() {
        showToast("네트워크 오류 — 변경되지 않았습니다");
        snapBarBack();
      });
  }

  bar.addEventListener("pointermove", onMove);
  bar.addEventListener("pointerup", onUp);
  bar.addEventListener("pointercancel", onCancel);
  e.preventDefault();
}

// ── Context Menu ──
function showContextMenu(x, y, item) {
  ctxTarget = item;
  var menu = document.getElementById("ctxMenu");
  var isMobile = window.innerWidth < 600;
  if (isMobile) {
    menu.style.left = "0";
    menu.style.right = "0";
    menu.style.bottom = "0";
    menu.style.top = "auto";
  } else {
    menu.style.left = x + "px";
    menu.style.top = y + "px";
    menu.style.right = "auto";
    menu.style.bottom = "auto";
    // Keep in viewport
    requestAnimationFrame(function() {
      var rect = menu.getBoundingClientRect();
      if (rect.right > window.innerWidth) menu.style.left = (x - rect.width) + "px";
      if (rect.bottom > window.innerHeight) menu.style.top = (y - rect.height) + "px";
    });
  }
  menu.classList.add("open");
}

function hideContextMenu() {
  document.getElementById("ctxMenu").classList.remove("open");
  ctxTarget = null;
}

function ctxAction(action) {
  var item = ctxTarget;
  hideContextMenu();
  if (!item) return;

  if (action === "contract") {
    openTimelineContract(item);
    return;
  }
  if (action === "addEquip") {
    openAddModalForBooking(item);
    return;
  }
  if (action === "deleteEquip") {
    var equipName = item["세트명"] || item["장비명"];
    if (!item["거래ID"] || !equipName) {
      showToast("삭제할 거래/장비 정보를 찾지 못했습니다");
      return;
    }
    if (!confirm(equipName + " 을(를) 이 거래에서 삭제할까요?")) return;
    fetch(API_URL + "?key=village2026&action=scheduleRemoveEquip&tid=" + encodeURIComponent(item["거래ID"]) +
      "&equipName=" + encodeURIComponent(equipName))
      .then(function(r) { return r.json(); })
      .then(function(res) {
        if (res.error) { showToast("삭제 실패: " + res.error); return; }
        showToast("삭제 완료");
        loadData(false, { silent: true });
      })
      .catch(function() { showToast("네트워크 오류"); });
    return;
  }
}

// ── 커스텀 자동완성 드롭다운 ──
(function() {
  var input = document.getElementById("addSetName");
  var dropdown = document.getElementById("acDropdown");
  var errEl = document.getElementById("addSetNameError");
  var activeIdx = -1;
  if (!input || !dropdown || !errEl) return;

  function getList() { return Object.keys(equipNames).sort(); }

  function hideDD() { dropdown.style.display = "none"; }
  function showDD() { dropdown.style.display = "block"; }

  function showDropdown(filter) {
    var list = getList();
    var q = (filter || "").toLowerCase();
    var filtered = q ? list.filter(function(n) { return n.toLowerCase().indexOf(q) >= 0; }) : list;

    if (filtered.length === 0) {
      hideDD();
      return;
    }

    activeIdx = -1;
    dropdown.innerHTML = "";
    filtered.forEach(function(name, i) {
      var div = document.createElement("div");
      div.className = "ac-item";
      div.setAttribute("data-idx", i);
      if (q) {
        var idx = name.toLowerCase().indexOf(q);
        div.innerHTML = escHtml(name.slice(0, idx))
          + '<span class="ac-match">' + escHtml(name.slice(idx, idx + q.length)) + '</span>'
          + escHtml(name.slice(idx + q.length));
      } else {
        div.textContent = name;
      }
      div.addEventListener("mousedown", function(e) {
        e.preventDefault();
        input.value = name;
        hideDD();
        validateInput();
      });
      dropdown.appendChild(div);
    });
    showDD();
  }

  function validateInput() {
    var val = input.value.trim();
    if (!val) {
      errEl.style.display = "none";
      input.style.borderColor = "";
    } else if (equipNames[val]) {
      errEl.style.display = "none";
      input.style.borderColor = "var(--green-text)";
    } else {
      errEl.style.display = "block";
      input.style.borderColor = "var(--red)";
    }
  }

  input.addEventListener("focus", function() {
    showDropdown(this.value.trim());
  });

  input.addEventListener("input", function() {
    showDropdown(this.value.trim());
    validateInput();
  });

  input.addEventListener("blur", function() {
    setTimeout(hideDD, 150);
    validateInput();
  });

  input.addEventListener("keydown", function(e) {
    var items = dropdown.querySelectorAll(".ac-item");
    if (!items.length) return;

    if (e.key === "ArrowDown") {
      e.preventDefault();
      activeIdx = Math.min(activeIdx + 1, items.length - 1);
      updateActive(items);
    } else if (e.key === "ArrowUp") {
      e.preventDefault();
      activeIdx = Math.max(activeIdx - 1, 0);
      updateActive(items);
    } else if (e.key === "Enter" && activeIdx >= 0) {
      e.preventDefault();
      input.value = items[activeIdx].textContent;
      hideDD();
      validateInput();
    } else if (e.key === "Escape") {
      hideDD();
    }
  });

  function updateActive(items) {
    items.forEach(function(el, i) {
      el.classList.toggle("active", i === activeIdx);
    });
    if (activeIdx >= 0 && items[activeIdx]) {
      items[activeIdx].scrollIntoView({ block: "nearest" });
    }
  }
})();

  document.getElementById("addSetNameError").style.display = "none";

function collectScheduleEquipEntries() {
  var rows = document.querySelectorAll("#addEquipRows .multi-equip-row");
  var merged = {};
  var order = [];
  var invalid = [];
  var hasCatalog = Object.keys(equipNames).length > 0;
  rows.forEach(function(row) {
    var nameInput = row.querySelector(".schedule-equip-name");
    var qtyInput = row.querySelector(".schedule-equip-qty");
    var name = nameInput ? nameInput.value.trim() : "";
    if (!name) return;
    if (hasCatalog && !equipNames[name]) {
      invalid.push(name);
      nameInput.style.borderColor = "var(--red)";
      return;
    }
    if (nameInput) nameInput.style.borderColor = "";
    var qty = parseInt(qtyInput ? qtyInput.value : "1", 10);
    if (!qty || qty < 1) qty = 1;
    if (!merged[name]) {
      merged[name] = { name: name, qty: qty };
      order.push(name);
    } else {
      merged[name].qty += qty;
    }
  });

  var errEl = document.getElementById("addSetNameError");
  if (invalid.length) {
    errEl.textContent = "목록에 없는 장비명: " + invalid.join(", ");
    errEl.style.display = "block";
    return null;
  }
  errEl.style.display = "none";
  return order.map(function(name) { return merged[name]; });
}

function getCustNames() {

  (rawItems || []).forEach(function(item) {

  });

// 고객명/거래ID로 예약 일정 목록 가져오기
function getBookingsForCust(query) {
  var q = String(query || "").trim().toLowerCase();
  var byTrade = {};
  (rawItems || []).forEach(function(item) {
    var txId = item["거래ID"];
    if (!txId) return;
    var name = item.custName || "";
    var hay = (name + " " + txId).toLowerCase();
    if (q && hay.indexOf(q) < 0) return;

    if (!byTrade[txId]) {
      byTrade[txId] = {
        거래ID: txId,
        custName: name,
        반출: item.반출 || "",
        반납: item.반납 || "",
        반출시간: item.반출시간 || "",
        반납시간: item.반납시간 || "",
        start: item.start,
        end: item.end,
        status: item.status,
        equipMap: {},
        equipList: []
      };
    }

    var equipName = item["세트명원본"] || item.세트명 || item["장비명"] || "";
    if (equipName && !byTrade[txId].equipMap[equipName]) {
      byTrade[txId].equipMap[equipName] = true;
      byTrade[txId].equipList.push(equipName);
    }
  });
  var bookings = Object.keys(byTrade).map(function(id) { return byTrade[id]; });
  bookings.sort(function(a, b) { return (b.start || "").localeCompare(a.start || ""); });
  return bookings;
}

function showBookingList(query) {
  var bookings = getBookingsForCust(query);
  var container = document.getElementById("bookingList");
  var group = document.getElementById("bookingSelectGroup");

  container.innerHTML = "";

    return;

  group.style.display = "block";
  bookings.forEach(function(b) {
    var card = document.createElement("div");
    card.className = "booking-card";
    var equipSummary = b.equipList.length
      ? b.equipList.slice(0, 4).join(", ") + (b.equipList.length > 4 ? " 외 " + (b.equipList.length - 4) + "개" : "")

      + '<div class="bc-detail">' + escHtml(b.거래ID) + ' · ' + escHtml(b.status || "대기") + ' · 장비 ' + b.equipList.length + '개</div>'

    card.addEventListener("click", function() {

      selectedBooking = b;

function submitAddBooking() {
  var entries = collectScheduleEquipEntries();
  if (!entries) return;
  if (!entries.length) { showToast("장비명을 하나 이상 입력해주세요"); return; }
  if (!selectedBooking) { showToast("일정을 선택해주세요"); return; }

  var txID = selectedBooking["거래ID"];
  var custName = selectedBooking.custName;

  setScheduleAddBusy(true, "등록 중...");

  var successes = [];
  var failures = [];
  entries.reduce(function(promise, entry) {
    return promise.then(function() {
      return postScheduleEquip(txID, entry)
        .then(function() { successes.push(entry); })
        .catch(function(err) { failures.push({ entry: entry, message: err.message }); });
    });
  }, Promise.resolve()).then(function() {
    setScheduleAddBusy(false);
    if (failures.length) {
      if (successes.length) loadData(false, { silent: true });
      resetScheduleEquipRows(failures.map(function(f) { return f.entry; }));
      showToast((successes.length ? successes.length + "개 추가 완료, " : "") + failures.length + "개 실패");
      alert("추가 실패 목록\n" + failures.map(function(f) {
        return "- " + f.entry.name + ": " + f.message;
      }).join("\n"));
      return;
    }
    showToast(custName + " / 장비 " + successes.length + "개 추가 완료");
    closeAddModal();
    loadData(false, { silent: true });
  }).catch(function() {
    setScheduleAddBusy(false);
    showToast("네트워크 오류");
  });
}

function scrollToToday() {
  var today = dateOnly(new Date());
  if (!dateRange.start || !dateRange.end || today < dateRange.start || today > dateRange.end) return;
  var off = daysBetween(dateRange.start, today);
  var colW = getColW();
  var gridScroll = document.getElementById("gridScroll");
  var target = off * colW - gridScroll.clientWidth / 2 + colW / 2;
  gridScroll.scrollTo({ left: Math.max(0, target), behavior: "smooth" });
}
window.scrollToToday = scrollToToday;

function moveToday() {
  var today = dateOnly(new Date());
  filterStart = addDays(today, -1);
  filterEnd = addDays(today, 14);
  document.getElementById("dateFrom").value = toDateStr(filterStart);
  document.getElementById("dateTo").value = toDateStr(filterEnd);
  loadData().then(function() {
    setTimeout(function() {
      scrollToToday();
      showToast("오늘 기준으로 이동했습니다");
    }, 60);
  });
}
window.moveToday = moveToday;

// ── Group Collapse ──
function toggleGroup(name) {
  collapsedGroups[name] = !collapsedGroups[name];
  render();
}
window.toggleGroup = toggleGroup;

// ── Group Mode ──
function changeGroupMode(mode) {
  groupMode = mode;
  collapsedGroups = {};
  render();
}
window.changeGroupMode = changeGroupMode;

// ── Search ──
document.getElementById("searchInput").addEventListener("input", function() {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(function() {
    searchQuery = document.getElementById("searchInput").value.trim();
    render();
  }, 150);
});

// ── Zoom ──
function zoomIn() {
  continuousColW = Math.min(MAX_COL_W, continuousColW * 1.3);
  applyZoom();
}
function zoomOut() {
  continuousColW = Math.max(MIN_COL_W, continuousColW / 1.3);
  applyZoom();
}
function applyZoom() {
  // 줌 레벨 라벨 업데이트
  var label = continuousColW >= 80 ? "일" : continuousColW >= 30 ? "주" : "월";
  document.getElementById("zoomLevel").textContent = label;
  document.documentElement.style.setProperty("--col-w", Math.round(continuousColW) + "px");
  render();
}
window.zoomIn = zoomIn;
window.zoomOut = zoomOut;

// ── 마우스 휠 줌 (날짜 헤더 + 그리드 위에서) ──
// 커서 위치 기준으로 줌: 커서가 가리키는 날짜가 줌 후에도 같은 화면 위치에 있도록
(function() {
  var gridScroll = document.getElementById("gridScroll");
  var wheelDebounce = null;

  function handleWheelZoom(e) {
    // Ctrl+Wheel 또는 그냥 Wheel (세로 스크롤이 아닌 경우에만)
    // Ctrl 누른 상태에서만 줌 (일반 스크롤과 구분)
    if (!e.ctrlKey && !e.metaKey) return;
    e.preventDefault();

    var rect = gridScroll.getBoundingClientRect();
    var mouseX = e.clientX - rect.left + gridScroll.scrollLeft;
    var oldColW = continuousColW;

    // deltaY > 0 = 줌 아웃, deltaY < 0 = 줌 인
    var factor = e.deltaY > 0 ? 0.92 : 1.08;
    continuousColW = Math.max(MIN_COL_W, Math.min(MAX_COL_W, continuousColW * factor));

    if (continuousColW === oldColW) return;

    // 커서 위치 기준 스크롤 보정
    var ratio = continuousColW / oldColW;
    var newScrollLeft = mouseX * ratio - (e.clientX - rect.left);

    // debounce render (빠른 스크롤 시 렌더링 줄이기)
    if (wheelDebounce) cancelAnimationFrame(wheelDebounce);
    wheelDebounce = requestAnimationFrame(function() {
      var label = continuousColW >= 80 ? "일" : continuousColW >= 30 ? "주" : "월";
      document.getElementById("zoomLevel").textContent = label;
      document.documentElement.style.setProperty("--col-w", Math.round(continuousColW) + "px");
      render();
      gridScroll.scrollLeft = Math.max(0, newScrollLeft);
    });
  }

  gridScroll.addEventListener("wheel", handleWheelZoom, { passive: false });
  document.getElementById("dateHeader").addEventListener("wheel", handleWheelZoom, { passive: false });
})();

// ── 모바일 핀치 줌 ──
var lastPinchDist = 0;
document.getElementById("gridScroll").addEventListener("touchstart", function(e) {
  if (e.touches.length === 2) {
    lastPinchDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
  }
}, { passive: true });
document.getElementById("gridScroll").addEventListener("touchmove", function(e) {
  if (e.touches.length === 2) {
    var dist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    if (lastPinchDist > 0) {
      var ratio = dist / lastPinchDist;
      continuousColW = Math.max(MIN_COL_W, Math.min(MAX_COL_W, continuousColW * ratio));
      lastPinchDist = dist;
      applyZoom();
    }
  }
}, { passive: true });

// ── Loading ──
function showLoading(show) {
  document.getElementById("loading").classList.toggle("hidden", !show);
}

// ── Toast ──
function showToast(msg) {
  var el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(function() { el.classList.remove("show"); }, 2500);
}
window.showToast = showToast;

// ── Refresh ──
function updateRefreshInfo() {
  var now = new Date();
  var t = pad2(now.getHours()) + ":" + pad2(now.getMinutes());
  document.getElementById("refreshInfo").textContent = t + " 갱신 \u00B7 1분마다";
}
function startAutoRefresh() {
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(function() { loadData(false, { silent: true }); }, REFRESH_INTERVAL);
}

// ── Escape ──
document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") {
    closeDetail();
    closeAddModal();
    hideContextMenu();
  }
});

// ── Date Range Filter ──
document.getElementById("dateFrom").addEventListener("change", function() {
  var v = this.value;
  filterStart = v ? new Date(v + "T00:00:00") : null;
  loadData();
});
document.getElementById("dateTo").addEventListener("change", function() {
  var v = this.value;
  filterEnd = v ? new Date(v + "T00:00:00") : null;
  loadData();
});

// ── URL 파라미터 처리 ──
(function() {
  var urlParams = new URLSearchParams(window.location.search);
  var searchParam = urlParams.get('search');
  if (searchParam) {
    document.getElementById('searchInput').value = searchParam;
    searchQuery = searchParam;
  }
})();

// ── Init ──
setupScrollSync();
loadData();
startAutoRefresh();

// After first render, scroll to today
var firstRenderDone = false;
var origRender = render;
render = function() {
  origRender();
  if (!firstRenderDone) {
    firstRenderDone = true;
    setTimeout(scrollToToday, 100);
  }
};

})();
</script>
</body>
